ן־אֶטְרֹף וְאֵין מַצִּיל׃","זֹבֵחַ תּוֹדָה יְכַבְּדָנְנִי וְשָׂם דֶּרֶךְ אַרְאֶנּוּ בְּיֵשַׁע אֱלֹהִים׃"],"51":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","בְּבוֹא־אֵלָיו נָתָן הַנָּבִיא כַּאֲשֶׁר־בָּא אֶל־בַּת־שָׁבַע׃","חָנֵּנִי אֱלֹהִים כְּחַסְדֶּךָ כְּרֹב רַחֲמֶיךָ מְחֵה פְשָׁעָי׃","הרבה כַּבְּסֵנִי מֵעֲוֺנִי וּמֵחַטָּאתִי טַהֲרֵנִי׃","כִּי־פְשָׁעַי אֲנִי אֵדָע וְחַטָּאתִי נֶגְדִּי תָמִיד׃","לְךָ לְבַדְּךָ ׀ חָטָאתִי וְהָרַע בְּעֵינֶיךָ עָשִׂיתִי לְמַעַן תִּצְדַּק בְּדָבְרֶךָ תִּזְכֶּה בְשָׁפְטֶךָ׃","הֵן־בְּעָווֹן חוֹלָלְתִּי וּבְחֵטְא יֶחֱמַתְנִי אִמִּי׃","הֵן־אֱמֶת חָפַצְתָּ בַטֻּחוֹת וּבְסָתֻם חָכְמָה תוֹדִיעֵנִי׃","תְּחַטְּאֵנִי בְאֵזוֹב וְאֶטְהָר תְּכַבְּסֵנִי וּמִשֶּׁלֶג אַלְבִּין׃","תַּשְׁמִיעֵנִי שָׂשׂוֹן וְשִׂמְחָה תָּגֵלְנָה עֲצָמוֹת דִּכִּיתָ׃","הַסְתֵּר פָּנֶיךָ מֵחֲטָאָי וְכָל־עֲוֺנֹתַי מְחֵה׃","לֵב טָהוֹר בְּרָא־לִי אֱלֹהִים וְרוּחַ נָכוֹן חַדֵּשׁ בְּקִרְבִּי׃","אַל־תַּשְׁלִיכֵנִי מִלְּפָנֶיךָ וְרוּחַ קָדְשְׁךָ אַל־תִּקַּח מִמֶּנִּי׃","הָשִׁיבָה לִּי שְׂשׂוֹן יִשְׁעֶךָ וְרוּחַ נְדִיבָה תִסְמְכֵנִי׃","אֲלַמְּדָה פֹשְׁעִים דְּרָכֶיךָ וְחַטָּאִים אֵלֶיךָ יָשׁוּבוּ׃","הַצִּילֵנִי מִדָּמִים ׀ אֱלֹהִים אֱלֹהֵי תְּשׁוּעָתִי תְּרַנֵּן לְשׁוֹנִי צִדְקָתֶךָ׃","אֲדֹנָי שְׂפָתַי תִּפְתָּח וּפִי יַגִּיד תְּהִלָּתֶךָ׃","כִּי ׀ לֹא־תַחְפֹּץ זֶבַח וְאֶתֵּנָה עוֹלָה לֹא תִרְצֶה׃","זִבְחֵי אֱלֹהִים רוּחַ נִשְׁבָּרָה לֵב־נִשְׁבָּר וְנִדְכֶּה אֱלֹהִים לֹא תִבְזֶה׃","הֵיטִיבָה בִרְצוֹנְךָ אֶת־צִיּוֹן תִּבְנֶה חוֹמוֹת יְרוּשָׁלִָם׃","אָז תַּחְפֹּץ זִבְחֵי־צֶדֶק עוֹלָה וְכָלִיל אָז יַעֲלוּ עַל־מִזְבַּחֲךָ פָרִים׃"],"52":["לַמְנַצֵּחַ מַשְׂכִּיל לְדָוִד׃","בְּבוֹא ׀ דּוֹאֵג הָאֲדֹמִי וַיַּגֵּד לְשָׁאוּל וַיֹּאמֶר לוֹ בָּא דָוִד אֶל־בֵּית אֲחִימֶלֶךְ׃","מַה־תִּתְהַלֵּל בְּרָעָה הַגִּבּוֹר חֶסֶד אֵל כָּל־הַיּוֹם׃","הַוּוֹת תַּחְשֹׁב לְשׁוֹנֶךָ כְּתַעַר מְלֻטָּשׁ עֹשֵׂה רְמִיָּה׃","אָהַבְתָּ רָּע מִטּוֹב שֶׁקֶר ׀ מִדַּבֵּר צֶדֶק סֶלָה׃","אָהַבְתָּ כָל־דִּבְרֵי־בָלַע לְשׁוֹן מִרְמָה׃","גַּם־אֵל יִתָּצְךָ לָנֶצַח יַחְתְּךָ וְיִסָּחֲךָ מֵאֹהֶל וְשֵׁרֶשְׁךָ מֵאֶרֶץ חַיִּים סֶלָה׃","וְיִרְאוּ צַדִּיקִים וְיִירָאוּ וְעָלָיו יִשְׂחָקוּ׃","הִנֵּה הַגֶּבֶר לֹא יָשִׂים אֱלֹהִים מָעוּזּוֹ וַיִּבְטַח בְּרֹב עָשְׁרוֹ יָעֹז בְּהַוָּתוֹ׃","וַאֲנִי ׀ כְּזַיִת רַעֲנָן בְּבֵית אֱלֹהִים בָּטַחְתִּי בְחֶסֶד־אֱלֹהִים עוֹלָם וָעֶד׃","אוֹדְךָ לְעוֹלָם כִּי עָשִׂיתָ וַאֲקַוֶּה שִׁמְךָ כִי־טוֹב נֶגֶד חֲסִידֶיךָ׃"],"53":["לַמְנַצֵּחַ עַל־מָחֲלַת מַשְׂכִּיל לְדָוִד׃","אָמַר נָבָל בְּלִבּוֹ אֵין אֱלֹהִים הִשְׁחִיתוּ וְהִתְעִיבוּ עָוֶל אֵין עֹשֵׂה־טוֹב׃","אֱלֹהִים מִשָּׁמַיִם הִשְׁקִיף עַל־בְּנֵי אָדָם לִרְאוֹת הֲיֵשׁ מַשְׂכִּיל דֹּרֵשׁ אֶת־אֱלֹהִים׃","כֻּלּוֹ סָג יַחְדָּו נֶאֱלָחוּ אֵין עֹשֵׂה־טוֹב אֵין גַּם־אֶחָד׃","הֲלֹא יָדְעוּ פֹּעֲלֵי אָוֶן אֹכְלֵי עַמִּי אָכְלוּ לֶחֶם אֱלֹהִים לֹא קָרָאוּ׃","שָׁם ׀ פָּחֲדוּ־פַחַד לֹא־הָיָה פָחַד כִּי־אֱלֹהִים פִּזַּר עַצְמוֹת חֹנָךְ הֱבִשֹׁתָה כִּי־אֱלֹהִים מְאָסָם׃","מִי יִתֵּן מִצִּיּוֹן יְשֻׁעוֹת יִשְׂרָאֵל בְּשׁוּב אֱלֹהִים שְׁבוּת עַמּוֹ יָגֵל יַעֲקֹב יִשְׂמַח יִשְׂרָאֵל׃"],"54":["לַמְנַצֵּחַ בִּנְגִינֹת מַשְׂכִּיל לְדָוִד׃","בְּבוֹא הַזִּיפִים וַיֹּאמְרוּ לְשָׁאוּל הֲלֹא דָוִד מִסְתַּתֵּר עִמָּנוּ׃","אֱלֹהִים בְּשִׁמְךָ הוֹשִׁיעֵנִי וּבִגְבוּרָתְךָ תְדִינֵנִי׃","אֱלֹהִים שְׁמַע תְּפִלָּתִי הַאֲזִינָה לְאִמְרֵי־פִי׃","כִּי זָרִים ׀ קָמוּ עָלַי וְעָרִיצִים בִּקְשׁוּ נַפְשִׁי לֹא שָׂמוּ אֱלֹהִים לְנֶגְדָּם סֶלָה׃","הִנֵּה אֱלֹהִים עֹזֵר לִי אֲדֹנָי בְּסֹמְכֵי נַפְשִׁי׃","ישוב הָרַע לְשֹׁרְרָי בַּאֲמִתְּךָ הַצְמִיתֵם׃","בִּנְדָבָה אֶזְבְּחָה־לָּךְ אוֹדֶה שִּׁמְךָ יְהוָה כִּי־טוֹב׃","כִּי מִכָּל־צָרָה הִצִּילָנִי וּבְאֹיְבַי רָאֲתָה עֵינִי׃"],"55":["לַמְנַצֵּחַ בִּנְגִינֹת מַשְׂכִּיל לְדָוִד׃","הַאֲזִינָה אֱלֹהִים תְּפִלָּתִי וְאַל־תִּתְעַלַּם מִתְּחִנָּתִי׃","הַקְשִׁיבָה לִּי וַעֲנֵנִי אָרִיד בְּשִׂיחִי וְאָהִימָה׃","מִקּוֹל אוֹיֵב מִפְּנֵי עָקַת רָשָׁע כִּי־יָמִיטוּ עָלַי אָוֶן וּבְאַף יִשְׂטְמוּנִי׃","לִבִּי יָחִיל בְּקִרְבִּי וְאֵימוֹת מָוֶת נָפְלוּ עָלָי׃","יִרְאָה וָרַעַד יָבֹא בִי וַתְּכַסֵּנִי פַּלָּצוּת׃","וָאֹמַר מִי־יִתֶּן־לִּי אֵבֶר כַּיּוֹנָה אָעוּפָה וְאֶשְׁכֹּנָה׃","הִנֵּה אַרְחִיק נְדֹד אָלִין בַּמִּדְבָּר סֶלָה׃","אָחִישָׁה מִפְלָט לִי מֵרוּחַ סֹעָה מִסָּעַר׃","בַּלַּע אֲדֹנָי פַּלַּג לְשׁוֹנָם כִּי־רָאִיתִי חָמָס וְרִיב בָּעִיר׃","יוֹמָם וָלַיְלָה יְסוֹבְבֻהָ עַל־חוֹמֹתֶיהָ וְאָוֶן וְעָמָל בְּקִרְבָּהּ׃","הַוּוֹת בְּקִרְבָּהּ וְלֹא־יָמִישׁ מֵרְחֹבָהּ תֹּךְ וּמִרְמָה׃","כִּי לֹא־אוֹיֵב יְחָרְפֵנִי וְאֶשָּׂא לֹא־מְשַׂנְאִי עָלַי הִגְדִּיל וְאֶסָּתֵר מִמֶּנּוּ׃","וְאַתָּה אֱנוֹשׁ כְּעֶרְכִּי אַלּוּפִי וּמְיֻדָּעִי׃","אֲשֶׁר יַחְדָּו נַמְתִּיק סוֹד בְּבֵית אֱלֹהִים נְהַלֵּךְ בְּרָגֶשׁ׃","ישימות עָלֵימוֹ יֵרְדוּ שְׁאוֹל חַיִּים כִּי־רָעוֹת בִּמְגוּרָם בְּקִרְבָּם׃","אֲנִי אֶל־אֱלֹהִים אֶקְרָא וַיהוָה יוֹשִׁיעֵנִי׃","עֶרֶב וָבֹקֶר וְצָהֳרַיִם אָשִׂיחָה וְאֶהֱמֶה וַיִּשְׁמַע קוֹלִי׃","פָּדָה בְשָׁלוֹם נַפְשִׁי מִקֲּרָב־לִי כִּי־בְרַבִּים הָיוּ עִמָּדִי׃","יִשְׁמַע ׀ אֵל ׀ וְיַעֲנֵם וְיֹשֵׁב קֶדֶם סֶלָה אֲשֶׁר אֵין חֲלִיפוֹת לָמוֹ וְלֹא יָרְאוּ אֱלֹהִים׃","שָׁלַח יָדָיו בִּשְׁלֹמָיו חִלֵּל בְּרִיתוֹ׃","חָלְקוּ ׀ מַחְמָאֹת פִּיו וּקֲרָב־לִבּוֹ רַכּוּ דְבָרָיו מִשֶּׁמֶן וְהֵמָּה פְתִחוֹת׃","הַשְׁלֵךְ עַל־יְהוָה ׀ יְהָבְךָ וְהוּא יְכַלְכְּלֶךָ לֹא־יִתֵּן לְעוֹלָם מוֹט לַצַּדִּיק׃","וְאַתָּה אֱלֹהִים ׀ תּוֹרִדֵם ׀ לִבְאֵר שַׁחַת אַנְשֵׁי דָמִים וּמִרְמָה לֹא־יֶחֱצוּ יְמֵיהֶם וַאֲנִי אֶבְטַח־בָּךְ׃"],"56":["לַמְנַצֵּחַ ׀ עַל־יוֹנַת אֵלֶם רְחֹקִים לְדָוִד מִכְתָּם בֶּאֱחֹז אֹתוֹ פְלִשְׁתִּים בְּגַת׃","חָנֵּנִי אֱלֹהִים כִּי־שְׁאָפַנִי אֱנוֹשׁ כָּל־הַיּוֹם לֹחֵם יִלְחָצֵנִי׃","שָׁאֲפוּ שׁוֹרְרַי כָּל־הַיּוֹם כִּי־רַבִּים לֹחֲמִים לִי מָרוֹם׃","יוֹם אִירָא אֲנִי אֵלֶיךָ אֶבְטָח׃","בֵּאלֹהִים אֲהַלֵּל דְּבָרוֹ בֵּאלֹהִים בָּטַחְתִּי לֹא אִירָא מַה־יַּעֲשֶׂה בָשָׂר לִי׃","כָּל־הַיּוֹם דְּבָרַי יְעַצֵּבוּ עָלַי כָּל־מַחְשְׁבֹתָם לָרָע׃","יָגוּרוּ ׀ יצפינו הֵמָּה עֲקֵבַי יִשְׁמֹרוּ כַּאֲשֶׁר קִוּוּ נַפְשִׁי׃","עַל־אָוֶן פַּלֶּט־לָמוֹ בְּאַף עַמִּים ׀ הוֹרֵד אֱלֹהִים׃","נֹדִי סָפַרְתָּה אָתָּה שִׂימָה דִמְעָתִי בְנֹאדֶךָ הֲלֹא בְּסִפְרָתֶךָ׃","אָז יָשׁוּבוּ אוֹיְבַי אָחוֹר בְּיוֹם אֶקְרָא זֶה־יָדַעְתִּי כִּי־אֱלֹהִים לִי׃","בֵּאלֹהִים אֲהַלֵּל דָּבָר בַּיהוָה אֲהַלֵּל דָּבָר׃","בֵּאלֹהִים בָּטַחְתִּי לֹא אִירָא מַה־יַּעֲשֶׂה אָדָם לִי׃","עָלַי אֱלֹהִים נְדָרֶיךָ אֲשַׁלֵּם תּוֹדֹת לָךְ׃","כִּי הִצַּלְתָּ נַפְשִׁי מִמָּוֶת הֲלֹא רַגְלַי מִדֶּחִי לְהִתְהַלֵּךְ לִפְנֵי אֱלֹהִים בְּאוֹר הַחַיִּים׃"],"57":["לַמְנַצֵּחַ אַל־תַּשְׁחֵת לְדָוִד מִכְתָּם בְּבָרְחוֹ מִפְּנֵי־שָׁאוּל בַּמְּעָרָה׃","חָנֵּנִי אֱלֹהִים ׀ חָנֵּנִי כִּי בְךָ חָסָיָה נַפְשִׁי וּבְצֵל־כְּנָפֶיךָ אֶחְסֶה עַד יַעֲבֹר הַוּוֹת׃","אֶקְרָא לֵאלֹהִים עֶלְיוֹן לָאֵל גֹּמֵר עָלָי׃","יִשְׁלַח מִשָּׁמַיִם ׀ וְיוֹשִׁיעֵנִי חֵרֵף שֹׁאֲפִי סֶלָה יִשְׁלַח אֱלֹהִים חַסְדּוֹ וַאֲמִתּוֹ׃","נַפְשִׁי ׀ בְּתוֹךְ לְבָאִם אֶשְׁכְּבָה לֹהֲטִים בְּנֵי־אָדָם שִׁנֵּיהֶם חֲנִית וְחִצִּים וּלְשׁוֹנָם חֶרֶב חַדָּה׃","רוּמָה עַל־הַשָּׁמַיִם אֱלֹהִים עַל כָּל־הָאָרֶץ כְּבוֹדֶךָ׃","רֶשֶׁת ׀ הֵכִינוּ לִפְעָמַי כָּפַף נַפְשִׁי כָּרוּ לְפָנַי שִׁיחָה נָפְלוּ בְתוֹכָהּ סֶלָה׃","נָכוֹן לִבִּי אֱלֹהִים נָכוֹן לִבִּי אָשִׁירָה וַאֲזַמֵּרָה׃","עוּרָה כְבוֹדִי עוּרָה הַנֵּבֶל וְכִנּוֹר אָעִירָה שָּׁחַר׃","אוֹדְךָ בָעַמִּים ׀ אֲדֹנָי אֲזַמֶּרְךָ בַּל־אֻמִּים׃","כִּי־גָדֹל עַד־שָׁמַיִם חַסְדֶּךָ וְעַד־שְׁחָקִים אֲמִתֶּךָ׃","רוּמָה עַל־שָׁמַיִם אֱלֹהִים עַל כָּל־הָאָרֶץ כְּבוֹדֶךָ׃"],"58":["לַמְנַצֵּחַ אַל־תַּשְׁחֵת לְדָוִד מִכְתָּם׃","הַאֻמְנָם אֵלֶם צֶדֶק תְּדַבֵּרוּן מֵישָׁרִים תִּשְׁפְּטוּ בְּנֵי אָדָם׃","אַף־בְּלֵב עוֹלֹת תִּפְעָלוּן בָּאָרֶץ חֲמַס יְדֵיכֶם תְּפַלֵּסוּן׃","זֹרוּ רְשָׁעִים מֵרָחֶם תָּעוּ מִבֶּטֶן דֹּבְרֵי כָזָב׃","חֲמַת־לָמוֹ כִּדְמוּת חֲמַת־נָחָשׁ כְּמוֹ־פֶתֶן חֵרֵשׁ יַאְטֵם אָזְנוֹ׃","אֲשֶׁר לֹא־יִשְׁמַע לְקוֹל מְלַחֲשִׁים חוֹבֵר חֲבָרִים מְחֻכָּם׃","אֱלֹהִים הֲרָס־שִׁנֵּימוֹ בְּפִימוֹ מַלְתְּעוֹת כְּפִירִים נְתֹץ ׀ יְהוָה׃","יִמָּאֲסוּ כְמוֹ־מַיִם יִתְהַלְּכוּ־לָמוֹ יִדְרֹךְ חצו כְּמוֹ יִתְמֹלָלוּ׃","כְּמוֹ שַׁבְּלוּל תֶּמֶס יַהֲלֹךְ נֵפֶל אֵשֶׁת בַּל־חָזוּ שָׁמֶשׁ׃","בְּטֶרֶם יָבִינוּ סִּירֹתֵיכֶם אָטָד כְּמוֹ־חַי כְּמוֹ־חָרוֹן יִשְׂעָרֶנּוּ׃","יִשְׂמַח צַדִּיק כִּי־חָזָה נָקָם פְּעָמָיו יִרְחַץ בְּדַם הָרָשָׁע׃","וְיֹאמַר אָדָם אַךְ־פְּרִי לַצַּדִּיק אַךְ יֵשׁ־אֱלֹהִים שֹׁפְטִים בָּאָרֶץ׃"],"59":["לַמְנַצֵּחַ אַל־תַּשְׁחֵת לְדָוִד מִכְתָּם בִּשְׁלֹחַ שָׁאוּל וַיִּשְׁמְרוּ אֶת־הַבַּיִת לַהֲמִיתוֹ׃","הַצִּילֵנִי מֵאֹיְבַי ׀ אֱלֹהָי מִּמִתְקוֹמְמַי תְּשַׂגְּבֵנִי׃","הַצִּילֵנִי מִפֹּעֲלֵי אָוֶן וּמֵאַנְשֵׁי דָמִים הוֹשִׁיעֵנִי׃","כִּי הִנֵּה אָרְבוּ לְנַפְשִׁי יָגוּרוּ עָלַי עַזִים לֹא־פִשְׁעִי וְלֹא־חַטָּאתִי יְהוָה׃","בְּלִי־עָוֺן יְרוּצוּן וְיִכּוֹנָנוּ עוּרָה לִקְרָאתִי וּרְאֵה׃","וְאַתָּה יְהוָה־אֱלֹהִים ׀ צְבָאוֹת אֱלֹהֵי יִשְׂרָאֵל הָקִיצָה לִפְקֹד כָּל־הַגּוֹיִם אַל־תָּחֹן כָּל־בֹּגְדֵי אָוֶן סֶלָה׃","יָשׁוּבוּ לָעֶרֶב יֶהֱמוּ כַכָּלֶב וִיסוֹבְבוּ עִיר׃","הִנֵּה ׀ יַבִּיעוּן בְּפִיהֶם חֲרָבוֹת בְּשִׂפְתוֹתֵיהֶם כִּי־מִי שֹׁמֵעַ׃","וְאַתָּה יְהוָה תִּשְׂחַק־לָמוֹ תִּלְעַג לְכָל־גּוֹיִם׃","עֻזּוֹ אֵלֶיךָ אֶשְׁמֹרָה כִּי־אֱלֹהִים מִשְׂגַּבִּי׃","אֱלֹהֵי חסדו יְקַדְּמֵנִי אֱלֹהִים יַרְאֵנִי בְשֹׁרְרָי׃","אַל־תַּהַרְגֵם ׀ פֶּן־יִשְׁכְּחוּ עַמִּי הֲנִיעֵמוֹ בְחֵילְךָ וְהוֹרִידֵמוֹ מָגִנֵּנוּ אֲדֹנָי׃","חַטַּאת־פִּימוֹ דְּבַר־שְׂפָתֵימוֹ וְיִלָּכְדוּ בִגְאוֹנָם וּמֵאָלָה וּמִכַּחַשׁ יְסַפֵּרוּ׃","כַּלֵּה בְחֵמָה כַּלֵּה וְאֵינֵמוֹ וְיֵדְעוּ כִּי־אֱלֹהִים מֹשֵׁל בְּיַעֲקֹב לְאַפְסֵי הָאָרֶץ סֶלָה׃","וְיָשׁוּבוּ לָעֶרֶב יֶהֱמוּ כַכָּלֶב וִיסוֹבְבוּ עִיר׃","הֵמָּה ינועון לֶאֱכֹל אִם־לֹא יִשְׂבְּעוּ וַיָּלִינוּ׃","וַאֲנִי ׀ אָשִׁיר עֻזֶּךָ וַאֲרַנֵּן לַבֹּקֶר חַסְדֶּךָ כִּי־הָיִיתָ מִשְׂגָּב לִי וּמָנוֹס בְּיוֹם צַר־לִי׃","עֻזִּי אֵלֶיךָ אֲזַמֵּרָה כִּי־אֱלֹהִים מִשְׂגַּבִּי אֱלֹהֵי חַסְדִּי׃"],"60":["לַמְנַצֵּחַ עַל־שׁוּשַׁן עֵדוּת מִכְתָּם לְדָוִד לְלַמֵּד׃","בְּהַצּוֹתוֹ ׀ אֶת אֲרַם נַהֲרַיִם וְאֶת־אֲרַם צוֹבָה וַיָּשָׁב יוֹאָב וַיַּךְ אֶת־אֱדוֹם בְּגֵיא־מֶלַח שְׁנֵים עָשָׂר אָלֶף׃","אֱלֹהִים זְנַחְתָּנוּ פְרַצְתָּנוּ אָנַפְתָּ תְּשׁוֹבֵב לָנוּ׃","הִרְעַשְׁתָּה אֶרֶץ פְּצַמְתָּהּ רְפָה שְׁבָרֶיהָ כִי־מָטָה׃","הִרְאִיתָה עַמְּךָ קָשָׁה הִשְׁקִיתָנוּ יַיִן תַּרְעֵלָה׃","נָתַתָּה לִּירֵאֶיךָ נֵּס לְהִתְנוֹסֵס מִפְּנֵי קֹשֶׁט סֶלָה׃","לְמַעַן יֵחָלְצוּן יְדִידֶיךָ הוֹשִׁיעָה יְמִינְךָ ועננו׃","אֱלֹהִים ׀ דִּבֶּר בְּקָדְשׁוֹ אֶעְלֹזָה אֲחַלְּקָה שְׁכֶם וְעֵמֶק סֻכּוֹת אֲמַדֵּד׃","לִי גִלְעָד ׀ וְלִי מְנַשֶּׁה וְאֶפְרַיִם מָעוֹז רֹאשִׁי יְהוּדָה מְחֹקְקִי׃","מוֹאָב ׀ סִיר רַחְצִי עַל־אֱדוֹם אַשְׁלִיךְ נַעֲלִי עָלַי פְּלֶשֶׁת הִתְרֹעָעִי׃","מִי יֹבִלֵנִי עִיר מָצוֹר מִי נָחַנִי עַד־אֱדוֹם׃","הֲלֹא־אַתָּה אֱלֹהִים זְנַחְתָּנוּ וְלֹא־תֵצֵא אֱלֹהִים בְּצִבְאוֹתֵינוּ׃","הָבָה־לָּנוּ עֶזְרָת מִצָּר וְשָׁוְא תְּשׁוּעַת אָדָם׃","בֵּאלֹהִים נַעֲשֶׂה־חָיִל וְהוּא יָבוּס צָרֵינוּ׃"],"61":["לַמְנַצֵּחַ ׀ עַל־נְגִינַת לְדָוִד׃","שִׁמְעָה אֱלֹהִים רִנָּתִי הַקְשִׁיבָה תְּפִלָּתִי׃","מִקְצֵה הָאָרֶץ ׀ אֵלֶיךָ אֶקְרָא בַּעֲטֹף לִבִּי בְּצוּר־יָרוּם מִמֶּנִּי תַנְחֵנִי׃","כִּי־הָיִיתָ מַחְסֶה לִי מִגְדַּל־עֹז מִפְּנֵי אוֹיֵב׃","אָגוּרָה בְאָהָלְךָ עוֹלָמִים אֶחֱסֶה בְסֵתֶר כְּנָפֶיךָ סֶּלָה׃","כִּי־אַתָּה אֱלֹהִים שָׁמַעְתָּ לִנְדָרָי נָתַתָּ יְרֻשַּׁת יִרְאֵי שְׁמֶךָ׃","יָמִים עַל־יְמֵי־מֶלֶךְ תּוֹסִיף שְׁנוֹתָיו כְּמוֹ־דֹר וָדֹר׃","יֵשֵׁב עוֹלָם לִפְנֵי אֱלֹהִים חֶסֶד וֶאֱמֶת מַן יִנְצְרֻהוּ׃","כֵּן אֲזַמְּרָה שִׁמְךָ לָעַד לְשַׁלְּמִי נְדָרַי יוֹם ׀ יוֹם׃"],"62":["לַמְנַצֵּחַ עַל־יְדוּתוּן מִזְמוֹר לְדָוִד׃","אַךְ אֶל־אֱלֹהִים דּוּמִיָּה נַפְשִׁי מִמֶּנּוּ יְשׁוּעָתִי׃","אַךְ־הוּא צוּרִי וִישׁוּעָתִי מִשְׂגַּבִּי לֹא־אֶמּוֹט רַבָּה׃","עַד־אָנָה ׀ תְּהוֹתְתוּ עַל אִישׁ תְּרָצְּחוּ כֻלְּכֶם כְּקִיר נָטוּי גָּדֵר הַדְּחוּיָה׃","אַךְ מִשְּׂאֵתוֹ ׀ יָעֲצוּ לְהַדִּיחַ יִרְצוּ כָזָב בְּפִיו יְבָרֵכוּ וּבְקִרְבָּם יְקַלְלוּ־סֶלָה׃","אַךְ לֵאלֹהִים דּוֹמִּי נַפְשִׁי כִּי־מִמֶּנּוּ תִּקְוָתִי׃","אַךְ־הוּא צוּרִי וִישׁוּעָתִי מִשְׂגַּבִּי לֹא אֶמּוֹט׃","עַל־אֱלֹהִים יִשְׁעִי וּכְבוֹדִי צוּר־עֻזִּי מַחְסִי בֵּאלֹהִים׃","בִּטְחוּ בוֹ בְכָל־עֵת ׀ עָם שִׁפְכוּ־לְפָנָיו לְבַבְכֶם אֱלֹהִים מַחֲסֶה־לָּנוּ סֶלָה׃","אַךְ ׀ הֶבֶל בְּנֵי־אָדָם כָּזָב בְּנֵי אִישׁ בְּמֹאזְנַיִם לַעֲלוֹת הֵמָּה מֵהֶבֶל יָחַד׃","אַל־תִּבְטְחוּ בְעֹשֶׁק וּבְגָזֵל אַל־תֶּהְבָּלוּ חַיִל ׀ כִּי־יָנוּב אַל־תָּשִׁיתוּ לֵב׃","אַחַת ׀ דִּבֶּר אֱלֹהִים שְׁתַּיִם־זוּ שָׁמָעְתִּי כִּי עֹז לֵאלֹהִים׃","וּלְךָ־אֲדֹנָי חָסֶד כִּי־אַתָּה תְשַׁלֵּם לְאִישׁ כְּמַעֲשֵׂהוּ׃"],"63":["מִזְמוֹר לְדָוִד בִּהְיוֹתוֹ בְּמִדְבַּר יְהוּדָה׃","אֱלֹהִים ׀ אֵלִי אַתָּה אֲשַׁחֲרֶךָּ צָמְאָה לְךָ ׀ נַפְשִׁי כָּמַהּ לְךָ בְשָׂרִי בְּאֶרֶץ־צִיָּה וְעָיֵף בְּלִי־מָיִם׃","כֵּן בַּקֹּדֶשׁ חֲזִיתִיךָ לִרְאוֹת עֻזְּךָ וּכְבוֹדֶךָ׃","כִּי־טוֹב חַסְדְּךָ מֵחַיִּים שְׂפָתַי יְשַׁבְּחוּנְךָ׃","כֵּן אֲבָרֶכְךָ בְחַיָּי בְּשִׁמְךָ אֶשָּׂא כַפָּי׃","כְּמוֹ חֵלֶב וָדֶשֶׁן תִּשְׂבַּע נַפְשִׁי וְשִׂפְתֵי רְנָנוֹת יְהַלֶּל־פִּי׃","אִם־זְכַרְתִּיךָ עַל־יְצוּעָי בְּאַשְׁמֻרוֹת אֶהְגֶּה־בָּךְ׃","כִּי־הָיִיתָ עֶזְרָתָה לִּי וּבְצֵל כְּנָפֶיךָ אֲרַנֵּן׃","דָּבְקָה נַפְשִׁי אַחֲרֶיךָ בִּי תָּמְכָה יְמִינֶךָ׃","וְהֵמָּה לְשׁוֹאָה יְבַקְשׁוּ נַפְשִׁי יָבֹאוּ בְּתַחְתִּיּוֹת הָאָרֶץ׃","יַגִּירֻהוּ עַל־יְדֵי־חָרֶב מְנָת שֻׁעָלִים יִהְיוּ׃","וְהַמֶּלֶךְ יִשְׂמַח בֵּאלֹהִים יִתְהַלֵּל כָּל־הַנִּשְׁבָּע בּוֹ כִּי יִסָּכֵר פִּי דוֹבְרֵי־שָׁקֶר׃"],"64":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","שְׁמַע־אֱלֹהִים קוֹלִי בְשִׂיחִי מִפַּחַד אוֹיֵב תִּצֹּר חַיָּי׃","תַּסְתִּירֵנִי מִסּוֹד מְרֵעִים מֵרִגְשַׁת פֹּעֲלֵי אָוֶן׃","אֲשֶׁר שָׁנְנוּ כַחֶרֶב לְשׁוֹנָם דָּרְכוּ חִצָּם דָּבָר מָר׃","לִירוֹת בַּמִּסְתָּרִים תָּם פִּתְאֹם יֹרֻהוּ וְלֹא יִירָאוּ׃","יְחַזְּקוּ־לָמוֹ ׀ דָּבָר רָע יְסַפְּרוּ לִטְמוֹן מוֹקְשִׁים אָמְרוּ מִי יִרְאֶה־לָּמוֹ׃","יַחְפְּשׂוּ־עוֹלֹת תַּמְנוּ חֵפֶשׂ מְחֻפָּשׂ וְקֶרֶב אִישׁ וְלֵב עָמֹק׃","וַיֹּרֵם אֱלֹהִים חֵץ פִּתְאוֹם הָיוּ מַכּוֹתָם׃","וַיַּכְשִׁילוּהוּ עָלֵימוֹ לְשׁוֹנָם יִתְנֹדֲדוּ כָּל־רֹאֵה בָם׃","וַיִּירְאוּ כָּל־אָדָם וַיַּגִּידוּ פֹּעַל אֱלֹהִים וּמַעֲשֵׂהוּ הִשְׂכִּילוּ׃","יִשְׂמַח צַדִּיק בַּיהוָה וְחָסָה בוֹ וְיִתְהַלְלוּ כָּל־יִשְׁרֵי־לֵב׃"],"65":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד שִׁיר׃","לְךָ דֻמִיָּה תְהִלָּה אֱלֹהִים בְּצִיּוֹן וּלְךָ יְשֻׁלַּם־נֶדֶר׃","שֹׁמֵעַ תְּפִלָּה עָדֶיךָ כָּל־בָּשָׂר יָבֹאוּ׃","דִּבְרֵי עֲוֺנֹת גָּבְרוּ מֶנִּי פְּשָׁעֵינוּ אַתָּה תְכַפְּרֵם׃","אַשְׁרֵי ׀ תִּבְחַר וּתְקָרֵב יִשְׁכֹּן חֲצֵרֶיךָ נִשְׂבְּעָה בְּטוּב בֵּיתֶךָ קְדֹשׁ הֵיכָלֶךָ׃","נוֹרָאוֹת ׀ בְּצֶדֶק תַּעֲנֵנוּ אֱלֹהֵי יִשְׁעֵנוּ מִבְטָח כָּל־קַצְוֵי־אֶרֶץ וְיָם רְחֹקִים׃","מֵכִין הָרִים בְּכֹחוֹ נֶאְזָר בִּגְבוּרָה׃","מַשְׁבִּיחַ ׀ שְׁאוֹן יַמִּים שְׁאוֹן גַּלֵּיהֶם וַהֲמוֹן לְאֻמִּים׃","וַיִּירְאוּ ׀ יֹשְׁבֵי קְצָוֺת מֵאוֹתֹתֶיךָ מוֹצָאֵי־בֹקֶר וָעֶרֶב תַּרְנִין׃","פָּקַדְתָּ הָאָרֶץ ׀ וַתְּשֹׁקְקֶהָ רַבַּת תַּעְשְׁרֶנָּה פֶּלֶג אֱלֹהִים מָלֵא מָיִם תָּכִין דְּגָנָם כִּי־כֵן תְּכִינֶהָ׃","תְּלָמֶיהָ רַוֵּה נַחֵת גְּדוּדֶיהָ בִּרְבִיבִים תְּמֹגְגֶנָּה צִמְחָהּ תְּבָרֵךְ׃","עִטַּרְתָּ שְׁנַת טוֹבָתֶךָ וּמַעְגָּלֶיךָ יִרְעֲפוּן דָּשֶׁן׃","יִרְעֲפוּ נְאוֹת מִדְבָּר וְגִיל גְּבָעוֹת תַּחְגֹּרְנָה׃","לָבְשׁוּ כָרִים ׀ הַצֹּאן וַעֲמָקִים יַעַטְפוּ־בָר יִתְרוֹעֲעוּ אַף־יָשִׁירוּ׃"],"66":["לַמְנַצֵּחַ שִׁיר מִזְמוֹר הָרִיעוּ לֵאלֹהִים כָּל־הָאָרֶץ׃","זַמְּרוּ כְבוֹד־שְׁמוֹ שִׂימוּ כָבוֹד תְּהִלָּתוֹ׃","אִמְרוּ לֵאלֹהִים מַה־נּוֹרָא מַעֲשֶׂיךָ בְּרֹב עֻזְּךָ יְכַחֲשׁוּ לְךָ אֹיְבֶיךָ׃","כָּל־הָאָרֶץ ׀ יִשְׁתַּחֲווּ לְךָ וִיזַמְּרוּ־לָךְ יְזַמְּרוּ שִׁמְךָ סֶלָה׃","לְכוּ וּרְאוּ מִפְעֲלוֹת אֱלֹהִים נוֹרָא עֲלִילָה עַל־בְּנֵי אָדָם׃","הָפַךְ יָם ׀ לְיַבָּשָׁה בַּנָּהָר יַעַבְרוּ בְרָגֶל שָׁם נִשְׂמְחָה־בּוֹ׃","מֹשֵׁל בִּגְבוּרָתוֹ ׀ עוֹלָם עֵינָיו בַּגּוֹיִם תִּצְפֶּינָה הַסּוֹרְרִים ׀ אַל־ירימו לָמוֹ סֶלָה׃","בָּרְכוּ עַמִּים ׀ אֱלֹהֵינוּ וְהַשְׁמִיעוּ קוֹל תְּהִלָּתוֹ׃","הַשָּׂם נַפְשֵׁנוּ בַּחַיִּים וְלֹא־נָתַן לַמּוֹט רַגְלֵנוּ׃","כִּי־בְחַנְתָּנוּ אֱלֹהִים צְרַפְתָּנוּ כִּצְרָף־כָּסֶף׃","הֲבֵאתָנוּ בַמְּצוּדָה שַׂמְתָּ מוּעָקָה בְמָתְנֵינוּ׃","הִרְכַּבְתָּ אֱנוֹשׁ לְרֹאשֵׁנוּ בָּאנוּ־בָאֵשׁ וּבַמַּיִם וַתּוֹצִיאֵנוּ לָרְוָיָה׃","אָבוֹא בֵיתְךָ בְעוֹלוֹת אֲשַׁלֵּם לְךָ נְדָרָי׃","אֲשֶׁר־פָּצוּ שְׂפָתָי וְדִבֶּר־פִּי בַּצַּר־לִי׃","עֹלוֹת מֵחִים אַעֲלֶה־לָּךְ עִם־קְטֹרֶת אֵילִים אֶעֱשֶׂה בָקָר עִם־עַתּוּדִים סֶלָה׃","לְכוּ־שִׁמְעוּ וַאֲסַפְּרָה כָּל־יִרְאֵי אֱלֹהִים אֲשֶׁר עָשָׂה לְנַפְשִׁי׃","אֵלָיו פִּי־קָרָאתִי וְרוֹמַם תַּחַת לְשׁוֹנִי׃","אָוֶן אִם־רָאִיתִי בְלִבִּי לֹא יִשְׁמַע ׀ אֲדֹנָי׃","אָכֵן שָׁמַע אֱלֹהִים הִקְשִׁיב בְּקוֹל תְּפִלָּתִי׃","בָּרוּךְ אֱלֹהִים אֲשֶׁר לֹא־הֵסִיר תְּפִלָּתִי וְחַסְדּוֹ מֵאִתִּי׃"],"67":["לַמְנַצֵּח בִּנְגִינֹת מִזְמוֹר שִׁיר׃","אֱלֹהִים יְחָנֵּנוּ וִיבָרְכֵנוּ יָאֵר פָּנָיו אִתָּנוּ סֶלָה׃","לָדַעַת בָּאָרֶץ דַּרְכֶּךָ בְּכָל־גּוֹיִם יְשׁוּעָתֶךָ׃","יוֹדוּךָ עַמִּים ׀ אֱלֹהִים יוֹדוּךָ עַמִּים כֻּלָּם׃","יִשְׂמְחוּ וִירַנְּנוּ לְאֻמִּים כִּי־תִשְׁפֹּט עַמִּים מִישׁוֹר וּלְאֻמִּים ׀ בָּאָרֶץ תַּנְחֵם סֶלָה׃","יוֹדוּךָ עַמִּים ׀ אֱלֹהִים יוֹדוּךָ עַמִּים כֻּלָּם׃","אֶרֶץ נָתְנָה יְבוּלָהּ יְבָרְכֵנוּ אֱלֹהִים אֱלֹהֵינוּ׃","יְבָרְכֵנוּ אֱלֹהִים וְיִירְאוּ אֹתוֹ כָּל־אַפְסֵי־אָרֶץ׃"],"68":["לַמְנַצֵּחַ לְדָוִד מִזְמוֹר שִׁיר׃","יָקוּם אֱלֹהִים יָפוּצוּ אוֹיְבָיו וְיָנוּסוּ מְשַׂנְאָיו מִפָּנָיו׃","כְּהִנְדֹּף עָשָׁן תִּנְדֹּף כְּהִמֵּס דּוֹנַג מִפְּנֵי־אֵשׁ יֹאבְדוּ רְשָׁעִים מִפְּנֵי אֱלֹהִים׃","וְצַדִּיקִים יִשְׂמְחוּ יַעַלְצוּ לִפְנֵי אֱלֹהִים וְיָשִׂישׂוּ בְשִׂמְחָה׃","שִׁירוּ ׀ לֵאלֹהִים זַמְּרוּ שְׁמוֹ סֹלּוּ לָרֹכֵב בָּעֲרָבוֹת בְּיָהּ שְׁמוֹ וְעִלְזוּ לְפָנָיו׃","אֲבִי יְתוֹמִים וְדַיַּן אַלְמָנוֹת אֱלֹהִים בִּמְעוֹן קָדְשׁוֹ׃","אֱלֹהִים ׀ מוֹשִׁיב יְחִידִים ׀ בַּיְתָה מוֹצִיא אֲסִירִים בַּכּוֹשָׁרוֹת אַךְ סוֹרֲרִים שָׁכְנוּ צְחִיחָה׃","אֱלֹהִים בְּצֵאתְךָ לִפְנֵי עַמֶּךָ בְּצַעְדְּךָ בִישִׁימוֹן סֶלָה׃","אֶרֶץ רָעָשָׁה ׀ אַף־שָׁמַיִם נָטְפוּ מִפְּנֵי אֱלֹהִים זֶה סִינַי מִפְּנֵי אֱלֹהִים אֱלֹהֵי יִשְׂרָאֵל׃","גֶּשֶׁם נְדָבוֹת תָּנִיף אֱלֹהִים נַחֲלָתְךָ וְנִלְאָה אַתָּה כוֹנַנְתָּהּ׃","חַיָּתְךָ יָשְׁבוּ־בָהּ תָּכִין בְּטוֹבָתְךָ לֶעָנִי אֱלֹהִים׃","אֲדֹנָי יִתֶּן־אֹמֶר הַמְבַשְּׂרוֹת צָבָא רָב׃","מַלְכֵי צְבָאוֹת יִדֹּדוּן יִדֹּדוּן וּנְוַת בַּיִת תְּחַלֵּק שָׁלָל׃","אִם־תִּשְׁכְּבוּן בֵּין שְׁפַתָּיִם כַּנְפֵי יוֹנָה נֶחְפָּה בַכֶּסֶף וְאֶבְרוֹתֶיהָ בִּירַקְרַק חָרוּץ׃","בְּפָרֵשׂ שַׁדַּי מְלָכִים בָּהּ תַּשְׁלֵג בְּצַלְמוֹן׃","הַר־אֱלֹהִים הַר־בָּשָׁן הַר גַּבְנֻנִּים הַר־בָּשָׁן׃","לָמָּה ׀ תְּרַצְּדוּן הָרִים גַּבְנֻנִּים הָהָר חָמַד אֱלֹהִים לְשִׁבְתּוֹ אַף־יְהוָה יִשְׁכֹּן לָנֶצַח׃","רֶכֶב אֱלֹהִים רִבֹּתַיִם אַלְפֵי שִׁנְאָן אֲדֹנָי בָם סִינַי בַּקֹּדֶשׁ׃","עָלִיתָ לַמָּרוֹם ׀ שָׁבִיתָ שֶּׁבִי לָקַחְתָּ מַתָּנוֹת בָּאָדָם וְאַף סוֹרְרִים לִשְׁכֹּן ׀ יָהּ אֱלֹהִים׃","בָּרוּךְ אֲדֹנָי יוֹם ׀ יוֹם יַעֲמָס־לָנוּ הָאֵל יְשׁוּעָתֵנוּ סֶלָה׃","הָאֵל ׀ לָנוּ אֵל לְמוֹשָׁעוֹת וְלֵיהוִה אֲדֹנָי לַמָּוֶת תּוֹצָאוֹת׃","אַךְ־אֱלֹהִים יִמְחַץ רֹאשׁ אֹיְבָיו קָדְקֹד שֵׂעָר מִתְהַלֵּךְ בַּאֲשָׁמָיו׃","אָמַר אֲדֹנָי מִבָּשָׁן אָשִׁיב אָשִׁיב מִמְּצֻלוֹת יָם׃","לְמַעַן ׀ תִּמְחַץ רַגְלְךָ בְּדָם לְשׁוֹן כְּלָבֶיךָ מֵאֹיְבִים מִנֵּהוּ׃","רָאוּ הֲלִיכוֹתֶיךָ אֱלֹהִים הֲלִיכוֹת אֵלִי מַלְכִּי בַקֹּדֶשׁ׃","קִדְּמוּ שָׁרִים אַחַר נֹגְנִים בְּתוֹךְ עֲלָמוֹת תּוֹפֵפוֹת׃","בְּמַקְהֵלוֹת בָּרְכוּ אֱלֹהִים יְהוָה מִמְּקוֹר יִשְׂרָאֵל׃","שָׁם בִּנְיָמִן ׀ צָעִיר רֹדֵם שָׂרֵי יְהוּדָה רִגְמָתָם שָׂרֵי זְבֻלוּן שָׂרֵי נַפְתָּלִי׃","צִוָּה אֱלֹהֶיךָ עֻזֶּךָ עוּזָּה אֱלֹהִים זוּ פָּעַלְתָּ לָּנוּ׃","מֵהֵיכָלֶךָ עַל־יְרוּשָׁלִָם לְךָ יוֹבִילוּ מְלָכִים שָׁי׃","גְּעַר חַיַּת קָנֶה עֲדַת אַבִּירִים ׀ בְּעֶגְלֵי עַמִּים מִתְרַפֵּס בְּרַצֵּי־כָסֶף בִּזַּר עַמִּים קְרָבוֹת יֶחְפָּצוּ׃","יֶאֱתָיוּ חַשְׁמַנִּים מִנִּי מִצְרָיִם כּוּשׁ תָּרִיץ יָדָיו לֵאלֹהִים׃","מַמְלְכוֹת הָאָרֶץ שִׁירוּ לֵאלֹהִים זַמְּרוּ אֲדֹנָי סֶלָה׃","לָרֹכֵב בִּשְׁמֵי שְׁמֵי־קֶדֶם הֵן יִתֵּן בְּקוֹלוֹ קוֹל עֹז׃","תְּנוּ עֹז לֵאלֹהִים עַל־יִשְׂרָאֵל גַּאֲוָתוֹ וְעֻזּוֹ בַּשְּׁחָקִים׃","נוֹרָא אֱלֹהִים מִמִּקְדָּשֶׁיךָ אֵל יִשְׂרָאֵל הוּא נֹתֵן ׀ עֹז וְתַעֲצֻמוֹת לָעָם בָּרוּךְ אֱלֹהִים׃"],"69":["לַמְנַצֵּחַ עַל־שׁוֹשַׁנִּים לְדָוִד׃","הוֹשִׁיעֵנִי אֱלֹהִים כִּי בָאוּ מַיִם עַד־נָפֶשׁ׃","טָבַעְתִּי ׀ בִּיוֵן מְצוּלָה וְאֵין מָעֳמָד בָּאתִי בְמַעֲמַקֵּי־מַיִם וְשִׁבֹּלֶת שְׁטָפָתְנִי׃","יָגַעְתִּי בְקָרְאִי נִחַר גְּרוֹנִי כָּלוּ עֵינַי מְיַחֵל לֵאלֹהָי׃","רַבּוּ ׀ מִשַּׂעֲרוֹת רֹאשִׁי שֹׂנְאַי חִנָּם עָצְמוּ מַצְמִיתַי אֹיְבַי שֶׁקֶר אֲשֶׁר לֹא־גָזַלְתִּי אָז אָשִׁיב׃","אֱלֹהִים אַתָּה יָדַעְתָּ לְאִוַּלְתִּי וְאַשְׁמוֹתַי מִמְּךָ לֹא־נִכְחָדוּ׃","אַל־יֵבֹשׁוּ בִי ׀ קֹוֶיךָ אֲדֹנָי יְהוִה צְבָאוֹת אַל־יִכָּלְמוּ בִי מְבַקְשֶׁיךָ אֱלֹהֵי יִשְׂרָאֵל׃","כִּי־עָלֶיךָ נָשָׂאתִי חֶרְפָּה כִּסְּתָה כְלִמָּה פָנָי׃","מוּזָר הָיִיתִי לְאֶחָי וְנָכְרִי לִבְנֵי אִמִּי׃","כִּי־קִנְאַת בֵּיתְךָ אֲכָלָתְנִי וְחֶרְפּוֹת חוֹרְפֶיךָ נָפְלוּ עָלָי׃","וָאֶבְכֶּה בַצּוֹם נַפְשִׁי וַתְּהִי לַחֲרָפוֹת לִי׃","וָאֶתְּנָה לְבוּשִׁי שָׂק וָאֱהִי לָהֶם לְמָשָׁל׃","יָשִׂיחוּ בִי יֹשְׁבֵי שָׁעַר וּנְגִינוֹת שׁוֹתֵי שֵׁכָר׃","וַאֲנִי תְפִלָּתִי־לְךָ ׀ יְהוָה עֵת רָצוֹן אֱלֹהִים בְּרָב־חַסְדֶּךָ עֲנֵנִי בֶּאֱמֶת יִשְׁעֶךָ׃","הַצִּילֵנִי מִטִּיט וְאַל־אֶטְבָּעָה אִנָּצְלָה מִשֹּׂנְאַי וּמִמַּעֲמַקֵּי־מָיִם׃","אַל־תִּשְׁטְפֵנִי ׀ שִׁבֹּלֶת מַיִם וְאַל־תִּבְלָעֵנִי מְצוּלָה וְאַל־תֶּאְטַר־עָלַי בְּאֵר פִּיהָ׃","עֲנֵנִי יְהוָה כִּי־טוֹב חַסְדֶּךָ כְּרֹב רַחֲמֶיךָ פְּנֵה אֵלָי׃","וְאַל־תַּסְתֵּר פָּנֶיךָ מֵעַבְדֶּךָ כִּי־צַר־לִי מַהֵר עֲנֵנִי׃","קָרְבָה אֶל־נַפְשִׁי גְאָלָהּ לְמַעַן אֹיְבַי פְּדֵנִי׃","אַתָּה יָדַעְתָּ חֶרְפָּתִי וּבָשְׁתִּי וּכְלִמָּתִי נֶגְדְּךָ כָּל־צוֹרְרָי׃","חֶרְפָּה ׀ שָׁבְרָה לִבִּי וָאָנוּשָׁה וָאֲקַוֶּה לָנוּד וָאַיִן וְלַמְנַחֲמִים וְלֹא מָצָאתִי׃","וַיִּתְּנוּ בְּבָרוּתִי רֹאשׁ וְלִצְמָאִי יַשְׁקוּנִי חֹמֶץ׃","יְהִי־שֻׁלְחָנָם לִפְנֵיהֶם לְפָח וְלִשְׁלוֹמִים לְמוֹקֵשׁ׃","תֶּחְשַׁכְנָה עֵינֵיהֶם מֵרְאוֹת וּמָתְנֵיהֶם תָּמִיד הַמְעַד׃","שְׁפָךְ־עֲלֵיהֶם זַעְמֶךָ וַחֲרוֹן אַפְּךָ יַשִּׂיגֵם׃","תְּהִי־טִירָתָם נְשַׁמָּה בְּאָהֳלֵיהֶם אַל־יְהִי יֹשֵׁב׃","כִּי־אַתָּה אֲשֶׁר־הִכִּיתָ רָדָפוּ וְאֶל־מַכְאוֹב חֲלָלֶיךָ יְסַפֵּרוּ׃","תְּנָה־עָוֺן עַל־עֲוֺנָם וְאַל־יָבֹאוּ בְּצִדְקָתֶךָ׃","יִמָּחוּ מִסֵּפֶר חַיִּים וְעִם צַדִּיקִים אַל־יִכָּתֵבוּ׃","וַאֲנִי עָנִי וְכוֹאֵב יְשׁוּעָתְךָ אֱלֹהִים תְּשַׂגְּבֵנִי׃","אֲהַלְלָה שֵׁם־אֱלֹהִים בְּשִׁיר וַאֲגַדְּלֶנּוּ בְתוֹדָה׃","וְתִיטַב לַיהוָה מִשּׁוֹר פָּר מַקְרִן מַפְרִיס׃","רָאוּ עֲנָוִים יִשְׂמָחוּ דֹּרְשֵׁי אֱלֹהִים וִיחִי לְבַבְכֶם׃","כִּי־שֹׁמֵעַ אֶל־אֶבְיוֹנִים יְהוָה וְאֶת־אֲסִירָיו לֹא בָזָה׃","יְהַלְלוּהוּ שָׁמַיִם וָאָרֶץ יַמִּים וְכָל־רֹמֵשׂ בָּם׃","כִּי אֱלֹהִים ׀ יוֹשִׁיעַ צִיּוֹן וְיִבְנֶה עָרֵי יְהוּדָה וְיָשְׁבוּ שָׁם וִירֵשׁוּהָ׃","וְזֶרַע עֲבָדָיו יִנְחָלוּהָ וְאֹהֲבֵי שְׁמוֹ יִשְׁכְּנוּ־בָהּ׃"],"70":["לַמְנַצֵּחַ לְדָוִד לְהַזְכִּיר׃","אֱלֹהִים לְהַצִּילֵנִי יְהוָה לְעֶזְרָתִי חוּשָׁה׃","יֵבֹשׁוּ וְיַחְפְּרוּ מְבַקְשֵׁי נַפְשִׁי יִסֹּגוּ אָחוֹר וְיִכָּלְמוּ חֲפֵצֵי רָעָתִי׃","יָשׁוּבוּ עַל־עֵקֶב בָּשְׁתָּם הָאֹמְרִים הֶאָח ׀ הֶאָח׃","יָשִׂישׂוּ וְיִשְׂמְחוּ ׀ בְּךָ כָּל־מְבַקְשֶׁיךָ וְיֹאמְרוּ תָמִיד יִגְדַּל אֱלֹהִים אֹהֲבֵי יְשׁוּעָתֶךָ׃","וַאֲנִי ׀ עָנִי וְאֶבְיוֹן אֱלֹהִים חוּשָׁה־לִּי עֶזְרִי וּמְפַלְטִי אַתָּה יְהוָה אַל־תְּאַחַר׃"],"71":["בְּךָ־יְהוָה חָסִיתִי אַל־אֵבוֹשָׁה לְעוֹלָם׃","בְּצִדְקָתְךָ תַּצִּילֵנִי וּתְפַלְּטֵנִי הַטֵּה־אֵלַי אָזְנְךָ וְהוֹשִׁיעֵנִי׃","הֱיֵה לִי ׀ לְצוּר מָעוֹן לָבוֹא תָּמִיד צִוִּיתָ לְהוֹשִׁיעֵנִי כִּי־סַלְעִי וּמְצוּדָתִי אָתָּה׃","אֱלֹהַי פַּלְּטֵנִי מִיַּד רָשָׁע מִכַּף מְעַוֵּל וְחוֹמֵץ׃","כִּי־אַתָּה תִקְוָתִי אֲדֹנָי יְהוִה מִבְטַחִי מִנְּעוּרָי׃","עָלֶיךָ ׀ נִסְמַכְתִּי מִבֶּטֶן מִמְּעֵי אִמִּי אַתָּה גוֹזִי בְּךָ תְהִלָּתִי תָמִיד׃","כְּמוֹפֵת הָיִיתִי לְרַבִּים וְאַתָּה מַחֲסִי־עֹז׃","יִמָּלֵא פִי תְּהִלָּתֶךָ כָּל־הַיּוֹם תִּפְאַרְתֶּךָ׃","אַל־תַּשְׁלִיכֵנִי לְעֵת זִקְנָה כִּכְלוֹת כֹּחִי אַל־תַּעַזְבֵנִי׃","כִּי־אָמְרוּ אוֹיְבַי לִי וְשֹׁמְרֵי נַפְשִׁי נוֹעֲצוּ יַחְדָּו׃","לֵאמֹר אֱלֹהִים עֲזָבוֹ רִדְפוּ וְתִפְשׂוּהוּ כִּי־אֵין מַצִּיל׃","אֱלֹהִים אַל־תִּרְחַק מִמֶּנִּי אֱלֹהַי לְעֶזְרָתִי חישה׃","יֵבֹשׁוּ יִכְלוּ שֹׂטְנֵי נַפְשִׁי יַעֲטוּ חֶרְפָּה וּכְלִמָּה מְבַקְשֵׁי רָעָתִי׃","וַאֲנִי תָּמִיד אֲיַחֵל וְהוֹסַפְתִּי עַל־כָּל־תְּהִלָּתֶךָ׃","פִּי ׀ יְסַפֵּר צִדְקָתֶךָ כָּל־הַיּוֹם תְּשׁוּעָתֶךָ כִּי לֹא יָדַעְתִּי סְפֹרוֹת׃","אָבוֹא בִּגְבֻרוֹת אֲדֹנָי יְהוִה אַזְכִּיר צִדְקָתְךָ לְבַדֶּךָ׃","אֱלֹהִים לִמַּדְתַּנִי מִנְּעוּרָי וְעַד־הֵנָּה אַגִּיד נִפְלְאוֹתֶיךָ׃","וְגַם עַד־זִקְנָה ׀ וְשֵׂיבָה אֱלֹהִים אַל־תַּעַזְבֵנִי עַד־אַגִּיד זְרוֹעֲךָ לְדוֹר לְכָל־יָבוֹא גְּבוּרָתֶךָ׃","וְצִדְקָתְךָ אֱלֹהִים עַד־מָרוֹם אֲשֶׁר־עָשִׂיתָ גְדֹלוֹת אֱלֹהִים מִי כָמוֹךָ׃","אֲשֶׁר הראיתנו ׀ צָרוֹת רַבּוֹת וְרָעוֹת תָּשׁוּב תחיינו וּמִתְּהֹמוֹת הָאָרֶץ תָּשׁוּב תַּעֲלֵנִי׃","תֶּרֶב ׀ גְּדֻלָּתִי וְתִסֹּב תְּנַחֲמֵנִי׃","גַּם־אֲנִי ׀ אוֹדְךָ בִכְלִי־נֶבֶל אֲמִתְּךָ אֱלֹהָי אֲזַמְּרָה לְךָ בְכִנּוֹר קְדוֹשׁ יִשְׂרָאֵל׃","תְּרַנֵּנָּה שְׂפָתַי כִּי אֲזַמְּרָה־לָּךְ וְנַפְשִׁי אֲשֶׁר פָּדִיתָ׃","גַּם־לְשׁוֹנִי כָּל־הַיּוֹם תֶּהְגֶּה צִדְקָתֶךָ כִּי־בֹשׁוּ כִי־חָפְרוּ מְבַקְשֵׁי רָעָתִי׃"],"72":["לִשְׁלֹמֹה ׀ אֱלֹהִים מִשְׁפָּטֶיךָ לְמֶלֶךְ תֵּן וְצִדְקָתְךָ לְבֶן־מֶלֶךְ׃","יָדִין עַמְּךָ בְצֶדֶק וַעֲנִיֶּיךָ בְמִשְׁפָּט׃","יִשְׂאוּ הָרִים שָׁלוֹם לָעָם וּגְבָעוֹת בִּצְדָקָה׃","יִשְׁפֹּט ׀ עֲנִיֵּי־עָם יוֹשִׁיעַ לִבְנֵי אֶבְיוֹן וִידַכֵּא עוֹשֵׁק׃","יִירָאוּךָ עִם־שָׁמֶשׁ וְלִפְנֵי יָרֵחַ דּוֹר דּוֹרִים׃","יֵרֵד כְּמָטָר עַל־גֵּז כִּרְבִיבִים זַרְזִיף אָרֶץ׃","יִפְרַח־בְּיָמָיו צַדִּיק וְרֹב שָׁלוֹם עַד־בְּלִי יָרֵחַ׃","וְיֵרְדְּ מִיָּם עַד־יָם וּמִנָּהָר עַד־אַפְסֵי־אָרֶץ׃","לְפָנָיו יִכְרְעוּ צִיִּים וְאֹיְבָיו עָפָר יְלַחֵכוּ׃","מַלְכֵי תַרְשִׁישׁ וְאִיִּים מִנְחָה יָשִׁיבוּ מַלְכֵי שְׁבָא וּסְבָא אֶשְׁכָּר יַקְרִיבוּ׃","וְיִשְׁתַּחֲווּ־לוֹ כָל־מְלָכִים כָּל־גּוֹיִם יַעַבְדוּהוּ׃","כִּי־יַצִּיל אֶבְיוֹן מְשַׁוֵּעַ וְעָנִי וְאֵין־עֹזֵר לוֹ׃","יָחֹס עַל־דַּל וְאֶבְיוֹן וְנַפְשׁוֹת אֶבְיוֹנִים יוֹשִׁיעַ׃","מִתּוֹךְ וּמֵחָמָס יִגְאַל נַפְשָׁם וְיֵיקַר דָּמָם בְּעֵינָיו׃","וִיחִי וְיִתֶּן־לוֹ מִזְּהַב שְׁבָא וְיִתְפַּלֵּל בַּעֲדוֹ תָמִיד כָּל־הַיּוֹם יְבָרֲכֶנְהוּ׃","יְהִי פִסַּת־בַּר ׀ בָּאָרֶץ בְּרֹאשׁ הָרִים יִרְעַשׁ כַּלְּבָנוֹן פִּרְיוֹ וְיָצִיצוּ מֵעִיר כְּעֵשֶׂב הָאָרֶץ׃","יְהִי שְׁמוֹ לְעוֹלָם לִפְנֵי־שֶׁמֶשׁ ינין שְׁמוֹ וְיִתְבָּרְכוּ בוֹ כָּל־גּוֹיִם יְאַשְּׁרוּהוּ׃","בָּרוּךְ ׀ יְהוָה אֱלֹהִים אֱלֹהֵי יִשְׂרָאֵל עֹשֵׂה נִפְלָאוֹת לְבַדּוֹ׃","וּבָרוּךְ ׀ שֵׁם כְּבוֹדוֹ לְעוֹלָם וְיִמָּלֵא כְבוֹדוֹ אֶת־כֹּל הָאָרֶץ אָמֵן ׀ וְאָמֵן׃","כָּלּוּ תְפִלּוֹת דָּוִד בֶּן־יִשָׁי׃"],"73":["מִזְמוֹר לְאָסָף אַךְ טוֹב לְיִשְׂרָאֵל אֱלֹהִים לְבָרֵי לֵבָב׃","וַאֲנִי כִּמְעַט נטוי רַגְלָי כְּאַיִן שפכה אֲשֻׁרָי׃","כִּי־קִנֵּאתִי בַּהוֹלְלִים שְׁלוֹם רְשָׁעִים אֶרְאֶה׃","כִּי אֵין חַרְצֻבּוֹת לְמוֹתָם וּבָרִיא אוּלָם׃","בַּעֲמַל אֱנוֹשׁ אֵינֵמוֹ וְעִם־אָדָם לֹא יְנֻגָּעוּ׃","לָכֵן עֲנָקַתְמוֹ גַאֲוָה יַעֲטָף־שִׁית חָמָס לָמוֹ׃","יָצָא מֵחֵלֶב עֵינֵמוֹ עָבְרוּ מַשְׂכִּיּוֹת לֵבָב׃","יָמִיקוּ ׀ וִידַבְּרוּ בְרָע עֹשֶׁק מִמָּרוֹם יְדַבֵּרוּ׃","שַׁתּוּ בַשָּׁמַיִם פִּיהֶם וּלְשׁוֹנָם תִּהֲלַךְ בָּאָרֶץ׃","לָכֵן ׀ ישיב עַמּוֹ הֲלֹם וּמֵי מָלֵא יִמָּצוּ לָמוֹ׃","וְאָמְרוּ אֵיכָה יָדַע־אֵל וְיֵשׁ דֵּעָה בְעֶלְיוֹן׃","הִנֵּה־אֵלֶּה רְשָׁעִים וְשַׁלְוֵי עוֹלָם הִשְׂגּוּ־חָיִל׃","אַךְ־רִיק זִכִּיתִי לְבָבִי וָאֶרְחַץ בְּנִקָּיוֹן כַּפָּי׃","וָאֱהִי נָגוּעַ כָּל־הַיּוֹם וְתוֹכַחְתִּי לַבְּקָרִים׃","אִם־אָמַרְתִּי אֲסַפְּרָה כְמוֹ הִנֵּה דוֹר בָּנֶיךָ בָגָדְתִּי׃","וָאֲחַשְּׁבָה לָדַעַת זֹאת עָמָל היא בְעֵינָי׃","עַד־אָבוֹא אֶל־מִקְדְּשֵׁי־אֵל אָבִינָה לְאַחֲרִיתָם׃","אַךְ בַּחֲלָקוֹת תָּשִׁית לָמוֹ הִפַּלְתָּם לְמַשּׁוּאוֹת׃","אֵיךְ הָיוּ לְשַׁמָּה כְרָגַע סָפוּ תַמּוּ מִן־בַּלָּהוֹת׃","כַּחֲלוֹם מֵהָקִיץ אֲדֹנָי בָּעִיר ׀ צַלְמָם תִּבְזֶה׃","כִּי יִתְחַמֵּץ לְבָבִי וְכִלְיוֹתַי אֶשְׁתּוֹנָן׃","וַאֲנִי־בַעַר וְלֹא אֵדָע בְּהֵמוֹת הָיִיתִי עִמָּךְ׃","וַאֲנִי תָמִיד עִמָּךְ אָחַזְתָּ בְּיַד־יְמִינִי׃","בַּעֲצָתְךָ תַנְחֵנִי וְאַחַר כָּבוֹד תִּקָּחֵנִי׃","מִי־לִי בַשָּׁמָיִם וְעִמְּךָ לֹא־חָפַצְתִּי בָאָרֶץ׃","כָּלָה שְׁאֵרִי וּלְבָבִי צוּר־לְבָבִי וְחֶלְקִי אֱלֹהִים לְעוֹלָם׃","כִּי־הִנֵּה רְחֵקֶיךָ יֹאבֵדוּ הִצְמַתָּה כָּל־זוֹנֶה מִמֶּךָּ׃","וַאֲנִי ׀ קִרֲבַת אֱלֹהִים לִי־טוֹב שַׁתִּי ׀ בַּאדֹנָי יְהֹוִה מַחְסִי לְסַפֵּר כָּל־מַלְאֲכוֹתֶיךָ׃"],"74":["מַשְׂכִּיל לְאָסָף לָמָה אֱלֹהִים זָנַחְתָּ לָנֶצַח יֶעְשַׁן אַפְּךָ בְּצֹאן מַרְעִיתֶךָ׃","זְכֹר עֲדָתְךָ ׀ קָנִיתָ קֶּדֶם גָּאַלְתָּ שֵׁבֶט נַחֲלָתֶךָ הַר־צִיּוֹן זֶה ׀ שָׁכַנְתָּ בּוֹ׃","הָרִימָה פְעָמֶיךָ לְמַשֻּׁאוֹת נֶצַח כָּל־הֵרַע אוֹיֵב בַּקֹּדֶשׁ׃","שָׁאֲגוּ צֹרְרֶיךָ בְּקֶרֶב מוֹעֲדֶךָ שָׂמוּ אוֹתֹתָם אֹתוֹת׃","יִוָּדַע כְּמֵבִיא לְמָעְלָה בִּסֲבָךְ־עֵץ קַרְדֻּמּוֹת׃","ועת פִּתּוּחֶיהָ יָּחַד בְּכַשִּׁיל וְכֵילַפֹּת יַהֲלֹמוּן׃","שִׁלְחוּ בָאֵשׁ מִקְדָּשֶׁךָ לָאָרֶץ חִלְּלוּ מִשְׁכַּן־שְׁמֶךָ׃","אָמְרוּ בְלִבָּם נִינָם יָחַד שָׂרְפוּ כָל־מוֹעֲדֵי־אֵל בָּאָרֶץ׃","אוֹתֹתֵינוּ לֹא רָאִינוּ אֵין־עוֹד נָבִיא וְלֹא־אִתָּנוּ יֹדֵעַ עַד־מָה׃","עַד־מָתַי אֱלֹהִים יְחָרֶף צָר יְנָאֵץ אוֹיֵב שִׁמְךָ לָנֶצַח׃","לָמָּה תָשִׁיב יָדְךָ וִימִינֶךָ מִקֶּרֶב חוקך כַלֵּה׃","וֵאלֹהִים מַלְכִּי מִקֶּדֶם פֹּעֵל יְשׁוּעוֹת בְּקֶרֶב הָאָרֶץ׃","אַתָּה פוֹרַרְתָּ בְעָזְּךָ יָם שִׁבַּרְתָּ רָאשֵׁי תַנִּינִים עַל־הַמָּיִם׃","אַתָּה רִצַּצְתָּ רָאשֵׁי לִוְיָתָן תִּתְּנֶנּוּ מַאֲכָל לְעָם לְצִיִּים׃","אַתָּה בָקַעְתָּ מַעְיָן וָנָחַל אַתָּה הוֹבַשְׁתָּ נַהֲרוֹת אֵיתָן׃","לְךָ יוֹם אַף־לְךָ לָיְלָה אַתָּה הֲכִינוֹתָ מָאוֹר וָשָׁמֶשׁ׃","אַתָּה הִצַּבְתָּ כָּל־גְּבוּלוֹת אָרֶץ קַיִץ וָחֹרֶף אַתָּה יְצַרְתָּם׃","זְכָר־זֹאת אוֹיֵב חֵרֵף ׀ יְהוָה וְעַם נָבָל נִאֲצוּ שְׁמֶךָ׃","אַל־תִּתֵּן לְחַיַּת נֶפֶשׁ תּוֹרֶךָ חַיַּת עֲנִיֶּיךָ אַל־תִּשְׁכַּח לָנֶצַח׃","הַבֵּט לַבְּרִית כִּי מָלְאוּ מַחֲשַׁכֵּי־אֶרֶץ נְאוֹת חָמָס׃","אַל־יָשֹׁב דַּךְ נִכְלָם עָנִי וְאֶבְיוֹן יְהַלְלוּ שְׁמֶךָ׃","קוּמָה אֱלֹהִים רִיבָה רִיבֶךָ זְכֹר חֶרְפָּתְךָ מִנִּי־נָבָל כָּל־הַיּוֹם׃","אַל־תִּשְׁכַּח קוֹל צֹרְרֶיךָ שְׁאוֹן קָמֶיךָ עֹלֶה תָמִיד׃"],"75":["לַמְנַצֵּחַ אַל־תַּשְׁחֵת מִזְמוֹר לְאָסָף שִׁיר׃","הוֹדִינוּ לְּךָ ׀ אֱלֹהִים הוֹדִינוּ וְקָרוֹב שְׁמֶךָ סִפְּרוּ נִפְלְאוֹתֶיךָ׃","כִּי אֶקַּח מוֹעֵד אֲנִי מֵישָׁרִים אֶשְׁפֹּט׃","נְמֹגִים אֶרֶץ וְכָל־יֹשְׁבֶיהָ אָנֹכִי תִכַּנְתִּי עַמּוּדֶיהָ סֶּלָה׃","אָמַרְתִּי לַהוֹלְלִים אַל־תָּהֹלּוּ וְלָרְשָׁעִים אַל־תָּרִימוּ קָרֶן׃","אַל־תָּרִימוּ לַמָּרוֹם קַרְנְכֶם תְּדַבְּרוּ בְצַוָּאר עָתָק׃","כִּי לֹא מִמּוֹצָא וּמִמַּעֲרָב וְלֹא מִמִּדְבַּר הָרִים׃","כִּי־אֱלֹהִים שֹׁפֵט זֶה יַשְׁפִּיל וְזֶה יָרִים׃","כִּי כוֹס בְּיַד־יְהוָה וְיַיִן חָמַר ׀ מָלֵא מֶסֶךְ וַיַּגֵּר מִזֶּה אַךְ־שְׁמָרֶיהָ יִמְצוּ יִשְׁתּוּ כֹּל רִשְׁעֵי־אָרֶץ׃","וַאֲנִי אַגִּיד לְעֹלָם אֲזַמְּרָה לֵאלֹהֵי יַעֲקֹב׃","וְכָל־קַרְנֵי רְשָׁעִים אֲגַדֵּעַ תְּרוֹמַמְנָה קַרְנוֹת צַדִּיק׃"],"76":["לַמְנַצֵּחַ בִּנְגִינֹת מִזְמוֹר לְאָסָף שִׁיר׃","נוֹדָע בִּיהוּדָה אֱלֹהִים בְּיִשְׂרָאֵל גָּדוֹל שְׁמוֹ׃","וַיְהִי בְשָׁלֵם סֻכּוֹ וּמְעוֹנָתוֹ בְצִיּוֹן׃","שָׁמָּה שִׁבַּר רִשְׁפֵי־קָשֶׁת מָגֵן וְחֶרֶב וּמִלְחָמָה סֶלָה׃","נָאוֹר אַתָּה אַדִּיר מֵהַרְרֵי־טָרֶף׃","אֶשְׁתּוֹלְלוּ ׀ אַבִּירֵי לֵב נָמוּ שְׁנָתָם וְלֹא־מָצְאוּ כָל־אַנְשֵׁי־חַיִל יְדֵיהֶם׃","מִגַּעֲרָתְךָ אֱלֹהֵי יַעֲקֹב נִרְדָּם וְרֶכֶב וָסוּס׃","אַתָּה ׀ נוֹרָא אַתָּה וּמִי־יַעֲמֹד לְפָנֶיךָ מֵאָז אַפֶּךָ׃","מִשָּׁמַיִם הִשְׁמַעְתָּ דִּין אֶרֶץ יָרְאָה וְשָׁקָטָה׃","בְּקוּם־לַמִּשְׁפָּט אֱלֹהִים לְהוֹשִׁיעַ כָּל־עַנְוֵי־אֶרֶץ סֶלָה׃","כִּי־חֲמַת אָדָם תּוֹדֶךָּ שְׁאֵרִית חֵמֹת תַּחְגֹּר׃","נִדֲרוּ וְשַׁלְּמוּ לַיהוָה אֱלֹהֵיכֶם כָּל־סְבִיבָיו יוֹבִילוּ שַׁי לַמּוֹרָא׃","יִבְצֹר רוּחַ נְגִידִים נוֹרָא לְמַלְכֵי־אָרֶץ׃"],"77":["לַמְנַצֵּחַ עַל־ידיתון לְאָסָף מִזְמוֹר׃","קוֹלִי אֶל־אֱלֹהִים וְאֶצְעָקָה קוֹלִי אֶל־אֱלֹהִים וְהַאֲזִין אֵלָי׃","בְּיוֹם צָרָתִי אֲדֹנָי דָּרָשְׁתִּי יָדִי ׀ לַיְלָה נִגְּרָה וְלֹא תָפוּג מֵאֲנָה הִנָּחֵם נַפְשִׁי׃","אֶזְכְּרָה אֱלֹהִים וְאֶהֱמָיָה אָשִׂיחָה ׀ וְתִתְעַטֵּף רוּחִי סֶלָה׃","אָחַזְתָּ שְׁמֻרוֹת עֵינָי נִפְעַמְתִּי וְלֹא אֲדַבֵּר׃","חִשַּׁבְתִּי יָמִים מִקֶּדֶם שְׁנוֹת עוֹלָמִים׃","אֶזְכְּרָה נְגִינָתִי בַּלָּיְלָה עִם־לְבָבִי אָשִׂיחָה וַיְחַפֵּשׂ רוּחִי׃","הַלְעוֹלָמִים יִזְנַח ׀ אֲדֹנָי וְלֹא־יֹסִיף לִרְצוֹת עוֹד׃","הֶאָפֵס לָנֶצַח חַסְדּוֹ גָּמַר אֹמֶר לְדֹר וָדֹר׃","הֲשָׁכַח חַנּוֹת אֵל אִם־קָפַץ בְּאַף רַחֲמָיו סֶלָה׃","וָאֹמַר חַלּוֹתִי הִיא שְׁנוֹת יְמִין עֶלְיוֹן׃","אזכיר מַעַלְלֵי־יָהּ כִּי־אֶזְכְּרָה מִקֶּדֶם פִּלְאֶךָ׃","וְהָגִיתִי בְכָל־פָּעֳלֶךָ וּבַעֲלִילוֹתֶיךָ אָשִׂיחָה׃","אֱלֹהִים בַּקֹּדֶשׁ דַּרְכֶּךָ מִי־אֵל גָּדוֹל כֵּאלֹהִים׃","אַתָּה הָאֵל עֹשֵׂה פֶלֶא הוֹדַעְתָּ בָעַמִּים עֻזֶּךָ׃","גָּאַלְתָּ בִּזְרוֹעַ עַמֶּךָ בְּנֵי־יַעֲקֹב וְיוֹסֵף סֶלָה׃","רָאוּךָ מַּיִם ׀ אֱלֹהִים רָאוּךָ מַּיִם יָחִילוּ אַף יִרְגְּזוּ תְהֹמוֹת׃","זֹרְמוּ מַיִם ׀ עָבוֹת קוֹל נָתְנוּ שְׁחָקִים אַף־חֲצָצֶיךָ יִתְהַלָּכוּ׃","קוֹל רַעַמְךָ ׀ בַּגַּלְגַּל הֵאִירוּ בְרָקִים תֵּבֵל רָגְזָה וַתִּרְעַשׁ הָאָרֶץ׃","בַּיָּם דַּרְכֶּךָ ושביליך בְּמַיִם רַבִּים וְעִקְּבוֹתֶיךָ לֹא נֹדָעוּ׃","נָחִיתָ כַצֹּאן עַמֶּךָ בְּיַד־מֹשֶׁה וְאַהֲרֹן׃"],"78":["מַשְׂכִּיל לְאָסָף הַאֲזִינָה עַמִּי תּוֹרָתִי הַטּוּ אָזְנְכֶם לְאִמְרֵי־פִי׃","אֶפְתְּחָה בְמָשָׁל פִּי אַבִּיעָה חִידוֹת מִנִּי־קֶדֶם׃","אֲשֶׁר שָׁמַעְנוּ וַנֵּדָעֵם וַאֲבוֹתֵינוּ סִפְּרוּ־לָנוּ׃","לֹא נְכַחֵד ׀ מִבְּנֵיהֶם לְדוֹר אַחֲרוֹן מְסַפְּרִים תְּהִלּוֹת יְהוָה וֶעֱזוּזוֹ וְנִפְלְאוֹתָיו אֲשֶׁר עָשָׂה׃","וַיָּקֶם עֵדוּת ׀ בְּיַעֲקֹב וְתוֹרָה שָׂם בְּיִשְׂרָאֵל אֲשֶׁר צִוָּה אֶת־אֲבוֹתֵינוּ לְהוֹדִיעָם לִבְנֵיהֶם׃","לְמַעַן יֵדְעוּ ׀ דּוֹר אַחֲרוֹן בָּנִים יִוָּלֵדוּ יָקֻמוּ וִיסַפְּרוּ לִבְנֵיהֶם׃","וְיָשִׂימוּ בֵאלֹהִים כִּסְלָם וְלֹא יִשְׁכְּחוּ מַעַלְלֵי־אֵל וּמִצְוֺתָיו יִנְצֹרוּ׃","וְלֹא יִהְיוּ ׀ כַּאֲבוֹתָם דּוֹר סוֹרֵר וּמֹרֶה דּוֹר לֹא־הֵכִין לִבּוֹ וְלֹא־נֶאֶמְנָה אֶת־אֵל רוּחוֹ׃","בְּנֵי־אֶפְרַיִם נוֹשְׁקֵי רוֹמֵי־קָשֶׁת הָפְכוּ בְּיוֹם קְרָב׃","לֹא שָׁמְרוּ בְּרִית אֱלֹהִים וּבְתוֹרָתוֹ מֵאֲנוּ לָלֶכֶת׃","וַיִּשְׁכְּחוּ עֲלִילוֹתָיו וְנִפְלְאוֹתָיו אֲשֶׁר הֶרְאָם׃","נֶגֶד אֲבוֹתָם עָשָׂה פֶלֶא בְּאֶרֶץ מִצְרַיִם שְׂדֵה־צֹעַן׃","בָּקַע יָם וַיַּעֲבִירֵם וַיַּצֶּב־מַיִם כְּמוֹ־נֵד׃","וַיַּנְחֵם בֶּעָנָן יוֹמָם וְכָל־הַלַּיְלָה בְּאוֹר אֵשׁ׃","יְבַקַּע צֻרִים בַּמִּדְבָּר וַיַּשְׁקְ כִּתְהֹמוֹת רַבָּה׃","וַיּוֹצִא נוֹזְלִים מִסָּלַע וַיּוֹרֶד כַּנְּהָרוֹת מָיִם׃","וַיּוֹסִיפוּ עוֹד לַחֲטֹא־לוֹ לַמְרוֹת עֶלְיוֹן בַּצִּיָּה׃","וַיְנַסּוּ־אֵל בִּלְבָבָם לִשְׁאָל־אֹכֶל לְנַפְשָׁם׃","וַיְדַבְּרוּ בֵּאלֹהִים אָמְרוּ הֲיוּכַל אֵל לַעֲרֹךְ שֻׁלְחָן בַּמִּדְבָּר׃","הֵן הִכָּה־צוּר ׀ וַיָּזוּבוּ מַיִם וּנְחָלִים יִשְׁטֹפוּ הֲגַם־לֶחֶם יוּכַל תֵּת אִם־יָכִין שְׁאֵר לְעַמּוֹ׃","לָכֵן ׀ שָׁמַע יְהוָה וַיִּתְעַבָּר וְאֵשׁ נִשְּׂקָה בְיַעֲקֹב וְגַם־אַף עָלָה בְיִשְׂרָאֵל׃","כִּי לֹא הֶאֱמִינוּ בֵּאלֹהִים וְלֹא בָטְחוּ בִּישׁוּעָתוֹ׃","וַיְצַו שְׁחָקִים מִמָּעַל וְדַלְתֵי שָׁמַיִם פָּתָח׃","וַיַּמְטֵר עֲלֵיהֶם מָן לֶאֱכֹל וּדְגַן־שָׁמַיִם נָתַן לָמוֹ׃","לֶחֶם אַבִּירִים אָכַל אִישׁ צֵידָה שָׁלַח לָהֶם לָשֹׂבַע׃","יַסַּע קָדִים בַּשָּׁמָיִם וַיְנַהֵג בְּעֻזּוֹ תֵימָן׃","וַיַּמְטֵר עֲלֵיהֶם כֶּעָפָר שְׁאֵר וּכְחוֹל יַמִּים עוֹף כָּנָף׃","וַיַּפֵּל בְּקֶרֶב מַחֲנֵהוּ סָבִיב לְמִשְׁכְּנֹתָיו׃","וַיֹּאכְלוּ וַיִּשְׂבְּעוּ מְאֹד וְתַאֲוָתָם יָבִא לָהֶם׃","לֹא־זָרוּ מִתַּאֲוָתָם עוֹד אָכְלָם בְּפִיהֶם׃","וְאַף אֱלֹהִים ׀ עָלָה בָהֶם וַיַּהֲרֹג בְּמִשְׁמַנֵּיהֶם וּבַחוּרֵי יִשְׂרָאֵל הִכְרִיעַ׃","בְּכָל־זֹאת חָטְאוּ־עוֹד וְלֹא־הֶאֱמִינוּ בְּנִפְלְאוֹתָיו׃","וַיְכַל־בַּהֶבֶל יְמֵיהֶם וּשְׁנוֹתָם בַּבֶּהָלָה׃","אִם־הֲרָגָם וּדְרָשׁוּהוּ וְשָׁבוּ וְשִׁחֲרוּ־אֵל׃","וַיִּזְכְּרוּ כִּי־אֱלֹהִים צוּרָם וְאֵל עֶלְיוֹן גֹּאֲלָם׃","וַיְפַתּוּהוּ בְּפִיהֶם וּבִלְשׁוֹנָם יְכַזְּבוּ־לוֹ׃","וְלִבָּם לֹא־נָכוֹן עִמּוֹ וְלֹא נֶאֶמְנוּ בִּבְרִיתוֹ׃","וְהוּא רַחוּם ׀ יְכַפֵּר עָוֺן וְלֹא־יַשְׁחִית וְהִרְבָּה לְהָשִׁיב אַפּוֹ וְלֹא־יָעִיר כָּל־חֲמָתוֹ׃","וַיִּזְכֹּר כִּי־בָשָׂר הֵמָּה רוּחַ הוֹלֵךְ וְלֹא יָשׁוּב׃","כַּמָּה יַמְרוּהוּ בַמִּדְבָּר יַעֲצִיבוּהוּ בִּישִׁימוֹן׃","וַיָּשׁוּבוּ וַיְנַסּוּ אֵל וּקְדוֹשׁ יִשְׂרָאֵל הִתְווּ׃","לֹא־זָכְרוּ אֶת־יָדוֹ יוֹם אֲשֶׁר־פָּדָם מִנִּי־צָר׃","אֲשֶׁר־שָׂם בְּמִצְרַיִם אֹתוֹתָיו וּמוֹפְתָיו בִּשְׂדֵה־צֹעַן׃","וַיַּהֲפֹךְ לְדָם יְאֹרֵיהֶם וְנֹזְלֵיהֶם בַּל־יִשְׁתָּיוּן׃","יְשַׁלַּח בָּהֶם עָרֹב וַיֹּאכְלֵם וּצְפַרְדֵּעַ וַתַּשְׁחִיתֵם׃","וַיִּתֵּן לֶחָסִיל יְבוּלָם וִיגִיעָם לָאַרְבֶּה׃","יַהֲרֹג בַּבָּרָד גַּפְנָם וְשִׁקְמוֹתָם בַּחֲנָמַל׃","וַיַּסְגֵּר לַבָּרָד בְּעִירָם וּמִקְנֵיהֶם לָרְשָׁפִים׃","יְשַׁלַּח־בָּם ׀ חֲרוֹן אַפּוֹ עֶבְרָה וָזַעַם וְצָרָה מִשְׁלַחַת מַלְאֲכֵי רָעִים׃","יְפַלֵּס נָתִיב לְאַפּוֹ לֹא־חָשַׂךְ מִמָּוֶת נַפְשָׁם וְחַיָּתָם לַדֶּבֶר הִסְגִּיר׃","וַיַּךְ כָּל־בְּכוֹר בְּמִצְרָיִם רֵאשִׁית אוֹנִים בְּאָהֳלֵי־חָם׃","וַיַּסַּע כַּצֹּאן עַמּוֹ וַיְנַהֲגֵם כַּעֵדֶר בַּמִּדְבָּר׃","וַיַּנְחֵם לָבֶטַח וְלֹא פָחָדוּ וְאֶת־אוֹיְבֵיהֶם כִּסָּה הַיָּם׃","וַיְבִיאֵם אֶל־גְּבוּל קָדְשׁוֹ הַר־זֶה קָנְתָה יְמִינוֹ׃","וַיְגָרֶשׁ מִפְּנֵיהֶם ׀ גּוֹיִם וַיַּפִּילֵם בְּחֶבֶל נַחֲלָה וַיַּשְׁכֵּן בְּאָהֳלֵיהֶם שִׁבְטֵי יִשְׂרָאֵל׃","וַיְנַסּוּ וַיַּמְרוּ אֶת־אֱלֹהִים עֶלְיוֹן וְעֵדוֹתָיו לֹא שָׁמָרוּ׃","וַיִּסֹּגוּ וַיִּבְגְּדוּ כַּאֲבוֹתָם נֶהְפְּכוּ כְּקֶשֶׁת רְמִיָּה׃","וַיַּכְעִיסוּהוּ בְּבָמוֹתָם וּבִפְסִילֵיהֶם יַקְנִיאוּהוּ׃","שָׁמַע אֱלֹהִים וַיִּתְעַבָּר וַיִּמְאַס מְאֹד בְּיִשְׂרָאֵל׃","וַיִּטֹּשׁ מִשְׁכַּן שִׁלוֹ אֹהֶל שִׁכֵּן בָּאָדָם׃","וַיִּתֵּן לַשְּׁבִי עֻזּוֹ וְתִפְאַרְתּוֹ בְיַד־צָר׃","וַיַּסְגֵּר לַחֶרֶב עַמּוֹ וּבְנַחֲלָתוֹ הִתְעַבָּר׃","בַּחוּרָיו אָכְלָה־אֵשׁ וּבְתוּלֹתָיו לֹא הוּלָּלוּ׃","כֹּהֲנָיו בַּחֶרֶב נָפָלוּ וְאַלְמְנֹתָיו לֹא תִבְכֶּינָה׃","וַיִּקַץ כְּיָשֵׁן ׀ אֲדֹנָי כְּגִבּוֹר מִתְרוֹנֵן מִיָּיִן׃","וַיַּךְ־צָרָיו אָחוֹר חֶרְפַּת עוֹלָם נָתַן לָמוֹ׃","וַיִּמְאַס בְּאֹהֶל יוֹסֵף וּבְשֵׁבֶט אֶפְרַיִם לֹא בָחָר׃","וַיִּבְחַר אֶת־שֵׁבֶט יְהוּדָה אֶת־הַר צִיּוֹן אֲשֶׁר אָהֵב׃","וַיִּבֶן כְּמוֹ־רָמִים מִקְדָּשׁוֹ כְּאֶרֶץ יְסָדָהּ לְעוֹלָם׃","וַיִּבְחַר בְּדָוִד עַבְדּוֹ וַיִּקָּחֵהוּ מִמִּכְלְאֹת צֹאן׃","מֵאַחַר עָלוֹת הֱבִיאוֹ לִרְעוֹת בְּיַעֲקֹב עַמּוֹ וּבְיִשְׂרָאֵל נַחֲלָתוֹ׃","וַיִּרְעֵם כְּתֹם לְבָבוֹ וּבִתְבוּנוֹת כַּפָּיו יַנְחֵם׃"],"79":["מִזְמוֹר לְאָסָף אֱלֹהִים בָּאוּ גוֹיִם ׀ בְּנַחֲלָתֶךָ טִמְּאוּ אֶת־הֵיכַל קָדְשֶׁךָ שָׂמוּ אֶת־יְרוּשָׁלִַם לְעִיִּים׃","נָתְנוּ אֶת־נִבְלַת עֲבָדֶיךָ מַאֲכָל לְעוֹף הַשָּׁמָיִם בְּשַׂר חֲסִידֶיךָ לְחַיְתוֹ־אָרֶץ׃","שָׁפְכוּ דָמָם ׀ כַּמַּיִם סְבִיבוֹת יְרוּשָׁלִָם וְאֵין קוֹבֵר׃","הָיִינוּ חֶרְפָּה לִשְׁכֵנֵינוּ לַעַג וָקֶלֶס לִסְבִיבוֹתֵינוּ׃","עַד־מָה יְהוָה תֶּאֱנַף לָנֶצַח תִּבְעַר כְּמוֹ־אֵשׁ קִנְאָתֶךָ׃","שְׁפֹךְ חֲמָתְךָ אֶל־הַגּוֹיִם אֲשֶׁר לֹא־יְדָעוּךָ וְעַל מַמְלָכוֹת אֲשֶׁר בְּשִׁמְךָ לֹא קָרָאוּ׃","כִּי אָכַל אֶת־יַעֲקֹב וְאֶת־נָוֵהוּ הֵשַׁמּוּ׃","אַל־תִּזְכָּר־לָנוּ עֲוֺנֹת רִאשֹׁנִים מַהֵר יְקַדְּמוּנוּ רַחֲמֶיךָ כִּי דַלּוֹנוּ מְאֹד׃","עָזְרֵנוּ ׀ אֱלֹהֵי יִשְׁעֵנוּ עַל־דְּבַר כְּבוֹד־שְׁמֶךָ וְהַצִּילֵנוּ וְכַפֵּר עַל־חַטֹּאתֵינוּ לְמַעַן שְׁמֶךָ׃","לָמָּה ׀ יֹאמְרוּ הַגּוֹיִם אַיֵּה אֱלֹהֵיהֶם יִוָּדַע בגיים לְעֵינֵינוּ נִקְמַת דַּם־עֲבָדֶיךָ הַשָּׁפוּךְ׃","תָּבוֹא לְפָנֶיךָ אֶנְקַת אָסִיר כְּגֹדֶל זְרוֹעֲךָ הוֹתֵר בְּנֵי תְמוּתָה׃","וְהָשֵׁב לִשְׁכֵנֵינוּ שִׁבְעָתַיִם אֶל־חֵיקָם חֶרְפָּתָם אֲשֶׁר חֵרְפוּךָ אֲדֹנָי׃","וַאֲנַחְנוּ עַמְּךָ ׀ וְצֹאן מַרְעִיתֶךָ נוֹדֶה לְּךָ לְעוֹלָם לְדֹר וָדֹר נְסַפֵּר תְּהִלָּתֶךָ׃"],"80":["לַמְנַצֵּחַ אֶל־שֹׁשַׁנִּים עֵדוּת לְאָסָף מִזְמוֹר׃","רֹעֵה יִשְׂרָאֵל ׀ הַאֲזִינָה נֹהֵג כַּצֹּאן יוֹסֵף יֹשֵׁב הַכְּרוּבִים הוֹפִיעָה׃","לִפְנֵי אֶפְרַיִם ׀ וּבִנְיָמִן וּמְנַשֶּׁה עוֹרְרָה אֶת־גְּבוּרָתֶךָ וּלְכָה לִישֻׁעָתָה לָּנוּ׃","אֱלֹהִים הֲשִׁיבֵנוּ וְהָאֵר פָּנֶיךָ וְנִוָּשֵׁעָה׃","יְהוָה אֱלֹהִים צְבָאוֹת עַד־מָתַי עָשַׁנְתָּ בִּתְפִלַּת עַמֶּךָ׃","הֶאֱכַלְתָּם לֶחֶם דִּמְעָה וַתַּשְׁקֵמוֹ בִּדְמָעוֹת שָׁלִישׁ׃","תְּשִׂימֵנוּ מָדוֹן לִשְׁכֵנֵינוּ וְאֹיְבֵינוּ יִלְעֲגוּ־לָמוֹ׃","אֱלֹהִים צְבָאוֹת הֲשִׁיבֵנוּ וְהָאֵר פָּנֶיךָ וְנִוָּשֵׁעָה׃","גֶּפֶן מִמִּצְרַיִם תַּסִּיעַ תְּגָרֵשׁ גּוֹיִם וַתִּטָּעֶהָ׃","פִּנִּיתָ לְפָנֶיהָ וַתַּשְׁרֵשׁ שָׁרָשֶׁיהָ וַתְּמַלֵּא־אָרֶץ׃","כָּסּוּ הָרִים צִלָּהּ וַעֲנָפֶיהָ אַרְזֵי־אֵל׃","תְּשַׁלַּח קְצִירֶהָ עַד־יָם וְאֶל־נָהָר יוֹנְקוֹתֶיהָ׃","לָמָּה פָּרַצְתָּ גְדֵרֶיהָ וְאָרוּהָ כָּל־עֹבְרֵי דָרֶךְ׃","יְכַרְסְמֶנָּה חֲזִיר מִיָּ וְזִיז שָׂדַי יִרְעֶנָּה׃","אֱלֹהִים צְבָאוֹת שׁוּב־נָא הַבֵּט מִשָּׁמַיִם וּרְאֵה וּפְקֹד גֶּפֶן זֹאת׃","וְכַנָּה אֲשֶׁר־נָטְעָה יְמִינֶךָ וְעַל־בֵּן אִמַּצְתָּה לָּךְ׃","שְׂרֻפָה בָאֵשׁ כְּסוּחָה מִגַּעֲרַת פָּנֶיךָ יֹאבֵדוּ׃","תְּהִי־יָדְךָ עַל־אִישׁ יְמִינֶךָ עַל־בֶּן־אָדָם אִמַּצְתָּ לָּךְ׃","וְלֹא־נָסוֹג מִמֶּךָּ תְּחַיֵּנוּ וּבְשִׁמְךָ נִקְרָא׃","יְהוָה אֱלֹהִים צְבָאוֹת הֲשִׁיבֵנוּ הָאֵר פָּנֶיךָ וְנִוָּשֵׁעָה׃"],"81":["לַמְנַצֵּחַ ׀ עַל־הַגִּתִּית לְאָסָף׃","הַרְנִינוּ לֵאלֹהִים עוּזֵּנוּ הָרִיעוּ לֵאלֹהֵי יַעֲקֹב׃","שְׂאוּ־זִמְרָה וּתְנוּ־תֹף כִּנּוֹר נָעִים עִם־נָבֶל׃","תִּקְעוּ בַחֹדֶשׁ שׁוֹפָר בַּכֵּסֶה לְיוֹם חַגֵּנוּ׃","כִּי חֹק לְיִשְׂרָאֵל הוּא מִשְׁפָּט לֵאלֹהֵי יַעֲקֹב׃","עֵדוּת ׀ בִּיהוֹסֵף שָׂמוֹ בְּצֵאתוֹ עַל־אֶרֶץ מִצְרָיִם שְׂפַת לֹא־יָדַעְתִּי אֶשְׁמָע׃","הֲסִירוֹתִי מִסֵּבֶל שִׁכְמוֹ כַּפָּיו מִדּוּד תַּעֲבֹרְנָה׃","בַּצָּרָה קָרָאתָ וָאֲחַלְּצֶךָּ אֶעֶנְךָ בְּסֵתֶר רַעַם אֶבְחָנְךָ עַל־מֵי מְרִיבָה סֶלָה׃","שְׁמַע עַמִּי וְאָעִידָה בָּךְ יִשְׂרָאֵל אִם־תִּשְׁמַע־לִי׃","לֹא־יִהְיֶה בְךָ אֵל זָר וְלֹא תִשְׁתַּחֲוֶה לְאֵל נֵכָר׃","אָנֹכִי ׀ יְהוָה אֱלֹהֶיךָ הַמַּעַלְךָ מֵאֶרֶץ מִצְרָיִם הַרְחֶב־פִּיךָ וַאֲמַלְאֵהוּ׃","וְלֹא־שָׁמַע עַמִּי לְקוֹלִי וְיִשְׂרָאֵל לֹא־אָבָה לִי׃","וָאֲשַׁלְּחֵהוּ בִּשְׁרִירוּת לִבָּם יֵלְכוּ בְּמוֹעֲצוֹתֵיהֶם׃","לוּ עַמִּי שֹׁמֵעַ לִי יִשְׂרָאֵל בִּדְרָכַי יְהַלֵּכוּ׃","כִּמְעַט אוֹיְבֵיהֶם אַכְנִיעַ וְעַל צָרֵיהֶם אָשִׁיב יָדִי׃","מְשַׂנְאֵי יְהוָה יְכַחֲשׁוּ־לוֹ וִיהִי עִתָּם לְעוֹלָם׃","וַיַּאֲכִילֵהוּ מֵחֵלֶב חִטָּה וּמִצּוּר דְּבַשׁ אַשְׂבִּיעֶךָ׃"],"82":["מִזְמוֹר לְאָסָף אֱלֹהִים נִצָּב בַּעֲדַת־אֵל בְּקֶרֶב אֱלֹהִים יִשְׁפֹּט׃","עַד־מָתַי תִּשְׁפְּטוּ־עָוֶל וּפְנֵי רְשָׁעִים תִּשְׂאוּ־סֶלָה׃","שִׁפְטוּ־דַל וְיָתוֹם עָנִי וָרָשׁ הַצְדִּיקוּ׃","פַּלְּטוּ־דַל וְאֶבְיוֹן מִיַּד רְשָׁעִים הַצִּילוּ׃","לֹא יָדְעוּ ׀ וְלֹא יָבִינוּ בַּחֲשֵׁכָה יִתְהַלָּכוּ יִמּוֹטוּ כָּל־מוֹסְדֵי אָרֶץ׃","אֲנִי־אָמַרְתִּי אֱלֹהִים אַתֶּם וּבְנֵי עֶלְיוֹן כֻּלְּכֶם׃","אָכֵן כְּאָדָם תְּמוּתוּן וּכְאַחַד הַשָּׂרִים תִּפֹּלוּ׃","קוּמָה אֱלֹהִים שָׁפְטָה הָאָרֶץ כִּי־אַתָּה תִנְחַל בְּכָל־הַגּוֹיִם׃"],"83":["שִׁיר מִזְמוֹר לְאָסָף׃","אֱלֹהִים אַל־דֳּמִי־לָךְ אַל־תֶּחֱרַשׁ וְאַל־תִּשְׁקֹט אֵל׃","כִּי־הִנֵּה אוֹיְבֶיךָ יֶהֱמָיוּן וּמְשַׂנְאֶיךָ נָשְׂאוּ רֹאשׁ׃","עַל־עַמְּךָ יַעֲרִימוּ סוֹד וְיִתְיָעֲצוּ עַל־צְפוּנֶיךָ׃","אָמְרוּ לְכוּ וְנַכְחִידֵם מִגּוֹי וְלֹא־יִזָּכֵר שֵׁם־יִשְׂרָאֵל עוֹד׃","כִּי נוֹעֲצוּ לֵב יַחְדָּו עָלֶיךָ בְּרִית יִכְרֹתוּ׃","אָהֳלֵי אֱדוֹם וְיִשְׁמְעֵאלִים מוֹאָב וְהַגְרִים׃","גְּבָל וְעַמּוֹן וַעֲמָלֵק פְּלֶשֶׁת עִם־יֹשְׁבֵי צוֹר׃","גַּם־אַשּׁוּר נִלְוָה עִמָּם הָיוּ זְרוֹעַ לִבְנֵי־לוֹט סֶלָה׃","עֲשֵׂה־לָהֶם כְּמִדְיָן כְּסִיסְרָא כְיָבִין בְּנַחַל קִישׁוֹן׃","נִשְׁמְדוּ בְעֵין־דֹּאר הָיוּ דֹּמֶן לָאֲדָמָה׃","שִׁיתֵמוֹ נְדִיבֵמוֹ כְּעֹרֵב וְכִזְאֵב וּכְזֶבַח וּכְצַלְמֻנָּע כָּל־נְסִיכֵמוֹ׃","אֲשֶׁר אָמְרוּ נִירֲשָׁה לָּנוּ אֵת נְאוֹת אֱלֹהִים׃","אֱלֹהַי שִׁיתֵמוֹ כַגַּלְגַּל כְּקַשׁ לִפְנֵי־רוּחַ׃","כְּאֵשׁ תִּבְעַר־יָעַר וּכְלֶהָבָה תְּלַהֵט הָרִים׃","כֵּן תִּרְדְּפֵם בְּסַעֲרֶךָ וּבְסוּפָתְךָ תְבַהֲלֵם׃","מַלֵּא פְנֵיהֶם קָלוֹן וִיבַקְשׁוּ שִׁמְךָ יְהוָה׃","יֵבֹשׁוּ וְיִבָּהֲלוּ עֲדֵי־עַד וְיַחְפְּרוּ וְיֹאבֵדוּ׃","וְיֵדְעוּ כִּי־אַתָּה שִׁמְךָ יְהוָה לְבַדֶּךָ עֶלְיוֹן עַל־כָּל־הָאָרֶץ׃"],"84":["לַמְנַצֵּחַ עַל־הַגִּתִּית לִבְנֵי־קֹרַח מִזְמוֹר׃","מַה־יְּדִידוֹת מִשְׁכְּנוֹתֶיךָ יְהוָה צְבָאוֹת׃","נִכְסְפָה וְגַם־כָּלְתָה ׀ נַפְשִׁי לְחַצְרוֹת יְהוָה לִבִּי וּבְשָׂרִי יְרַנְּנוּ אֶל אֵל־חָי׃","גַּם־צִפּוֹר ׀ מָצְאָה בַיִת וּדְרוֹר ׀ קֵן לָהּ אֲשֶׁר־שָׁתָה אֶפְרֹחֶיהָ אֶת־מִזְבְּחוֹתֶיךָ יְהוָה צְבָאוֹת מַלְכִּי וֵאלֹהָי׃","אַשְׁרֵי יוֹשְׁבֵי בֵיתֶךָ עוֹד יְהַלְלוּךָ סֶּלָה׃","אַשְׁרֵי אָדָם עוֹז־לוֹ בָךְ מְסִלּוֹת בִּלְבָבָם׃","עֹבְרֵי ׀ בְּעֵמֶק הַבָּכָא מַעְיָן יְשִׁיתוּהוּ גַּם־בְּרָכוֹת יַעְטֶה מוֹרֶה׃","יֵלְכוּ מֵחַיִל אֶל־חָיִל יֵרָאֶה אֶל־אֱלֹהִים בְּצִיּוֹן׃","יְהוָה אֱלֹהִים צְבָאוֹת שִׁמְעָה תְפִלָּתִי הַאֲזִינָה אֱלֹהֵי יַעֲקֹב סֶלָה׃","מָגִנֵּנוּ רְאֵה אֱלֹהִים וְהַבֵּט פְּנֵי מְשִׁיחֶךָ׃","כִּי טוֹב־יוֹם בַּחֲצֵרֶיךָ מֵאָלֶף בָּחַרְתִּי הִסְתּוֹפֵף בְּבֵית אֱלֹהַי מִדּוּר בְּאָהֳלֵי־רֶשַׁע׃","כִּי שֶׁמֶשׁ ׀ וּמָגֵן יְהוָה אֱלֹהִים חֵן וְכָבוֹד יִתֵּן יְהוָה לֹא יִמְנַע־טוֹב לַהֹלְכִים בְּתָמִים׃","יְהוָה צְבָאוֹת אַשְׁרֵי אָדָם בֹּטֵחַ בָּךְ׃"],"85":["לַמְנַצֵּחַ ׀ לִבְנֵי־קֹרַח מִזְמוֹר׃","רָצִיתָ יְהוָה אַרְצֶךָ שַׁבְתָּ שבות יַעֲקֹב׃","נָשָׂאתָ עֲוֺן עַמֶּךָ כִּסִּיתָ כָל־חַטָּאתָם סֶלָה׃","אָסַפְתָּ כָל־עֶבְרָתֶךָ הֱשִׁיבוֹתָ מֵחֲרוֹן אַפֶּךָ׃","שׁוּבֵנוּ אֱלֹהֵי יִשְׁעֵנוּ וְהָפֵר כַּעַסְךָ עִמָּנוּ׃","הַלְעוֹלָם תֶּאֱנַף־בָּנוּ תִּמְשֹׁךְ אַפְּךָ לְדֹר וָדֹר׃","הֲלֹא־אַתָּה תָּשׁוּב תְּחַיֵּנוּ וְעַמְּךָ יִשְׂמְחוּ־בָךְ׃","הַרְאֵנוּ יְהוָה חַסְדֶּךָ וְיֶשְׁעֲךָ תִּתֶּן־לָנוּ׃","אֶשְׁמְעָה מַה־יְדַבֵּר הָאֵל ׀ יְהוָה כִּי ׀ יְדַבֵּר שָׁלוֹם אֶל־עַמּוֹ וְאֶל־חֲסִידָיו וְאַל־יָשׁוּבוּ לְכִסְלָה׃","אַךְ ׀ קָרוֹב לִירֵאָיו יִשְׁעוֹ לִשְׁכֹּן כָּבוֹד בְּאַרְצֵנוּ׃","חֶסֶד־וֶאֱמֶת נִפְגָּשׁוּ צֶדֶק וְשָׁלוֹם נָשָׁקוּ׃","אֱמֶת מֵאֶרֶץ תִּצְמָח וְצֶדֶק מִשָּׁמַיִם נִשְׁקָף׃","גַּם־יְהוָה יִתֵּן הַטּוֹב וְאַרְצֵנוּ תִּתֵּן יְבוּלָהּ׃","צֶדֶק לְפָנָיו יְהַלֵּךְ וְיָשֵׂם לְדֶרֶךְ פְּעָמָיו׃"],"86":["תְּפִלָּה לְדָוִד הַטֵּה־יְהוָה אָזְנְךָ עֲנֵנִי כִּי־עָנִי וְאֶבְיוֹן אָנִי׃","שָׁמְרָה נַפְשִׁי כִּי־חָסִיד אָנִי הוֹשַׁע עַבְדְּךָ אַתָּה אֱלֹהַי הַבּוֹטֵחַ אֵלֶיךָ׃","חָנֵּנִי אֲדֹנָי כִּי אֵלֶיךָ אֶקְרָא כָּל־הַיּוֹם׃","שַׂמֵּחַ נֶפֶשׁ עַבְדֶּךָ כִּי אֵלֶיךָ אֲדֹנָי נַפְשִׁי אֶשָּׂא׃","כִּי־אַתָּה אֲדֹנָי טוֹב וְסַלָּח וְרַב־חֶסֶד לְכָל־קֹרְאֶיךָ׃","הַאֲזִינָה יְהוָה תְּפִלָּתִי וְהַקְשִׁיבָה בְּקוֹל תַּחֲנוּנוֹתָי׃","בְּיוֹם צָרָתִי אֶקְרָאֶךָּ כִּי תַעֲנֵנִי׃","אֵין־כָּמוֹךָ בָאֱלֹהִים ׀ אֲדֹנָי וְאֵין כְּמַעֲשֶׂיךָ׃","כָּל־גּוֹיִם ׀ אֲשֶׁר עָשִׂיתָ יָבוֹאוּ ׀ וְיִשְׁתַּחֲווּ לְפָנֶיךָ אֲדֹנָי וִיכַבְּדוּ לִשְׁמֶךָ׃","כִּי־גָדוֹל אַתָּה וְעֹשֵׂה נִפְלָאוֹת אַתָּה אֱלֹהִים לְבַדֶּךָ׃","הוֹרֵנִי יְהוָה ׀ דַּרְכֶּךָ אֲהַלֵּךְ בַּאֲמִתֶּךָ יַחֵד לְבָבִי לְיִרְאָה שְׁמֶךָ׃","אוֹדְךָ ׀ אֲדֹנָי אֱלֹהַי בְּכָל־לְבָבִי וַאֲכַבְּדָה שִׁמְךָ לְעוֹלָם׃","כִּי־חַסְדְּךָ גָּדוֹל עָלָי וְהִצַּלְתָּ נַפְשִׁי מִשְּׁאוֹל תַּחְתִּיָּה׃","אֱלֹהִים ׀ זֵדִים קָמוּ־עָלַי וַעֲדַת עָרִיצִים בִּקְשׁוּ נַפְשִׁי וְלֹא שָׂמוּךָ לְנֶגְדָּם׃","וְאַתָּה אֲדֹנָי אֵל־רַחוּם וְחַנּוּן אֶרֶךְ אַפַּיִם וְרַב־חֶסֶד וֶאֱמֶת׃","פְּנֵה אֵלַי וְחָנֵּנִי תְּנָה־עֻזְּךָ לְעַבְדֶּךָ וְהוֹשִׁיעָה לְבֶן־אֲמָתֶךָ׃","עֲשֵׂה־עִמִּי אוֹת לְטוֹבָה וְיִרְאוּ שֹׂנְאַי וְיֵבֹשׁוּ כִּי־אַתָּה יְהוָה עֲזַרְתַּנִי וְנִחַמְתָּנִי׃"],"87":["לִבְנֵי־קֹרַח מִזְמוֹר שִׁיר יְסוּדָתוֹ בְּהַרְרֵי־קֹדֶשׁ׃","אֹהֵב יְהוָה שַׁעֲרֵי צִיּוֹן מִכֹּל מִשְׁכְּנוֹת יַעֲקֹב׃","נִכְבָּדוֹת מְדֻבָּר בָּךְ עִיר הָאֱלֹהִים סֶלָה׃","אַזְכִּיר ׀ רַהַב וּבָבֶל לְיֹדְעָי הִנֵּה פְלֶשֶׁת וְצוֹר עִם־כּוּשׁ זֶה יֻלַּד־שָׁם׃","וּלֲצִיּוֹן ׀ יֵאָמַר אִישׁ וְאִישׁ יֻלַּד־בָּהּ וְהוּא יְכוֹנְנֶהָ עֶלְיוֹן׃","יְהוָה יִסְפֹּר בִּכְתוֹב עַמִּים זֶה יֻלַּד־שָׁם סֶלָה׃","וְשָׁרִים כְּחֹלְלִים כָּל־מַעְיָנַי בָּךְ׃"],"88":["שִׁיר מִזְמוֹר לִבְנֵי קֹרַח לַמְנַצֵּחַ עַל־מָחֲלַת לְעַנּוֹת מַשְׂכִּיל לְהֵימָן הָאֶזְרָחִי׃","יְהוָה אֱלֹהֵי יְשׁוּעָתִי יוֹם־צָעַקְתִּי בַלַּיְלָה נֶגְדֶּךָ׃","תָּבוֹא לְפָנֶיךָ תְּפִלָּתִי הַטֵּה־אָזְנְךָ לְרִנָּתִי׃","כִּי־שָׂבְעָה בְרָעוֹת נַפְשִׁי וְחַיַּי לִשְׁאוֹל הִגִּיעוּ׃","נֶחְשַׁבְתִּי עִם־יוֹרְדֵי בוֹר הָיִיתִי כְּגֶבֶר אֵין־אֱיָל׃","בַּמֵּתִים חָפְשִׁי כְּמוֹ חֲלָלִים ׀ שֹׁכְבֵי קֶבֶר אֲשֶׁר לֹא זְכַרְתָּם עוֹד וְהֵמָּה מִיָּדְךָ נִגְזָרוּ׃","שַׁתַּנִי בְּבוֹר תַּחְתִּיּוֹת בְּמַחֲשַׁכִּים בִּמְצֹלוֹת׃","עָלַי סָמְכָה חֲמָתֶךָ וְכָל־מִשְׁבָּרֶיךָ עִנִּיתָ סֶּלָה׃","הִרְחַקְתָּ מְיֻדָּעַי מִמֶּנִּי שַׁתַּנִי תוֹעֵבוֹת לָמוֹ כָּלֻא וְלֹא אֵצֵא׃","עֵינִי דָאֲבָה מִנִּי עֹנִי קְרָאתִיךָ יְהוָה בְּכָל־יוֹם שִׁטַּחְתִּי אֵלֶיךָ כַפָּי׃","הֲלַמֵּתִים תַּעֲשֶׂה־פֶּלֶא אִם־רְפָאִים יָקוּמוּ ׀ יוֹדוּךָ סֶּלָה׃","הַיְסֻפַּר בַּקֶּבֶר חַסְדֶּךָ אֱמוּנָתְךָ בָּאֲבַדּוֹן׃","הֲיִוָּדַע בַּחֹשֶׁךְ פִּלְאֶךָ וְצִדְקָתְךָ בְּאֶרֶץ נְשִׁיָּה׃","וַאֲנִי ׀ אֵלֶיךָ יְהוָה שִׁוַּעְתִּי וּבַבֹּקֶר תְּפִלָּתִי תְקַדְּמֶךָּ׃","לָמָה יְהוָה תִּזְנַח נַפְשִׁי תַּסְתִּיר פָּנֶיךָ מִמֶּנִּי׃","עָנִי אֲנִי וְגֹוֵעַ מִנֹּעַר נָשָׂאתִי אֵמֶיךָ אָפוּנָה׃","עָלַי עָבְרוּ חֲרוֹנֶיךָ בִּעוּתֶיךָ צִמְּתוּתֻנִי׃","סַבּוּנִי כַמַּיִם כָּל־הַיּוֹם הִקִּיפוּ עָלַי יָחַד׃","הִרְחַקְתָּ מִמֶּנִּי אֹהֵב וָרֵעַ מְיֻדָּעַי מַחְשָׁךְ׃"],"89":["מַשְׂכִּיל לְאֵיתָן הָאֶזְרָחִי׃","חַסְדֵי יְהוָה עוֹלָם אָשִׁירָה לְדֹר וָדֹר ׀ אוֹדִיעַ אֱמוּנָתְךָ בְּפִי׃","כִּי־אָמַרְתִּי עוֹלָם חֶסֶד יִבָּנֶה שָׁמַיִם ׀ תָּכִן אֱמוּנָתְךָ בָהֶם׃","כָּרַתִּי בְרִית לִבְחִירִי נִשְׁבַּעְתִּי לְדָוִד עַבְדִּי׃","עַד־עוֹלָם אָכִין זַרְעֶךָ וּבָנִיתִי לְדֹר־וָדוֹר כִּסְאֲךָ סֶלָה׃","וְיוֹדוּ שָׁמַיִם פִּלְאֲךָ יְהוָה אַף־אֱמוּנָתְךָ בִּקְהַל קְדֹשִׁים׃","כִּי מִי בַשַּׁחַק יַעֲרֹךְ לַיהוָה יִדְמֶה לַיהוָה בִּבְנֵי אֵלִים׃","אֵל נַעֲרָץ בְּסוֹד־קְדֹשִׁים רַבָּה וְנוֹרָא עַל־כָּל־סְבִיבָיו׃","יְהוָה ׀ אֱלֹהֵי צְבָאוֹת מִי־כָמוֹךָ חֲסִין ׀ יָהּ וֶאֱמוּנָתְךָ סְבִיבוֹתֶיךָ׃","אַתָּה מוֹשֵׁל בְּגֵאוּת הַיָּם בְּשׂוֹא גַלָּיו אַתָּה תְשַׁבְּחֵם׃","אַתָּה דִכִּאתָ כֶחָלָל רָהַב בִּזְרוֹעַ עֻזְּךָ פִּזַּרְתָּ אוֹיְבֶיךָ׃","לְךָ שָׁמַיִם אַף־לְךָ אָרֶץ תֵּבֵל וּמְלֹאָהּ אַתָּה יְסַדְתָּם׃","צָפוֹן וְיָמִין אַתָּה בְרָאתָם תָּבוֹר וְחֶרְמוֹן בְּשִׁמְךָ יְרַנֵּנוּ׃","לְךָ זְרוֹעַ עִם־גְּבוּרָה תָּעֹז יָדְךָ תָּרוּם יְמִינֶךָ׃","צֶדֶק וּמִשְׁפָּט מְכוֹן כִּסְאֶךָ חֶסֶד וֶאֱמֶת יְקַדְּמוּ פָנֶיךָ׃","אַשְׁרֵי הָעָם יוֹדְעֵי תְרוּעָה יְהוָה בְּאוֹר־פָּנֶיךָ יְהַלֵּכוּן׃","בְּשִׁמְךָ יְגִילוּן כָּל־הַיּוֹם וּבְצִדְקָתְךָ יָרוּמוּ׃","כִּי־תִפְאֶרֶת עֻזָּמוֹ אָתָּה וּבִרְצֹנְךָ תרים קַרְנֵנוּ׃","כִּי לַיהוָה מָגִנֵּנוּ וְלִקְדוֹשׁ יִשְׂרָאֵל מַלְכֵּנוּ׃","אָז דִּבַּרְתָּ־בְחָזוֹן לַחֲסִידֶיךָ וַתֹּאמֶר שִׁוִּיתִי עֵזֶר עַל־גִּבּוֹר הֲרִימוֹתִי בָחוּר מֵעָם׃","מָצָאתִי דָּוִד עַבְדִּי בְּשֶׁמֶן קָדְשִׁי מְשַׁחְתִּיו׃","אֲשֶׁר יָדִי תִּכּוֹן עִמּוֹ אַף־זְרוֹעִי תְאַמְּצֶנּוּ׃","לֹא־יַשִּׁא אוֹיֵב בּוֹ וּבֶן־עַוְלָה לֹא יְעַנֶּנּוּ׃","וְכַתּוֹתִי מִפָּנָיו צָרָיו וּמְשַׂנְאָיו אֶגּוֹף׃","וֶאֶמוּנָתִי וְחַסְדִּי עִמּוֹ וּבִשְׁמִי תָּרוּם קַרְנוֹ׃","וְשַׂמְתִּי בַיָּם יָדוֹ וּבַנְּהָרוֹת יְמִינוֹ׃","הוּא יִקְרָאֵנִי אָבִי אָתָּה אֵלִי וְצוּר יְשׁוּעָתִי׃","אַף־אָנִי בְּכוֹר אֶתְּנֵהוּ עֶלְיוֹן לְמַלְכֵי־אָרֶץ׃","לְעוֹלָם אשמור־לוֹ חַסְדִּי וּבְרִיתִי נֶאֱמֶנֶת לוֹ׃","וְשַׂמְתִּי לָעַד זַרְעוֹ וְכִסְאוֹ כִּימֵי שָׁמָיִם׃","אִם־יַעַזְבוּ בָנָיו תּוֹרָתִי וּבְמִשְׁפָּטַי לֹא יֵלֵכוּן׃","אִם־חֻקֹּתַי יְחַלֵּלוּ וּמִצְוֺתַי לֹא יִשְׁמֹרוּ׃","וּפָקַדְתִּי בְשֵׁבֶט פִּשְׁעָם וּבִנְגָעִים עֲוֺנָם׃","וְחַסְדִּי לֹא־אָפִיר מֵעִמּוֹ וְלֹא־אֲשַׁקֵּר בֶּאֱמוּנָתִי׃","לֹא־אֲחַלֵּל בְּרִיתִי וּמוֹצָא שְׂפָתַי לֹא אֲשַׁנֶּה׃","אַחַת נִשְׁבַּעְתִּי בְקָדְשִׁי אִם־לְדָוִד אֲכַזֵּב׃","זַרְעוֹ לְעוֹלָם יִהְיֶה וְכִסְאוֹ כַשֶּׁמֶשׁ נֶגְדִּי׃","כְּיָרֵחַ יִכּוֹן עוֹלָם וְעֵד בַּשַּׁחַק נֶאֱמָן סֶלָה׃","וְאַתָּה זָנַחְתָּ וַתִּמְאָס הִתְעַבַּרְתָּ עִם־מְשִׁיחֶךָ׃","נֵאַרְתָּה בְּרִית עַבְדֶּךָ חִלַּלְתָּ לָאָרֶץ נִזְרוֹ׃","פָּרַצְתָּ כָל־גְּדֵרֹתָיו שַׂמְתָּ מִבְצָרָיו מְחִתָּה׃","שַׁסֻּהוּ כָּל־עֹבְרֵי דָרֶךְ הָיָה חֶרְפָּה לִשְׁכֵנָיו׃","הֲרִימוֹתָ יְמִין צָרָיו הִשְׂמַחְתָּ כָּל־אוֹיְבָיו׃","אַף־תָּשִׁיב צוּר חַרְבּוֹ וְלֹא הֲקֵימֹתוֹ בַּמִּלְחָמָה׃","הִשְׁבַּתָּ מִטְּהָרוֹ וְכִסְאוֹ לָאָרֶץ מִגַּרְתָּה׃","הִקְצַרְתָּ יְמֵי עֲלוּמָיו הֶעֱטִיתָ עָלָיו בּוּשָׁה סֶלָה׃","עַד־מָה יְהוָה תִּסָּתֵר לָנֶצַח תִּבְעַר כְּמוֹ־אֵשׁ חֲמָתֶךָ׃","זְכָר־אֲנִי מֶה־חָלֶד עַל־מַה־שָּׁוְא בָּרָאתָ כָל־בְּנֵי־אָדָם׃","מִי גֶבֶר יִחְיֶה וְלֹא יִרְאֶה־מָּוֶת יְמַלֵּט נַפְשׁוֹ מִיַּד־שְׁאוֹל סֶלָה׃","אַיֵּה ׀ חֲסָדֶיךָ הָרִאשֹׁנִים ׀ אֲדֹנָי נִשְׁבַּעְתָּ לְדָוִד בֶּאֱמוּנָתֶךָ׃","זְכֹר אֲדֹנָי חֶרְפַּת עֲבָדֶיךָ שְׂאֵתִי בְחֵיקִי כָּל־רַבִּים עַמִּים׃","אֲשֶׁר חֵרְפוּ אוֹיְבֶיךָ ׀ יְהוָה אֲשֶׁר חֵרְפוּ עִקְּבוֹת מְשִׁיחֶךָ׃","בָּרוּךְ יְהוָה לְעוֹלָם אָמֵן ׀ וְאָמֵן׃"],"90":["תְּפִלָּה לְמֹשֶׁה אִישׁ־הָאֱלֹהִים אֲדֹנָי מָעוֹן אַתָּה הָיִיתָ לָּנוּ בְּדֹר וָדֹר׃","בְּטֶרֶם ׀ הָרִים יֻלָּדוּ וַתְּחוֹלֵל אֶרֶץ וְתֵבֵל וּמֵעוֹלָם עַד־עוֹלָם אַתָּה אֵל׃","תָּשֵׁב אֱנוֹשׁ עַד־דַּכָּא וַתֹּאמֶר שׁוּבוּ בְנֵי־אָדָם׃","כִּי אֶלֶף שָׁנִים בְּעֵינֶיךָ כְּיוֹם אֶתְמוֹל כִּי יַעֲבֹר וְאַשְׁמוּרָה בַלָּיְלָה׃","זְרַמְתָּם שֵׁנָה יִהְיוּ בַּבֹּקֶר כֶּחָצִיר יַחֲלֹף׃","בַּבֹּקֶר יָצִיץ וְחָלָף לָעֶרֶב יְמוֹלֵל וְיָבֵשׁ׃","כִּי־כָלִינוּ בְאַפֶּךָ וּבַחֲמָתְךָ נִבְהָלְנוּ׃","שת עֲוֺנֹתֵינוּ לְנֶגְדֶּךָ עֲלֻמֵנוּ לִמְאוֹר פָּנֶיךָ׃","כִּי כָל־יָמֵינוּ פָּנוּ בְעֶבְרָתֶךָ כִּלִּינוּ שָׁנֵינוּ כְמוֹ־הֶגֶה׃","יְמֵי־שְׁנוֹתֵינוּ בָהֶם שִׁבְעִים שָׁנָה וְאִם בִּגְבוּרֹת ׀ שְׁמוֹנִים שָׁנָה וְרָהְבָּם עָמָל וָאָוֶן כִּי־גָז חִישׁ וַנָּעֻפָה׃","מִי־יוֹדֵעַ עֹז אַפֶּךָ וּכְיִרְאָתְךָ עֶבְרָתֶךָ׃","לִמְנוֹת יָמֵינוּ כֵּן הוֹדַע וְנָבִא לְבַב חָכְמָה׃","שׁוּבָה יְהוָה עַד־מָתָי וְהִנָּחֵם עַל־עֲבָדֶיךָ׃","שַׂבְּעֵנוּ בַבֹּקֶר חַסְדֶּךָ וּנְרַנְּנָה וְנִשְׂמְחָה בְּכָל־יָמֵינוּ׃","שַׂמְּחֵנוּ כִּימוֹת עִנִּיתָנוּ שְׁנוֹת רָאִינוּ רָעָה׃","יֵרָאֶה אֶל־עֲבָדֶיךָ פָעֳלֶךָ וַהֲדָרְךָ עַל־בְּנֵיהֶם׃","וִיהִי ׀ נֹעַם אֲדֹנָי אֱלֹהֵינוּ עָלֵינוּ וּמַעֲשֵׂה יָדֵינוּ כּוֹנְנָה עָלֵינוּ וּמַעֲשֵׂה יָדֵינוּ כּוֹנְנֵהוּ׃"],"91":["יֹשֵׁב בְּסֵתֶר עֶלְיוֹן בְּצֵל שַׁדַּי יִתְלוֹנָן׃","אֹמַר לַיהוָה מַחְסִי וּמְצוּדָתִי אֱלֹהַי אֶבְטַח־בּוֹ׃","כִּי הוּא יַצִּילְךָ מִפַּח יָקוּשׁ מִדֶּבֶר הַוּוֹת׃","בְּאֶבְרָתוֹ ׀ יָסֶךְ לָךְ וְתַחַת־כְּנָפָיו תֶּחְסֶה צִנָּה וְסֹחֵרָה אֲמִתּוֹ׃","לֹא־תִירָא מִפַּחַד לָיְלָה מֵחֵץ יָעוּף יוֹמָם׃","מִדֶּבֶר בָּאֹפֶל יַהֲלֹךְ מִקֶּטֶב יָשׁוּד צָהֳרָיִם׃","יִפֹּל מִצִּדְּךָ ׀ אֶלֶף וּרְבָבָה מִימִינֶךָ אֵלֶיךָ לֹא יִגָּשׁ׃","רַק בְּעֵינֶיךָ תַבִּיט וְשִׁלֻּמַת רְשָׁעִים תִּרְאֶה׃","כִּי־אַתָּה יְהוָה מַחְסִי עֶלְיוֹן שַׂמְתָּ מְעוֹנֶךָ׃","לֹא־תְאֻנֶּה אֵלֶיךָ רָעָה וְנֶגַע לֹא־יִקְרַב בְּאָהֳלֶךָ׃","כִּי מַלְאָכָיו יְצַוֶּה־לָּךְ לִשְׁמָרְךָ בְּכָל־דְּרָכֶיךָ׃","עַל־כַּפַּיִם יִשָּׂאוּנְךָ פֶּן־תִּגֹּף בָּאֶבֶן רַגְלֶךָ׃","עַל־שַׁחַל וָפֶתֶן תִּדְרֹךְ תִּרְמֹס כְּפִיר וְתַנִּין׃","כִּי בִי חָשַׁק וַאֲפַלְּטֵהוּ אֲשַׂגְּבֵהוּ כִּי־יָדַע שְׁמִי׃","יִקְרָאֵנִי ׀ וְאֶעֱנֵהוּ עִמּוֹ־אָנֹכִי בְצָרָה אֲחַלְּצֵהוּ וַאֲכַבְּדֵהוּ׃","אֹרֶךְ יָמִים אַשְׂבִּיעֵהוּ וְאַרְאֵהוּ בִּישׁוּעָתִי׃"],"92":["מִזְמוֹר שִׁיר לְיוֹם הַשַּׁבָּת׃","טוֹב לְהֹדוֹת לַיהוָה וּלְזַמֵּר לְשִׁמְךָ עֶלְיוֹן׃","לְהַגִּיד בַּבֹּקֶר חַסְדֶּךָ וֶאֱמוּנָתְךָ בַּלֵּילוֹת׃","עֲלֵי־עָשׂוֹר וַעֲלֵי־נָבֶל עֲלֵי הִגָּיוֹן בְּכִנּוֹר׃","כִּי שִׂמַּחְתַּנִי יְהוָה בְּפָעֳלֶךָ בְּמַעֲשֵׂי יָדֶיךָ אֲרַנֵּן׃","מַה־גָּדְלוּ מַעֲשֶׂיךָ יְהוָה מְאֹד עָמְקוּ מַחְשְׁבֹתֶיךָ׃","אִישׁ־בַּעַר לֹא יֵדָע וּכְסִיל לֹא־יָבִין אֶת־זֹאת׃","בִּפְרֹחַ רְשָׁעִים ׀ כְּמוֹ עֵשֶׂב וַיָּצִיצוּ כָּל־פֹּעֲלֵי אָוֶן לְהִשָּׁמְדָם עֲדֵי־עַד׃","וְאַתָּה מָרוֹם לְעֹלָם יְהוָה׃","כִּי הִנֵּה אֹיְבֶיךָ ׀ יְהוָה כִּי־הִנֵּה אֹיְבֶיךָ יֹאבֵדוּ יִתְפָּרְדוּ כָּל־פֹּעֲלֵי אָוֶן׃","וַתָּרֶם כִּרְאֵים קַרְנִי בַּלֹּתִי בְּשֶׁמֶן רַעֲנָן׃","וַתַּבֵּט עֵינִי בְּשׁוּרָי בַּקָּמִים עָלַי מְרֵעִים תִּשְׁמַעְנָה אָזְנָי׃","צַדִּיק כַּתָּמָר יִפְרָח כְּאֶרֶז בַּלְּבָנוֹן יִשְׂגֶּה׃","שְׁתוּלִים בְּבֵית יְהוָה בְּחַצְרוֹת אֱלֹהֵינוּ יַפְרִיחוּ׃","עוֹד יְנוּבוּן בְּשֵׂיבָה דְּשֵׁנִים וְרַעֲנַנִּים יִהְיוּ׃","לְהַגִּיד כִּי־יָשָׁר יְהוָה צוּרִי וְלֹא־עלתה בּוֹ׃"],"93":["יְהוָה מָלָךְ גֵּאוּת לָבֵשׁ לָבֵשׁ יְהוָה עֹז הִתְאַזָּר אַף־תִּכּוֹן תֵּבֵל בַּל־תִּמּוֹט׃","נָכוֹן כִּסְאֲךָ מֵאָז מֵעוֹלָם אָתָּה׃","נָשְׂאוּ נְהָרוֹת ׀ יְהוָה נָשְׂאוּ נְהָרוֹת קוֹלָם יִשְׂאוּ נְהָרוֹת דָּכְיָם׃","מִקֹּלוֹת ׀ מַיִם רַבִּים אַדִּירִים מִשְׁבְּרֵי־יָם אַדִּיר בַּמָּרוֹם יְהוָה׃","עֵדֹתֶיךָ ׀ נֶאֶמְנוּ מְאֹד לְבֵיתְךָ נַאֲוָה־קֹדֶשׁ יְהוָה לְאֹרֶךְ יָמִים׃"],"94":["אֵל־נְקָמוֹת יְהוָה אֵל נְקָמוֹת הוֹפִיַע׃","הִנָּשֵׂא שֹׁפֵט הָאָרֶץ הָשֵׁב גְּמוּל עַל־גֵּאִים׃","עַד־מָתַי רְשָׁעִים ׀ יְהוָה עַד־מָתַי רְשָׁעִים יַעֲלֹזוּ׃","יַבִּיעוּ יְדַבְּרוּ עָתָק יִתְאַמְּרוּ כָּל־פֹּעֲלֵי אָוֶן׃","עַמְּךָ יְהוָה יְדַכְּאוּ וְנַחֲלָתְךָ יְעַנּוּ׃","אַלְמָנָה וְגֵר יַהֲרֹגוּ וִיתוֹמִים יְרַצֵּחוּ׃","וַיֹּאמְרוּ לֹא יִרְאֶה־יָּהּ וְלֹא־יָבִין אֱלֹהֵי יַעֲקֹב׃","בִּינוּ בֹּעֲרִים בָּעָם וּכְסִילִים מָתַי תַּשְׂכִּילוּ׃","הֲנֹטַע אֹזֶן הֲלֹא יִשְׁמָע אִם־יֹצֵר עַיִן הֲלֹא יַבִּיט׃","הֲיֹסֵר גּוֹיִם הֲלֹא יוֹכִיחַ הַמְלַמֵּד אָדָם דָּעַת׃","יְהוָה יֹדֵעַ מַחְשְׁבוֹת אָדָם כִּי־הֵמָּה הָבֶל׃","אַשְׁרֵי ׀ הַגֶּבֶר אֲשֶׁר־תְּיַסְּרֶנּוּ יָּהּ וּמִתּוֹרָתְךָ תְלַמְּדֶנּוּ׃","לְהַשְׁקִיט לוֹ מִימֵי רָע עַד יִכָּרֶה לָרָשָׁע שָׁחַת׃","כִּי ׀ לֹא־יִטֹּשׁ יְהוָה עַמּוֹ וְנַחֲלָתוֹ לֹא יַעֲזֹב׃","כִּי־עַד־צֶדֶק יָשׁוּב מִשְׁפָּט וְאַחֲרָיו כָּל־יִשְׁרֵי־לֵב׃","מִי־יָקוּם לִי עִם־מְרֵעִים מִי־יִתְיַצֵּב לִי עִם־פֹּעֲלֵי אָוֶן׃","לוּלֵי יְהוָה עֶזְרָתָה לִּי כִּמְעַט ׀ שָׁכְנָה דוּמָה נַפְשִׁי׃","אִם־אָמַרְתִּי מָטָה רַגְלִי חַסְדְּךָ יְהוָה יִסְעָדֵנִי׃","בְּרֹב שַׂרְעַפַּי בְּקִרְבִּי תַּנְחוּמֶיךָ יְשַׁעַשְׁעוּ נַפְשִׁי׃","הַיְחָבְרְךָ כִּסֵּא הַוּוֹת יֹצֵר עָמָל עֲלֵי־חֹק׃","יָגוֹדּוּ עַל־נֶפֶשׁ צַדִּיק וְדָם נָקִי יַרְשִׁיעוּ׃","וַיְהִי יְהוָה לִי לְמִשְׂגָּב וֵאלֹהַי לְצוּר מַחְסִי׃","וַיָּשֶׁב עֲלֵיהֶם ׀ אֶת־אוֹנָם וּבְרָעָתָם יַצְמִיתֵם יַצְמִיתֵם יְהוָה אֱלֹהֵינוּ׃"],"95":["לְכוּ נְרַנְּנָה לַיהוָה נָרִיעָה לְצוּר יִשְׁעֵנוּ׃","נְקַדְּמָה פָנָיו בְּתוֹדָה בִּזְמִרוֹת נָרִיעַ לוֹ׃","כִּי אֵל גָּדוֹל יְהוָה וּמֶלֶךְ גָּדוֹל עַל־כָּל־אֱלֹהִים׃","אֲשֶׁר בְּיָדוֹ מֶחְקְרֵי־אָרֶץ וְתוֹעֲפוֹת הָרִים לוֹ׃","אֲשֶׁר־לוֹ הַיָּם וְהוּא עָשָׂהוּ וְיַבֶּשֶׁת יָדָיו יָצָרוּ׃","בֹּאוּ נִשְׁתַּחֲוֶה וְנִכְרָעָה נִבְרְכָה לִפְנֵי־יְהוָה עֹשֵׂנוּ׃","כִּי הוּא אֱלֹהֵינוּ וַאֲנַחְנוּ עַם מַרְעִיתוֹ וְצֹאן יָדוֹ הַיּוֹם אִם־בְּקֹלוֹ תִשְׁמָעוּ׃","אַל־תַּקְשׁוּ לְבַבְכֶם כִּמְרִיבָה כְּיוֹם מַסָּה בַּמִּדְבָּר׃","אֲשֶׁר נִסּוּנִי אֲבוֹתֵיכֶם בְּחָנוּנִי גַּם־רָאוּ פָעֳלִי׃","אַרְבָּעִים שָׁנָה ׀ אָקוּט בְּדוֹר וָאֹמַר עַם תֹּעֵי לֵבָב הֵם וְהֵם לֹא־יָדְעוּ דְרָכָי׃","אֲשֶׁר־נִשְׁבַּעְתִּי בְאַפִּי אִם־יְבֹאוּן אֶל־מְנוּחָתִי׃"],"96":["שִׁירוּ לַיהוָה שִׁיר חָדָשׁ שִׁירוּ לַיהוָה כָּל־הָאָרֶץ׃","שִׁירוּ לַיהוָה בָּרֲכוּ שְׁמוֹ בַּשְּׂרוּ מִיּוֹם־לְיוֹם יְשׁוּעָתוֹ׃","סַפְּרוּ בַגּוֹיִם כְּבוֹדוֹ בְּכָל־הָעַמִּים נִפְלְאוֹתָיו׃","כִּי גָדוֹל יְהוָה וּמְהֻלָּל מְאֹד נוֹרָא הוּא עַל־כָּל־אֱלֹהִים׃","כִּי ׀ כָּל־אֱלֹהֵי הָעַמִּים אֱלִילִים וַיהוָה שָׁמַיִם עָשָׂה׃","הוֹד־וְהָדָר לְפָנָיו עֹז וְתִפְאֶרֶת בְּמִקְדָּשׁוֹ׃","הָבוּ לַיהוָה מִשְׁפְּחוֹת עַמִּים הָבוּ לַיהוָה כָּבוֹד וָעֹז׃","הָבוּ לַיהוָה כְּבוֹד שְׁמוֹ שְׂאוּ־מִנְחָה וּבֹאוּ לְחַצְרוֹתָיו׃","הִשְׁתַּחֲווּ לַיהוָה בְּהַדְרַת־קֹדֶשׁ חִילוּ מִפָּנָיו כָּל־הָאָרֶץ׃","אִמְרוּ בַגּוֹיִם ׀ יְהוָה מָלָךְ אַף־תִּכּוֹן תֵּבֵל בַּל־תִּמּוֹט יָדִין עַמִּים בְּמֵישָׁרִים׃","יִשְׂמְחוּ הַשָּׁמַיִם וְתָגֵל הָאָרֶץ יִרְעַם הַיָּם וּמְלֹאוֹ׃","יַעֲלֹז שָׂדַי וְכָל־אֲשֶׁר־בּוֹ אָז יְרַנְּנוּ כָּל־עֲצֵי־יָעַר׃","לִפְנֵי יְהוָה ׀ כִּי בָא כִּי בָא לִשְׁפֹּט הָאָרֶץ יִשְׁפֹּט־תֵּבֵל בְּצֶדֶק וְעַמִּים בֶּאֱמוּנָתוֹ׃"],"97":["יְהוָה מָלָךְ תָּגֵל הָאָרֶץ יִשְׂמְחוּ אִיִּים רַבִּים׃","עָנָן וַעֲרָפֶל סְבִיבָיו צֶדֶק וּמִשְׁפָּט מְכוֹן כִּסְאוֹ׃","אֵשׁ לְפָנָיו תֵּלֵךְ וּתְלַהֵט סָבִיב צָרָיו׃","הֵאִירוּ בְרָקָיו תֵּבֵל רָאֲתָה וַתָּחֵל הָאָרֶץ׃","הָרִים כַּדּוֹנַג נָמַסּוּ מִלִּפְנֵי יְהוָה מִלִּפְנֵי אֲדוֹן כָּל־הָאָרֶץ׃","הִגִּידוּ הַשָּׁמַיִם צִדְקוֹ וְרָאוּ כָל־הָעַמִּים כְּבוֹדוֹ׃","יֵבֹשׁוּ ׀ כָּל־עֹבְדֵי פֶסֶל הַמִּתְהַלְלִים בָּאֱלִילִים הִשְׁתַּחֲווּ־לוֹ כָּל־אֱלֹהִים׃","שָׁמְעָה וַתִּשְׂמַח ׀ צִיּוֹן וַתָּגֵלְנָה בְּנוֹת יְהוּדָה לְמַעַן מִשְׁפָּטֶיךָ יְהוָה׃","כִּי־אַתָּה יְהוָה עֶלְיוֹן עַל־כָּל־הָאָרֶץ מְאֹד נַעֲלֵיתָ עַל־כָּל־אֱלֹהִים׃","אֹהֲבֵי יְהוָה שִׂנְאוּ רָע שֹׁמֵר נַפְשׁוֹת חֲסִידָיו מִיַּד רְשָׁעִים יַצִּילֵם׃","אוֹר זָרֻעַ לַצַּדִּיק וּלְיִשְׁרֵי־לֵב שִׂמְחָה׃","שִׂמְחוּ צַדִּיקִים בַּיהוָה וְהוֹדוּ לְזֵכֶר קָדְשׁוֹ׃"],"98":["מִזְמוֹר שִׁירוּ לַיהוָה ׀ שִׁיר חָדָשׁ כִּי־נִפְלָאוֹת עָשָׂה הוֹשִׁיעָה־לּוֹ יְמִינוֹ וּזְרוֹעַ קָדְשׁוֹ׃","הוֹדִיעַ יְהוָה יְשׁוּעָתוֹ לְעֵינֵי הַגּוֹיִם גִּלָּה צִדְקָתוֹ׃","זָכַר חַסְדּוֹ ׀ וֶאֱמוּנָתוֹ לְבֵית יִשְׂרָאֵל רָאוּ כָל־אַפְסֵי־אָרֶץ אֵת יְשׁוּעַת אֱלֹהֵינוּ׃","הָרִיעוּ לַיהוָה כָּל־הָאָרֶץ פִּצְחוּ וְרַנְּנוּ וְזַמֵּרוּ׃","זַמְּרוּ לַיהוָה בְּכִנּוֹר בְּכִנּוֹר וְקוֹל זִמְרָה׃","בַּחֲצֹצְרוֹת וְקוֹל שׁוֹפָר הָרִיעוּ לִפְנֵי ׀ הַמֶּלֶךְ יְהוָה׃","יִרְעַם הַיָּם וּמְלֹאוֹ תֵּבֵל וְיֹשְׁבֵי בָהּ׃","נְהָרוֹת יִמְחֲאוּ־כָף יַחַד הָרִים יְרַנֵּנוּ׃","לִפְנֵי־יְהוָה כִּי בָא לִשְׁפֹּט הָאָרֶץ יִשְׁפֹּט־תֵּבֵל בְּצֶדֶק וְעַמִּים בְּמֵישָׁרִים׃"],"99":["יְהוָה מָלָךְ יִרְגְּזוּ עַמִּים יֹשֵׁב כְּרוּבִים תָּנוּט הָאָרֶץ׃","יְהוָה בְּצִיּוֹן גָּדוֹל וְרָם הוּא עַל־כָּל־הָעַמִּים׃","יוֹדוּ שִׁמְךָ גָּדוֹל וְנוֹרָא קָדוֹשׁ הוּא׃","וְעֹז מֶלֶךְ מִשְׁפָּט אָהֵב אַתָּה כּוֹנַנְתָּ מֵישָׁרִים מִשְׁפָּט וּצְדָקָה בְּיַעֲקֹב ׀ אַתָּה עָשִׂיתָ׃","רוֹמְמוּ יְהוָה אֱלֹהֵינוּ וְהִשְׁתַּחֲווּ לַהֲדֹם רַגְלָיו קָדוֹשׁ הוּא׃","מֹשֶׁה וְאַהֲרֹן ׀ בְּכֹהֲנָיו וּשְׁמוּאֵל בְּקֹרְאֵי שְׁמוֹ קֹרִאים אֶל־יְהוָה וְהוּא יַעֲנֵם׃","בְּעַמּוּד עָנָן יְדַבֵּר אֲלֵיהֶם שָׁמְרוּ עֵדֹתָיו וְחֹק נָתַן־לָמוֹ׃","יְהוָה אֱלֹהֵינוּ אַתָּה עֲנִיתָם אֵל נֹשֵׂא הָיִיתָ לָהֶם וְנֹקֵם עַל־עֲלִילוֹתָם׃","רוֹמְמוּ יְהוָה אֱלֹהֵינוּ וְהִשְׁתַּחֲווּ לְהַר קָדְשׁוֹ כִּי־קָדוֹשׁ יְהוָה אֱלֹהֵינוּ׃"],"100":["מִזְמוֹר לְתוֹדָה הָרִיעוּ לַיהוָה כָּל־הָאָרֶץ׃","עִבְדוּ אֶת־יְהוָה בְּשִׂמְחָה בֹּאוּ לְפָנָיו בִּרְנָנָה׃","דְּעוּ כִּי־יְהוָה הוּא אֱלֹהִים הוּא־עָשָׂנוּ ולא אֲנַחְנוּ עַמּוֹ וְצֹאן מַרְעִיתוֹ׃","בֹּאוּ שְׁעָרָיו ׀ בְּתוֹדָה חֲצֵרֹתָיו בִּתְהִלָּה הוֹדוּ־לוֹ בָּרֲכוּ שְׁמוֹ׃","כִּי־טוֹב יְהֹוָה לְעוֹלָם חַסְדּוֹ וְעַד־דֹּר וָדֹר אֱמוּנָתוֹ׃"],"101":["לְדָוִד מִזְמוֹר חֶסֶד־וּמִשְׁפָּט אָשִׁירָה לְךָ יְהוָה אֲזַמֵּרָה׃","אַשְׂכִּילָה ׀ בְּדֶרֶךְ תָּמִים מָתַי תָּבוֹא אֵלָי אֶתְהַלֵּךְ בְּתָם־לְבָבִי בְּקֶרֶב בֵּיתִי׃","לֹא־אָשִׁית ׀ לְנֶגֶד עֵינַי דְּבַר־בְּלִיָּעַל עֲשֹׂה־סֵטִים שָׂנֵאתִי לֹא יִדְבַּק בִּי׃","לֵבָב עִקֵּשׁ יָסוּר מִמֶּנִּי רָע לֹא אֵדָע׃","מלושני בַסֵּתֶר ׀ רֵעֵהוּ אוֹתוֹ אַצְמִית גְּבַהּ־עֵינַיִם וּרְחַב לֵבָב אֹתוֹ לֹא אוּכָל׃","עֵינַי ׀ בְּנֶאֶמְנֵי־אֶרֶץ לָשֶׁבֶת עִמָּדִי הֹלֵךְ בְּדֶרֶךְ תָּמִים הוּא יְשָׁרְתֵנִי׃","לֹא־יֵשֵׁב ׀ בְּקֶרֶב בֵּיתִי עֹשֵׂה רְמִיָּה דֹּבֵר שְׁקָרִים לֹא־יִכּוֹן לְנֶגֶד עֵינָי׃","לַבְּקָרִים אַצְמִית כָּל־רִשְׁעֵי־אָרֶץ לְהַכְרִית מֵעִיר־יְהוָה כָּל־פֹּעֲלֵי אָוֶן׃"],"102":["תְּפִלָּה לְעָנִי כִי־יַעֲטֹף וְלִפְנֵי יְהוָה יִשְׁפֹּךְ שִׂיחוֹ׃","יְהוָה שִׁמְעָה תְפִלָּתִי וְשַׁוְעָתִי אֵלֶיךָ תָבוֹא׃","אַל־תַּסְתֵּר פָּנֶיךָ ׀ מִמֶּנִּי בְּיוֹם צַר לִי הַטֵּה־אֵלַי אָזְנֶךָ בְּיוֹם אֶקְרָא מַהֵר עֲנֵנִי׃","כִּי־כָלוּ בְעָשָׁן יָמָי וְעַצְמוֹתַי כְּמוֹ־קֵד נִחָרוּ׃","הוּכָּה־כָעֵשֶׂב וַיִּבַשׁ לִבִּי כִּי־שָׁכַחְתִּי מֵאֲכֹל לַחְמִי׃","מִקּוֹל אַנְחָתִי דָּבְקָה עַצְמִי לִבְשָׂרִי׃","דָּמִיתִי לִקְאַת מִדְבָּר הָיִיתִי כְּכוֹס חֳרָבוֹת׃","שָׁקַדְתִּי וָאֶהְיֶה כְּצִפּוֹר בּוֹדֵד עַל־גָּג׃","כָּל־הַיּוֹם חֵרְפוּנִי אוֹיְבָי מְהוֹלָלַי בִּי נִשְׁבָּעוּ׃","כִּי־אֵפֶר כַּלֶּחֶם אָכָלְתִּי וְשִׁקֻּוַי בִּבְכִי מָסָכְתִּי׃","מִפְּנֵי־זַעַמְךָ וְקִצְפֶּךָ כִּי נְשָׂאתַנִי וַתַּשְׁלִיכֵנִי׃","יָמַי כְּצֵל נָטוּי וַאֲנִי כָּעֵשֶׂב אִיבָשׁ׃","וְאַתָּה יְהוָה לְעוֹלָם תֵּשֵׁב וְזִכְרְךָ לְדֹר וָדֹר׃","אַתָּה תָקוּם תְּרַחֵם צִיּוֹן כִּי־עֵת לְחֶנְנָהּ כִּי־בָא מוֹעֵד׃","כִּי־רָצוּ עֲבָדֶיךָ אֶת־אֲבָנֶיהָ וְאֶת־עֲפָרָהּ יְחֹנֵנוּ׃","וְיִירְאוּ גוֹיִם אֶת־שֵׁם יְהוָה וְכָל־מַלְכֵי הָאָרֶץ אֶת־כְּבוֹדֶךָ׃","כִּי־בָנָה יְהוָה צִיּוֹן נִרְאָה בִּכְבוֹדוֹ׃","פָּנָה אֶל־תְּפִלַּת הָעַרְעָר וְלֹא־בָזָה אֶת־תְּפִלָּתָם׃","תִּכָּתֶב זֹאת לְדוֹר אַחֲרוֹן וְעַם נִבְרָא יְהַלֶּל־יָהּ׃","כִּי־הִשְׁקִיף מִמְּרוֹם קָדְשׁוֹ יְהוָה מִשָּׁמַיִם ׀ אֶל־אֶרֶץ הִבִּיט׃","לִשְׁמֹעַ אֶנְקַת אָסִיר לְפַתֵּחַ בְּנֵי תְמוּתָה׃","לְסַפֵּר בְּצִיּוֹן שֵׁם יְהוָה וּתְהִלָּתוֹ בִּירוּשָׁלִָם׃","בְּהִקָּבֵץ עַמִּים יַחְדָּו וּמַמְלָכוֹת לַעֲבֹד אֶת־יְהוָה׃","עִנָּה בַדֶּרֶךְ כחו קִצַּר יָמָי׃","אֹמַר אֵלִי אַל־תַּעֲלֵנִי בַּחֲצִי יָמָי בְּדוֹר דּוֹרִים שְׁנוֹתֶיךָ׃","לְפָנִים הָאָרֶץ יָסַדְתָּ וּמַעֲשֵׂה יָדֶיךָ שָׁמָיִם׃","הֵמָּה ׀ יֹאבֵדוּ וְאַתָּה תַעֲמֹד וְכֻלָּם כַּבֶּגֶד יִבְלוּ כַּלְּבוּשׁ תַּחֲלִיפֵם וְיַחֲלֹפוּ׃","וְאַתָּה־הוּא וּשְׁנוֹתֶיךָ לֹא יִתָּמּוּ׃","בְּנֵי־עֲבָדֶיךָ יִשְׁכּוֹנוּ וְזַרְעָם לְפָנֶיךָ יִכּוֹן׃"],"103":["לְדָוִד ׀ בָּרֲכִי נַפְשִׁי אֶת־יְהוָה וְכָל־קְרָבַי אֶת־שֵׁם קָדְשׁוֹ׃","בָּרֲכִי נַפְשִׁי אֶת־יְהוָה וְאַל־תִּשְׁכְּחִי כָּל־גְּמוּלָיו׃","הַסֹּלֵחַ לְכָל־עֲוֺנֵכִי הָרֹפֵא לְכָל־תַּחֲלֻאָיְכִי׃","הַגּוֹאֵל מִשַּׁחַת חַיָּיְכִי הַמְעַטְּרֵכִי חֶסֶד וְרַחֲמִים׃","הַמַּשְׂבִּיַע בַּטּוֹב עֶדְיֵךְ תִּתְחַדֵּשׁ כַּנֶּשֶׁר נְעוּרָיְכִי׃","עֹשֵׂה צְדָקוֹת יְהוָה וּמִשְׁפָּטִים לְכָל־עֲשׁוּקִים׃","יוֹדִיעַ דְּרָכָיו לְמֹשֶׁה לִבְנֵי יִשְׂרָאֵל עֲלִילוֹתָיו׃","רַחוּם וְחַנּוּן יְהוָה אֶרֶךְ אַפַּיִם וְרַב־חָסֶד׃","לֹא־לָנֶצַח יָרִיב וְלֹא לְעוֹלָם יִטּוֹר׃","לֹא כַחֲטָאֵינוּ עָשָׂה לָנוּ וְלֹא כַעֲוֺנֹתֵינוּ גָּמַל עָלֵינוּ׃","כִּי כִגְבֹהַּ שָׁמַיִם עַל־הָאָרֶץ גָּבַר חַסְדּוֹ עַל־יְרֵאָיו׃","כִּרְחֹק מִזְרָח מִמַּעֲרָב הִרְחִיק מִמֶּנּוּ אֶת־פְּשָׁעֵינוּ׃","כְּרַחֵם אָב עַל־בָּנִים רִחַם יְהוָה עַל־יְרֵאָיו׃","כִּי־הוּא יָדַע יִצְרֵנוּ זָכוּר כִּי־עָפָר אֲנָחְנוּ׃","אֱנוֹשׁ כֶּחָצִיר יָמָיו כְּצִיץ הַשָּׂדֶה כֵּן יָצִיץ׃","כִּי רוּחַ עָבְרָה־בּוֹ וְאֵינֶנּוּ וְלֹא־יַכִּירֶנּוּ עוֹד מְקוֹמוֹ׃","וְחֶסֶד יְהוָה ׀ מֵעוֹלָם וְעַד־עוֹלָם עַל־יְרֵאָיו וְצִדְקָתוֹ לִבְנֵי בָנִים׃","לְשֹׁמְרֵי בְרִיתוֹ וּלְזֹכְרֵי פִקֻּדָיו לַעֲשׂוֹתָם׃","יְהוָה בַּשָּׁמַיִם הֵכִין כִּסְאוֹ וּמַלְכוּתוֹ בַּכֹּל מָשָׁלָה׃","בָּרֲכוּ יְהוָה מַלְאָכָיו גִּבֹּרֵי כֹחַ עֹשֵׂי דְבָרוֹ לִשְׁמֹעַ בְּקוֹל דְּבָרוֹ׃","בָּרֲכוּ יְהוָה כָּל־צְבָאָיו מְשָׁרְתָיו עֹשֵׂי רְצוֹנוֹ׃","בָּרֲכוּ יְהוָה ׀ כָּל־מַעֲשָׂיו בְּכָל־מְקֹמוֹת מֶמְשַׁלְתּוֹ בָּרֲכִי נַפְשִׁי אֶת־יְהוָה׃"],"104":["בָּרֲכִי נַפְשִׁי אֶת־יְהוָה יְהוָה אֱלֹהַי גָּדַלְתָּ מְּאֹד הוֹד וְהָדָר לָבָשְׁתָּ׃","עֹטֶה־אוֹר כַּשַּׂלְמָה נוֹטֶה שָׁמַיִם כַּיְרִיעָה׃","הַמְקָרֶה בַמַּיִם עֲלִיּוֹתָיו הַשָּׂם־עָבִים רְכוּבוֹ הַמְהַלֵּךְ עַל־כַּנְפֵי־רוּחַ׃","עֹשֶׂה מַלְאָכָיו רוּחוֹת מְשָׁרְתָיו אֵשׁ לֹהֵט׃","יָסַד־אֶרֶץ עַל־מְכוֹנֶיהָ בַּל־תִּמּוֹט עוֹלָם וָעֶד׃","תְּהוֹם כַּלְּבוּשׁ כִּסִּיתוֹ עַל־הָרִים יַעַמְדוּ־מָיִם׃","מִן־גַּעֲרָתְךָ יְנוּסוּן מִן־קוֹל רַעַמְךָ יֵחָפֵזוּן׃","יַעֲלוּ הָרִים יֵרְדוּ בְקָעוֹת אֶל־מְקוֹם זֶה ׀ יָסַדְתָּ לָהֶם׃","גְּבוּל־שַׂמְתָּ בַּל־יַעֲבֹרוּן בַּל־יְשׁוּבוּן לְכַסּוֹת הָאָרֶץ׃","הַמְשַׁלֵּחַ מַעְיָנִים בַּנְּחָלִים בֵּין הָרִים יְהַלֵּכוּן׃","יַשְׁקוּ כָּל־חַיְתוֹ שָׂדָי יִשְׁבְּרוּ פְרָאִים צְמָאָם׃","עֲלֵיהֶם עוֹף־הַשָּׁמַיִם יִשְׁכּוֹן מִבֵּין עֳפָאיִם יִתְּנוּ־קוֹל׃","מַשְׁקֶה הָרִים מֵעֲלִיּוֹתָיו מִפְּרִי מַעֲשֶׂיךָ תִּשְׂבַּע הָאָרֶץ׃","מַצְמִיחַ חָצִיר ׀ לַבְּהֵמָה וְעֵשֶׂב לַעֲבֹדַת הָאָדָם לְהוֹצִיא לֶחֶם מִן־הָאָרֶץ׃","וְיַיִן ׀ יְשַׂמַּח לְבַב־אֱנוֹשׁ לְהַצְהִיל פָּנִים מִשָּׁמֶן וְלֶחֶם לְבַב־אֱנוֹשׁ יִסְעָד׃","יִשְׂבְּעוּ עֲצֵי יְהוָה אַרְזֵי לְבָנוֹן אֲשֶׁר נָטָע׃","אֲשֶׁר־שָׁם צִפֳּרִים יְקַנֵּנוּ חֲסִידָה בְּרוֹשִׁים בֵּיתָהּ׃","הָרִים הַגְּבֹהִים לַיְּעֵלִים סְלָעִים מַחְסֶה לַשְׁפַנִּים׃","עָשָׂה יָרֵחַ לְמוֹעֲדִים שֶׁמֶשׁ יָדַע מְבוֹאוֹ׃","תָּשֶׁת־חֹשֶׁךְ וִיהִי לָיְלָה בּוֹ־תִרְמֹשׂ כָּל־חַיְתוֹ־יָעַר׃","הַכְּפִירִים שֹׁאֲגִים לַטָּרֶף וּלְבַקֵּשׁ מֵאֵל אָכְלָם׃","תִּזְרַח הַשֶּׁמֶשׁ יֵאָסֵפוּן וְאֶל־מְעוֹנֹתָם יִרְבָּצוּן׃","יֵצֵא אָדָם לְפָעֳלוֹ וְלַעֲבֹדָתוֹ עֲדֵי־עָרֶב׃","מָה־רַבּוּ מַעֲשֶׂיךָ ׀ יְהוָה כֻּלָּם בְּחָכְמָה עָשִׂיתָ מָלְאָה הָאָרֶץ קִנְיָנֶךָ׃","זֶה ׀ הַיָּם גָּדוֹל וּרְחַב יָדָיִם שָׁם־רֶמֶשׂ וְאֵין מִסְפָּר חַיּוֹת קְטַנּוֹת עִם־גְּדֹלוֹת׃","שָׁם אֳנִיּוֹת יְהַלֵּכוּן לִוְיָתָן זֶה־יָצַרְתָּ לְשַׂחֶק־בּוֹ׃","כֻּלָּם אֵלֶיךָ יְשַׂבֵּרוּן לָתֵת אָכְלָם בְּעִתּוֹ׃","תִּתֵּן לָהֶם יִלְקֹטוּן תִּפְתַּח יָדְךָ יִשְׂבְּעוּן טוֹב׃","תַּסְתִּיר פָּנֶיךָ יִבָּהֵלוּן תֹּסֵף רוּחָם יִגְוָעוּן וְאֶל־עֲפָרָם יְשׁוּבוּן׃","תְּשַׁלַּח רוּחֲךָ יִבָּרֵאוּן וּתְחַדֵּשׁ פְּנֵי אֲדָמָה׃","יְהִי כְבוֹד יְהוָה לְעוֹלָם יִשְׂמַח יְהוָה בְּמַעֲשָׂיו׃","הַמַּבִּיט לָאָרֶץ וַתִּרְעָד יִגַּע בֶּהָרִים וְיֶעֱשָׁנוּ׃","אָשִׁירָה לַיהוָה בְּחַיָּי אֲזַמְּרָה לֵאלֹהַי בְּעוֹדִי׃","יֶעֱרַב עָלָיו שִׂיחִי אָנֹכִי אֶשְׂמַח בַּיהוָה׃","יִתַּמּוּ חַטָּאִים ׀ מִן־הָאָרֶץ וּרְשָׁעִים ׀ עוֹד אֵינָם בָּרֲכִי נַפְשִׁי אֶת־יְהוָה הַלְלוּ־יָהּ׃"],"105":["הוֹדוּ לַיהוָה קִרְאוּ בִּשְׁמוֹ הוֹדִיעוּ בָעַמִּים עֲלִילוֹתָיו׃","שִׁירוּ־לוֹ זַמְּרוּ־לוֹ שִׂיחוּ בְּכָל־נִפְלְאוֹתָיו׃","הִתְהַלְלוּ בְּשֵׁם קָדְשׁוֹ יִשְׂמַח לֵב ׀ מְבַקְשֵׁי יְהוָה׃","דִּרְשׁוּ יְהוָה וְעֻזּוֹ בַּקְּשׁוּ פָנָיו תָּמִיד׃","זִכְרוּ נִפְלְאוֹתָיו אֲשֶׁר־עָשָׂה מֹפְתָיו וּמִשְׁפְּטֵי־פִיו׃","זֶרַע אַבְרָהָם עַבְדּוֹ בְּנֵי יַעֲקֹב בְּחִירָיו׃","הוּא יְהוָה אֱלֹהֵינוּ בְּכָל־הָאָרֶץ מִשְׁפָּטָיו׃","זָכַר לְעוֹלָם בְּרִיתוֹ דָּבָר צִוָּה לְאֶלֶף דּוֹר׃","אֲשֶׁר כָּרַת אֶת־אַבְרָהָם וּשְׁבוּעָתוֹ לְיִשְׂחָק׃","וַיַּעֲמִידֶהָ לְיַעֲקֹב לְחֹק לְיִשְׂרָאֵל בְּרִית עוֹלָם׃","לֵאמֹר לְךָ אֶתֵּן אֶת־אֶרֶץ־כְּנָעַן חֶבֶל נַחֲלַתְכֶם׃","בִּהְיוֹתָם מְתֵי מִסְפָּר כִּמְעַט וְגָרִים בָּהּ׃","וַיִּתְהַלְּכוּ מִגּוֹי אֶל־גּוֹי מִמַּמְלָכָה אֶל־עַם אַחֵר׃","לֹא־הִנִּיחַ אָדָם לְעָשְׁקָם וַיּוֹכַח עֲלֵיהֶם מְלָכִים׃","אַל־תִּגְּעוּ בִמְשִׁיחָי וְלִנְבִיאַי אַל־תָּרֵעוּ׃","וַיִּקְרָא רָעָב עַל־הָאָרֶץ כָּל־מַטֵּה־לֶחֶם שָׁבָר׃","שָׁלַח לִפְנֵיהֶם אִישׁ לְעֶבֶד נִמְכַּר יוֹסֵף׃","עִנּוּ בַכֶּבֶל רגליו בַּרְזֶל בָּאָה נַפְשׁוֹ׃","עַד־עֵת בֹּא־דְבָרוֹ אִמְרַת יְהוָה צְרָפָתְהוּ׃","שָׁלַח מֶלֶךְ וַיַּתִּירֵהוּ מֹשֵׁל עַמִּים וַיְפַתְּחֵהוּ׃","שָׂמוֹ אָדוֹן לְבֵיתוֹ וּמֹשֵׁל בְּכָל־קִנְיָנוֹ׃","לֶאְסֹר שָׂרָיו בְּנַפְשׁוֹ וּזְקֵנָיו יְחַכֵּם׃","וַיָּבֹא יִשְׂרָאֵל מִצְרָיִם וְיַעֲקֹב גָּר בְּאֶרֶץ־חָם׃","וַיֶּפֶר אֶת־עַמּוֹ מְאֹד וַיַּעֲצִמֵהוּ מִצָּרָיו׃","הָפַךְ לִבָּם לִשְׂנֹא עַמּוֹ לְהִתְנַכֵּל בַּעֲבָדָיו׃","שָׁלַח מֹשֶׁה עַבְדּוֹ אַהֲרֹן אֲשֶׁר בָּחַר־בּוֹ׃","שָׂמוּ־בָם דִּבְרֵי אֹתוֹתָיו וּמֹפְתִים בְּאֶרֶץ חָם׃","שָׁלַח חֹשֶׁךְ וַיַּחְשִׁךְ וְלֹא־מָרוּ אֶת־דברוו׃","הָפַךְ אֶת־מֵימֵיהֶם לְדָם וַיָּמֶת אֶת־דְּגָתָם׃","שָׁרַץ אַרְצָם צְפַרְדְּעִים בְּחַדְרֵי מַלְכֵיהֶם׃","אָמַר וַיָּבֹא עָרֹב כִּנִּים בְּכָל־גְּבוּלָם׃","נָתַן גִּשְׁמֵיהֶם בָּרָד אֵשׁ לֶהָבוֹת בְּאַרְצָם׃","וַיַּךְ גַּפְנָם וּתְאֵנָתָם וַיְשַׁבֵּר עֵץ גְּבוּלָם׃","אָמַר וַיָּבֹא אַרְבֶּה וְיֶלֶק וְאֵין מִסְפָּר׃","וַיֹּאכַל כָּל־עֵשֶׂב בְּאַרְצָם וַיֹּאכַל פְּרִי אַדְמָתָם׃","וַיַּךְ כָּל־בְּכוֹר בְּאַרְצָם רֵאשִׁית לְכָל־אוֹנָם׃","וַיּוֹצִיאֵם בְּכֶסֶף וְזָהָב וְאֵין בִּשְׁבָטָיו כּוֹשֵׁל׃","שָׂמַח מִצְרַיִם בְּצֵאתָם כִּי־נָפַל פַּחְדָּם עֲלֵיהֶם׃","פָּרַשׂ עָנָן לְמָסָךְ וְאֵשׁ לְהָאִיר לָיְלָה׃","שָׁאַל וַיָּבֵא שְׂלָו וְלֶחֶם שָׁמַיִם יַשְׂבִּיעֵם׃","פָּתַח צוּר וַיָּזוּבוּ מָיִם הָלְכוּ בַּצִּיּוֹת נָהָר׃","כִּי־זָכַר אֶת־דְּבַר קָדְשׁוֹ אֶת־אַבְרָהָם עַבְדּוֹ׃","וַיּוֹצִא עַמּוֹ בְשָׂשׂוֹן בְּרִנָּה אֶת־בְּחִירָיו׃","וַיִּתֵּן לָהֶם אַרְצוֹת גּוֹיִם וַעֲמַל לְאֻמִּים יִירָשׁוּ׃","בַּעֲבוּר ׀ יִשְׁמְרוּ חֻקָּיו וְתוֹרֹתָיו יִנְצֹרוּ הַלְלוּ־יָהּ׃"],"106":["הַלְלוּ יָהּ ׀ הוֹדוּ לַיהוָה כִּי־טוֹב כִּי לְעוֹלָם חַסְדּוֹ׃","מִי יְמַלֵּל גְּבוּרוֹת יְהוָה יַשְׁמִיעַ כָּל־תְּהִלָּתוֹ׃","אַשְׁרֵי שֹׁמְרֵי מִשְׁפָּט עֹשֵׂה צְדָקָה בְכָל־עֵת׃","זָכְרֵנִי יְהוָה בִּרְצוֹן עַמֶּךָ פָּקְדֵנִי בִּישׁוּעָתֶךָ׃","לִרְאוֹת ׀ בְּטוֹבַת בְּחִירֶיךָ לִשְׂמֹחַ בְּשִׂמְחַת גּוֹיֶךָ לְהִתְהַלֵּל עִם־נַחֲלָתֶךָ׃","חָטָאנוּ עִם־אֲבוֹתֵינוּ הֶעֱוִינוּ הִרְשָׁעְנוּ׃","אֲבוֹתֵינוּ בְמִצְרַיִם ׀ לֹא־הִשְׂכִּילוּ נִפְלְאוֹתֶיךָ לֹא זָכְרוּ אֶת־רֹב חֲסָדֶיךָ וַיַּמְרוּ עַל־יָם בְּיַם־סוּף׃","וַיּוֹשִׁיעֵם לְמַעַן שְׁמוֹ לְהוֹדִיעַ אֶת־גְּבוּרָתוֹ׃","וַיִּגְעַר בְּיַם־סוּף וַיֶּחֱרָב וַיּוֹלִיכֵם בַּתְּהֹמוֹת כַּמִּדְבָּר׃","וַיּוֹשִׁיעֵם מִיַּד שׂוֹנֵא וַיִּגְאָלֵם מִיַּד אוֹיֵב׃","וַיְכַסּוּ־מַיִם צָרֵיהֶם אֶחָד מֵהֶם לֹא נוֹתָר׃","וַיַּאֲמִינוּ בִדְבָרָיו יָשִׁירוּ תְּהִלָּתוֹ׃","מִהֲרוּ שָׁכְחוּ מַעֲשָׂיו לֹא־חִכּוּ לַעֲצָתוֹ׃","וַיִּתְאַוּוּ תַאֲוָה בַּמִּדְבָּר וַיְנַסּוּ־אֵל בִּישִׁימוֹן׃","וַיִּתֵּן לָהֶם שֶׁאֱלָתָם וַיְשַׁלַּח רָזוֹן בְּנַפְשָׁם׃","וַיְקַנְאוּ לְמֹשֶׁה בַּמַּחֲנֶה לְאַהֲרֹן קְדוֹשׁ יְהוָה׃","תִּפְתַּח־אֶרֶץ וַתִּבְלַע דָּתָן וַתְּכַס עַל־עֲדַת אֲבִירָם׃","וַתִּבְעַר־אֵשׁ בַּעֲדָתָם לֶהָבָה תְּלַהֵט רְשָׁעִים׃","יַעֲשׂוּ־עֵגֶל בְּחֹרֵב וַיִּשְׁתַּחֲווּ לְמַסֵּכָה׃","וַיָּמִירוּ אֶת־כְּבוֹדָם בְּתַבְנִית שׁוֹר אֹכֵל עֵשֶׂב׃","שָׁכְחוּ אֵל מוֹשִׁיעָם עֹשֶׂה גְדֹלוֹת בְּמִצְרָיִם׃","נִפְלָאוֹת בְּאֶרֶץ חָם נוֹרָאוֹת עַל־יַם־סוּף׃","וַיֹּאמֶר לְהַשְׁמִידָם לוּלֵי מֹשֶׁה בְחִירוֹ עָמַד בַּפֶּרֶץ לְפָנָיו לְהָשִׁיב חֲמָתוֹ מֵהַשְׁחִית׃","וַיִּמְאֲסוּ בְּאֶרֶץ חֶמְדָּה לֹא־הֶאֱמִינוּ לִדְבָרוֹ׃","וַיֵּרָגְנוּ בְאָהֳלֵיהֶם לֹא שָׁמְעוּ בְּקוֹל יְהוָה׃","וַיִּשָּׂא יָדוֹ לָהֶם לְהַפִּיל אוֹתָם בַּמִּדְבָּר׃","וּלְהַפִּיל זַרְעָם בַּגּוֹיִם וּלְזָרוֹתָם בָּאֲרָצוֹת׃","וַיִּצָּמְדוּ לְבַעַל פְּעוֹר וַיֹּאכְלוּ זִבְחֵי מֵתִים׃","וַיַּכְעִיסוּ בְּמַעַלְלֵיהֶם וַתִּפְרָץ־בָּם מַגֵּפָה׃","וַיַּעֲמֹד פִּינְחָס וַיְפַלֵּל וַתֵּעָצַר הַמַּגֵּפָה׃","וַתֵּחָשֶׁב לוֹ לִצְדָקָה לְדֹר וָדֹר עַד־עוֹלָם׃","וַיַּקְצִיפוּ עַל־מֵי מְרִיבָה וַיֵּרַע לְמֹשֶׁה בַּעֲבוּרָם׃","כִּי־הִמְרוּ אֶת־רוּחוֹ וַיְבַטֵּא בִּשְׂפָתָיו׃","לֹא־הִשְׁמִידוּ אֶת־הָעַמִּים אֲשֶׁר אָמַר יְהוָה לָהֶם׃","וַיִּתְעָרְבוּ בַגּוֹיִם וַיִּלְמְדוּ מַעֲשֵׂיהֶם׃","וַיַּעַבְדוּ אֶת־עֲצַבֵּיהֶם וַיִּהְיוּ לָהֶם לְמוֹקֵשׁ׃","וַיִּזְבְּחוּ אֶת־בְּנֵיהֶם וְאֶת־בְּנוֹתֵיהֶם לַשֵּׁדִים׃","וַיִּשְׁפְּכוּ דָם נָקִי דַּם־בְּנֵיהֶם וּבְנוֹתֵיהֶם אֲשֶׁר זִבְּחוּ לַעֲצַבֵּי כְנָעַן וַתֶּחֱנַף הָאָרֶץ בַּדָּמִים׃","וַיִּטְמְאוּ בְמַעֲשֵׂיהֶם וַיִּזְנוּ בְּמַעַלְלֵיהֶם׃","וַיִּחַר־אַף יְהוָה בְּעַמּוֹ וַיְתָעֵב אֶת־נַחֲלָתוֹ׃","וַיִּתְּנֵם בְּיַד־גּוֹיִם וַיִּמְשְׁלוּ בָהֶם שֹׂנְאֵיהֶם׃","וַיִּלְחָצוּם אוֹיְבֵיהֶם וַיִּכָּנְעוּ תַּחַת יָדָם׃","פְּעָמִים רַבּוֹת יַצִּילֵם וְהֵמָּה יַמְרוּ בַעֲצָתָם וַיָּמֹכּוּ בַּעֲוֺנָם׃","וַיַּרְא בַּצַּר לָהֶם בְּשָׁמְעוֹ אֶת־רִנָּתָם׃","וַיִּזְכֹּר לָהֶם בְּרִיתוֹ וַיִּנָּחֵם כְּרֹב חסדו׃","וַיִּתֵּן אוֹתָם לְרַחֲמִים לִפְנֵי כָּל־שׁוֹבֵיהֶם׃","הוֹשִׁיעֵנוּ ׀ יְהוָה אֱלֹהֵינוּ וְקַבְּצֵנוּ מִן־הַגּוֹיִם לְהֹדוֹת לְשֵׁם קָדְשֶׁךָ לְהִשְׁתַּבֵּחַ בִּתְהִלָּתֶךָ׃","בָּרוּךְ־יְהוָה אֱלֹהֵי יִשְׂרָאֵל מִן־הָעוֹלָם ׀ וְעַד הָעוֹלָם וְאָמַר כָּל־הָעָם אָמֵן הַלְלוּ־יָהּ׃"],"107":["הֹדוּ לַיהוָה כִּי־טוֹב כִּי לְעוֹלָם חַסְדּוֹ׃","יֹאמְרוּ גְּאוּלֵי יְהוָה אֲשֶׁר גְּאָלָם מִיַּד־צָר׃","וּמֵאֲרָצוֹת קִבְּצָם מִמִּזְרָח וּמִמַּעֲרָב מִצָּפוֹן וּמִיָּם׃","תָּעוּ בַמִּדְבָּר בִּישִׁימוֹן דָּרֶךְ עִיר מוֹשָׁב לֹא מָצָאוּ׃","רְעֵבִים גַּם־צְמֵאִים נַפְשָׁם בָּהֶם תִּתְעַטָּף׃","וַיִּצְעֲקוּ אֶל־יְהוָה בַּצַּר לָהֶם מִמְּצוּקוֹתֵיהֶם יַצִּילֵם׃","וַיַּדְרִיכֵם בְּדֶרֶךְ יְשָׁרָה לָלֶכֶת אֶל־עִיר מוֹשָׁב׃","יוֹדוּ לַיהוָה חַסְדּוֹ וְנִפְלְאוֹתָיו לִבְנֵי אָדָם׃","כִּי־הִשְׂבִּיעַ נֶפֶשׁ שֹׁקֵקָה וְנֶפֶשׁ רְעֵבָה מִלֵּא־טוֹב׃","יֹשְׁבֵי חֹשֶׁךְ וְצַלְמָוֶת אֲסִירֵי עֳנִי וּבַרְזֶל׃","כִּי־הִמְרוּ אִמְרֵי־אֵל וַעֲצַת עֶלְיוֹן נָאָצוּ׃","וַיַּכְנַע בֶּעָמָל לִבָּם כָּשְׁלוּ וְאֵין עֹזֵר׃","וַיִּזְעֲקוּ אֶל־יְהוָה בַּצַּר לָהֶם מִמְּצֻקוֹתֵיהֶם יוֹשִׁיעֵם׃","יוֹצִיאֵם מֵחֹשֶׁךְ וְצַלְמָוֶת וּמוֹסְרוֹתֵיהֶם יְנַתֵּק׃","יוֹדוּ לַיהוָה חַסְדּוֹ וְנִפְלְאוֹתָיו לִבְנֵי אָדָם׃","כִּי־שִׁבַּר דַּלְתוֹת נְחֹשֶׁת וּבְרִיחֵי בַרְזֶל גִּדֵּעַ׃","אֱוִלִים מִדֶּרֶךְ פִּשְׁעָם וּמֵעֲוֺנֹתֵיהֶם יִתְעַנּוּ׃","כָּל־אֹכֶל תְּתַעֵב נַפְשָׁם וַיַּגִּיעוּ עַד־שַׁעֲרֵי מָוֶת׃","וַיִּזְעֲקוּ אֶל־יְהוָה בַּצַּר לָהֶם מִמְּצֻקוֹתֵיהֶם יוֹשִׁיעֵם׃","יִשְׁלַח דְּבָרוֹ וְיִרְפָּאֵם וִימַלֵּט מִשְּׁחִיתוֹתָם׃","יוֹדוּ לַיהוָה חַסְדּוֹ וְנִפְלְאוֹתָיו לִבְנֵי אָדָם׃","וְיִזְבְּחוּ זִבְחֵי תוֹדָה וִיסַפְּרוּ מַעֲשָׂיו בְּרִנָּה׃","יוֹרְדֵי הַיָּם בָּאֳנִיּוֹת עֹשֵׂי מְלָאכָה בְּמַיִם רַבִּים׃","הֵמָּה רָאוּ מַעֲשֵׂי יְהוָה וְנִפְלְאוֹתָיו בִּמְצוּלָה׃","וַיֹּאמֶר וַיַּעֲמֵד רוּחַ סְעָרָה וַתְּרוֹמֵם גַּלָּיו׃","יַעֲלוּ שָׁמַיִם יֵרְדוּ תְהוֹמוֹת נַפְשָׁם בְּרָעָה תִתְמוֹגָג׃","יָחוֹגּוּ וְיָנוּעוּ כַּשִּׁכּוֹר וְכָל־חָכְמָתָם תִּתְבַּלָּע׃","וַיִּצְעֲקוּ אֶל־יְהוָה בַּצַּר לָהֶם וּמִמְּצוּקֹתֵיהֶם יוֹצִיאֵם׃","יָקֵם סְעָרָה לִדְמָמָה וַיֶּחֱשׁוּ גַּלֵּיהֶם׃","וַיִּשְׂמְחוּ כִי־יִשְׁתֹּקוּ וַיַּנְחֵם אֶל־מְחוֹז חֶפְצָם׃","יוֹדוּ לַיהוָה חַסְדּוֹ וְנִפְלְאוֹתָיו לִבְנֵי אָדָם׃","וִירֹמְמוּהוּ בִּקְהַל־עָם וּבְמוֹשַׁב זְקֵנִים יְהַלְלוּהוּ׃","יָשֵׂם נְהָרוֹת לְמִדְבָּר וּמֹצָאֵי מַיִם לְצִמָּאוֹן׃","אֶרֶץ פְּרִי לִמְלֵחָה מֵרָעַת יֹשְׁבֵי בָהּ׃","יָשֵׂם מִדְבָּר לַאֲגַם־מַיִם וְאֶרֶץ צִיָּה לְמֹצָאֵי מָיִם׃","וַיּוֹשֶׁב שָׁם רְעֵבִים וַיְכוֹנְנוּ עִיר מוֹשָׁב׃","וַיִּזְרְעוּ שָׂדוֹת וַיִּטְּעוּ כְרָמִים וַיַּעֲשׂוּ פְּרִי תְבוּאָה׃","וַיְבָרֲכֵם וַיִּרְבּוּ מְאֹד וּבְהֶמְתָּם לֹא יַמְעִיט׃","וַיִּמְעֲטוּ וַיָּשֹׁחוּ מֵעֹצֶר רָעָה וְיָגוֹן׃","שֹׁפֵךְ בּוּז עַל־נְדִיבִים וַיַּתְעֵם בְּתֹהוּ לֹא־דָרֶךְ׃","וַיְשַׂגֵּב אֶבְיוֹן מֵעוֹנִי וַיָּשֶׂם כַּצֹּאן מִשְׁפָּחוֹת׃","יִרְאוּ יְשָׁרִים וְיִשְׂמָחוּ וְכָל־עַוְלָה קָפְצָה פִּיהָ׃","מִי־חָכָם וְיִשְׁמָר־אֵלֶּה וְיִתְבּוֹנְנוּ חַסְדֵי יְהוָה׃"],"108":["שִׁיר מִזְמוֹר לְדָוִד׃","נָכוֹן לִבִּי אֱלֹהִים אָשִׁירָה וַאֲזַמְּרָה אַף־כְּבוֹדִי׃","עוּרָה הַנֵּבֶל וְכִנּוֹר אָעִירָה שָּׁחַר׃","אוֹדְךָ בָעַמִּים ׀ יְהוָה וַאֲזַמֶּרְךָ בַּל־אֻמִּים׃","כִּי־גָדוֹל מֵעַל־שָׁמַיִם חַסְדֶּךָ וְעַד־שְׁחָקִים אֲמִתֶּךָ׃","רוּמָה עַל־שָׁמַיִם אֱלֹהִים וְעַל כָּל־הָאָרֶץ כְּבוֹדֶךָ׃","לְמַעַן יֵחָלְצוּן יְדִידֶיךָ הוֹשִׁיעָה יְמִינְךָ וַעֲנֵנִי׃","אֱלֹהִים ׀ דִּבֶּר בְּקָדְשׁוֹ אֶעְלֹזָה אֲחַלְּקָה שְׁכֶם וְעֵמֶק סֻכּוֹת אֲמַדֵּד׃","לִי גִלְעָד ׀ לִי מְנַשֶּׁה וְאֶפְרַיִם מָעוֹז רֹאשִׁי יְהוּדָה מְחֹקְקִי׃","מוֹאָב ׀ סִיר רַחְצִי עַל־אֱדוֹם אַשְׁלִיךְ נַעֲלִי עֲלֵי־פְלֶשֶׁת אֶתְרוֹעָע׃","מִי יֹבִלֵנִי עִיר מִבְצָר מִי נָחַנִי עַד־אֱדוֹם׃","הֲלֹא־אֱלֹהִים זְנַחְתָּנוּ וְלֹא־תֵצֵא אֱלֹהִים בְּצִבְאֹתֵינוּ׃","הָבָה־לָּנוּ עֶזְרָת מִצָּר וְשָׁוְא תְּשׁוּעַת אָדָם׃","בֵּאלֹהִים נַעֲשֶׂה־חָיִל וְהוּא יָבוּס צָרֵינוּ׃"],"109":["לַמְנַצֵּחַ לְדָוִד מִזְמוֹר אֱלֹהֵי תְהִלָּתִי אַל־תֶּחֱרַשׁ׃","כִּי פִי רָשָׁע וּפִי־מִרְמָה עָלַי פָּתָחוּ דִּבְּרוּ אִתִּי לְשׁוֹן שָׁקֶר׃","וְדִבְרֵי שִׂנְאָה סְבָבוּנִי וַיִּלָּחֲמוּנִי חִנָּם׃","תַּחַת־אַהֲבָתִי יִשְׂטְנוּנִי וַאֲנִי תְפִלָּה׃","וַיָּשִׂימוּ עָלַי רָעָה תַּחַת טוֹבָה וְשִׂנְאָה תַּחַת אַהֲבָתִי׃","הַפְקֵד עָלָיו רָשָׁע וְשָׂטָן יַעֲמֹד עַל־יְמִינוֹ׃","בְּהִשָּׁפְטוֹ יֵצֵא רָשָׁע וּתְפִלָּתוֹ תִּהְיֶה לַחֲטָאָה׃","יִהְיוּ־יָמָיו מְעַטִּים פְּקֻדָּתוֹ יִקַּח אַחֵר׃","יִהְיוּ־בָנָיו יְתוֹמִים וְאִשְׁתּוֹ אַלְמָנָה׃","וְנוֹעַ יָנוּעוּ בָנָיו וְשִׁאֵלוּ וְדָרְשׁוּ מֵחָרְבוֹתֵיהֶם׃","יְנַקֵּשׁ נוֹשֶׁה לְכָל־אֲשֶׁר־לוֹ וְיָבֹזּוּ זָרִים יְגִיעוֹ׃","אַל־יְהִי־לוֹ מֹשֵׁךְ חָסֶד וְאַל־יְהִי חוֹנֵן לִיתוֹמָיו׃","יְהִי־אַחֲרִיתוֹ לְהַכְרִית בְּדוֹר אַחֵר יִמַּח שְׁמָם׃","יִזָּכֵר ׀ עֲוֺן אֲבֹתָיו אֶל־יְהוָה וְחַטַּאת אִמּוֹ אַל־תִּמָּח׃","יִהְיוּ נֶגֶד־יְהוָה תָּמִיד וְיַכְרֵת מֵאֶרֶץ זִכְרָם׃","יַעַן אֲשֶׁר ׀ לֹא זָכַר עֲשׂוֹת חָסֶד וַיִּרְדֹּף אִישׁ־עָנִי וְאֶבְיוֹן וְנִכְאֵה לֵבָב לְמוֹתֵת׃","וַיֶּאֱהַב קְלָלָה וַתְּבוֹאֵהוּ וְלֹא־חָפֵץ בִּבְרָכָה וַתִּרְחַק מִמֶּנּוּ׃","וַיִּלְבַּשׁ קְלָלָה כְּמַדּוֹ וַתָּבֹא כַמַּיִם בְּקִרְבּוֹ וְכַשֶּׁמֶן בְּעַצְמוֹתָיו׃","תְּהִי־לוֹ כְּבֶגֶד יַעְטֶה וּלְמֵזַח תָּמִיד יַחְגְּרֶהָ׃","זֹאת פְּעֻלַּת שֹׂטְנַי מֵאֵת יְהוָה וְהַדֹּבְרִים רָע עַל־נַפְשִׁי׃","וְאַתָּה ׀ יְהוִה אֲדֹנָי עֲשֵׂה־אִתִּי לְמַעַן שְׁמֶךָ כִּי־טוֹב חַסְדְּךָ הַצִּילֵנִי׃","כִּי־עָנִי וְאֶבְיוֹן אָנֹכִי וְלִבִּי חָלַל בְּקִרְבִּי׃","כְּצֵל־כִּנְטוֹתוֹ נֶהֱלָכְתִּי נִנְעַרְתִּי כָּאַרְבֶּה׃","בִּרְכַּי כָּשְׁלוּ מִצּוֹם וּבְשָׂרִי כָּחַשׁ מִשָּׁמֶן׃","וַאֲנִי ׀ הָיִיתִי חֶרְפָּה לָהֶם יִרְאוּנִי יְנִיעוּן רֹאשָׁם׃","עָזְרֵנִי יְהוָה אֱלֹהָי הוֹשִׁיעֵנִי כְחַסְדֶּךָ׃","וְיֵדְעוּ כִּי־יָדְךָ זֹּאת אַתָּה יְהוָה עֲשִׂיתָהּ׃","יְקַלְלוּ־הֵמָּה וְאַתָּה תְבָרֵךְ קָמוּ ׀ וַיֵּבֹשׁוּ וְעַבְדְּךָ יִשְׂמָח׃","יִלְבְּשׁוּ שׂוֹטְנַי כְּלִמָּה וְיַעֲטוּ כַמְעִיל בָּשְׁתָּם׃","אוֹדֶה יְהוָה מְאֹד בְּפִי וּבְתוֹךְ רַבִּים אֲהַלְלֶנּוּ׃","כִּי־יַעֲמֹד לִימִין אֶבְיוֹן לְהוֹשִׁיעַ מִשֹּׁפְטֵי נַפְשׁוֹ׃"],"110":["לְדָוִד מִזְמוֹר נְאֻם יְהוָה ׀ לַאדֹנִי שֵׁב לִימִינִי עַד־אָשִׁית אֹיְבֶיךָ הֲדֹם לְרַגְלֶיךָ׃","מַטֵּה־עֻזְּךָ יִשְׁלַח יְהוָה מִצִּיּוֹן רְדֵה בְּקֶרֶב אֹיְבֶיךָ׃","עַמְּךָ נְדָבֹת בְּיוֹם חֵילֶךָ בְּהַדְרֵי־קֹדֶשׁ מֵרֶחֶם מִשְׁחָר לְךָ טַל יַלְדֻתֶיךָ׃","נִשְׁבַּע יְהוָה ׀ וְלֹא יִנָּחֵם אַתָּה־כֹהֵן לְעוֹלָם עַל־דִּבְרָתִי מַלְכִּי־צֶדֶק׃","אֲדֹנָי עַל־יְמִינְךָ מָחַץ בְּיוֹם־אַפּוֹ מְלָכִים׃","יָדִין בַּגּוֹיִם מָלֵא גְוִיּוֹת מָחַץ רֹאשׁ עַל־אֶרֶץ רַבָּה׃","מִנַּחַל בַּדֶּרֶךְ יִשְׁתֶּה עַל־כֵּן יָרִים רֹאשׁ׃"],"111":["הַלְלוּ יָהּ ׀ אוֹדֶה יְהוָה בְּכָל־לֵבָב בְּסוֹד יְשָׁרִים וְעֵדָה׃","גְּדֹלִים מַעֲשֵׂי יְהוָה דְּרוּשִׁים לְכָל־חֶפְצֵיהֶם׃","הוֹד־וְהָדָר פָּעֳלוֹ וְצִדְקָתוֹ עֹמֶדֶת לָעַד׃","זֵכֶר עָשָׂה לְנִפְלְאֹתָיו חַנּוּן וְרַחוּם יְהוָה׃","טֶרֶף נָתַן לִירֵאָיו יִזְכֹּר לְעוֹלָם בְּרִיתוֹ׃","כֹּחַ מַעֲשָׂיו הִגִּיד לְעַמּוֹ לָתֵת לָהֶם נַחֲלַת גּוֹיִם׃","מַעֲשֵׂי יָדָיו אֱמֶת וּמִשְׁפָּט נֶאֱמָנִים כָּל־פִּקּוּדָיו׃","סְמוּכִים לָעַד לְעוֹלָם עֲשׂוּיִם בֶּאֱמֶת וְיָשָׁר׃","פְּדוּת ׀ שָׁלַח לְעַמּוֹ צִוָּה־לְעוֹלָם בְּרִיתוֹ קָדוֹשׁ וְנוֹרָא שְׁמוֹ׃","רֵאשִׁית חָכְמָה ׀ יִרְאַת יְהוָה שֵׂכֶל טוֹב לְכָל־עֹשֵׂיהֶם תְּהִלָּתוֹ עֹמֶדֶת לָעַד׃"],"112":["הַלְלוּ יָהּ ׀ אַשְׁרֵי־אִישׁ יָרֵא אֶת־יְהוָה בְּמִצְוֺתָיו חָפֵץ מְאֹד׃","גִּבּוֹר בָּאָרֶץ יִהְיֶה זַרְעוֹ דּוֹר יְשָׁרִים יְבֹרָךְ׃","הוֹן־וָעֹשֶׁר בְּבֵיתוֹ וְצִדְקָתוֹ עֹמֶדֶת לָעַד׃","זָרַח בַּחֹשֶׁךְ אוֹר לַיְשָׁרִים חַנּוּן וְרַחוּם וְצַדִּיק׃","טוֹב־אִישׁ חוֹנֵן וּמַלְוֶה יְכַלְכֵּל דְּבָרָיו בְּמִשְׁפָּט׃","כִּי־לְעוֹלָם לֹא־יִמּוֹט לְזֵכֶר עוֹלָם יִהְיֶה צַדִּיק׃","מִשְּׁמוּעָה רָעָה לֹא יִירָא נָכוֹן לִבּוֹ בָּטֻחַ בַּיהוָה׃","סָמוּךְ לִבּוֹ לֹא יִירָא עַד אֲשֶׁר־יִרְאֶה בְצָרָיו׃","פִּזַּר ׀ נָתַן לָאֶבְיוֹנִים צִדְקָתוֹ עֹמֶדֶת לָעַד קַרְנוֹ תָּרוּם בְּכָבוֹד׃","רָשָׁע יִרְאֶה ׀ וְכָעָס שִׁנָּיו יַחֲרֹק וְנָמָס תַּאֲוַת רְשָׁעִים תֹּאבֵד׃"],"113":["הַלְלוּ יָהּ ׀ הַלְלוּ עַבְדֵי יְהוָה הַלְלוּ אֶת־שֵׁם יְהוָה׃","יְהִי שֵׁם יְהוָה מְבֹרָךְ מֵעַתָּה וְעַד־עוֹלָם׃","מִמִּזְרַח־שֶׁמֶשׁ עַד־מְבוֹאוֹ מְהֻלָּל שֵׁם יְהוָה׃","רָם עַל־כָּל־גּוֹיִם ׀ יְהוָה עַל הַשָּׁמַיִם כְּבוֹדוֹ׃","מִי כַּיהוָה אֱלֹהֵינוּ הַמַּגְבִּיהִי לָשָׁבֶת׃","הַמַּשְׁפִּילִי לִרְאוֹת בַּשָּׁמַיִם וּבָאָרֶץ׃","מְקִימִי מֵעָפָר דָּל מֵאַשְׁפֹּת יָרִים אֶבְיוֹן׃","לְהוֹשִׁיבִי עִם־נְדִיבִים עִם נְדִיבֵי עַמּוֹ׃","מוֹשִׁיבִי ׀ עֲקֶרֶת הַבַּיִת אֵם־הַבָּנִים שְׂמֵחָה הַלְלוּ־יָהּ׃"],"114":["בְּצֵאת יִשְׂרָאֵל מִמִּצְרָיִם בֵּית יַעֲקֹב מֵעַם לֹעֵז׃","הָיְתָה יְהוּדָה לְקָדְשׁוֹ יִשְׂרָאֵל מַמְשְׁלוֹתָיו׃","הַיָּם רָאָה וַיָּנֹס הַיַּרְדֵּן יִסֹּב לְאָחוֹר׃","הֶהָרִים רָקְדוּ כְאֵילִים גְּבָעוֹת כִּבְנֵי־צֹאן׃","מַה־לְּךָ הַיָּם כִּי תָנוּס הַיַּרְדֵּן תִּסֹּב לְאָחוֹר׃","הֶהָרִים תִּרְקְדוּ כְאֵילִים גְּבָעוֹ
