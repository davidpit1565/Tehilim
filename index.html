/* ===================== BET EL · TEHILLIM ===================== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4af5f; --gold-bright:#f3e3af; --gold-deep:#b8860b;
  --gold-grad:linear-gradient(135deg,#a9791f 0%,#e6c874 38%,#f7ecc4 52%,#d9b25f 68%,#a9791f 100%);
  --radius:20px; --radius-sm:14px;
  --font-sacred:"Frank Ruhl Libre","David Libre",Georgia,"Times New Roman",serif;
  --font-ui:"Heebo","Assistant",system-ui,-apple-system,sans-serif;
  --fs-scale:1;
  --ease:cubic-bezier(.22,.61,.36,1);
  --nav-h:70px;
}
/* ---- DARK (default) ---- */
:root,[data-theme="dark"]{
  --bg:#080d19; --bg-grad:radial-gradient(120% 90% at 50% -10%,#16224a 0%,#0b1226 42%,#070b16 100%);
  --panel:rgba(22,33,63,.62); --panel-solid:#121c38; --panel-2:rgba(30,44,82,.55);
  --ink:#f6f1e4; --ink-soft:#cdd6ec; --muted:#8593b6;
  --line:rgba(212,175,95,.20); --line-strong:rgba(212,175,95,.42);
  --card-shadow:0 18px 44px -20px rgba(0,0,0,.85),0 2px 0 rgba(255,255,255,.03) inset;
  --glass-border:1px solid rgba(212,175,95,.22);
  --verse-num:var(--gold);
  --overlay:rgba(6,10,20,.72);
}
/* ---- LIGHT (parchment) ---- */
[data-theme="light"]{
  --bg:#efe6d2; --bg-grad:radial-gradient(120% 90% at 50% -10%,#fbf5e6 0%,#f0e6d0 55%,#e7dcc2 100%);
  --panel:rgba(255,252,244,.78); --panel-solid:#fbf6ea; --panel-2:rgba(247,239,223,.8);
  --ink:#22314e; --ink-soft:#3c4a66; --muted:#8a7f66;
  --line:rgba(150,116,44,.28); --line-strong:rgba(150,116,44,.5);
  --gold:#9a7526; --gold-bright:#c69a3c;
  --gold-grad:linear-gradient(135deg,#8a651c 0%,#c49a3d 45%,#e6c874 55%,#9a7526 100%);
  --card-shadow:0 16px 40px -22px rgba(80,60,20,.5),0 1px 0 rgba(255,255,255,.6) inset;
  --glass-border:1px solid rgba(150,116,44,.32);
  --verse-num:#a67c22;
  --overlay:rgba(60,48,24,.5);
}
html,body{height:100%}
body{
  font-family:var(--font-ui); background:var(--bg); color:var(--ink);
  background-image:var(--bg-grad); background-attachment:fixed;

    radial-gradient(1px 1px at 40% 80%,rgba(212,175,95,.3),transparent),
    radial-gradient(1px 1px at 85% 25%,rgba(212,175,95,.4),transparent);
}
[data-theme="light"] body::before{opacity:.25;
  background:radial-gradient(1px 1px at 20% 30%,rgba(150,116,44,.4),transparent),radial-gradient(1px 1px at 70% 60%,rgba(150,116,44,.3),transparent);}
#app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 16px calc(var(--nav-h) + 30px);min-height:100vh}
.view{animation:fade .45s var(--ease)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
::selection{background:rgba(212,175,95,.3)}

/* ---------- scrollbar ---------- */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- typography helpers ---------- */
.gold-text{background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.serif{font-family:var(--font-sacred)}

/* ---------- ornamental divider ---------- */
.ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0;color:var(--gold);opacity:.9}
.ornament::before,.ornament::after{content:"";height:1px;flex:1;max-width:120px;
  background:linear-gradient(90deg,transparent,var(--line-strong),transparent)}
.ornament svg{width:26px;height:26px;flex:none}

/* ================= HEADER ================= */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:14px 4px 12px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  margin:0 -16px;padding-left:20px;padding-right:20px;
  background:linear-gradient(to bottom,var(--bg) 30%,transparent);
}
.topbar .tb-title{font-family:var(--font-sacred);font-weight:700;font-size:20px;letter-spacing:.5px}
.topbar .tb-mark{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.icon-btn{width:42px;height:42px;border:none;background:var(--panel);border:var(--glass-border);border-radius:12px;
  color:var(--gold);display:grid;place-items:center;cursor:pointer;transition:.2s var(--ease);backdrop-filter:blur(8px)}
.icon-btn:active{transform:scale(.92)}
.icon-btn svg{width:20px;height:20px}

/* ================= HOME ================= */
.hero{text-align:center;padding:18px 0 6px}
.hero-logo{width:190px;max-width:56vw;height:auto;filter:drop-shadow(0 20px 40px rgba(0,0,0,.6));
  animation:rise .9s var(--ease) both}
@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
.hero-sub{font-family:var(--font-sacred);font-size:15px;color:var(--muted);letter-spacing:3px;margin-top:2px}

.date-band{display:flex;flex-direction:column;align-items:center;gap:3px;margin:6px 0 4px}
.date-heb{font-family:var(--font-sacred);font-size:26px;font-weight:700;letter-spacing:.5px}
.date-greg{font-size:13px;color:var(--muted);letter-spacing:.5px}
.greeting{font-size:14px;color:var(--gold);font-family:var(--font-sacred);margin-top:2px}

/* next zman strip */
.zman-strip{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto 4px;
  padding:9px 16px;border-radius:999px;background:var(--panel);border:var(--glass-border);
  font-size:13.5px;max-width:max-content;backdrop-filter:blur(8px);box-shadow:var(--card-shadow)}
.zman-strip b{color:var(--gold);font-weight:700}
.zman-strip .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* card */
.card{background:var(--panel);border:var(--glass-border);border-radius:var(--radius);padding:22px 20px;
  box-shadow:var(--card-shadow);backdrop-filter:blur(12px);position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;
  background:linear-gradient(135deg,rgba(212,175,95,.06),transparent 40%)}
.card-title{font-family:var(--font-sacred);font-size:15px;color:var(--gold);letter-spacing:1px;margin-bottom:2px;
  display:flex;align-items:center;gap:8px}
.daily-card{margin-top:16px;text-align:center}
.daily-range{font-family:var(--font-sacred);font-size:32px;font-weight:700;margin:6px 0 2px;line-height:1.2}
.daily-count{font-size:13px;color:var(--muted);margin-bottom:16px}
.daily-mode-tag{display:inline-block;font-size:11px;color:var(--gold);border:1px solid var(--line-strong);
  padding:3px 12px;border-radius:999px;margin-bottom:12px;letter-spacing:.5px}

/* progress ring */
.prog-wrap{display:flex;align-items:center;justify-content:center;gap:16px;margin:4px 0 18px}
.ring{position:relative;width:66px;height:66px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--line);}
.ring .fg{stroke:url(#goldgrad);stroke-linecap:round;transition:stroke-dashoffset .6s var(--ease)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--gold);font-family:var(--font-sacred)}
.prog-text{text-align:right;font-size:13px;color:var(--ink-soft)}
.prog-text b{display:block;font-family:var(--font-sacred);font-size:16px;color:var(--ink)}

/* primary button */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;
  padding:15px 20px;border:none;border-radius:15px;cursor:pointer;font-family:var(--font-ui);
  font-size:16px;font-weight:700;letter-spacing:.3px;position:relative;transition:.2s var(--ease)}
.btn-gold{background:var(--gold-grad);color:#2a1e05;box-shadow:0 10px 26px -10px rgba(184,134,11,.7)}
.btn-gold:active{transform:translateY(1px) scale(.99)}
.btn-ghost{background:var(--panel);border:var(--glass-border);color:var(--gold)}
.btn svg{width:19px;height:19px}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row .btn{font-size:14px;padding:13px}

/* quick tiles */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.q-tile{background:var(--panel);border:var(--glass-border);border-radius:var(--radius-sm);padding:16px 14px;
  display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.2s var(--ease);backdrop-filter:blur(8px)}
.q-tile:active{transform:scale(.97)}
.q-tile .qi{color:var(--gold)}.q-tile .qi svg{width:24px;height:24px}
.q-tile .qt{font-family:var(--font-sacred);font-size:16px;font-weight:700}
.q-tile .qd{font-size:12px;color:var(--muted)}

/* ================= TEHILLIM GRID ================= */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:8px 2px 14px}
.section-head h2{font-family:var(--font-sacred);font-size:22px;font-weight:700}
.search-box{display:flex;align-items:center;gap:9px;background:var(--panel);border:var(--glass-border);
  border-radius:13px;padding:11px 14px;margin-bottom:16px;backdrop-filter:blur(8px)}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--font-ui);font-size:15px}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{width:18px;height:18px;color:var(--muted)}
.ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px}
.ps-cell{aspect-ratio:1;border-radius:14px;background:var(--panel);border:var(--glass-border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;
  transition:.18s var(--ease);position:relative;overflow:hidden;backdrop-filter:blur(6px)}
.ps-cell:active{transform:scale(.9)}
.ps-cell .n{font-family:var(--font-sacred);font-size:20px;font-weight:700;color:var(--ink)}
.ps-cell .g{font-size:9px;color:var(--muted)}
.ps-cell.read{border-color:var(--line-strong)}
.ps-cell.read::before{content:"";position:absolute;inset:0;background:var(--gold-grad);opacity:.13}
.ps-cell .check{position:absolute;top:5px;left:5px;width:15px;height:15px;color:var(--gold);opacity:0;transform:scale(.5);transition:.25s var(--ease)}
.ps-cell.read .check{opacity:1;transform:scale(1)}

/* ================= READER ================= */
.reader{padding-top:6px}
.reader-head{position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 55%,transparent);
  margin:0 -16px;padding:8px 16px 12px;backdrop-filter:blur(10px)}
.reader-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.reader-title{font-family:var(--font-sacred);font-size:20px;font-weight:700;text-align:center;flex:1}
.reader-progress{height:3px;background:var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
.reader-progress i{display:block;height:100%;background:var(--gold-grad);width:0;transition:width .4s var(--ease)}

.chapter{animation:fade .4s var(--ease)}
.chapter-title{text-align:center;font-family:var(--font-sacred);font-size:30px;font-weight:700;margin:20px 0 6px}
.chapter-title .num{color:var(--gold)}
.chapter-cap{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;margin-bottom:12px}
.psalm-body{font-family:var(--font-sacred);font-size:calc(21px * var(--fs-scale));line-height:2.05;
  text-align:justify;color:var(--ink);padding:4px 2px}
.verse{margin:0}
.verse .vn{display:inline-block;font-size:.62em;color:var(--verse-num);font-weight:700;
  vertical-align:.15em;margin-left:6px;font-family:var(--font-ui)}

/* prayer block */
.prayer{background:var(--panel-2);border:var(--glass-border);border-radius:var(--radius);
  padding:20px 18px;margin:6px 0 8px;backdrop-filter:blur(10px);position:relative}
.prayer-title{font-family:var(--font-sacred);font-size:17px;color:var(--gold);text-align:center;margin-bottom:12px;letter-spacing:.5px}
.prayer p{font-family:var(--font-sacred);font-size:calc(18px * var(--fs-scale));line-height:1.95;text-align:justify;margin:10px 0;color:var(--ink-soft)}
.prayer.collapsed .pbody{display:none}
.prayer-toggle{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--gold);font-size:13px;
  cursor:pointer;margin-top:6px;user-select:none}
.prayer-toggle svg{width:15px;height:15px;transition:.3s var(--ease)}
.prayer.collapsed .prayer-toggle svg{transform:rotate(180deg)}

/* reader nav */
.reader-nav{display:flex;gap:10px;margin:20px 0 8px;align-items:center}
.rnav-btn{flex:1;padding:14px;border-radius:14px;background:var(--panel);border:var(--glass-border);
  color:var(--ink);font-family:var(--font-ui);font-weight:700;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:.18s var(--ease)}
.rnav-btn:active{transform:scale(.96)}
.rnav-btn:disabled{opacity:.35;pointer-events:none}
.rnav-btn.done{background:var(--gold-grad);color:#2a1e05;flex:1.4}
.rnav-btn svg{width:17px;height:17px}

/* floating reader tools */
.reader-tools{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + 16px);z-index:35;
  display:flex;gap:8px;background:var(--panel-solid);border:var(--glass-border);border-radius:999px;
  padding:7px 9px;box-shadow:var(--card-shadow);backdrop-filter:blur(12px);animation:rise .4s var(--ease)}
.reader-tools button{width:40px;height:40px;border:none;background:transparent;color:var(--gold);border-radius:50%;
  cursor:pointer;display:grid;place-items:center;transition:.15s var(--ease)}
.reader-tools button:active{background:rgba(212,175,95,.15);transform:scale(.9)}
.reader-tools button svg{width:19px;height:19px}
.reader-tools .sep{width:1px;background:var(--line);margin:6px 2px}
.reader-tools .fs-val{font-family:var(--font-sacred);font-weight:700;font-size:13px;display:grid;place-items:center;min-width:30px;color:var(--ink-soft)}

/* ================= CALENDAR ================= */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px}
.cal-nav{width:40px;height:40px;border-radius:12px;background:var(--panel);border:var(--glass-border);
  color:var(--gold);display:grid;place-items:center;cursor:pointer}
.cal-nav:active{transform:scale(.9)}
.cal-month{text-align:center}
.cal-month .m{font-family:var(--font-sacred);font-size:22px;font-weight:700}
.cal-month .y{font-size:12px;color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0;font-weight:700}
.cal-cell{aspect-ratio:.82;border-radius:11px;background:var(--panel);border:1px solid transparent;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;
  position:relative;transition:.15s var(--ease);overflow:hidden}
.cal-cell.empty{background:transparent;pointer-events:none}
.cal-cell:active{transform:scale(.92)}
.cal-cell .hd{font-family:var(--font-sacred);font-size:16px;font-weight:700;color:var(--ink)}
.cal-cell .gd{font-size:9px;color:var(--muted)}
.cal-cell.today{border-color:var(--gold);background:var(--panel-2)}
.cal-cell.today .hd{color:var(--gold)}
.cal-cell.sel{outline:2px solid var(--gold);outline-offset:-2px}
.cal-cell.hol::after{content:"";position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--gold)}
.cal-cell.sat{background:var(--panel-2)}

/* day detail */
.day-detail{margin-top:16px}
.dd-date{font-family:var(--font-sacred);font-size:20px;font-weight:700;text-align:center}
.dd-greg{text-align:center;font-size:12px;color:var(--muted);margin-bottom:6px}
.dd-events{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:8px 0}
.dd-event{font-size:12px;color:var(--gold);border:1px solid var(--line-strong);padding:4px 12px;border-radius:999px;font-family:var(--font-sacred)}
.dd-portion{text-align:center;margin:12px 0;padding:12px;background:var(--panel-2);border-radius:14px;border:var(--glass-border)}
.dd-portion .lbl{font-size:11px;color:var(--muted);letter-spacing:.5px}
.dd-portion .val{font-family:var(--font-sacred);font-size:18px;font-weight:700;color:var(--ink);margin-top:2px}
.dd-portion .val:hover{color:var(--gold)}

/* zmanim list */
.zmanim-list{margin-top:6px}
.zman-row{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;border-bottom:1px solid var(--line)}
.zman-row:last-child{border-bottom:none}
.zman-row .zl{display:flex;align-items:center;gap:11px}
.zman-row .zi{color:var(--gold);width:20px;height:20px;flex:none}.zman-row .zi svg{width:20px;height:20px}
.zman-row .zname{font-family:var(--font-sacred);font-size:16px}
.zman-row .ztime{font-variant-numeric:tabular-nums;font-size:17px;font-weight:700;letter-spacing:.5px}
.zman-row.next{background:linear-gradient(90deg,transparent,rgba(212,175,95,.1));border-radius:10px;padding-inline:10px}
.zman-row.next .ztime{color:var(--gold)}
.loc-line{text-align:center;font-size:12px;color:var(--muted);margin:10px 0 2px;display:flex;align-items:center;justify-content:center;gap:6px}
.loc-line svg{width:13px;height:13px;color:var(--gold)}

/* ================= SETTINGS ================= */
.set-group{margin-top:18px}
.set-group h3{font-family:var(--font-sacred);font-size:14px;color:var(--gold);letter-spacing:1px;margin:0 4px 8px}
.set-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px;background:var(--panel);
  border:var(--glass-border);border-radius:14px;margin-bottom:9px;backdrop-filter:blur(8px)}
.set-item .si-l{display:flex;align-items:center;gap:12px}
.set-item .si-ico{color:var(--gold);width:22px;height:22px;flex:none}.set-item .si-ico svg{width:22px;height:22px}
.set-item .si-t{font-size:15px;font-weight:600}
.set-item .si-d{font-size:12px;color:var(--muted);margin-top:1px}
/* toggle */
.toggle{width:50px;height:29px;border-radius:999px;background:var(--line);border:1px solid var(--line-strong);
  position:relative;cursor:pointer;transition:.25s var(--ease);flex:none}
.toggle::after{content:"";position:absolute;top:2px;right:2px;width:23px;height:23px;border-radius:50%;
  background:var(--ink-soft);transition:.25s var(--ease)}
.toggle.on{background:var(--gold-grad)}
.toggle.on::after{right:calc(100% - 25px);background:#2a1e05}
/* segmented */
.seg{display:flex;background:var(--line);border-radius:11px;padding:3px;gap:3px}
.seg button{border:none;background:transparent;color:var(--ink-soft);padding:8px 14px;border-radius:9px;
  font-family:var(--font-ui);font-size:13px;font-weight:700;cursor:pointer;transition:.2s var(--ease)}
.seg button.on{background:var(--gold-grad);color:#2a1e05}
/* stepper */
.stepper{display:flex;align-items:center;gap:4px;background:var(--line);border-radius:11px;padding:3px}
.stepper button{width:34px;height:34px;border:none;background:transparent;color:var(--gold);font-size:20px;font-weight:700;cursor:pointer;border-radius:8px}
.stepper button:active{background:rgba(212,175,95,.15)}
.stepper .v{min-width:40px;text-align:center;font-family:var(--font-sacred);font-weight:700;font-size:15px}

.credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px;line-height:1.8}
.credit .cg{color:var(--gold);font-family:var(--font-sacred)}

/* ================= BOTTOM NAV ================= */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;height:var(--nav-h);
  display:flex;max-width:640px;margin:0 auto;
  background:var(--panel-solid);border-top:var(--glass-border);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 -10px 30px -12px rgba(0,0,0,.5);padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--muted);transition:.2s var(--ease);position:relative}
.nav-item svg{width:24px;height:24px;transition:.2s var(--ease)}
.nav-item span{font-size:11px;font-weight:700}
.nav-item.on{color:var(--gold)}
.nav-item.on svg{transform:translateY(-2px);filter:drop-shadow(0 3px 6px rgba(212,175,95,.5))}
.nav-item.on::before{content:"";position:absolute;top:9px;width:34px;height:34px;border-radius:12px;
  background:radial-gradient(circle,rgba(212,175,95,.18),transparent 70%)}

/* ================= MODALS / CELEBRATION ================= */
.overlay{position:fixed;inset:0;z-index:60;background:var(--overlay);backdrop-filter:blur(6px);
  display:grid;place-items:center;padding:24px;animation:fade .3s var(--ease)}
.modal{background:var(--panel-solid);border:1px solid var(--line-strong);border-radius:24px;padding:28px 24px;
  max-width:380px;width:100%;text-align:center;box-shadow:var(--card-shadow);position:relative;animation:pop .5s var(--ease)}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
.modal h3{font-family:var(--font-sacred);font-size:26px;font-weight:700;margin-bottom:8px}
.modal p{font-size:14px;color:var(--ink-soft);line-height:1.7;margin-bottom:20px}
.modal .m-crown{color:var(--gold);margin-bottom:8px}.modal .m-crown svg{width:56px;height:56px;filter:drop-shadow(0 6px 14px rgba(212,175,95,.5))}
.modal .close-x{position:absolute;top:14px;left:14px;background:none;border:none;color:var(--muted);cursor:pointer}
.modal .close-x svg{width:20px;height:20px}

/* confetti */
.confetti{position:fixed;inset:0;z-index:55;pointer-events:none;overflow:hidden}
.confetti i{position:absolute;top:-12px;width:9px;height:14px;opacity:.9;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}

/* toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + 20px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel-solid);border:1px solid var(--line-strong);color:var(--ink);padding:12px 20px;
  border-radius:999px;font-size:14px;z-index:70;opacity:0;transition:.3s var(--ease);box-shadow:var(--card-shadow);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}

#locChip{display:inline-flex;align-items:center;gap:6px}
#locChip svg{width:14px;height:14px}

/* city picker */
.city-modal{max-width:420px;max-height:82vh;display:flex;flex-direction:column;padding:22px 16px 16px;text-align:right}
.city-list{overflow-y:auto;flex:1;margin:0 -4px}
.city-row{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;border-radius:12px;cursor:pointer;transition:.15s var(--ease)}
.city-row:active{transform:scale(.98)}
.city-row:hover{background:var(--panel-2)}
.city-row .cn{font-family:var(--font-sacred);font-size:17px;font-weight:700}
.city-row .cc{font-size:12px;color:var(--muted)}

</style>
</head>

<script>window.TEHILLIM={"1":["אַשְׁרֵי־הָאִישׁ אֲשֶׁר ׀ לֹא הָלַךְ בַּעֲצַת רְשָׁעִים וּבְדֶרֶךְ חַטָּאִים לֹא עָמָד וּבְמוֹשַׁב לֵצִים לֹא יָשָׁב׃","כִּי אִם בְּתוֹרַת יְהוָה חֶפְצוֹ וּבְתוֹרָתוֹ יֶהְגֶּה יוֹמָם וָלָיְלָה׃","וְהָיָה כְּעֵץ שָׁתוּל עַל־פַּלְגֵי מָיִם אֲשֶׁר פִּרְיוֹ ׀ יִתֵּן בְּעִתּוֹ וְעָלֵהוּ לֹא־יִבּוֹל וְכֹל אֲשֶׁר־יַעֲשֶׂה יַצְלִיחַ׃","לֹא־כֵן הָרְשָׁעִים כִּי אִם־כַּמֹּץ אֲשֶׁר־תִּדְּפֶנּוּ רוּחַ׃","עַל־כֵּן ׀ לֹא־יָקֻמוּ רְשָׁעִים בַּמִּשְׁפָּט וְחַטָּאִים בַּעֲדַת צַדִּיקִים׃","כִּי־יוֹדֵעַ יְהוָה דֶּרֶךְ צַדִּיקִים וְדֶרֶךְ רְשָׁעִים תֹּאבֵד׃"],"2":["לָמָּה רָגְשׁוּ גוֹיִם וּלְאֻמִּים יֶהְגּוּ־רִיק׃","יִתְיַצְּבוּ ׀ מַלְכֵי־אֶרֶץ וְרוֹזְנִים נוֹסְדוּ־יָחַד עַל־יְהוָה וְעַל־מְשִׁיחוֹ׃","נְנַתְּקָה אֶת־מוֹסְרוֹתֵימוֹ וְנַשְׁלִיכָה מִמֶּנּוּ עֲבֹתֵימוֹ׃","יוֹשֵׁב בַּשָּׁמַיִם יִשְׂחָק אֲדֹנָי יִלְעַג־לָמוֹ׃","אָז יְדַבֵּר אֵלֵימוֹ בְאַפּוֹ וּבַחֲרוֹנוֹ יְבַהֲלֵמוֹ׃","וַאֲנִי נָסַכְתִּי מַלְכִּי עַל־צִיּוֹן הַר־קָדְשִׁי׃","אֲסַפְּרָה אֶל חֹק יְהוָה אָמַר אֵלַי בְּנִי אַתָּה אֲנִי הַיּוֹם יְלִדְתִּיךָ׃","שְׁאַל מִמֶּנִּי וְאֶתְּנָה גוֹיִם נַחֲלָתֶךָ וַאֲחֻזָּתְךָ אַפְסֵי־אָרֶץ׃","תְּרֹעֵם בְּשֵׁבֶט בַּרְזֶל כִּכְלִי יוֹצֵר תְּנַפְּצֵם׃","וְעַתָּה מְלָכִים הַשְׂכִּילוּ הִוָּסְרוּ שֹׁפְטֵי אָרֶץ׃","עִבְדוּ אֶת־יְהוָה בְּיִרְאָה וְגִילוּ בִּרְעָדָה׃","נַשְּׁקוּ־בַר פֶּן־יֶאֱנַף ׀ וְתֹאבְדוּ דֶרֶךְ כִּי־יִבְעַר כִּמְעַט אַפּוֹ אַשְׁרֵי כָּל־חוֹסֵי בוֹ׃"],"3":["מִזְמוֹר לְדָוִד בְּבָרְחוֹ מִפְּנֵי ׀ אַבְשָׁלוֹם בְּנוֹ׃","יְהוָה מָה־רַבּוּ צָרָי רַבִּים קָמִים עָלָי׃","רַבִּים אֹמְרִים לְנַפְשִׁי אֵין יְשׁוּעָתָה לּוֹ בֵאלֹהִים סֶלָה׃","וְאַתָּה יְהוָה מָגֵן בַּעֲדִי כְּבוֹדִי וּמֵרִים רֹאשִׁי׃","קוֹלִי אֶל־יְהוָה אֶקְרָא וַיַּעֲנֵנִי מֵהַר קָדְשׁוֹ סֶלָה׃","אֲנִי שָׁכַבְתִּי וָאִישָׁנָה הֱקִיצוֹתִי כִּי יְהוָה יִסְמְכֵנִי׃","לֹא־אִירָא מֵרִבְבוֹת עָם אֲשֶׁר סָבִיב שָׁתוּ עָלָי׃","קוּמָה יְהוָה ׀ הוֹשִׁיעֵנִי אֱלֹהַי כִּי־הִכִּיתָ אֶת־כָּל־אֹיְבַי לֶחִי שִׁנֵּי רְשָׁעִים שִׁבַּרְתָּ׃","לַיהוָה הַיְשׁוּעָה עַל־עַמְּךָ בִרְכָתֶךָ סֶּלָה׃"],"4":["לַמְנַצֵּחַ בִּנְגִינוֹת מִזְמוֹר לְדָוִד׃","בְּקָרְאִי עֲנֵנִי ׀ אֱלֹהֵי צִדְקִי בַּצָּר הִרְחַבְתָּ לִּי חָנֵּנִי וּשְׁמַע תְּפִלָּתִי׃","בְּנֵי אִישׁ עַד־מֶה כְבוֹדִי לִכְלִמָּה תֶּאֱהָבוּן רִיק תְּבַקְשׁוּ כָזָב סֶלָה׃","וּדְעוּ כִּי־הִפְלָה יְהוָה חָסִיד לוֹ יְהוָה יִשְׁמַע בְּקָרְאִי אֵלָיו׃","רִגְזוּ וְאַל־תֶּחֱטָאוּ אִמְרוּ בִלְבַבְכֶם עַל־מִשְׁכַּבְכֶם וְדֹמּוּ סֶלָה׃","זִבְחוּ זִבְחֵי־צֶדֶק וּבִטְחוּ אֶל־יְהוָה׃","רַבִּים אֹמְרִים מִי־יַרְאֵנוּ טוֹב נְסָה־עָלֵינוּ אוֹר פָּנֶיךָ יְהוָה׃","נָתַתָּה שִׂמְחָה בְלִבִּי מֵעֵת דְּגָנָם וְתִירוֹשָׁם רָבּוּ׃","בְּשָׁלוֹם יַחְדָּו אֶשְׁכְּבָה וְאִישָׁן כִּי־אַתָּה יְהוָה לְבָדָד לָבֶטַח תּוֹשִׁיבֵנִי׃"],"5":["לַמְנַצֵּחַ אֶל־הַנְּחִילוֹת מִזְמוֹר לְדָוִד׃","אֲמָרַי הַאֲזִינָה ׀ יְהוָה בִּינָה הֲגִיגִי׃","הַקְשִׁיבָה ׀ לְקוֹל שַׁוְעִי מַלְכִּי וֵאלֹהָי כִּי־אֵלֶיךָ אֶתְפַּלָּל׃","יְהוָה בֹּקֶר תִּשְׁמַע קוֹלִי בֹּקֶר אֶעֱרָךְ־לְךָ וַאֲצַפֶּה׃","כִּי ׀ לֹא אֵל־חָפֵץ רֶשַׁע ׀ אָתָּה לֹא יְגֻרְךָ רָע׃","לֹא־יִתְיַצְּבוּ הוֹלְלִים לְנֶגֶד עֵינֶיךָ שָׂנֵאתָ כָּל־פֹּעֲלֵי אָוֶן׃","תְּאַבֵּד דֹּבְרֵי כָזָב אִישׁ־דָּמִים וּמִרְמָה יְתָעֵב ׀ יְהוָה׃","וַאֲנִי בְּרֹב חַסְדְּךָ אָבוֹא בֵיתֶךָ אֶשְׁתַּחֲוֶה אֶל־הֵיכַל־קָדְשְׁךָ בְּיִרְאָתֶךָ׃","יְהוָה ׀ נְחֵנִי בְצִדְקָתֶךָ לְמַעַן שׁוֹרְרָי הושר לְפָנַי דַּרְכֶּךָ׃","כִּי אֵין בְּפִיהוּ נְכוֹנָה קִרְבָּם הַוּוֹת קֶבֶר־פָּתוּחַ גְּרוֹנָם לְשׁוֹנָם יַחֲלִיקוּן׃","הַאֲשִׁימֵם ׀ אֱלֹהִים יִפְּלוּ מִמֹּעֲצוֹתֵיהֶם בְּרֹב פִּשְׁעֵיהֶם הַדִּיחֵמוֹ כִּי־מָרוּ בָךְ׃","וְיִשְׂמְחוּ כָל־חוֹסֵי בָךְ לְעוֹלָם יְרַנֵּנוּ וְתָסֵךְ עָלֵימוֹ וְיַעְלְצוּ בְךָ אֹהֲבֵי שְׁמֶךָ׃","כִּי־אַתָּה תְּבָרֵךְ צַדִּיק יְהוָה כַּצִּנָּה רָצוֹן תַּעְטְרֶנּוּ׃"],"6":["לַמְנַצֵּחַ בִּנְגִינוֹת עַל־הַשְּׁמִינִית מִזְמוֹר לְדָוִד׃","יְהוָה אַל־בְּאַפְּךָ תוֹכִיחֵנִי וְאַל־בַּחֲמָתְךָ תְיַסְּרֵנִי׃","חָנֵּנִי יְהוָה כִּי אֻמְלַל אָנִי רְפָאֵנִי יְהוָה כִּי נִבְהֲלוּ עֲצָמָי׃","וְנַפְשִׁי נִבְהֲלָה מְאֹד ואת יְהוָה עַד־מָתָי׃","שׁוּבָה יְהוָה חַלְּצָה נַפְשִׁי הוֹשִׁיעֵנִי לְמַעַן חַסְדֶּךָ׃","כִּי אֵין בַּמָּוֶת זִכְרֶךָ בִּשְׁאוֹל מִי יוֹדֶה־לָּךְ׃","יָגַעְתִּי ׀ בְּאַנְחָתִי אַשְׂחֶה בְכָל־לַיְלָה מִטָּתִי בְּדִמְעָתִי עַרְשִׂי אַמְסֶה׃","עָשְׁשָׁה מִכַּעַס עֵינִי עָתְקָה בְּכָל־צוֹרְרָי׃","סוּרוּ מִמֶּנִּי כָּל־פֹּעֲלֵי אָוֶן כִּי־שָׁמַע יְהוָה קוֹל בִּכְיִי׃","שָׁמַע יְהוָה תְּחִנָּתִי יְהוָה תְּפִלָּתִי יִקָּח׃","יֵבֹשׁוּ ׀ וְיִבָּהֲלוּ מְאֹד כָּל־אֹיְבָי יָשֻׁבוּ יֵבֹשׁוּ רָגַע׃"],"7":["שִׁגָּיוֹן לְדָוִד אֲשֶׁר־שָׁר לַיהוָה עַל־דִּבְרֵי־כוּשׁ בֶּן־יְמִינִי׃","יְהוָה אֱלֹהַי בְּךָ חָסִיתִי הוֹשִׁיעֵנִי מִכָּל־רֹדְפַי וְהַצִּילֵנִי׃","פֶּן־יִטְרֹף כְּאַרְיֵה נַפְשִׁי פֹּרֵק וְאֵין מַצִּיל׃","יְהוָה אֱלֹהַי אִם־עָשִׂיתִי זֹאת אִם־יֶשׁ־עָוֶל בְּכַפָּי׃","אִם־גָּמַלְתִּי שׁוֹלְמִי רָע וָאֲחַלְּצָה צוֹרְרִי רֵיקָם׃","יִרַדֹּף אוֹיֵב ׀ נַפְשִׁי וְיַשֵּׂג וְיִרְמֹס לָאָרֶץ חַיָּי וּכְבוֹדִי ׀ לֶעָפָר יַשְׁכֵּן סֶלָה׃","קוּמָה יְהוָה ׀ בְּאַפֶּךָ הִנָּשֵׂא בְּעַבְרוֹת צוֹרְרָי וְעוּרָה אֵלַי מִשְׁפָּט צִוִּיתָ׃","וַעֲדַת לְאֻמִּים תְּסוֹבְבֶךָּ וְעָלֶיהָ לַמָּרוֹם שׁוּבָה׃","יְהוָה יָדִין עַמִּים שָׁפְטֵנִי יְהוָה כְּצִדְקִי וּכְתֻמִּי עָלָי׃","יִגְמָר־נָא רַע ׀ רְשָׁעִים וּתְכוֹנֵן צַדִּיק וּבֹחֵן לִבּוֹת וּכְלָיוֹת אֱלֹהִים צַדִּיק׃","מָגִנִּי עַל־אֱלֹהִים מוֹשִׁיעַ יִשְׁרֵי־לֵב׃","אֱלֹהִים שׁוֹפֵט צַדִּיק וְאֵל זֹעֵם בְּכָל־יוֹם׃","אִם־לֹא יָשׁוּב חַרְבּוֹ יִלְטוֹשׁ קַשְׁתּוֹ דָרַךְ וַיְכוֹנְנֶהָ׃","וְלוֹ הֵכִין כְּלֵי־מָוֶת חִצָּיו לְדֹלְקִים יִפְעָל׃","הִנֵּה יְחַבֶּל־אָוֶן וְהָרָה עָמָל וְיָלַד שָׁקֶר׃","בּוֹר כָּרָה וַיַּחְפְּרֵהוּ וַיִּפֹּל בְּשַׁחַת יִפְעָל׃","יָשׁוּב עֲמָלוֹ בְרֹאשׁוֹ וְעַל קָדְקֳדוֹ חֲמָסוֹ יֵרֵד׃","אוֹדֶה יְהוָה כְּצִדְקוֹ וַאֲזַמְּרָה שֵׁם־יְהוָה עֶלְיוֹן׃"],"8":["לַמְנַצֵּחַ עַל־הַגִּתִּית מִזְמוֹר לְדָוִד׃","יְהוָה אֲדֹנֵינוּ מָה־אַדִּיר שִׁמְךָ בְּכָל־הָאָרֶץ אֲשֶׁר תְּנָה הוֹדְךָ עַל־הַשָּׁמָיִם׃","מִפִּי עוֹלְלִים ׀ וְיֹנְקִים יִסַּדְתָּ עֹז לְמַעַן צוֹרְרֶיךָ לְהַשְׁבִּית אוֹיֵב וּמִתְנַקֵּם׃","כִּי־אֶרְאֶה שָׁמֶיךָ מַעֲשֵׂי אֶצְבְּעֹתֶיךָ יָרֵחַ וְכוֹכָבִים אֲשֶׁר כּוֹנָנְתָּה׃","מָה־אֱנוֹשׁ כִּי־תִזְכְּרֶנּוּ וּבֶן־אָדָם כִּי תִפְקְדֶנּוּ׃","וַתְּחַסְּרֵהוּ מְּעַט מֵאֱלֹהִים וְכָבוֹד וְהָדָר תְּעַטְּרֵהוּ׃","תַּמְשִׁילֵהוּ בְּמַעֲשֵׂי יָדֶיךָ כֹּל שַׁתָּה תַחַת־רַגְלָיו׃","צֹנֶה וַאֲלָפִים כֻּלָּם וְגַם בַּהֲמוֹת שָׂדָי׃","צִפּוֹר שָׁמַיִם וּדְגֵי הַיָּם עֹבֵר אָרְחוֹת יַמִּים׃","יְהוָה אֲדֹנֵינוּ מָה־אַדִּיר שִׁמְךָ בְּכָל־הָאָרֶץ׃"],"9":["לַמְנַצֵּחַ עַלְמוּת לַבֵּן מִזְמוֹר לְדָוִד׃","אוֹדֶה יְהוָה בְּכָל־לִבִּי אֲסַפְּרָה כָּל־נִפְלְאוֹתֶיךָ׃","אֶשְׂמְחָה וְאֶעֶלְצָה בָךְ אֲזַמְּרָה שִׁמְךָ עֶלְיוֹן׃","בְּשׁוּב־אוֹיְבַי אָחוֹר יִכָּשְׁלוּ וְיֹאבְדוּ מִפָּנֶיךָ׃","כִּי־עָשִׂיתָ מִשְׁפָּטִי וְדִינִי יָשַׁבְתָּ לְכִסֵּא שׁוֹפֵט צֶדֶק׃","גָּעַרְתָּ גוֹיִם אִבַּדְתָּ רָשָׁע שְׁמָם מָחִיתָ לְעוֹלָם וָעֶד׃","הָאוֹיֵב ׀ תַּמּוּ חֳרָבוֹת לָנֶצַח וְעָרִים נָתַשְׁתָּ אָבַד זִכְרָם הֵמָּה׃","וַיהוָה לְעוֹלָם יֵשֵׁב כּוֹנֵן לַמִּשְׁפָּט כִּסְאוֹ׃","וְהוּא יִשְׁפֹּט־תֵּבֵל בְּצֶדֶק יָדִין לְאֻמִּים בְּמֵישָׁרִים׃","וִיהִי יְהוָה מִשְׂגָּב לַדָּךְ מִשְׂגָּב לְעִתּוֹת בַּצָּרָה׃","וְיִבְטְחוּ בְךָ יוֹדְעֵי שְׁמֶךָ כִּי לֹא־עָזַבְתָּ דֹרְשֶׁיךָ יְהוָה׃","זַמְּרוּ לַיהוָה יֹשֵׁב צִיּוֹן הַגִּידוּ בָעַמִּים עֲלִילוֹתָיו׃","כִּי־דֹרֵשׁ דָּמִים אוֹתָם זָכָר לֹא־שָׁכַח צַעֲקַת עניים׃","חָנְנֵנִי יְהוָה רְאֵה עָנְיִי מִשֹּׂנְאָי מְרוֹמְמִי מִשַּׁעֲרֵי מָוֶת׃","לְמַעַן אֲסַפְּרָה כָּל־תְּהִלָּתֶיךָ בְּשַׁעֲרֵי בַת־צִיּוֹן אָגִילָה בִּישׁוּעָתֶךָ׃","טָבְעוּ גוֹיִם בְּשַׁחַת עָשׂוּ בְּרֶשֶׁת־זוּ טָמָנוּ נִלְכְּדָה רַגְלָם׃","נוֹדַע ׀ יְהוָה מִשְׁפָּט עָשָׂה בְּפֹעַל כַּפָּיו נוֹקֵשׁ רָשָׁע הִגָּיוֹן סֶלָה׃","יָשׁוּבוּ רְשָׁעִים לִשְׁאוֹלָה כָּל־גּוֹיִם שְׁכֵחֵי אֱלֹהִים׃","כִּי לֹא לָנֶצַח יִשָּׁכַח אֶבְיוֹן תִּקְוַת ענוים תֹּאבַד לָעַד׃","קוּמָה יְהוָה אַל־יָעֹז אֱנוֹשׁ יִשָּׁפְטוּ גוֹיִם עַל־פָּנֶיךָ׃","שִׁיתָה יְהוָה ׀ מוֹרָה לָהֶם יֵדְעוּ גוֹיִם אֱנוֹשׁ הֵמָּה סֶּלָה׃"],"10":["לָמָה יְהוָה תַּעֲמֹד בְּרָחוֹק תַּעְלִים לְעִתּוֹת בַּצָּרָה׃","בְּגַאֲוַת רָשָׁע יִדְלַק עָנִי יִתָּפְשׂוּ ׀ בִּמְזִמּוֹת זוּ חָשָׁבוּ׃","כִּי־הִלֵּל רָשָׁע עַל־תַּאֲוַת נַפְשׁוֹ וּבֹצֵעַ בֵּרֵךְ נִאֵץ ׀ יְהוָה׃","רָשָׁע כְּגֹבַהּ אַפּוֹ בַּל־יִדְרֹשׁ אֵין אֱלֹהִים כָּל־מְזִמּוֹתָיו׃","יָחִילוּ דרכו ׀ בְּכָל־עֵת מָרוֹם מִשְׁפָּטֶיךָ מִנֶּגְדּוֹ כָּל־צוֹרְרָיו יָפִיחַ בָּהֶם׃","אָמַר בְּלִבּוֹ בַּל־אֶמּוֹט לְדֹר וָדֹר אֲשֶׁר לֹא־בְרָע׃","אָלָה פִּיהוּ מָלֵא וּמִרְמוֹת וָתֹךְ תַּחַת לְשׁוֹנוֹ עָמָל וָאָוֶן׃","יֵשֵׁב ׀ בְּמַאְרַב חֲצֵרִים בַּמִּסְתָּרִים יַהֲרֹג נָקִי עֵינָיו לְחֵלְכָה יִצְפֹּנוּ׃","יֶאֱרֹב בַּמִּסְתָּר ׀ כְּאַרְיֵה בְסֻכֹּה יֶאֱרֹב לַחֲטוֹף עָנִי יַחְטֹף עָנִי בְּמָשְׁכוֹ בְרִשְׁתּוֹ׃","ודכה יָשֹׁחַ וְנָפַל בַּעֲצוּמָיו חלכאים׃","אָמַר בְּלִבּוֹ שָׁכַח אֵל הִסְתִּיר פָּנָיו בַּל־רָאָה לָנֶצַח׃","קוּמָה יְהוָה אֵל נְשָׂא יָדֶךָ אַל־תִּשְׁכַּח עניים׃","עַל־מֶה ׀ נִאֵץ רָשָׁע ׀ אֱלֹהִים אָמַר בְּלִבּוֹ לֹא תִּדְרֹשׁ׃","רָאִתָה כִּי־אַתָּה ׀ עָמָל וָכַעַס ׀ תַּבִּיט לָתֵת בְּיָדֶךָ עָלֶיךָ יַעֲזֹב חֵלֶכָה יָתוֹם אַתָּה ׀ הָיִיתָ עוֹזֵר׃","שְׁבֹר זְרוֹעַ רָשָׁע וָרָע תִּדְרוֹשׁ־רִשְׁעוֹ בַל־תִּמְצָא׃","יְהוָה מֶלֶךְ עוֹלָם וָעֶד אָבְדוּ גוֹיִם מֵאַרְצוֹ׃","תַּאֲוַת עֲנָוִים שָׁמַעְתָּ יְהוָה תָּכִין לִבָּם תַּקְשִׁיב אָזְנֶךָ׃","לִשְׁפֹּט יָתוֹם וָדָךְ בַּל־יוֹסִיף עוֹד לַעֲרֹץ אֱנוֹשׁ מִן־הָאָרֶץ׃"],"11":["לַמְנַצֵּחַ לְדָוִד בַּיהוָה ׀ חָסִיתִי אֵיךְ תֹּאמְרוּ לְנַפְשִׁי נודו הַרְכֶם צִפּוֹר׃","כִּי הִנֵּה הָרְשָׁעִים יִדְרְכוּן קֶשֶׁת כּוֹנְנוּ חִצָּם עַל־יֶתֶר לִירוֹת בְּמוֹ־אֹפֶל לְיִשְׁרֵי־לֵב׃","כִּי הַשָּׁתוֹת יֵהָרֵסוּן צַדִּיק מַה־פָּעָל׃","יְהוָה ׀ בְּהֵיכַל קָדְשׁוֹ יְהוָה בַּשָּׁמַיִם כִּסְאוֹ עֵינָיו יֶחֱזוּ עַפְעַפָּיו יִבְחֲנוּ בְּנֵי אָדָם׃","יְהוָה צַדִּיק יִבְחָן וְרָשָׁע וְאֹהֵב חָמָס שָׂנְאָה נַפְשׁוֹ׃","יַמְטֵר עַל־רְשָׁעִים פַּחִים אֵשׁ וְגָפְרִית וְרוּחַ זִלְעָפוֹת מְנָת כּוֹסָם׃","כִּי־צַדִּיק יְהוָה צְדָקוֹת אָהֵב יָשָׁר יֶחֱזוּ פָנֵימוֹ׃"],"12":["לַמְנַצֵּחַ עַל־הַשְּׁמִינִית מִזְמוֹר לְדָוִד׃","הוֹשִׁיעָה יְהוָה כִּי־גָמַר חָסִיד כִּי־פַסּוּ אֱמוּנִים מִבְּנֵי אָדָם׃","שָׁוְא ׀ יְדַבְּרוּ אִישׁ אֶת־רֵעֵהוּ שְׂפַת חֲלָקוֹת בְּלֵב וָלֵב יְדַבֵּרוּ׃","יַכְרֵת יְהוָה כָּל־שִׂפְתֵי חֲלָקוֹת לָשׁוֹן מְדַבֶּרֶת גְּדֹלוֹת׃","אֲשֶׁר אָמְרוּ ׀ לִלְשֹׁנֵנוּ נַגְבִּיר שְׂפָתֵינוּ אִתָּנוּ מִי אָדוֹן לָנוּ׃","מִשֹּׁד עֲנִיִּים מֵאַנְקַת אֶבְיוֹנִים עַתָּה אָקוּם יֹאמַר יְהוָה אָשִׁית בְּיֵשַׁע יָפִיחַ לוֹ׃","אִמֲרוֹת יְהוָה אֲמָרוֹת טְהֹרוֹת כֶּסֶף צָרוּף בַּעֲלִיל לָאָרֶץ מְזֻקָּק שִׁבְעָתָיִם׃","אַתָּה־יְהוָה תִּשְׁמְרֵם תִּצְּרֶנּוּ ׀ מִן־הַדּוֹר זוּ לְעוֹלָם׃","סָבִיב רְשָׁעִים יִתְהַלָּכוּן כְּרֻם זֻלּוּת לִבְנֵי אָדָם׃"],"13":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","עַד־אָנָה יְהוָה תִּשְׁכָּחֵנִי נֶצַח עַד־אָנָה ׀ תַּסְתִּיר אֶת־פָּנֶיךָ מִמֶּנִּי׃","עַד־אָנָה אָשִׁית עֵצוֹת בְּנַפְשִׁי יָגוֹן בִּלְבָבִי יוֹמָם עַד־אָנָה ׀ יָרוּם אֹיְבִי עָלָי׃","הַבִּיטָה עֲנֵנִי יְהוָה אֱלֹהָי הָאִירָה עֵינַי פֶּן־אִישַׁן הַמָּוֶת׃","פֶּן־יֹאמַר אֹיְבִי יְכָלְתִּיו צָרַי יָגִילוּ כִּי אֶמּוֹט׃","וַאֲנִי ׀ בְּחַסְדְּךָ בָטַחְתִּי יָגֵל לִבִּי בִּישׁוּעָתֶךָ אָשִׁירָה לַיהוָה כִּי גָמַל עָלָי׃"],"14":["לַמְנַצֵּחַ לְדָוִד אָמַר נָבָל בְּלִבּוֹ אֵין אֱלֹהִים הִשְׁחִיתוּ הִתְעִיבוּ עֲלִילָה אֵין עֹשֵׂה־טוֹב׃","יְהוָה מִשָּׁמַיִם הִשְׁקִיף עַל־בְּנֵי־אָדָם לִרְאוֹת הֲיֵשׁ מַשְׂכִּיל דֹּרֵשׁ אֶת־אֱלֹהִים׃","הַכֹּל סָר יַחְדָּו נֶאֱלָחוּ אֵין עֹשֵׂה־טוֹב אֵין גַּם־אֶחָד׃","הֲלֹא יָדְעוּ כָּל־פֹּעֲלֵי אָוֶן אֹכְלֵי עַמִּי אָכְלוּ לֶחֶם יְהוָה לֹא קָרָאוּ׃","שָׁם ׀ פָּחֲדוּ פָחַד כִּי־אֱלֹהִים בְּדוֹר צַדִּיק׃","עֲצַת־עָנִי תָבִישׁוּ כִּי יְהוָה מַחְסֵהוּ׃","מִי יִתֵּן מִצִּיּוֹן יְשׁוּעַת יִשְׂרָאֵל בְּשׁוּב יְהוָה שְׁבוּת עַמּוֹ יָגֵל יַעֲקֹב יִשְׂמַח יִשְׂרָאֵל׃"],"15":["מִזְמוֹר לְדָוִד יְהֹוָה מִי־יָגוּר בְּאָהֳלֶךָ מִי־יִשְׁכֹּן בְּהַר קָדְשֶׁךָ׃","הוֹלֵךְ תָּמִים וּפֹעֵל צֶדֶק וְדֹבֵר אֱמֶת בִּלְבָבוֹ׃","לֹא־רָגַל ׀ עַל־לְשֹׁנוֹ לֹא־עָשָׂה לְרֵעֵהוּ רָעָה וְחֶרְפָּה לֹא־נָשָׂא עַל־קְרֹבוֹ׃","נִבְזֶה ׀ בְּעֵינָיו נִמְאָס וְאֶת־יִרְאֵי יְהוָה יְכַבֵּד נִשְׁבַּע לְהָרַע וְלֹא יָמִר׃","כַּסְפּוֹ ׀ לֹא־נָתַן בְּנֶשֶׁךְ וְשֹׁחַד עַל־נָקִי לֹא לָקָח עֹשֵׂה־אֵלֶּה לֹא יִמּוֹט לְעוֹלָם׃"],"16":["מִכְתָּם לְדָוִד שָׁמְרֵנִי אֵל כִּי־חָסִיתִי בָךְ׃","אָמַרְתְּ לַיהוָה אֲדֹנָי אָתָּה טוֹבָתִי בַּל־עָלֶיךָ׃","לִקְדוֹשִׁים אֲשֶׁר־בָּאָרֶץ הֵמָּה וְאַדִּירֵי כָּל־חֶפְצִי־בָם׃","יִרְבּוּ עַצְּבוֹתָם אַחֵר מָהָרוּ בַּל־אַסִּיךְ נִסְכֵּיהֶם מִדָּם וּבַל־אֶשָּׂא אֶת־שְׁמוֹתָם עַל־שְׂפָתָי׃","יְהוָה מְנָת־חֶלְקִי וְכוֹסִי אַתָּה תּוֹמִיךְ גּוֹרָלִי׃","חֲבָלִים נָפְלוּ־לִי בַּנְּעִמִים אַף־נַחֲלָת שָׁפְרָה עָלָי׃","אֲבָרֵךְ אֶת־יְהוָה אֲשֶׁר יְעָצָנִי אַף־לֵילוֹת יִסְּרוּנִי כִלְיוֹתָי׃","שִׁוִּיתִי יְהוָה לְנֶגְדִּי תָמִיד כִּי מִימִינִי בַּל־אֶמּוֹט׃","לָכֵן ׀ שָׂמַח לִבִּי וַיָּגֶל כְּבוֹדִי אַף־בְּשָׂרִי יִשְׁכֹּן לָבֶטַח׃","כִּי ׀ לֹא־תַעֲזֹב נַפְשִׁי לִשְׁאוֹל לֹא־תִתֵּן חֲסִידְךָ לִרְאוֹת שָׁחַת׃","תּוֹדִיעֵנִי אֹרַח חַיִּים שֹׂבַע שְׂמָחוֹת אֶת־פָּנֶיךָ נְעִמוֹת בִּימִינְךָ נֶצַח׃"],"17":["תְּפִלָּה לְדָוִד שִׁמְעָה יְהוָה ׀ צֶדֶק הַקְשִׁיבָה רִנָּתִי הַאֲזִינָה תְפִלָּתִי בְּלֹא שִׂפְתֵי מִרְמָה׃","מִלְּפָנֶיךָ מִשְׁפָּטִי יֵצֵא עֵינֶיךָ תֶּחֱזֶינָה מֵישָׁרִים׃","בָּחַנְתָּ לִבִּי ׀ פָּקַדְתָּ לַּיְלָה צְרַפְתַּנִי בַל־תִּמְצָא זַמֹּתִי בַּל־יַעֲבָר־פִּי׃","לִפְעֻלּוֹת אָדָם בִּדְבַר שְׂפָתֶיךָ אֲנִי שָׁמַרְתִּי אָרְחוֹת פָּרִיץ׃","תָּמֹךְ אֲשֻׁרַי בְּמַעְגְּלוֹתֶיךָ בַּל־נָמוֹטּוּ פְעָמָי׃","אֲנִי־קְרָאתִיךָ כִי־תַעֲנֵנִי אֵל הַט־אָזְנְךָ לִי שְׁמַע אִמְרָתִי׃","הַפְלֵה חֲסָדֶיךָ מוֹשִׁיעַ חוֹסִים מִמִּתְקוֹמְמִים בִּימִינֶךָ׃","שָׁמְרֵנִי כְּאִישׁוֹן בַּת־עָיִן בְּצֵל כְּנָפֶיךָ תַּסְתִּירֵנִי׃","מִפְּנֵי רְשָׁעִים זוּ שַׁדּוּנִי אֹיְבַי בְּנֶפֶשׁ יַקִּיפוּ עָלָי׃","חֶלְבָּמוֹ סָּגְרוּ פִּימוֹ דִּבְּרוּ בְגֵאוּת׃","אַשֻּׁרֵינוּ עַתָּה סבבוני עֵינֵיהֶם יָשִׁיתוּ לִנְטוֹת בָּאָרֶץ׃","דִּמְיֹנוֹ כְּאַרְיֵה יִכְסוֹף לִטְרוֹף וְכִכְפִיר יֹשֵׁב בְּמִסְתָּרִים׃","קוּמָה יְהוָה קַדְּמָה פָנָיו הַכְרִיעֵהוּ פַּלְּטָה נַפְשִׁי מֵרָשָׁע חַרְבֶּךָ׃","מִמְתִים יָדְךָ ׀ יְהוָה מִמְתִים מֵחֶלֶד חֶלְקָם בַּחַיִּים וצפינך תְּמַלֵּא בִטְנָם יִשְׂבְּעוּ בָנִים וְהִנִּיחוּ יִתְרָם לְעוֹלְלֵיהֶם׃","אֲנִי בְּצֶדֶק אֶחֱזֶה פָנֶיךָ אֶשְׂבְּעָה בְהָקִיץ תְּמוּנָתֶךָ׃"],"18":["לַמְנַצֵּחַ ׀ לְעֶבֶד יְהוָה לְדָוִד אֲשֶׁר דִּבֶּר ׀ לַיהוָה אֶת־דִּבְרֵי הַשִּׁירָה הַזֹּאת בְּיוֹם הִצִּיל־יְהוָה אוֹתוֹ מִכַּף כָּל־אֹיְבָיו וּמִיַּד שָׁאוּל׃","וַיֹּאמַר אֶרְחָמְךָ יְהוָה חִזְקִי׃","יְהוָה ׀ סַלְעִי וּמְצוּדָתִי וּמְפַלְטִי אֵלִי צוּרִי אֶחֱסֶה־בּוֹ מָגִנִּי וְקֶרֶן־יִשְׁעִי מִשְׂגַּבִּי׃","מְהֻלָּל אֶקְרָא יְהוָה וּמִן־אֹיְבַי אִוָּשֵׁעַ׃","אֲפָפוּנִי חֶבְלֵי־מָוֶת וְנַחֲלֵי בְלִיַּעַל יְבַעֲתוּנִי׃","חֶבְלֵי שְׁאוֹל סְבָבוּנִי קִדְּמוּנִי מוֹקְשֵׁי מָוֶת׃","בַּצַּר־לִי ׀ אֶקְרָא יְהוָה וְאֶל־אֱלֹהַי אֲשַׁוֵּעַ יִשְׁמַע מֵהֵיכָלוֹ קוֹלִי וְשַׁוְעָתִי לְפָנָיו ׀ תָּבוֹא בְאָזְנָיו׃","וַתִּגְעַשׁ וַתִּרְעַשׁ ׀ הָאָרֶץ וּמוֹסְדֵי הָרִים יִרְגָּזוּ וַיִּתְגָּעֲשׁוּ כִּי־חָרָה לוֹ׃","עָלָה עָשָׁן ׀ בְּאַפּוֹ וְאֵשׁ־מִפִּיו תֹּאכֵל גֶּחָלִים בָּעֲרוּ מִמֶּנּוּ׃","וַיֵּט שָׁמַיִם וַיֵּרַד וַעֲרָפֶל תַּחַת רַגְלָיו׃","וַיִּרְכַּב עַל־כְּרוּב וַיָּעֹף וַיֵּדֶא עַל־כַּנְפֵי־רוּחַ׃","יָשֶׁת חֹשֶׁךְ ׀ סִתְרוֹ סְבִיבוֹתָיו סֻכָּתוֹ חֶשְׁכַת־מַיִם עָבֵי שְׁחָקִים׃","מִנֹּגַהּ נֶגְדּוֹ עָבָיו עָבְרוּ בָּרָד וְגַחֲלֵי־אֵשׁ׃","וַיַּרְעֵם בַּשָּׁמַיִם ׀ יְהוָה וְעֶלְיוֹן יִתֵּן קֹלוֹ בָּרָד וְגַחֲלֵי־אֵשׁ׃","וַיִּשְׁלַח חִצָּיו וַיְפִיצֵם וּבְרָקִים רָב וַיְהֻמֵּם׃","וַיֵּרָאוּ ׀ אֲפִיקֵי מַיִם וַיִּגָּלוּ מוֹסְדוֹת תֵּבֵל מִגַּעֲרָתְךָ יְהוָה מִנִּשְׁמַת רוּחַ אַפֶּךָ׃","יִשְׁלַח מִמָּרוֹם יִקָּחֵנִי יַמְשֵׁנִי מִמַּיִם רַבִּים׃","יַצִּילֵנִי מֵאֹיְבִי עָז וּמִשֹּׂנְאַי כִּי־אָמְצוּ מִמֶּנִּי׃","יְקַדְּמוּנִי בְיוֹם־אֵידִי וַיְהִי־יְהוָה לְמִשְׁעָן לִי׃","וַיּוֹצִיאֵנִי לַמֶּרְחָב יְחַלְּצֵנִי כִּי חָפֵץ בִּי׃","יִגְמְלֵנִי יְהוָה כְּצִדְקִי כְּבֹר יָדַי יָשִׁיב לִי׃","כִּי־שָׁמַרְתִּי דַּרְכֵי יְהוָה וְלֹא־רָשַׁעְתִּי מֵאֱלֹהָי׃","כִּי כָל־מִשְׁפָּטָיו לְנֶגְדִּי וְחֻקֹּתָיו לֹא־אָסִיר מֶנִּי׃","וָאֱהִי תָמִים עִמּוֹ וָאֶשְׁתַּמֵּר מֵעֲוֺנִי׃","וַיָּשֶׁב־יְהוָה לִי כְצִדְקִי כְּבֹר יָדַי לְנֶגֶד עֵינָיו׃","עִם־חָסִיד תִּתְחַסָּד עִם־גְּבַר תָּמִים תִּתַּמָּם׃","עִם־נָבָר תִּתְבָּרָר וְעִם־עִקֵּשׁ תִּתְפַּתָּל׃","כִּי־אַתָּה עַם־עָנִי תוֹשִׁיעַ וְעֵינַיִם רָמוֹת תַּשְׁפִּיל׃","כִּי־אַתָּה תָּאִיר נֵרִי יְהוָה אֱלֹהַי יַגִּיהַּ חָשְׁכִּי׃","כִּי־בְךָ אָרֻץ גְּדוּד וּבֵאלֹהַי אֲדַלֶּג־שׁוּר׃","הָאֵל תָּמִים דַּרְכּוֹ אִמְרַת־יְהוָה צְרוּפָה מָגֵן הוּא לְכֹל ׀ הַחֹסִים בּוֹ׃","כִּי מִי אֱלוֹהַּ מִבַּלְעֲדֵי יְהוָה וּמִי צוּר זוּלָתִי אֱלֹהֵינוּ׃","הָאֵל הַמְאַזְּרֵנִי חָיִל וַיִּתֵּן תָּמִים דַּרְכִּי׃","מְשַׁוֶּה רַגְלַי כָּאַיָּלוֹת וְעַל בָּמֹתַי יַעֲמִידֵנִי׃","מְלַמֵּד יָדַי לַמִּלְחָמָה וְנִחֲתָה קֶשֶׁת־נְחוּשָׁה זְרוֹעֹתָי׃","וַתִּתֶּן־לִי מָגֵן יִשְׁעֶךָ וִימִינְךָ תִסְעָדֵנִי וְעַנְוַתְךָ תַרְבֵּנִי׃","תַּרְחִיב צַעֲדִי תַחְתָּי וְלֹא מָעֲדוּ קַרְסֻלָּי׃","אֶרְדּוֹף אוֹיְבַי וְאַשִּׂיגֵם וְלֹא־אָשׁוּב עַד־כַּלּוֹתָם׃","אֶמְחָצֵם וְלֹא־יֻכְלוּ קוּם יִפְּלוּ תַּחַת רַגְלָי׃","וַתְּאַזְּרֵנִי חַיִל לַמִּלְחָמָה תַּכְרִיעַ קָמַי תַּחְתָּי׃","וְאֹיְבַי נָתַתָּה לִּי עֹרֶף וּמְשַׂנְאַי אַצְמִיתֵם׃","יְשַׁוְּעוּ וְאֵין־מוֹשִׁיעַ עַל־יְהוָה וְלֹא עָנָם׃","וְאֶשְׁחָקֵם כְּעָפָר עַל־פְּנֵי־רוּחַ כְּטִיט חוּצוֹת אֲרִיקֵם׃","תְּפַלְּטֵנִי מֵרִיבֵי עָם תְּשִׂימֵנִי לְרֹאשׁ גּוֹיִם עַם לֹא־יָדַעְתִּי יַעַבְדוּנִי׃","לְשֵׁמַע אֹזֶן יִשָּׁמְעוּ לִי בְּנֵי־נֵכָר יְכַחֲשׁוּ־לִי׃","בְּנֵי־נֵכָר יִבֹּלוּ וְיַחְרְגוּ מִמִּסְגְּרוֹתֵיהֶם׃","חַי־יְהוָה וּבָרוּךְ צוּרִי וְיָרוּם אֱלוֹהֵי יִשְׁעִי׃","הָאֵל הַנּוֹתֵן נְקָמוֹת לִי וַיַּדְבֵּר עַמִּים תַּחְתָּי׃","מְפַלְּטִי מֵאֹיְבָי אַף מִן־קָמַי תְּרוֹמְמֵנִי מֵאִישׁ חָמָס תַּצִּילֵנִי׃","עַל־כֵּן ׀ אוֹדְךָ בַגּוֹיִם ׀ יְהוָה וּלְשִׁמְךָ אֲזַמֵּרָה׃","מגדל יְשׁוּעוֹת מַלְכּוֹ וְעֹשֶׂה חֶסֶד ׀ לִמְשִׁיחוֹ לְדָוִד וּלְזַרְעוֹ עַד־עוֹלָם׃"],"19":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","הַשָּׁמַיִם מְסַפְּרִים כְּבוֹד־אֵל וּמַעֲשֵׂה יָדָיו מַגִּיד הָרָקִיעַ׃","יוֹם לְיוֹם יַבִּיעַ אֹמֶר וְלַיְלָה לְּלַיְלָה יְחַוֶּה־דָּעַת׃","אֵין־אֹמֶר וְאֵין דְּבָרִים בְּלִי נִשְׁמָע קוֹלָם׃","בְּכָל־הָאָרֶץ ׀ יָצָא קַוָּם וּבִקְצֵה תֵבֵל מִלֵּיהֶם לַשֶּׁמֶשׁ שָׂם־אֹהֶל בָּהֶם׃","וְהוּא כְּחָתָן יֹצֵא מֵחֻפָּתוֹ יָשִׂישׂ כְּגִבּוֹר לָרוּץ אֹרַח׃","מִקְצֵה הַשָּׁמַיִם ׀ מוֹצָאוֹ וּתְקוּפָתוֹ עַל־קְצוֹתָם וְאֵין נִסְתָּר מֵחַמָּתוֹ׃","תּוֹרַת יְהוָה תְּמִימָה מְשִׁיבַת נָפֶשׁ עֵדוּת יְהוָה נֶאֱמָנָה מַחְכִּימַת פֶּתִי׃","פִּקּוּדֵי יְהוָה יְשָׁרִים מְשַׂמְּחֵי־לֵב מִצְוַת יְהוָה בָּרָה מְאִירַת עֵינָיִם׃","יִרְאַת יְהוָה ׀ טְהוֹרָה עוֹמֶדֶת לָעַד מִשְׁפְּטֵי־יְהוָה אֱמֶת צָדְקוּ יַחְדָּו׃","הַנֶּחֱמָדִים מִזָּהָב וּמִפַּז רָב וּמְתוּקִים מִדְּבַשׁ וְנֹפֶת צוּפִים׃","גַּם־עַבְדְּךָ נִזְהָר בָּהֶם בְּשָׁמְרָם עֵקֶב רָב׃","שְׁגִיאוֹת מִי־יָבִין מִנִּסְתָּרוֹת נַקֵּנִי׃","גַּם מִזֵּדִים ׀ חֲשֹׂךְ עַבְדֶּךָ אַל־יִמְשְׁלוּ־בִי אָז אֵיתָם וְנִקֵּיתִי מִפֶּשַׁע רָב׃","יִהְיוּ לְרָצוֹן ׀ אִמְרֵי־פִי וְהֶגְיוֹן לִבִּי לְפָנֶיךָ יְהוָה צוּרִי וְגֹאֲלִי׃"],"20":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","יַעַנְךָ יְהוָה בְּיוֹם צָרָה יְשַׂגֶּבְךָ שֵׁם ׀ אֱלֹהֵי יַעֲקֹב׃","יִשְׁלַח־עֶזְרְךָ מִקֹּדֶשׁ וּמִצִּיּוֹן יִסְעָדֶךָּ׃","יִזְכֹּר כָּל־מִנְחֹתֶךָ וְעוֹלָתְךָ יְדַשְּׁנֶה סֶלָה׃","יִתֶּן־לְךָ כִלְבָבֶךָ וְכָל־עֲצָתְךָ יְמַלֵּא׃","נְרַנְּנָה ׀ בִּישׁוּעָתֶךָ וּבְשֵׁם־אֱלֹהֵינוּ נִדְגֹּל יְמַלֵּא יְהוָה כָּל־מִשְׁאֲלוֹתֶיךָ׃","עַתָּה יָדַעְתִּי כִּי הוֹשִׁיעַ ׀ יְהוָה מְשִׁיחוֹ יַעֲנֵהוּ מִשְּׁמֵי קָדְשׁוֹ בִּגְבֻרוֹת יֵשַׁע יְמִינוֹ׃","אֵלֶּה בָרֶכֶב וְאֵלֶּה בַסּוּסִים וַאֲנַחְנוּ ׀ בְּשֵׁם־יְהוָה אֱלֹהֵינוּ נַזְכִּיר׃","הֵמָּה כָּרְעוּ וְנָפָלוּ וַאֲנַחְנוּ קַּמְנוּ וַנִּתְעוֹדָד׃","יְהוָה הוֹשִׁיעָה הַמֶּלֶךְ יַעֲנֵנוּ בְיוֹם־קָרְאֵנוּ׃"],"21":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","יְהוָה בְּעָזְּךָ יִשְׂמַח־מֶלֶךְ וּבִישׁוּעָתְךָ מַה־יגיל מְאֹד׃","תַּאֲוַת לִבּוֹ נָתַתָּה לּוֹ וַאֲרֶשֶׁת שְׂפָתָיו בַּל־מָנַעְתָּ סֶּלָה׃","כִּי־תְקַדְּמֶנּוּ בִּרְכוֹת טוֹב תָּשִׁית לְרֹאשׁוֹ עֲטֶרֶת פָּז׃","חַיִּים ׀ שָׁאַל מִמְּךָ נָתַתָּה לּוֹ אֹרֶךְ יָמִים עוֹלָם וָעֶד׃","גָּדוֹל כְּבוֹדוֹ בִּישׁוּעָתֶךָ הוֹד וְהָדָר תְּשַׁוֶּה עָלָיו׃","כִּי־תְשִׁיתֵהוּ בְרָכוֹת לָעַד תְּחַדֵּהוּ בְשִׂמְחָה אֶת־פָּנֶיךָ׃","כִּי־הַמֶּלֶךְ בֹּטֵחַ בַּיהוָה וּבְחֶסֶד עֶלְיוֹן בַּל־יִמּוֹט׃","תִּמְצָא יָדְךָ לְכָל־אֹיְבֶיךָ יְמִינְךָ תִּמְצָא שֹׂנְאֶיךָ׃","תְּשִׁיתֵמוֹ ׀ כְּתַנּוּר אֵשׁ לְעֵת פָּנֶיךָ יְהוָה בְּאַפּוֹ יְבַלְּעֵם וְתֹאכְלֵם אֵשׁ׃","פִּרְיָמוֹ מֵאֶרֶץ תְּאַבֵּד וְזַרְעָם מִבְּנֵי אָדָם׃","כִּי־נָטוּ עָלֶיךָ רָעָה חָשְׁבוּ מְזִמָּה בַּל־יוּכָלוּ׃","כִּי תְּשִׁיתֵמוֹ שֶׁכֶם בְּמֵיתָרֶיךָ תְּכוֹנֵן עַל־פְּנֵיהֶם׃","רוּמָה יְהוָה בְּעֻזֶּךָ נָשִׁירָה וּנְזַמְּרָה גְּבוּרָתֶךָ׃"],"22":["לַמְנַצֵּחַ עַל־אַיֶּלֶת הַשַּׁחַר מִזְמוֹר לְדָוִד׃","אֵלִי אֵלִי לָמָה עֲזַבְתָּנִי רָחוֹק מִישׁוּעָתִי דִּבְרֵי שַׁאֲגָתִי׃","אֱלֹהַי אֶקְרָא יוֹמָם וְלֹא תַעֲנֶה וְלַיְלָה וְלֹא־דוּמִיָּה לִי׃","וְאַתָּה קָדוֹשׁ יוֹשֵׁב תְּהִלּוֹת יִשְׂרָאֵל׃","בְּךָ בָּטְחוּ אֲבֹתֵינוּ בָּטְחוּ וַתְּפַלְּטֵמוֹ׃","אֵלֶיךָ זָעֲקוּ וְנִמְלָטוּ בְּךָ בָטְחוּ וְלֹא־בוֹשׁוּ׃","וְאָנֹכִי תוֹלַעַת וְלֹא־אִישׁ חֶרְפַּת אָדָם וּבְזוּי עָם׃","כָּל־רֹאַי יַלְעִגוּ לִי יַפְטִירוּ בְשָׂפָה יָנִיעוּ רֹאשׁ׃","גֹּל אֶל־יְהוָה יְפַלְּטֵהוּ יַצִּילֵהוּ כִּי חָפֵץ בּוֹ׃","כִּי־אַתָּה גֹחִי מִבָּטֶן מַבְטִיחִי עַל־שְׁדֵי אִמִּי׃","עָלֶיךָ הָשְׁלַכְתִּי מֵרָחֶם מִבֶּטֶן אִמִּי אֵלִי אָתָּה׃","אַל־תִּרְחַק מִמֶּנִּי כִּי־צָרָה קְרוֹבָה כִּי־אֵין עוֹזֵר׃","סְבָבוּנִי פָּרִים רַבִּים אַבִּירֵי בָשָׁן כִּתְּרוּנִי׃","פָּצוּ עָלַי פִּיהֶם אַרְיֵה טֹרֵף וְשֹׁאֵג׃","כַּמַּיִם נִשְׁפַּכְתִּי וְהִתְפָּרְדוּ כָּל־עַצְמוֹתָי הָיָה לִבִּי כַּדּוֹנָג נָמֵס בְּתוֹךְ מֵעָי׃","יָבֵשׁ כַּחֶרֶשׂ ׀ כֹּחִי וּלְשׁוֹנִי מֻדְבָּק מַלְקוֹחָי וְלַעֲפַר־מָוֶת תִּשְׁפְּתֵנִי׃","כִּי סְבָבוּנִי כְּלָבִים עֲדַת מְרֵעִים הִקִּיפוּנִי כָּאֲרִי יָדַי וְרַגְלָי׃","אֲסַפֵּר כָּל־עַצְמוֹתָי הֵמָּה יַבִּיטוּ יִרְאוּ־בִי׃","יְחַלְּקוּ בְגָדַי לָהֶם וְעַל־לְבוּשִׁי יַפִּילוּ גוֹרָל׃","וְאַתָּה יְהוָה אַל־תִּרְחָק אֱיָלוּתִי לְעֶזְרָתִי חוּשָׁה׃","הַצִּילָה מֵחֶרֶב נַפְשִׁי מִיַּד־כֶּלֶב יְחִידָתִי׃","הוֹשִׁיעֵנִי מִפִּי אַרְיֵה וּמִקַּרְנֵי רֵמִים עֲנִיתָנִי׃","אֲסַפְּרָה שִׁמְךָ לְאֶחָי בְּתוֹךְ קָהָל אֲהַלְלֶךָּ׃","יִרְאֵי יְהוָה ׀ הַלְלוּהוּ כָּל־זֶרַע יַעֲקֹב כַּבְּדוּהוּ וְגוּרוּ מִמֶּנּוּ כָּל־זֶרַע יִשְׂרָאֵל׃","כִּי לֹא־בָזָה וְלֹא שִׁקַּץ עֱנוּת עָנִי וְלֹא־הִסְתִּיר פָּנָיו מִמֶּנּוּ וּבְשַׁוְּעוֹ אֵלָיו שָׁמֵעַ׃","מֵאִתְּךָ תְהִלָּתִי בְּקָהָל רָב נְדָרַי אֲשַׁלֵּם נֶגֶד יְרֵאָיו׃","יֹאכְלוּ עֲנָוִים ׀ וְיִשְׂבָּעוּ יְהַלְלוּ יְהוָה דֹּרְשָׁיו יְחִי לְבַבְכֶם לָעַד׃","יִזְכְּרוּ ׀ וְיָשֻׁבוּ אֶל־יְהוָה כָּל־אַפְסֵי־אָרֶץ וְיִשְׁתַּחֲווּ לְפָנֶיךָ כָּל־מִשְׁפְּחוֹת גּוֹיִם׃","כִּי לַיהוָה הַמְּלוּכָה וּמֹשֵׁל בַּגּוֹיִם׃","אָכְלוּ וַיִּשְׁתַּחֲוּוּ ׀ כָּל־דִּשְׁנֵי־אֶרֶץ לְפָנָיו יִכְרְעוּ כָּל־יוֹרְדֵי עָפָר וְנַפְשׁוֹ לֹא חִיָּה׃","זֶרַע יַעַבְדֶנּוּ יְסֻפַּר לַאדֹנָי לַדּוֹר׃","יָבֹאוּ וְיַגִּידוּ צִדְקָתוֹ לְעַם נוֹלָד כִּי עָשָׂה׃"],"23":["מִזְמוֹר לְדָוִד יְהוָה רֹעִי לֹא אֶחְסָר׃","בִּנְאוֹת דֶּשֶׁא יַרְבִּיצֵנִי עַל־מֵי מְנֻחוֹת יְנַהֲלֵנִי׃","נַפְשִׁי יְשׁוֹבֵב יַנְחֵנִי בְמַעְגְּלֵי־צֶדֶק לְמַעַן שְׁמוֹ׃","גַּם כִּי־אֵלֵךְ בְּגֵיא צַלְמָוֶת לֹא־אִירָא רָע כִּי־אַתָּה עִמָּדִי שִׁבְטְךָ וּמִשְׁעַנְתֶּךָ הֵמָּה יְנַחֲמֻנִי׃","תַּעֲרֹךְ לְפָנַי ׀ שֻׁלְחָן נֶגֶד צֹרְרָי דִּשַּׁנְתָּ בַשֶּׁמֶן רֹאשִׁי כּוֹסִי רְוָיָה׃","אַךְ ׀ טוֹב וָחֶסֶד יִרְדְּפוּנִי כָּל־יְמֵי חַיָּי וְשַׁבְתִּי בְּבֵית־יְהוָה לְאֹרֶךְ יָמִים׃"],"24":["לְדָוִד מִזְמוֹר לַיהוָה הָאָרֶץ וּמְלוֹאָהּ תֵּבֵל וְיֹשְׁבֵי בָהּ׃","כִּי־הוּא עַל־יַמִּים יְסָדָהּ וְעַל־נְהָרוֹת יְכוֹנְנֶהָ׃","מִי־יַעֲלֶה בְהַר־יְהוָה וּמִי־יָקוּם בִּמְקוֹם קָדְשׁוֹ׃","נְקִי כַפַּיִם וּבַר־לֵבָב אֲשֶׁר ׀ לֹא־נָשָׂא לַשָּׁוְא נַפְשִׁי וְלֹא נִשְׁבַּע לְמִרְמָה׃","יִשָּׂא בְרָכָה מֵאֵת יְהוָה וּצְדָקָה מֵאֱלֹהֵי יִשְׁעוֹ׃","זֶה דּוֹר דרשו מְבַקְשֵׁי פָנֶיךָ יַעֲקֹב סֶלָה׃","שְׂאוּ שְׁעָרִים ׀ רָאשֵׁיכֶם וְהִנָּשְׂאוּ פִּתְחֵי עוֹלָם וְיָבוֹא מֶלֶךְ הַכָּבוֹד׃","מִי זֶה מֶלֶךְ הַכָּבוֹד יְהוָה עִזּוּז וְגִבּוֹר יְהוָה גִּבּוֹר מִלְחָמָה׃","שְׂאוּ שְׁעָרִים ׀ רָאשֵׁיכֶם וּשְׂאוּ פִּתְחֵי עוֹלָם וְיָבֹא מֶלֶךְ הַכָּבוֹד׃","מִי הוּא זֶה מֶלֶךְ הַכָּבוֹד יְהוָה צְבָאוֹת הוּא מֶלֶךְ הַכָּבוֹד סֶלָה׃"],"25":["לְדָוִד אֵלֶיךָ יְהוָה נַפְשִׁי אֶשָּׂא׃","אֱלֹהַי בְּךָ בָטַחְתִּי אַל־אֵבוֹשָׁה אַל־יַעַלְצוּ אֹיְבַי לִי׃","גַּם כָּל־קֹוֶיךָ לֹא יֵבֹשׁוּ יֵבֹשׁוּ הַבּוֹגְדִים רֵיקָם׃","דְּרָכֶיךָ יְהוָה הוֹדִיעֵנִי אֹרְחוֹתֶיךָ לַמְּדֵנִי׃","הַדְרִיכֵנִי בַאֲמִתֶּךָ ׀ וְלַמְּדֵנִי כִּי־אַתָּה אֱלֹהֵי יִשְׁעִי אוֹתְךָ קִוִּיתִי כָּל־הַיּוֹם׃","זְכֹר־רַחֲמֶיךָ יְהוָה וַחֲסָדֶיךָ כִּי מֵעוֹלָם הֵמָּה׃","חַטֹּאות נְעוּרַי ׀ וּפְשָׁעַי אַל־תִּזְכֹּר כְּחַסְדְּךָ זְכָר־לִי־אַתָּה לְמַעַן טוּבְךָ יְהוָה׃","טוֹב־וְיָשָׁר יְהוָה עַל־כֵּן יוֹרֶה חַטָּאִים בַּדָּרֶךְ׃","יַדְרֵךְ עֲנָוִים בַּמִּשְׁפָּט וִילַמֵּד עֲנָוִים דַּרְכּוֹ׃","כָּל־אָרְחוֹת יְהוָה חֶסֶד וֶאֱמֶת לְנֹצְרֵי בְרִיתוֹ וְעֵדֹתָיו׃","לְמַעַן־שִׁמְךָ יְהוָה וְסָלַחְתָּ לַעֲוֺנִי כִּי רַב־הוּא׃","מִי־זֶה הָאִישׁ יְרֵא יְהוָה יוֹרֶנּוּ בְּדֶרֶךְ יִבְחָר׃","נַפְשׁוֹ בְּטוֹב תָּלִין וְזַרְעוֹ יִירַשׁ אָרֶץ׃","סוֹד יְהוָה לִירֵאָיו וּבְרִיתוֹ לְהוֹדִיעָם׃","עֵינַי תָּמִיד אֶל־יְהוָה כִּי הוּא־יוֹצִיא מֵרֶשֶׁת רַגְלָי׃","פְּנֵה־אֵלַי וְחָנֵּנִי כִּי־יָחִיד וְעָנִי אָנִי׃","צָרוֹת לְבָבִי הִרְחִיבוּ מִמְּצוּקוֹתַי הוֹצִיאֵנִי׃","רְאֵה עָנְיִי וַעֲמָלִי וְשָׂא לְכָל־חַטֹּאותָי׃","רְאֵה־אוֹיְבַי כִּי־רָבּוּ וְשִׂנְאַת חָמָס שְׂנֵאוּנִי׃","שָׁמְרָה נַפְשִׁי וְהַצִּילֵנִי אַל־אֵבוֹשׁ כִּי־חָסִיתִי בָךְ׃","תֹּם־וָיֹשֶׁר יִצְּרוּנִי כִּי קִוִּיתִיךָ׃","פְּדֵה אֱלֹהִים אֶת־יִשְׂרָאֵל מִכֹּל צָרוֹתָיו׃"],"26":["לְדָוִד ׀ שָׁפְטֵנִי יְהוָה כִּי־אֲנִי בְּתֻמִּי הָלַכְתִּי וּבַיהוָה בָּטַחְתִּי לֹא אֶמְעָד׃","בְּחָנֵנִי יְהוָה וְנַסֵּנִי צרופה כִלְיוֹתַי וְלִבִּי׃","כִּי־חַסְדְּךָ לְנֶגֶד עֵינָי וְהִתְהַלַּכְתִּי בַּאֲמִתֶּךָ׃","לֹא־יָשַׁבְתִּי עִם־מְתֵי־שָׁוְא וְעִם נַעֲלָמִים לֹא אָבוֹא׃","שָׂנֵאתִי קְהַל מְרֵעִים וְעִם־רְשָׁעִים לֹא אֵשֵׁב׃","אֶרְחַץ בְּנִקָּיוֹן כַּפָּי וַאֲסֹבְבָה אֶת־מִזְבַּחֲךָ יְהוָה׃","לַשְׁמִעַ בְּקוֹל תּוֹדָה וּלְסַפֵּר כָּל־נִפְלְאוֹתֶיךָ׃","יְהוָה אָהַבְתִּי מְעוֹן בֵּיתֶךָ וּמְקוֹם מִשְׁכַּן כְּבוֹדֶךָ׃","אַל־תֶּאֱסֹף עִם־חַטָּאִים נַפְשִׁי וְעִם־אַנְשֵׁי דָמִים חַיָּי׃","אֲשֶׁר־בִּידֵיהֶם זִמָּה וִימִינָם מָלְאָה שֹּׁחַד׃","וַאֲנִי בְּתֻמִּי אֵלֵךְ פְּדֵנִי וְחָנֵּנִי׃","רַגְלִי עָמְדָה בְמִישׁוֹר בְּמַקְהֵלִים אֲבָרֵךְ יְהוָה׃"],"27":["לְדָוִד ׀ יְהוָה ׀ אוֹרִי וְיִשְׁעִי מִמִּי אִירָא יְהוָה מָעוֹז־חַיַּי מִמִּי אֶפְחָד׃","בִּקְרֹב עָלַי ׀ מְרֵעִים לֶאֱכֹל אֶת־בְּשָׂרִי צָרַי וְאֹיְבַי לִי הֵמָּה כָשְׁלוּ וְנָפָלוּ׃","אִם־תַּחֲנֶה עָלַי ׀ מַחֲנֶה לֹא־יִירָא לִבִּי אִם־תָּקוּם עָלַי מִלְחָמָה בְּזֹאת אֲנִי בוֹטֵחַ׃","אַחַת ׀ שָׁאַלְתִּי מֵאֵת־יְהוָה אוֹתָהּ אֲבַקֵּשׁ שִׁבְתִּי בְּבֵית־יְהוָה כָּל־יְמֵי חַיַּי לַחֲזוֹת בְּנֹעַם־יְהוָה וּלְבַקֵּר בְּהֵיכָלוֹ׃","כִּי יִצְפְּנֵנִי ׀ בְּסֻכֹּה בְּיוֹם רָעָה יַסְתִּרֵנִי בְּסֵתֶר אָהֳלוֹ בְּצוּר יְרוֹמְמֵנִי׃","וְעַתָּה יָרוּם רֹאשִׁי עַל אֹיְבַי סְבִיבוֹתַי וְאֶזְבְּחָה בְאָהֳלוֹ זִבְחֵי תְרוּעָה אָשִׁירָה וַאֲזַמְּרָה לַיהוָה׃","שְׁמַע־יְהוָה קוֹלִי אֶקְרָא וְחָנֵּנִי וַעֲנֵנִי׃","לְךָ ׀ אָמַר לִבִּי בַּקְּשׁוּ פָנָי אֶת־פָּנֶיךָ יְהוָה אֲבַקֵּשׁ׃","אַל־תַּסְתֵּר פָּנֶיךָ ׀ מִמֶּנִּי אַל־תַּט־בְּאַף עַבְדֶּךָ עֶזְרָתִי הָיִיתָ אַל־תִּטְּשֵׁנִי וְאַל־תַּעַזְבֵנִי אֱלֹהֵי יִשְׁעִי׃","כִּי־אָבִי וְאִמִּי עֲזָבוּנִי וַיהוָה יַאַסְפֵנִי׃","הוֹרֵנִי יְהוָה דַּרְכֶּךָ וּנְחֵנִי בְּאֹרַח מִישׁוֹר לְמַעַן שׁוֹרְרָי׃","אַל־תִּתְּנֵנִי בְּנֶפֶשׁ צָרָי כִּי קָמוּ־בִי עֵדֵי־שֶׁקֶר וִיפֵחַ חָמָס׃","לוּלֵא הֶאֱמַנְתִּי לִרְאוֹת בְּטוּב־יְהוָה בְּאֶרֶץ חַיִּים׃","קַוֵּה אֶל־יְהוָה חֲזַק וְיַאֲמֵץ לִבֶּךָ וְקַוֵּה אֶל־יְהוָה׃"],"28":["לְדָוִד אֵלֶיךָ יְהוָה ׀ אֶקְרָא צוּרִי אַל־תֶּחֱרַשׁ מִמֶּנִּי פֶּן־תֶּחֱשֶׁה מִמֶּנִּי וְנִמְשַׁלְתִּי עִם־יוֹרְדֵי בוֹר׃","שְׁמַע קוֹל תַּחֲנוּנַי בְּשַׁוְּעִי אֵלֶיךָ בְּנָשְׂאִי יָדַי אֶל־דְּבִיר קָדְשֶׁךָ׃","אַל־תִּמְשְׁכֵנִי עִם־רְשָׁעִים וְעִם־פֹּעֲלֵי אָוֶן דֹּבְרֵי שָׁלוֹם עִם־רֵעֵיהֶם וְרָעָה בִּלְבָבָם׃","תֶּן־לָהֶם כְּפָעֳלָם וּכְרֹעַ מַעַלְלֵיהֶם כְּמַעֲשֵׂה יְדֵיהֶם תֵּן לָהֶם הָשֵׁב גְּמוּלָם לָהֶם׃","כִּי לֹא יָבִינוּ אֶל־פְּעֻלֹּת יְהוָה וְאֶל־מַעֲשֵׂה יָדָיו יֶהֶרְסֵם וְלֹא יִבְנֵם׃","בָּרוּךְ יְהוָה כִּי־שָׁמַע קוֹל תַּחֲנוּנָי׃","יְהוָה ׀ עֻזִּי וּמָגִנִּי בּוֹ בָטַח לִבִּי וְנֶעֱזָרְתִּי וַיַּעֲלֹז לִבִּי וּמִשִּׁירִי אֲהוֹדֶנּוּ׃","יְהוָה עֹז־לָמוֹ וּמָעוֹז יְשׁוּעוֹת מְשִׁיחוֹ הוּא׃","הוֹשִׁיעָה ׀ אֶת־עַמֶּךָ וּבָרֵךְ אֶת־נַחֲלָתֶךָ וּרְעֵם וְנַשְּׂאֵם עַד־הָעוֹלָם׃"],"29":["מִזְמוֹר לְדָוִד הָבוּ לַיהוָה בְּנֵי אֵלִים הָבוּ לַיהוָה כָּבוֹד וָעֹז׃","הָבוּ לַיהוָה כְּבוֹד שְׁמוֹ הִשְׁתַּחֲווּ לַיהוָה בְּהַדְרַת־קֹדֶשׁ׃","קוֹל יְהוָה עַל־הַמָּיִם אֵל־הַכָּבוֹד הִרְעִים יְהוָה עַל־מַיִם רַבִּים׃","קוֹל־יְהוָה בַּכֹּחַ קוֹל יְהוָה בֶּהָדָר׃","קוֹל יְהוָה שֹׁבֵר אֲרָזִים וַיְשַׁבֵּר יְהוָה אֶת־אַרְזֵי הַלְּבָנוֹן׃","וַיַּרְקִידֵם כְּמוֹ־עֵגֶל לְבָנוֹן וְשִׂרְיֹן כְּמוֹ בֶן־רְאֵמִים׃","קוֹל־יְהוָה חֹצֵב לַהֲבוֹת אֵשׁ׃","קוֹל יְהוָה יָחִיל מִדְבָּר יָחִיל יְהוָה מִדְבַּר קָדֵשׁ׃","קוֹל יְהוָה ׀ יְחוֹלֵל אַיָּלוֹת וַיֶּחֱשֹׂף יְעָרוֹת וּבְהֵיכָלוֹ כֻּלּוֹ אֹמֵר כָּבוֹד׃","יְהוָה לַמַּבּוּל יָשָׁב וַיֵּשֶׁב יְהוָה מֶלֶךְ לְעוֹלָם׃","יְהוָה עֹז לְעַמּוֹ יִתֵּן יְהוָה ׀ יְבָרֵךְ אֶת־עַמּוֹ בַשָּׁלוֹם׃"],"30":["מִזְמוֹר שִׁיר־חֲנֻכַּת הַבַּיִת לְדָוִד׃","אֲרוֹמִמְךָ יְהוָה כִּי דִלִּיתָנִי וְלֹא־שִׂמַּחְתָּ אֹיְבַי לִי׃","יְהוָה אֱלֹהָי שִׁוַּעְתִּי אֵלֶיךָ וַתִּרְפָּאֵנִי׃","יְהוָה הֶעֱלִיתָ מִן־שְׁאוֹל נַפְשִׁי חִיִּיתַנִי מיורדי־בוֹר׃","זַמְּרוּ לַיהוָה חֲסִידָיו וְהוֹדוּ לְזֵכֶר קָדְשׁוֹ׃","כִּי רֶגַע ׀ בְּאַפּוֹ חַיִּים בִּרְצוֹנוֹ בָּעֶרֶב יָלִין בֶּכִי וְלַבֹּקֶר רִנָּה׃","וַאֲנִי אָמַרְתִּי בְשַׁלְוִי בַּל־אֶמּוֹט לְעוֹלָם׃","יְהוָה בִּרְצוֹנְךָ הֶעֱמַדְתָּה לְהַרְרִי עֹז הִסְתַּרְתָּ פָנֶיךָ הָיִיתִי נִבְהָל׃","אֵלֶיךָ יְהוָה אֶקְרָא וְאֶל־אֲדֹנָי אֶתְחַנָּן׃","מַה־בֶּצַע בְּדָמִי בְּרִדְתִּי אֶל־שָׁחַת הֲיוֹדְךָ עָפָר הֲיַגִּיד אֲמִתֶּךָ׃","שְׁמַע־יְהוָה וְחָנֵּנִי יְהוָה הֱיֵה־עֹזֵר לִי׃","הָפַכְתָּ מִסְפְּדִי לְמָחוֹל לִי פִּתַּחְתָּ שַׂקִּי וַתְּאַזְּרֵנִי שִׂמְחָה׃","לְמַעַן ׀ יְזַמֶּרְךָ כָבוֹד וְלֹא יִדֹּם יְהוָה אֱלֹהַי לְעוֹלָם אוֹדֶךָּ׃"],"31":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","בְּךָ יְהוָה חָסִיתִי אַל־אֵבוֹשָׁה לְעוֹלָם בְּצִדְקָתְךָ פַלְּטֵנִי׃","הַטֵּה אֵלַי ׀ אָזְנְךָ מְהֵרָה הַצִּילֵנִי הֱיֵה לִי ׀ לְצוּר־מָעוֹז לְבֵית מְצוּדוֹת לְהוֹשִׁיעֵנִי׃","כִּי־סַלְעִי וּמְצוּדָתִי אָתָּה וּלְמַעַן שִׁמְךָ תַּנְחֵנִי וּתְנַהֲלֵנִי׃","תּוֹצִיאֵנִי מֵרֶשֶׁת זוּ טָמְנוּ לִי כִּי־אַתָּה מָעוּזִּי׃","בְּיָדְךָ אַפְקִיד רוּחִי פָּדִיתָה אוֹתִי יְהוָה אֵל אֱמֶת׃","שָׂנֵאתִי הַשֹּׁמְרִים הַבְלֵי־שָׁוְא וַאֲנִי אֶל־יְהוָה בָּטָחְתִּי׃","אָגִילָה וְאֶשְׂמְחָה בְּחַסְדֶּךָ אֲשֶׁר רָאִיתָ אֶת־עָנְיִי יָדַעְתָּ בְּצָרוֹת נַפְשִׁי׃","וְלֹא הִסְגַּרְתַּנִי בְּיַד־אוֹיֵב הֶעֱמַדְתָּ בַמֶּרְחָב רַגְלָי׃","חָנֵּנִי יְהוָה כִּי צַר־לִי עָשְׁשָׁה בְכַעַס עֵינִי נַפְשִׁי וּבִטְנִי׃","כִּי כָלוּ בְיָגוֹן חַיַּי וּשְׁנוֹתַי בַּאֲנָחָה כָּשַׁל בַּעֲוֺנִי כֹחִי וַעֲצָמַי עָשֵׁשׁוּ׃","מִכָּל־צֹרְרַי הָיִיתִי חֶרְפָּה וְלִשֲׁכֵנַי ׀ מְאֹד וּפַחַד לִמְיֻדָּעָי רֹאַי בַּחוּץ נָדְדוּ מִמֶּנִּי׃","נִשְׁכַּחְתִּי כְּמֵת מִלֵּב הָיִיתִי כִּכְלִי אֹבֵד׃","כִּי שָׁמַעְתִּי ׀ דִּבַּת רַבִּים מָגוֹר מִסָּבִיב בְּהִוָּסְדָם יַחַד עָלַי לָקַחַת נַפְשִׁי זָמָמוּ׃","וַאֲנִי ׀ עָלֶיךָ בָטַחְתִּי יְהוָה אָמַרְתִּי אֱלֹהַי אָתָּה׃","בְּיָדְךָ עִתֹּתָי הַצִּילֵנִי מִיַּד־אוֹיְבַי וּמֵרֹדְפָי׃","הָאִירָה פָנֶיךָ עַל־עַבְדֶּךָ הוֹשִׁיעֵנִי בְחַסְדֶּךָ׃","יְהוָה אַל־אֵבוֹשָׁה כִּי קְרָאתִיךָ יֵבֹשׁוּ רְשָׁעִים יִדְּמוּ לִשְׁאוֹל׃","תֵּאָלַמְנָה שִׂפְתֵי שָׁקֶר הַדֹּבְרוֹת עַל־צַדִּיק עָתָק בְּגַאֲוָה וָבוּז׃","מָה רַב־טוּבְךָ אֲשֶׁר־צָפַנְתָּ לִּירֵאֶיךָ פָּעַלְתָּ לַחֹסִים בָּךְ נֶגֶד בְּנֵי אָדָם׃","תַּסְתִּירֵם ׀ בְּסֵתֶר פָּנֶיךָ מֵרֻכְסֵי אִישׁ תִּצְפְּנֵם בְּסֻכָּה מֵרִיב לְשֹׁנוֹת׃","בָּרוּךְ יְהוָה כִּי הִפְלִיא חַסְדּוֹ לִי בְּעִיר מָצוֹר׃","וַאֲנִי ׀ אָמַרְתִּי בְחָפְזִי נִגְרַזְתִּי מִנֶּגֶד עֵינֶיךָ אָכֵן שָׁמַעְתָּ קוֹל תַּחֲנוּנַי בְּשַׁוְּעִי אֵלֶיךָ׃","אֶהֱבוּ אֶת־יְהוָה כָּל־חֲסִידָיו אֱמוּנִים נֹצֵר יְהוָה וּמְשַׁלֵּם עַל־יֶתֶר עֹשֵׂה גַאֲוָה׃","חִזְקוּ וְיַאֲמֵץ לְבַבְכֶם כָּל־הַמְיַחֲלִים לַיהוָה׃"],"32":["לְדָוִד מַשְׂכִּיל אַשְׁרֵי נְשׂוּי־פֶּשַׁע כְּסוּי חֲטָאָה׃","אַשְׁרֵי אָדָם לֹא יַחְשֹׁב יְהוָה לוֹ עָוֺן וְאֵין בְּרוּחוֹ רְמִיָּה׃","כִּי־הֶחֱרַשְׁתִּי בָּלוּ עֲצָמָי בְּשַׁאֲגָתִי כָּל־הַיּוֹם׃","כִּי ׀ יוֹמָם וָלַיְלָה תִּכְבַּד עָלַי יָדֶךָ נֶהְפַּךְ לְשַׁדִּי בְּחַרְבֹנֵי קַיִץ סֶלָה׃","חַטָּאתִי אוֹדִיעֲךָ וַעֲוֺנִי לֹא־כִסִּיתִי אָמַרְתִּי אוֹדֶה עֲלֵי פְשָׁעַי לַיהוָה וְאַתָּה נָשָׂאתָ עֲוֺן חַטָּאתִי סֶלָה׃","עַל־זֹאת יִתְפַּלֵּל כָּל־חָסִיד ׀ אֵלֶיךָ לְעֵת מְצֹא רַק לְשֵׁטֶף מַיִם רַבִּים אֵלָיו לֹא יַגִּיעוּ׃","אַתָּה ׀ סֵתֶר לִי מִצַּר תִּצְּרֵנִי רָנֵּי פַלֵּט תְּסוֹבְבֵנִי סֶלָה׃","אַשְׂכִּילְךָ ׀ וְאוֹרְךָ בְּדֶרֶךְ־זוּ תֵלֵךְ אִיעֲצָה עָלֶיךָ עֵינִי׃","אַל־תִּהְיוּ ׀ כְּסוּס כְּפֶרֶד אֵין הָבִין בְּמֶתֶג־וָרֶסֶן עֶדְיוֹ לִבְלוֹם בַּל קְרֹב אֵלֶיךָ׃","רַבִּים מַכְאוֹבִים לָרָשָׁע וְהַבּוֹטֵחַ בַּיהוָה חֶסֶד יְסוֹבְבֶנּוּ׃","שִׂמְחוּ בַיהוָה וְגִילוּ צַדִּיקִים וְהַרְנִינוּ כָּל־יִשְׁרֵי־לֵב׃"],"33":["רַנְּנוּ צַדִּיקִים בַּיהוָה לַיְשָׁרִים נָאוָה תְהִלָּה׃","הוֹדוּ לַיהוָה בְּכִנּוֹר בְּנֵבֶל עָשׂוֹר זַמְּרוּ־לוֹ׃","שִׁירוּ־לוֹ שִׁיר חָדָשׁ הֵיטִיבוּ נַגֵּן בִּתְרוּעָה׃","כִּי־יָשָׁר דְּבַר־יְהוָה וְכָל־מַעֲשֵׂהוּ בֶּאֱמוּנָה׃","אֹהֵב צְדָקָה וּמִשְׁפָּט חֶסֶד יְהוָה מָלְאָה הָאָרֶץ׃","בִּדְבַר יְהוָה שָׁמַיִם נַעֲשׂוּ וּבְרוּחַ פִּיו כָּל־צְבָאָם׃","כֹּנֵס כַּנֵּד מֵי הַיָּם נֹתֵן בְּאֹצָרוֹת תְּהוֹמוֹת׃","יִירְאוּ מֵיְהוָה כָּל־הָאָרֶץ מִמֶּנּוּ יָגוּרוּ כָּל־יֹשְׁבֵי תֵבֵל׃","כִּי הוּא אָמַר וַיֶּהִי הוּא־צִוָּה וַיַּעֲמֹד׃","יְהוָה הֵפִיר עֲצַת־גּוֹיִם הֵנִיא מַחְשְׁבוֹת עַמִּים׃","עֲצַת יְהוָה לְעוֹלָם תַּעֲמֹד מַחְשְׁבוֹת לִבּוֹ לְדֹר וָדֹר׃","אַשְׁרֵי הַגּוֹי אֲשֶׁר־יְהוָה אֱלֹהָיו הָעָם ׀ בָּחַר לְנַחֲלָה לוֹ׃","מִשָּׁמַיִם הִבִּיט יְהוָה רָאָה אֶת־כָּל־בְּנֵי הָאָדָם׃","מִמְּכוֹן־שִׁבְתּוֹ הִשְׁגִּיחַ אֶל כָּל־יֹשְׁבֵי הָאָרֶץ׃","הַיֹּצֵר יַחַד לִבָּם הַמֵּבִין אֶל־כָּל־מַעֲשֵׂיהֶם׃","אֵין־הַמֶּלֶךְ נוֹשָׁע בְּרָב־חָיִל גִּבּוֹר לֹא־יִנָּצֵל בְּרָב־כֹּחַ׃","שֶׁקֶר הַסּוּס לִתְשׁוּעָה וּבְרֹב חֵילוֹ לֹא יְמַלֵּט׃","הִנֵּה עֵין יְהוָה אֶל־יְרֵאָיו לַמְיַחֲלִים לְחַסְדּוֹ׃","לְהַצִּיל מִמָּוֶת נַפְשָׁם וּלְחַיּוֹתָם בָּרָעָב׃","נַפְשֵׁנוּ חִכְּתָה לַיהוָה עֶזְרֵנוּ וּמָגִנֵּנוּ הוּא׃","כִּי־בוֹ יִשְׂמַח לִבֵּנוּ כִּי בְשֵׁם קָדְשׁוֹ בָטָחְנוּ׃","יְהִי־חַסְדְּךָ יְהוָה עָלֵינוּ כַּאֲשֶׁר יִחַלְנוּ לָךְ׃"],"34":["לְדָוִד בְּשַׁנּוֹתוֹ אֶת־טַעְמוֹ לִפְנֵי אֲבִימֶלֶךְ וַיְגָרֲשֵׁהוּ וַיֵּלַךְ׃","אֲבָרֲכָה אֶת־יְהוָה בְּכָל־עֵת תָּמִיד תְּהִלָּתוֹ בְּפִי׃","בַּיהוָה תִּתְהַלֵּל נַפְשִׁי יִשְׁמְעוּ עֲנָוִים וְיִשְׂמָחוּ׃","גַּדְּלוּ לַיהוָה אִתִּי וּנְרוֹמְמָה שְׁמוֹ יַחְדָּו׃","דָּרַשְׁתִּי אֶת־יְהוָה וְעָנָנִי וּמִכָּל־מְגוּרוֹתַי הִצִּילָנִי׃","הִבִּיטוּ אֵלָיו וְנָהָרוּ וּפְנֵיהֶם אַל־יֶחְפָּרוּ׃","זֶה עָנִי קָרָא וַיהוָה שָׁמֵעַ וּמִכָּל־צָרוֹתָיו הוֹשִׁיעוֹ׃","חֹנֶה מַלְאַךְ־יְהוָה סָבִיב לִירֵאָיו וַיְחַלְּצֵם׃","טַעֲמוּ וּרְאוּ כִּי־טוֹב יְהוָה אַשְׁרֵי הַגֶּבֶר יֶחֱסֶה־בּוֹ׃","יְראוּ אֶת־יְהוָה קְדֹשָׁיו כִּי־אֵין מַחְסוֹר לִירֵאָיו׃","כְּפִירִים רָשׁוּ וְרָעֵבוּ וְדֹרְשֵׁי יְהוָה לֹא־יַחְסְרוּ כָל־טוֹב׃","לְכוּ־בָנִים שִׁמְעוּ־לִי יִרְאַת יְהוָה אֲלַמֶּדְכֶם׃","מִי־הָאִישׁ הֶחָפֵץ חַיִּים אֹהֵב יָמִים לִרְאוֹת טוֹב׃","נְצֹר לְשׁוֹנְךָ מֵרָע וּשְׂפָתֶיךָ מִדַּבֵּר מִרְמָה׃","סוּר מֵרָע וַעֲשֵׂה־טוֹב בַּקֵּשׁ שָׁלוֹם וְרָדְפֵהוּ׃","עֵינֵי יְהוָה אֶל־צַדִּיקִים וְאָזְנָיו אֶל־שַׁוְעָתָם׃","פְּנֵי יְהוָה בְּעֹשֵׂי רָע לְהַכְרִית מֵאֶרֶץ זִכְרָם׃","צָעֲקוּ וַיהוָה שָׁמֵעַ וּמִכָּל־צָרוֹתָם הִצִּילָם׃","קָרוֹב יְהוָה לְנִשְׁבְּרֵי־לֵב וְאֶת־דַּכְּאֵי־רוּחַ יוֹשִׁיעַ׃","רַבּוֹת רָעוֹת צַדִּיק וּמִכֻּלָּם יַצִּילֶנּוּ יְהוָה׃","שֹׁמֵר כָּל־עַצְמוֹתָיו אַחַת מֵהֵנָּה לֹא נִשְׁבָּרָה׃","תְּמוֹתֵת רָשָׁע רָעָה וְשֹׂנְאֵי צַדִּיק יֶאְשָׁמוּ׃","פּוֹדֶה יְהוָה נֶפֶשׁ עֲבָדָיו וְלֹא יֶאְשְׁמוּ כָּל־הַחֹסִים בּוֹ׃"],"35":["לְדָוִד ׀ רִיבָה יְהוָה אֶת־יְרִיבַי לְחַם אֶת־לֹחֲמָי׃","הַחֲזֵק מָגֵן וְצִנָּה וְקוּמָה בְּעֶזְרָתִי׃","וְהָרֵק חֲנִית וּסְגֹר לִקְרַאת רֹדְפָי אֱמֹר לְנַפְשִׁי יְשֻׁעָתֵךְ אָנִי׃","יֵבֹשׁוּ וְיִכָּלְמוּ מְבַקְשֵׁי נַפְשִׁי יִסֹּגוּ אָחוֹר וְיַחְפְּרוּ חֹשְׁבֵי רָעָתִי׃","יִהְיוּ כְּמֹץ לִפְנֵי־רוּחַ וּמַלְאַךְ יְהוָה דּוֹחֶה׃","יְהִי־דַרְכָּם חֹשֶׁךְ וַחֲלַקְלַקּוֹת וּמַלְאַךְ יְהוָה רֹדְפָם׃","כִּי־חִנָּם טָמְנוּ־לִי שַׁחַת רִשְׁתָּם חִנָּם חָפְרוּ לְנַפְשִׁי׃","תְּבוֹאֵהוּ שׁוֹאָה לֹא־יֵדָע וְרִשְׁתּוֹ אֲשֶׁר־טָמַן תִּלְכְּדוֹ בְּשׁוֹאָה יִפָּל־בָּהּ׃","וְנַפְשִׁי תָּגִיל בַּיהוָה תָּשִׂישׂ בִּישׁוּעָתוֹ׃","כָּל עַצְמוֹתַי ׀ תֹּאמַרְנָה יְהוָה מִי כָמוֹךָ מַצִּיל עָנִי מֵחָזָק מִמֶּנּוּ וְעָנִי וְאֶבְיוֹן מִגֹּזְלוֹ׃","יְקוּמוּן עֵדֵי חָמָס אֲשֶׁר לֹא־יָדַעְתִּי יִשְׁאָלוּנִי׃","יְשַׁלְּמוּנִי רָעָה תַּחַת טוֹבָה שְׁכוֹל לְנַפְשִׁי׃","וַאֲנִי ׀ בַּחֲלוֹתָם לְבוּשִׁי שָׂק עִנֵּיתִי בַצּוֹם נַפְשִׁי וּתְפִלָּתִי עַל־חֵיקִי תָשׁוּב׃","כְּרֵעַ־כְּאָח לִי הִתְהַלָּכְתִּי כַּאֲבֶל־אֵם קֹדֵר שַׁחוֹתִי׃","וּבְצַלְעִי שָׂמְחוּ וְנֶאֱסָפוּ נֶאֶסְפוּ עָלַי נֵכִים וְלֹא יָדַעְתִּי קָרְעוּ וְלֹא־דָמּוּ׃","בְּחַנְפֵי לַעֲגֵי מָעוֹג חָרֹק עָלַי שִׁנֵּימוֹ׃","אֲדֹנָי כַּמָּה תִּרְאֶה הָשִׁיבָה נַפְשִׁי מִשֹּׁאֵיהֶם מִכְּפִירִים יְחִידָתִי׃","אוֹדְךָ בְּקָהָל רָב בְּעַם עָצוּם אֲהַלְלֶךָּ׃","אַל־יִשְׂמְחוּ־לִי אֹיְבַי שֶׁקֶר שֹׂנְאַי חִנָּם יִקְרְצוּ־עָיִן׃","כִּי לֹא שָׁלוֹם יְדַבֵּרוּ וְעַל רִגְעֵי־אֶרֶץ דִּבְרֵי מִרְמוֹת יַחֲשֹׁבוּן׃","וַיַּרְחִיבוּ עָלַי פִּיהֶם אָמְרוּ הֶאָח ׀ הֶאָח רָאֲתָה עֵינֵינוּ׃","רָאִיתָה יְהוָה אַל־תֶּחֱרַשׁ אֲדֹנָי אֲל־תִּרְחַק מִמֶּנִּי׃","הָעִירָה וְהָקִיצָה לְמִשְׁפָּטִי אֱלֹהַי וַאדֹנָי לְרִיבִי׃","שָׁפְטֵנִי כְצִדְקְךָ יְהוָה אֱלֹהָי וְאַל־יִשְׂמְחוּ־לִי׃","אַל־יֹאמְרוּ בְלִבָּם הֶאָח נַפְשֵׁנוּ אַל־יֹאמְרוּ בִּלַּעֲנוּהוּ׃","יֵבֹשׁוּ וְיַחְפְּרוּ ׀ יַחְדָּו שְׂמֵחֵי רָעָתִי יִלְבְּשׁוּ־בֹשֶׁת וּכְלִמָּה הַמַּגְדִּילִים עָלָי׃","יָרֹנּוּ וְיִשְׂמְחוּ חֲפֵצֵי צִדְקִי וְיֹאמְרוּ תָמִיד יִגְדַּל יְהוָה הֶחָפֵץ שְׁלוֹם עַבְדּוֹ׃","וּלְשׁוֹנִי תֶּהְגֶּה צִדְקֶךָ כָּל־הַיּוֹם תְּהִלָּתֶךָ׃"],"36":["לַמְנַצֵּחַ ׀ לְעֶבֶד־יְהוָה לְדָוִד׃","נְאֻם־פֶּשַׁע לָרָשָׁע בְּקֶרֶב לִבִּי אֵין־פַּחַד אֱלֹהִים לְנֶגֶד עֵינָיו׃","כִּי־הֶחֱלִיק אֵלָיו בְּעֵינָיו לִמְצֹא עֲוֺנוֹ לִשְׂנֹא׃","דִּבְרֵי־פִיו אָוֶן וּמִרְמָה חָדַל לְהַשְׂכִּיל לְהֵיטִיב׃","אָוֶן ׀ יַחְשֹׁב עַל־מִשְׁכָּבוֹ יִתְיַצֵּב עַל־דֶּרֶךְ לֹא־טוֹב רָע לֹא יִמְאָס׃","יְהוָה בְּהַשָּׁמַיִם חַסְדֶּךָ אֱמוּנָתְךָ עַד־שְׁחָקִים׃","צִדְקָתְךָ ׀ כְּהַרְרֵי־אֵל מִשְׁפָּטֶךָ תְּהוֹם רַבָּה אָדָם־וּבְהֵמָה תוֹשִׁיעַ יְהוָה׃","מַה־יָּקָר חַסְדְּךָ אֱלֹהִים וּבְנֵי אָדָם בְּצֵל כְּנָפֶיךָ יֶחֱסָיוּן׃","יִרְוְיֻן מִדֶּשֶׁן בֵּיתֶךָ וְנַחַל עֲדָנֶיךָ תַשְׁקֵם׃","כִּי־עִמְּךָ מְקוֹר חַיִּים בְּאוֹרְךָ נִרְאֶה־אוֹר׃","מְשֹׁךְ חַסְדְּךָ לְיֹדְעֶיךָ וְצִדְקָתְךָ לְיִשְׁרֵי־לֵב׃","אַל־תְּבוֹאֵנִי רֶגֶל גַּאֲוָה וְיַד־רְשָׁעִים אַל־תְּנִדֵנִי׃","שָׁם נָפְלוּ פֹּעֲלֵי אָוֶן דֹּחוּ וְלֹא־יָכְלוּ קוּם׃"],"37":["לְדָוִד ׀ אַל־תִּתְחַר בַּמְּרֵעִים אַל־תְּקַנֵּא בְּעֹשֵׂי עַוְלָה׃","כִּי כֶחָצִיר מְהֵרָה יִמָּלוּ וּכְיֶרֶק דֶּשֶׁא יִבּוֹלוּן׃","בְּטַח בַּיהוָה וַעֲשֵׂה־טוֹב שְׁכָן־אֶרֶץ וּרְעֵה אֱמוּנָה׃","וְהִתְעַנַּג עַל־יְהוָה וְיִתֶּן־לְךָ מִשְׁאֲלֹת לִבֶּךָ׃","גּוֹל עַל־יְהוָה דַּרְכֶּךָ וּבְטַח עָלָיו וְהוּא יַעֲשֶׂה׃","וְהוֹצִיא כָאוֹר צִדְקֶךָ וּמִשְׁפָּטֶךָ כַּצָּהֳרָיִם׃","דּוֹם ׀ לַיהוָה וְהִתְחוֹלֵל לוֹ אַל־תִּתְחַר בְּמַצְלִיחַ דַּרְכּוֹ בְּאִישׁ עֹשֶׂה מְזִמּוֹת׃","הֶרֶף מֵאַף וַעֲזֹב חֵמָה אַל־תִּתְחַר אַךְ־לְהָרֵעַ׃","כִּי־מְרֵעִים יִכָּרֵתוּן וְקֹוֵי יְהוָה הֵמָּה יִירְשׁוּ־אָרֶץ׃","וְעוֹד מְעַט וְאֵין רָשָׁע וְהִתְבּוֹנַנְתָּ עַל־מְקוֹמוֹ וְאֵינֶנּוּ׃","וַעֲנָוִים יִירְשׁוּ־אָרֶץ וְהִתְעַנְּגוּ עַל־רֹב שָׁלוֹם׃","זֹמֵם רָשָׁע לַצַּדִּיק וְחֹרֵק עָלָיו שִׁנָּיו׃","אֲדֹנָי יִשְׂחַק־לוֹ כִּי־רָאָה כִּי־יָבֹא יוֹמוֹ׃","חֶרֶב ׀ פָּתְחוּ רְשָׁעִים וְדָרְכוּ קַשְׁתָּם לְהַפִּיל עָנִי וְאֶבְיוֹן לִטְבוֹחַ יִשְׁרֵי־דָרֶךְ׃","חַרְבָּם תָּבוֹא בְלִבָּם וְקַשְּׁתוֹתָם תִּשָּׁבַרְנָה׃","טוֹב־מְעַט לַצַּדִּיק מֵהֲמוֹן רְשָׁעִים רַבִּים׃","כִּי זְרוֹעוֹת רְשָׁעִים תִּשָּׁבַרְנָה וְסוֹמֵךְ צַדִּיקִים יְהוָה׃","יוֹדֵעַ יְהוָה יְמֵי תְמִימִם וְנַחֲלָתָם לְעוֹלָם תִּהְיֶה׃","לֹא־יֵבֹשׁוּ בְּעֵת רָעָה וּבִימֵי רְעָבוֹן יִשְׂבָּעוּ׃","כִּי רְשָׁעִים ׀ יֹאבֵדוּ וְאֹיְבֵי יְהוָה כִּיקַר כָּרִים כָּלוּ בֶעָשָׁן כָּלוּ׃","לֹוֶה רָשָׁע וְלֹא יְשַׁלֵּם וְצַדִּיק חוֹנֵן וְנוֹתֵן׃","כִּי מְבֹרָכָיו יִירְשׁוּ אָרֶץ וּמְקֻלָּלָיו יִכָּרֵתוּ׃","מֵיְהוָה מִצְעֲדֵי־גֶבֶר כּוֹנָנוּ וְדַרְכּוֹ יֶחְפָּץ׃","כִּי־יִפֹּל לֹא־יוּטָל כִּי־יְהוָה סוֹמֵךְ יָדוֹ׃","נַעַר ׀ הָיִיתִי גַּם־זָקַנְתִּי וְלֹא־רָאִיתִי צַדִּיק נֶעֱזָב וְזַרְעוֹ מְבַקֶּשׁ־לָחֶם׃","כָּל־הַיּוֹם חוֹנֵן וּמַלְוֶה וְזַרְעוֹ לִבְרָכָה׃","סוּר מֵרָע וַעֲשֵׂה־טוֹב וּשְׁכֹן לְעוֹלָם׃","כִּי יְהוָה ׀ אֹהֵב מִשְׁפָּט וְלֹא־יַעֲזֹב אֶת־חֲסִידָיו לְעוֹלָם נִשְׁמָרוּ וְזֶרַע רְשָׁעִים נִכְרָת׃","צַדִּיקִים יִירְשׁוּ־אָרֶץ וְיִשְׁכְּנוּ לָעַד עָלֶיהָ׃","פִּי־צַדִּיק יֶהְגֶּה חָכְמָה וּלְשׁוֹנוֹ תְּדַבֵּר מִשְׁפָּט׃","תּוֹרַת אֱלֹהָיו בְּלִבּוֹ לֹא תִמְעַד אֲשֻׁרָיו׃","צוֹפֶה רָשָׁע לַצַּדִּיק וּמְבַקֵּשׁ לַהֲמִיתוֹ׃","יְהוָה לֹא־יַעַזְבֶנּוּ בְיָדוֹ וְלֹא יַרְשִׁיעֶנּוּ בְּהִשָּׁפְטוֹ׃","קַוֵּה אֶל־יְהוָה ׀ וּשְׁמֹר דַּרְכּוֹ וִירוֹמִמְךָ לָרֶשֶׁת אָרֶץ בְּהִכָּרֵת רְשָׁעִים תִּרְאֶה׃","רָאִיתִי רָשָׁע עָרִיץ וּמִתְעָרֶה כְּאֶזְרָח רַעֲנָן׃","וַיַּעֲבֹר וְהִנֵּה אֵינֶנּוּ וָאֲבַקְשֵׁהוּ וְלֹא נִמְצָא׃","שְׁמָר־תָּם וּרְאֵה יָשָׁר כִּי־אַחֲרִית לְאִישׁ שָׁלוֹם׃","וּפֹשְׁעִים נִשְׁמְדוּ יַחְדָּו אַחֲרִית רְשָׁעִים נִכְרָתָה׃","וּתְשׁוּעַת צַדִּיקִים מֵיְהוָה מָעוּזָּם בְּעֵת צָרָה׃","וַיַּעְזְרֵם יְהוָה וַיְפַלְּטֵם יְפַלְּטֵם מֵרְשָׁעִים וְיוֹשִׁיעֵם כִּי־חָסוּ בוֹ׃"],"38":["מִזְמוֹר לְדָוִד לְהַזְכִּיר׃","יְהוָה אַל־בְּקֶצְפְּךָ תוֹכִיחֵנִי וּבַחֲמָתְךָ תְיַסְּרֵנִי׃","כִּי־חִצֶּיךָ נִחֲתוּ בִי וַתִּנְחַת עָלַי יָדֶךָ׃","אֵין־מְתֹם בִּבְשָׂרִי מִפְּנֵי זַעְמֶךָ אֵין־שָׁלוֹם בַּעֲצָמַי מִפְּנֵי חַטָּאתִי׃","כִּי עֲוֺנֹתַי עָבְרוּ רֹאשִׁי כְּמַשָּׂא כָבֵד יִכְבְּדוּ מִמֶּנִּי׃","הִבְאִישׁוּ נָמַקּוּ חַבּוּרֹתָי מִפְּנֵי אִוַּלְתִּי׃","נַעֲוֵיתִי שַׁחֹתִי עַד־מְאֹד כָּל־הַיּוֹם קֹדֵר הִלָּכְתִּי׃","כִּי־כְסָלַי מָלְאוּ נִקְלֶה וְאֵין מְתֹם בִּבְשָׂרִי׃","נְפוּגוֹתִי וְנִדְכֵּיתִי עַד־מְאֹד שָׁאַגְתִּי מִנַּהֲמַת לִבִּי׃","אֲדֹנָי נֶגְדְּךָ כָל־תַּאֲוָתִי וְאַנְחָתִי מִמְּךָ לֹא־נִסְתָּרָה׃","לִבִּי סְחַרְחַר עֲזָבַנִי כֹחִי וְאוֹר־עֵינַי גַּם־הֵם אֵין אִתִּי׃","אֹהֲבַי ׀ וְרֵעַי מִנֶּגֶד נִגְעִי יַעֲמֹדוּ וּקְרוֹבַי מֵרָחֹק עָמָדוּ׃","וַיְנַקְשׁוּ ׀ מְבַקְשֵׁי נַפְשִׁי וְדֹרְשֵׁי רָעָתִי דִּבְּרוּ הַוּוֹת וּמִרְמוֹת כָּל־הַיּוֹם יֶהְגּוּ׃","וַאֲנִי כְחֵרֵשׁ לֹא אֶשְׁמָע וּכְאִלֵּם לֹא יִפְתַּח־פִּיו׃","וָאֱהִי כְּאִישׁ אֲשֶׁר לֹא־שֹׁמֵעַ וְאֵין בְּפִיו תּוֹכָחוֹת׃","כִּי־לְךָ יְהוָה הוֹחָלְתִּי אַתָּה תַעֲנֶה אֲדֹנָי אֱלֹהָי׃","כִּי־אָמַרְתִּי פֶּן־יִשְׂמְחוּ־לִי בְּמוֹט רַגְלִי עָלַי הִגְדִּילוּ׃","כִּי־אֲנִי לְצֶלַע נָכוֹן וּמַכְאוֹבִי נֶגְדִּי תָמִיד׃","כִּי־עֲוֺנִי אַגִּיד אֶדְאַג מֵחַטָּאתִי׃","וְאֹיְבַי חַיִּים עָצֵמוּ וְרַבּוּ שֹׂנְאַי שָׁקֶר׃","וּמְשַׁלְּמֵי רָעָה תַּחַת טוֹבָה יִשְׂטְנוּנִי תַּחַת רדופי־טוֹב׃","אַל־תַּעַזְבֵנִי יְהוָה אֱלֹהַי אַל־תִּרְחַק מִמֶּנִּי׃","חוּשָׁה לְעֶזְרָתִי אֲדֹנָי תְּשׁוּעָתִי׃"],"39":["לַמְנַצֵּחַ לידיתון מִזְמוֹר לְדָוִד׃","אָמַרְתִּי אֶשְׁמְרָה דְרָכַי מֵחֲטוֹא בִלְשׁוֹנִי אֶשְׁמְרָה לְפִי מַחְסוֹם בְּעֹד רָשָׁע לְנֶגְדִּי׃","נֶאֱלַמְתִּי דוּמִיָּה הֶחֱשֵׁיתִי מִטּוֹב וּכְאֵבִי נֶעְכָּר׃","חַם־לִבִּי ׀ בְּקִרְבִּי בַּהֲגִיגִי תִבְעַר־אֵשׁ דִּבַּרְתִּי בִּלְשׁוֹנִי׃","הוֹדִיעֵנִי יְהוָה ׀ קִצִּי וּמִדַּת יָמַי מַה־הִיא אֵדְעָה מֶה־חָדֵל אָנִי׃","הִנֵּה טְפָחוֹת ׀ נָתַתָּה יָמַי וְחֶלְדִּי כְאַיִן נֶגְדֶּךָ אַךְ כָּל־הֶבֶל כָּל־אָדָם נִצָּב סֶלָה׃","אַךְ־בְּצֶלֶם ׀ יִתְהַלֶּךְ־אִישׁ אַךְ־הֶבֶל יֶהֱמָיוּן יִצְבֹּר וְלֹא־יֵדַע מִי־אֹסְפָם׃","וְעַתָּה מַה־קִּוִּיתִי אֲדֹנָי תּוֹחַלְתִּי לְךָ הִיא׃","מִכָּל־פְּשָׁעַי הַצִּילֵנִי חֶרְפַּת נָבָל אַל־תְּשִׂימֵנִי׃","נֶאֱלַמְתִּי לֹא אֶפְתַּח־פִּי כִּי אַתָּה עָשִׂיתָ׃","הָסֵר מֵעָלַי נִגְעֶךָ מִתִּגְרַת יָדְךָ אֲנִי כָלִיתִי׃","בְּתוֹכָחוֹת עַל־עָוֺן ׀ יִסַּרְתָּ אִישׁ וַתֶּמֶס כָּעָשׁ חֲמוּדוֹ אַךְ הֶבֶל כָּל־אָדָם סֶלָה׃","שִׁמְעָה־תְפִלָּתִי ׀ יְהוָה וְשַׁוְעָתִי ׀ הַאֲזִינָה אֶל־דִּמְעָתִי אַל־תֶּחֱרַשׁ כִּי גֵר אָנֹכִי עִמָּךְ תּוֹשָׁב כְּכָל־אֲבוֹתָי׃","הָשַׁע מִמֶּנִּי וְאַבְלִיגָה בְּטֶרֶם אֵלֵךְ וְאֵינֶנִּי׃"],"40":["לַמְנַצֵּחַ לְדָוִד מִזְמוֹר׃","קַוֺּה קִוִּיתִי יְהוָה וַיֵּט אֵלַי וַיִּשְׁמַע שַׁוְעָתִי׃","וַיַּעֲלֵנִי ׀ מִבּוֹר שָׁאוֹן מִטִּיט הַיָּוֵן וַיָּקֶם עַל־סֶלַע רַגְלַי כּוֹנֵן אֲשֻׁרָי׃","וַיִּתֵּן בְּפִי ׀ שִׁיר חָדָשׁ תְּהִלָּה לֵאלֹהֵינוּ יִרְאוּ רַבִּים וְיִירָאוּ וְיִבְטְחוּ בַּיהוָה׃","אַשְׁרֵי הַגֶּבֶר אֲשֶׁר־שָׂם יְהֹוָה מִבְטַחוֹ וְלֹא־פָנָה אֶל־רְהָבִים וְשָׂטֵי כָזָב׃","רַבּוֹת עָשִׂיתָ ׀ אַתָּה ׀ יְהוָה אֱלֹהַי נִפְלְאֹתֶיךָ וּמַחְשְׁבֹתֶיךָ אֵלֵינוּ אֵין ׀ עֲרֹךְ אֵלֶיךָ אַגִּידָה וַאֲדַבֵּרָה עָצְמוּ מִסַּפֵּר׃","זֶבַח וּמִנְחָה ׀ לֹא־חָפַצְתָּ אָזְנַיִם כָּרִיתָ לִּי עוֹלָה וַחֲטָאָה לֹא שָׁאָלְתָּ׃","אָז אָמַרְתִּי הִנֵּה־בָאתִי בִּמְגִלַּת־סֵפֶר כָּתוּב עָלָי׃","לַעֲשׂוֹת־רְצוֹנְךָ אֱלֹהַי חָפָצְתִּי וְתוֹרָתְךָ בְּתוֹךְ מֵעָי׃","בִּשַּׂרְתִּי צֶדֶק ׀ בְּקָהָל רָב הִנֵּה שְׂפָתַי לֹא אֶכְלָא יְהוָה אַתָּה יָדָעְתָּ׃","צִדְקָתְךָ לֹא־כִסִּיתִי ׀ בְּתוֹךְ לִבִּי אֱמוּנָתְךָ וּתְשׁוּעָתְךָ אָמָרְתִּי לֹא־כִחַדְתִּי חַסְדְּךָ וַאֲמִתְּךָ לְקָהָל רָב׃","אַתָּה יְהוָה לֹא־תִכְלָא רַחֲמֶיךָ מִמֶּנִּי חַסְדְּךָ וַאֲמִתְּךָ תָּמִיד יִצְּרוּנִי׃","כִּי אָפְפוּ־עָלַי ׀ רָעוֹת עַד־אֵין מִסְפָּר הִשִּׂיגוּנִי עֲוֺנֹתַי וְלֹא־יָכֹלְתִּי לִרְאוֹת עָצְמוּ מִשַּׂעֲרוֹת רֹאשִׁי וְלִבִּי עֲזָבָנִי׃","רְצֵה יְהוָה לְהַצִּילֵנִי יְהוָה לְעֶזְרָתִי חוּשָׁה׃","יֵבֹשׁוּ וְיַחְפְּרוּ ׀ יַחַד מְבַקְשֵׁי נַפְשִׁי לִסְפּוֹתָהּ יִסֹּגוּ אָחוֹר וְיִכָּלְמוּ חֲפֵצֵי רָעָתִי׃","יָשֹׁמּוּ עַל־עֵקֶב בָּשְׁתָּם הָאֹמְרִים לִי הֶאָח ׀ הֶאָח׃","יָשִׂישׂוּ וְיִשְׂמְחוּ ׀ בְּךָ כָּל־מְבַקְשֶׁיךָ יֹאמְרוּ תָמִיד יִגְדַּל יְהוָה אֹהֲבֵי תְּשׁוּעָתֶךָ׃","וַאֲנִי ׀ עָנִי וְאֶבְיוֹן אֲדֹנָי יַחֲשָׁב לִי עֶזְרָתִי וּמְפַלְטִי אַתָּה אֱלֹהַי אַל־תְּאַחַר׃"],"41":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","אַשְׁרֵי מַשְׂכִּיל אֶל־דָּל בְּיוֹם רָעָה יְמַלְּטֵהוּ יְהוָה׃","יְהוָה ׀ יִשְׁמְרֵהוּ וִיחַיֵּהוּ יאשר בָּאָרֶץ וְאַל־תִּתְּנֵהוּ בְּנֶפֶשׁ אֹיְבָיו׃","יְהוָה יִסְעָדֶנּוּ עַל־עֶרֶשׂ דְּוָי כָּל־מִשְׁכָּבוֹ הָפַכְתָּ בְחָלְיוֹ׃","אֲנִי־אָמַרְתִּי יְהוָה חָנֵּנִי רְפָאָה נַפְשִׁי כִּי־חָטָאתִי לָךְ׃","אוֹיְבַי יֹאמְרוּ רַע לִי מָתַי יָמוּת וְאָבַד שְׁמוֹ׃","וְאִם־בָּא לִרְאוֹת ׀ שָׁוְא יְדַבֵּר לִבּוֹ יִקְבָּץ־אָוֶן לוֹ יֵצֵא לַחוּץ יְדַבֵּר׃","יַחַד עָלַי יִתְלַחֲשׁוּ כָּל־שֹׂנְאָי עָלַי ׀ יַחְשְׁבוּ רָעָה לִי׃","דְּבַר־בְּלִיַּעַל יָצוּק בּוֹ וַאֲשֶׁר שָׁכַב לֹא־יוֹסִיף לָקוּם׃","גַּם־אִישׁ שְׁלוֹמִי ׀ אֲשֶׁר־בָּטַחְתִּי בוֹ אוֹכֵל לַחְמִי הִגְדִּיל עָלַי עָקֵב׃","וְאַתָּה יְהוָה חָנֵּנִי וַהֲקִימֵנִי וַאֲשַׁלְּמָה לָהֶם׃","בְּזֹאת יָדַעְתִּי כִּי־חָפַצְתָּ בִּי כִּי לֹא־יָרִיעַ אֹיְבִי עָלָי׃","וַאֲנִי בְּתֻמִּי תָּמַכְתָּ בִּי וַתַּצִּיבֵנִי לְפָנֶיךָ לְעוֹלָם׃","בָּרוּךְ יְהוָה ׀ אֱלֹהֵי יִשְׂרָאֵל מֵהָעוֹלָם וְעַד הָעוֹלָם אָמֵן ׀ וְאָמֵן׃"],"42":["לַמְנַצֵּחַ מַשְׂכִּיל לִבְנֵי־קֹרַח׃","כְּאַיָּל תַּעֲרֹג עַל־אֲפִיקֵי־מָיִם כֵּן נַפְשִׁי תַעֲרֹג אֵלֶיךָ אֱלֹהִים׃","צָמְאָה נַפְשִׁי ׀ לֵאלֹהִים לְאֵל חָי מָתַי אָבוֹא וְאֵרָאֶה פְּנֵי אֱלֹהִים׃","הָיְתָה־לִּי דִמְעָתִי לֶחֶם יוֹמָם וָלָיְלָה בֶּאֱמֹר אֵלַי כָּל־הַיּוֹם אַיֵּה אֱלֹהֶיךָ׃","אֵלֶּה אֶזְכְּרָה ׀ וְאֶשְׁפְּכָה עָלַי ׀ נַפְשִׁי כִּי אֶעֱבֹר ׀ בַּסָּךְ אֶדַּדֵּם עַד־בֵּית אֱלֹהִים בְּקוֹל־רִנָּה וְתוֹדָה הָמוֹן חוֹגֵג׃","מַה־תִּשְׁתּוֹחֲחִי ׀ נַפְשִׁי וַתֶּהֱמִי עָלָי הוֹחִילִי לֵאלֹהִים כִּי־עוֹד אוֹדֶנּוּ יְשׁוּעוֹת פָּנָיו׃","אֱלֹהַי עָלַי נַפְשִׁי תִשְׁתּוֹחָח עַל־כֵּן אֶזְכָּרְךָ מֵאֶרֶץ יַרְדֵּן וְחֶרְמוֹנִים מֵהַר מִצְעָר׃","תְּהוֹם־אֶל־תְּהוֹם קוֹרֵא לְקוֹל צִנּוֹרֶיךָ כָּל־מִשְׁבָּרֶיךָ וְגַלֶּיךָ עָלַי עָבָרוּ׃","יוֹמָם ׀ יְצַוֶּה יְהוָה ׀ חַסְדּוֹ וּבַלַּיְלָה שירה עִמִּי תְּפִלָּה לְאֵל חַיָּי׃","אוֹמְרָה ׀ לְאֵל סַלְעִי לָמָה שְׁכַחְתָּנִי לָמָּה־קֹדֵר אֵלֵךְ בְּלַחַץ אוֹיֵב׃","בְּרֶצַח ׀ בְּעַצְמוֹתַי חֵרְפוּנִי צוֹרְרָי בְּאָמְרָם אֵלַי כָּל־הַיּוֹם אַיֵּה אֱלֹהֶיךָ׃","מַה־תִּשְׁתּוֹחֲחִי ׀ נַפְשִׁי וּמַה־תֶּהֱמִי עָלָי הוֹחִילִי לֵאלֹהִים כִּי־עוֹד אוֹדֶנּוּ יְשׁוּעֹת פָּנַי וֵאלֹהָי׃"],"43":["שָׁפְטֵנִי אֱלֹהִים ׀ וְרִיבָה רִיבִי מִגּוֹי לֹא־חָסִיד מֵאִישׁ־מִרְמָה וְעַוְלָה תְפַלְּטֵנִי׃","כִּי־אַתָּה ׀ אֱלֹהֵי מָעוּזִּי לָמָה זְנַחְתָּנִי לָמָּה־קֹדֵר אֶתְהַלֵּךְ בְּלַחַץ אוֹיֵב׃","שְׁלַח־אוֹרְךָ וַאֲמִתְּךָ הֵמָּה יַנְחוּנִי יְבִיאוּנִי אֶל־הַר־קָדְשְׁךָ וְאֶל־מִשְׁכְּנוֹתֶיךָ׃","וְאָבוֹאָה ׀ אֶל־מִזְבַּח אֱלֹהִים אֶל־אֵל שִׂמְחַת גִּילִי וְאוֹדְךָ בְכִנּוֹר אֱלֹהִים אֱלֹהָי׃","מַה־תִּשְׁתּוֹחֲחִי ׀ נַפְשִׁי וּמַה־תֶּהֱמִי עָלָי הוֹחִילִי לֵאלֹהִים כִּי־עוֹד אוֹדֶנּוּ יְשׁוּעֹת פָּנַי וֵאלֹהָי׃"],"44":["לַמְנַצֵּחַ לִבְנֵי־קֹרַח מַשְׂכִּיל׃","אֱלֹהִים ׀ בְּאָזְנֵינוּ שָׁמַעְנוּ אֲבוֹתֵינוּ סִפְּרוּ־לָנוּ פֹּעַל פָּעַלְתָּ בִימֵיהֶם בִּימֵי קֶדֶם׃","אַתָּה ׀ יָדְךָ גּוֹיִם הוֹרַשְׁתָּ וַתִּטָּעֵם תָּרַע לְאֻמִּים וַתְּשַׁלְּחֵם׃","כִּי לֹא בְחַרְבָּם יָרְשׁוּ אָרֶץ וּזְרוֹעָם לֹא־הוֹשִׁיעָה לָּמוֹ כִּי־יְמִינְךָ וּזְרוֹעֲךָ וְאוֹר פָּנֶיךָ כִּי רְצִיתָם׃","אַתָּה־הוּא מַלְכִּי אֱלֹהִים צַוֵּה יְשׁוּעוֹת יַעֲקֹב׃","בְּךָ צָרֵינוּ נְנַגֵּחַ בְּשִׁמְךָ נָבוּס קָמֵינוּ׃","כִּי לֹא בְקַשְׁתִּי אֶבְטָח וְחַרְבִּי לֹא תוֹשִׁיעֵנִי׃","כִּי הוֹשַׁעְתָּנוּ מִצָּרֵינוּ וּמְשַׂנְאֵינוּ הֱבִישׁוֹתָ׃","בֵּאלֹהִים הִלַּלְנוּ כָל־הַיּוֹם וְשִׁמְךָ ׀ לְעוֹלָם נוֹדֶה סֶלָה׃","אַף־זָנַחְתָּ וַתַּכְלִימֵנוּ וְלֹא־תֵצֵא בְּצִבְאוֹתֵינוּ׃","תְּשִׁיבֵנוּ אָחוֹר מִנִּי־צָר וּמְשַׂנְאֵינוּ שָׁסוּ לָמוֹ׃","תִּתְּנֵנוּ כְּצֹאן מַאֲכָל וּבַגּוֹיִם זֵרִיתָנוּ׃","תִּמְכֹּר־עַמְּךָ בְלֹא־הוֹן וְלֹא־רִבִּיתָ בִּמְחִירֵיהֶם׃","תְּשִׂימֵנוּ חֶרְפָּה לִשְׁכֵנֵינוּ לַעַג וָקֶלֶס לִסְבִיבוֹתֵינוּ׃","תְּשִׂימֵנוּ מָשָׁל בַּגּוֹיִם מְנוֹד־רֹאשׁ בַּל־אֻמִּים׃","כָּל־הַיּוֹם כְּלִמָּתִי נֶגְדִּי וּבֹשֶׁת פָּנַי כִּסָּתְנִי׃","מִקּוֹל מְחָרֵף וּמְגַדֵּף מִפְּנֵי אוֹיֵב וּמִתְנַקֵּם׃","כָּל־זֹאת בָּאַתְנוּ וְלֹא שְׁכַחֲנוּךָ וְלֹא־שִׁקַּרְנוּ בִּבְרִיתֶךָ׃","לֹא־נָסוֹג אָחוֹר לִבֵּנוּ וַתֵּט אֲשֻׁרֵינוּ מִנִּי אָרְחֶךָ׃","כִּי דִכִּיתָנוּ בִּמְקוֹם תַּנִּים וַתְּכַס עָלֵינוּ בְצַלְמָוֶת׃","אִם־שָׁכַחְנוּ שֵׁם אֱלֹהֵינוּ וַנִּפְרֹשׂ כַּפֵּינוּ לְאֵל זָר׃","הֲלֹא אֱלֹהִים יַחֲקָר־זֹאת כִּי־הוּא יֹדֵעַ תַּעֲלֻמוֹת לֵב׃","כִּי־עָלֶיךָ הֹרַגְנוּ כָל־הַיּוֹם נֶחְשַׁבְנוּ כְּצֹאן טִבְחָה׃","עוּרָה ׀ לָמָּה תִישַׁן ׀ אֲדֹנָי הָקִיצָה אַל־תִּזְנַח לָנֶצַח׃","לָמָּה־פָנֶיךָ תַסְתִּיר תִּשְׁכַּח עָנְיֵנוּ וְלַחֲצֵנוּ׃","כִּי שָׁחָה לֶעָפָר נַפְשֵׁנוּ דָּבְקָה לָאָרֶץ בִּטְנֵנוּ׃","קוּמָה עֶזְרָתָה לָּנוּ וּפְדֵנוּ לְמַעַן חַסְדֶּךָ׃"],"45":["לַמְנַצֵּחַ עַל־שֹׁשַׁנִּים לִבְנֵי־קֹרַח מַשְׂכִּיל שִׁיר יְדִידֹת׃","רָחַשׁ לִבִּי ׀ דָּבָר טוֹב אֹמֵר אָנִי מַעֲשַׂי לְמֶלֶךְ לְשׁוֹנִי עֵט ׀ סוֹפֵר מָהִיר׃","יָפְיָפִיתָ מִבְּנֵי אָדָם הוּצַק חֵן בְּשְׂפְתוֹתֶיךָ עַל־כֵּן בֵּרַכְךָ אֱלֹהִים לְעוֹלָם׃","חֲגוֹר־חַרְבְּךָ עַל־יָרֵךְ גִּבּוֹר הוֹדְךָ וַהֲדָרֶךָ׃","וַהֲדָרְךָ ׀ צְלַח רְכַב עַל־דְּבַר־אֱמֶת וְעַנְוָה־צֶדֶק וְתוֹרְךָ נוֹרָאוֹת יְמִינֶךָ׃","חִצֶּיךָ שְׁנוּנִים עַמִּים תַּחְתֶּיךָ יִפְּלוּ בְּלֵב אוֹיְבֵי הַמֶּלֶךְ׃","כִּסְאֲךָ אֱלֹהִים עוֹלָם וָעֶד שֵׁבֶט מִישֹׁר שֵׁבֶט מַלְכוּתֶךָ׃","אָהַבְתָּ צֶּדֶק וַתִּשְׂנָא רֶשַׁע עַל־כֵּן ׀ מְשָׁחֲךָ אֱלֹהִים אֱלֹהֶיךָ שֶׁמֶן שָׂשׂוֹן מֵחֲבֵרֶיךָ׃","מֹר־וַאֲהָלוֹת קְצִיעוֹת כָּל־בִּגְדֹתֶיךָ מִן־הֵיכְלֵי שֵׁן מִנִּי שִׂמְּחוּךָ׃","בְּנוֹת מְלָכִים בְּיִקְּרוֹתֶיךָ נִצְּבָה שֵׁגַל לִימִינְךָ בְּכֶתֶם אוֹפִיר׃","שִׁמְעִי־בַת וּרְאִי וְהַטִּי אָזְנֵךְ וְשִׁכְחִי עַמֵּךְ וּבֵית אָבִיךְ׃","וְיִתְאָו הַמֶּלֶךְ יָפְיֵךְ כִּי־הוּא אֲדֹנַיִךְ וְהִשְׁתַּחֲוִי־לוֹ׃","וּבַת־צֹר ׀ בְּמִנְחָה פָּנַיִךְ יְחַלּוּ עֲשִׁירֵי עָם׃","כָּל־כְּבוּדָּה בַת־מֶלֶךְ פְּנִימָה מִמִּשְׁבְּצוֹת זָהָב לְבוּשָׁהּ׃","לִרְקָמוֹת תּוּבַל לַמֶּלֶךְ בְּתוּלוֹת אַחֲרֶיהָ רֵעוֹתֶיהָ מוּבָאוֹת לָךְ׃","תּוּבַלְנָה בִּשְׂמָחֹת וָגִיל תְּבֹאֶינָה בְּהֵיכַל מֶלֶךְ׃","תַּחַת אֲבֹתֶיךָ יִהְיוּ בָנֶיךָ תְּשִׁיתֵמוֹ לְשָׂרִים בְּכָל־הָאָרֶץ׃","אַזְכִּירָה שִׁמְךָ בְּכָל־דֹּר וָדֹר עַל־כֵּן עַמִּים יְהוֹדֻךָ לְעֹלָם וָעֶד׃"],"46":["לַמְנַצֵּחַ לִבְנֵי־קֹרַח עַל־עֲלָמוֹת שִׁיר׃","אֱלֹהִים לָנוּ מַחֲסֶה וָעֹז עֶזְרָה בְצָרוֹת נִמְצָא מְאֹד׃","עַל־כֵּן לֹא־נִירָא בְּהָמִיר אָרֶץ וּבְמוֹט הָרִים בְּלֵב יַמִּים׃","יֶהֱמוּ יֶחְמְרוּ מֵימָיו יִרְעֲשׁוּ־הָרִים בְּגַאֲוָתוֹ סֶלָה׃","נָהָר פְּלָגָיו יְשַׂמְּחוּ עִיר־אֱלֹהִים קְדֹשׁ מִשְׁכְּנֵי עֶלְיוֹן׃","אֱלֹהִים בְּקִרְבָּהּ בַּל־תִּמּוֹט יַעְזְרֶהָ אֱלֹהִים לִפְנוֹת בֹּקֶר׃","הָמוּ גוֹיִם מָטוּ מַמְלָכוֹת נָתַן בְּקוֹלוֹ תָּמוּג אָרֶץ׃","יְהוָה צְבָאוֹת עִמָּנוּ מִשְׂגָּב־לָנוּ אֱלֹהֵי יַעֲקֹב סֶלָה׃","לְכוּ־חֲזוּ מִפְעֲלוֹת יְהוָה אֲשֶׁר־שָׂם שַׁמּוֹת בָּאָרֶץ׃","מַשְׁבִּית מִלְחָמוֹת עַד־קְצֵה הָאָרֶץ קֶשֶׁת יְשַׁבֵּר וְקִצֵּץ חֲנִית עֲגָלוֹת יִשְׂרֹף בָּאֵשׁ׃","הַרְפּוּ וּדְעוּ כִּי־אָנֹכִי אֱלֹהִים אָרוּם בַּגּוֹיִם אָרוּם בָּאָרֶץ׃","יְהוָה צְבָאוֹת עִמָּנוּ מִשְׂגָּב־לָנוּ אֱלֹהֵי יַעֲקֹב סֶלָה׃"],"47":["לַמְנַצֵּחַ ׀ לִבְנֵי־קֹרַח מִזְמוֹר׃","כָּל־הָעַמִּים תִּקְעוּ־כָף הָרִיעוּ לֵאלֹהִים בְּקוֹל רִנָּה׃","כִּי־יְהוָה עֶלְיוֹן נוֹרָא מֶלֶךְ גָּדוֹל עַל־כָּל־הָאָרֶץ׃","יַדְבֵּר עַמִּים תַּחְתֵּינוּ וּלְאֻמִּים תַּחַת רַגְלֵינוּ׃","יִבְחַר־לָנוּ אֶת־נַחֲלָתֵנוּ אֶת גְּאוֹן יַעֲקֹב אֲשֶׁר־אָהֵב סֶלָה׃","עָלָה אֱלֹהִים בִּתְרוּעָה יְהֹוָה בְּקוֹל שׁוֹפָר׃","זַמְּרוּ אֱלֹהִים זַמֵּרוּ זַמְּרוּ לְמַלְכֵּנוּ זַמֵּרוּ׃","כִּי מֶלֶךְ כָּל־הָאָרֶץ אֱלֹהִים זַמְּרוּ מַשְׂכִּיל׃","מָלַךְ אֱלֹהִים עַל־גּוֹיִם אֱלֹהִים יָשַׁב ׀ עַל־כִּסֵּא קָדְשׁוֹ׃","נְדִיבֵי עַמִּים ׀ נֶאֱסָפוּ עַם אֱלֹהֵי אַבְרָהָם כִּי לֵאלֹהִים מָגִנֵּי־אֶרֶץ מְאֹד נַעֲלָה׃"],"48":["שִׁיר מִזְמוֹר לִבְנֵי־קֹרַח׃","גָּדוֹל יְהוָה וּמְהֻלָּל מְאֹד בְּעִיר אֱלֹהֵינוּ הַר־קָדְשׁוֹ׃","יְפֵה נוֹף מְשׂוֹשׂ כָּל־הָאָרֶץ הַר־צִיּוֹן יַרְכְּתֵי צָפוֹן קִרְיַת מֶלֶךְ רָב׃","אֱלֹהִים בְּאַרְמְנוֹתֶיהָ נוֹדַע לְמִשְׂגָּב׃","כִּי־הִנֵּה הַמְּלָכִים נוֹעֲדוּ עָבְרוּ יַחְדָּו׃","הֵמָּה רָאוּ כֵּן תָּמָהוּ נִבְהֲלוּ נֶחְפָּזוּ׃","רְעָדָה אֲחָזָתַם שָׁם חִיל כַּיּוֹלֵדָה׃","בְּרוּחַ קָדִים תְּשַׁבֵּר אֳנִיּוֹת תַּרְשִׁישׁ׃","כַּאֲשֶׁר שָׁמַעְנוּ ׀ כֵּן רָאִינוּ בְּעִיר־יְהוָה צְבָאוֹת בְּעִיר אֱלֹהֵינוּ אֱלֹהִים יְכוֹנְנֶהָ עַד־עוֹלָם סֶלָה׃","דִּמִּינוּ אֱלֹהִים חַסְדֶּךָ בְּקֶרֶב הֵיכָלֶךָ׃","כְּשִׁמְךָ אֱלֹהִים כֵּן תְּהִלָּתְךָ עַל־קַצְוֵי־אֶרֶץ צֶדֶק מָלְאָה יְמִינֶךָ׃","יִשְׂמַח ׀ הַר־צִיּוֹן תָּגֵלְנָה בְּנוֹת יְהוּדָה לְמַעַן מִשְׁפָּטֶיךָ׃","סֹבּוּ צִיּוֹן וְהַקִּיפוּהָ סִפְרוּ מִגְדָּלֶיהָ׃","שִׁיתוּ לִבְּכֶם ׀ לְחֵילָה פַּסְּגוּ אַרְמְנוֹתֶיהָ לְמַעַן תְּסַפְּרוּ לְדוֹר אַחֲרוֹן׃","כִּי זֶה ׀ אֱלֹהִים אֱלֹהֵינוּ עוֹלָם וָעֶד הוּא יְנַהֲגֵנוּ עַל־מוּת׃"],"49":["לַמְנַצֵּחַ ׀ לִבְנֵי־קֹרַח מִזְמוֹר׃","שִׁמְעוּ־זֹאת כָּל־הָעַמִּים הַאֲזִינוּ כָּל־יֹשְׁבֵי חָלֶד׃","גַּם־בְּנֵי אָדָם גַּם־בְּנֵי־אִישׁ יַחַד עָשִׁיר וְאֶבְיוֹן׃","פִּי יְדַבֵּר חָכְמוֹת וְהָגוּת לִבִּי תְבוּנוֹת׃","אַטֶּה לְמָשָׁל אָזְנִי אֶפְתַּח בְּכִנּוֹר חִידָתִי׃","לָמָּה אִירָא בִּימֵי רָע עֲוֺן עֲקֵבַי יְסוּבֵּנִי׃","הַבֹּטְחִים עַל־חֵילָם וּבְרֹב עָשְׁרָם יִתְהַלָּלוּ׃","אָח לֹא־פָדֹה יִפְדֶּה אִישׁ לֹא־יִתֵּן לֵאלֹהִים כָּפְרוֹ׃","וְיֵקַר פִּדְיוֹן נַפְשָׁם וְחָדַל לְעוֹלָם׃","וִיחִי־עוֹד לָנֶצַח לֹא יִרְאֶה הַשָּׁחַת׃","כִּי יִרְאֶה ׀ חֲכָמִים יָמוּתוּ יַחַד כְּסִיל וָבַעַר יֹאבֵדוּ וְעָזְבוּ לַאֲחֵרִים חֵילָם׃","קִרְבָּם בָּתֵּימוֹ ׀ לְעוֹלָם מִשְׁכְּנֹתָם לְדֹר וָדֹר קָרְאוּ בִשְׁמוֹתָם עֲלֵי אֲדָמוֹת׃","וְאָדָם בִּיקָר בַּל־יָלִין נִמְשַׁל כַּבְּהֵמוֹת נִדְמוּ׃","זֶה דַרְכָּם כֵּסֶל לָמוֹ וְאַחֲרֵיהֶם ׀ בְּפִיהֶם יִרְצוּ סֶלָה׃","כַּצֹּאן ׀ לִשְׁאוֹל שַׁתּוּ מָוֶת יִרְעֵם וַיִּרְדּוּ בָם יְשָׁרִים ׀ לַבֹּקֶר וצירם לְבַלּוֹת שְׁאוֹל מִזְּבֻל לוֹ׃","אַךְ־אֱלֹהִים יִפְדֶּה נַפְשִׁי מִיַּד־שְׁאוֹל כִּי יִקָּחֵנִי סֶלָה׃","אַל־תִּירָא כִּי־יַעֲשִׁר אִישׁ כִּי־יִרְבֶּה כְּבוֹד בֵּיתוֹ׃","כִּי לֹא בְמוֹתוֹ יִקַּח הַכֹּל לֹא־יֵרֵד אַחֲרָיו כְּבוֹדוֹ׃","כִּי־נַפְשׁוֹ בְּחַיָּיו יְבָרֵךְ וְיוֹדֻךָ כִּי־תֵיטִיב לָךְ׃","תָּבוֹא עַד־דּוֹר אֲבוֹתָיו עַד־נֵצַח לֹא יִרְאוּ־אוֹר׃","אָדָם בִּיקָר וְלֹא יָבִין נִמְשַׁל כַּבְּהֵמוֹת נִדְמוּ׃"],"50":["מִזְמוֹר לְאָסָף אֵל ׀ אֱלֹהִים יְהוָה דִּבֶּר וַיִּקְרָא־אָרֶץ מִמִּזְרַח־שֶׁמֶשׁ עַד־מְבֹאוֹ׃","מִצִּיּוֹן מִכְלַל־יֹפִי אֱלֹהִים הוֹפִיעַ׃","יָבֹא אֱלֹהֵינוּ וְאַל־יֶחֱרַשׁ אֵשׁ־לְפָנָיו תֹּאכֵל וּסְבִיבָיו נִשְׂעֲרָה מְאֹד׃","יִקְרָא אֶל־הַשָּׁמַיִם מֵעָל וְאֶל־הָאָרֶץ לָדִין עַמּוֹ׃","אִסְפוּ־לִי חֲסִידָי כֹּרְתֵי בְרִיתִי עֲלֵי־זָבַח׃","וַיַּגִּידוּ שָׁמַיִם צִדְקוֹ כִּי־אֱלֹהִים ׀ שֹׁפֵט הוּא סֶלָה׃","שִׁמְעָה עַמִּי ׀ וַאֲדַבֵּרָה יִשְׂרָאֵל וְאָעִידָה בָּךְ אֱלֹהִים אֱלֹהֶיךָ אָנֹכִי׃","לֹא עַל־זְבָחֶיךָ אוֹכִיחֶךָ וְעוֹלֹתֶיךָ לְנֶגְדִּי תָמִיד׃","לֹא־אֶקַּח מִבֵּיתְךָ פָר מִמִּכְלְאֹתֶיךָ עַתּוּדִים׃","כִּי־לִי כָל־חַיְתוֹ־יָעַר בְּהֵמוֹת בְּהַרְרֵי־אָלֶף׃","יָדַעְתִּי כָּל־עוֹף הָרִים וְזִיז שָׂדַי עִמָּדִי׃","אִם־אֶרְעַב לֹא־אֹמַר לָךְ כִּי־לִי תֵבֵל וּמְלֹאָהּ׃","הַאוֹכַל בְּשַׂר אַבִּירִים וְדַם עַתּוּדִים אֶשְׁתֶּה׃","זְבַח לֵאלֹהִים תּוֹדָה וְשַׁלֵּם לְעֶלְיוֹן נְדָרֶיךָ׃","וּקְרָאֵנִי בְּיוֹם צָרָה אֲחַלֶּצְךָ וּתְכַבְּדֵנִי׃","וְלָרָשָׁע ׀ אָמַר אֱלֹהִים מַה־לְּךָ לְסַפֵּר חֻקָּי וַתִּשָּׂא בְרִיתִי עֲלֵי־פִיךָ׃","וְאַתָּה שָׂנֵאתָ מוּסָר וַתַּשְׁלֵךְ דְּבָרַי אַחֲרֶיךָ׃","אִם־רָאִיתָ גַנָּב וַתִּרֶץ עִמּוֹ וְעִם מְנָאֲפִים חֶלְקֶךָ׃","פִּיךָ שָׁלַחְתָּ בְרָעָה וּלְשׁוֹנְךָ תַּצְמִיד מִרְמָה׃","תֵּשֵׁב בְּאָחִיךָ תְדַבֵּר בְּבֶן־אִמְּךָ תִּתֶּן־דֹּפִי׃","אֵלֶּה עָשִׂיתָ ׀ וְהֶחֱרַשְׁתִּי דִּמִּיתָ הֱיוֹת־אֶהְיֶה כָמוֹךָ אוֹכִיחֲךָ וְאֶעֶרְכָה לְעֵינֶיךָ׃","בִּינוּ־נָא זֹאת שֹׁכְחֵי אֱלוֹהַּ פֶּ
