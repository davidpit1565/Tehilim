ת כִּבְנֵי־צֹאן׃","מִלִּפְנֵי אָדוֹן חוּלִי אָרֶץ מִלִּפְנֵי אֱלוֹהַּ יַעֲקֹב׃","הַהֹפְכִי הַצּוּר אֲגַם־מָיִם חַלָּמִישׁ לְמַעְיְנוֹ־מָיִם׃"],"115":["לֹא לָנוּ יְהוָה לֹא לָנוּ כִּי־לְשִׁמְךָ תֵּן כָּבוֹד עַל־חַסְדְּךָ עַל־אֲמִתֶּךָ׃","לָמָּה יֹאמְרוּ הַגּוֹיִם אַיֵּה־נָא אֱלֹהֵיהֶם׃","וֵאלֹהֵינוּ בַשָּׁמָיִם כֹּל אֲשֶׁר־חָפֵץ עָשָׂה׃","עֲצַבֵּיהֶם כֶּסֶף וְזָהָב מַעֲשֵׂה יְדֵי אָדָם׃","פֶּה־לָהֶם וְלֹא יְדַבֵּרוּ עֵינַיִם לָהֶם וְלֹא יִרְאוּ׃","אָזְנַיִם לָהֶם וְלֹא יִשְׁמָעוּ אַף לָהֶם וְלֹא יְרִיחוּן׃","יְדֵיהֶם ׀ וְלֹא יְמִישׁוּן רַגְלֵיהֶם וְלֹא יְהַלֵּכוּ לֹא־יֶהְגּוּ בִּגְרוֹנָם׃","כְּמוֹהֶם יִהְיוּ עֹשֵׂיהֶם כֹּל אֲשֶׁר־בֹּטֵחַ בָּהֶם׃","יִשְׂרָאֵל בְּטַח בַּיהוָה עֶזְרָם וּמָגִנָּם הוּא׃","בֵּית אַהֲרֹן בִּטְחוּ בַיהוָה עֶזְרָם וּמָגִנָּם הוּא׃","יִרְאֵי יְהוָה בִּטְחוּ בַיהוָה עֶזְרָם וּמָגִנָּם הוּא׃","יְהוָה זְכָרָנוּ יְבָרֵךְ יְבָרֵךְ אֶת־בֵּית יִשְׂרָאֵל יְבָרֵךְ אֶת־בֵּית אַהֲרֹן׃","יְבָרֵךְ יִרְאֵי יְהוָה הַקְּטַנִּים עִם־הַגְּדֹלִים׃","יֹסֵף יְהוָה עֲלֵיכֶם עֲלֵיכֶם וְעַל־בְּנֵיכֶם׃","בְּרוּכִים אַתֶּם לַיהוָה עֹשֵׂה שָׁמַיִם וָאָרֶץ׃","הַשָּׁמַיִם שָׁמַיִם לַיהוָה וְהָאָרֶץ נָתַן לִבְנֵי־אָדָם׃","לֹא הַמֵּתִים יְהַלְלוּ־יָהּ וְלֹא כָּל־יֹרְדֵי דוּמָה׃","וַאֲנַחְנוּ ׀ נְבָרֵךְ יָהּ מֵעַתָּה וְעַד־עוֹלָם הַלְלוּ־יָהּ׃"],"116":["אָהַבְתִּי כִּי־יִשְׁמַע ׀ יְהוָה אֶת־קוֹלִי תַּחֲנוּנָי׃","כִּי־הִטָּה אָזְנוֹ לִי וּבְיָמַי אֶקְרָא׃","אֲפָפוּנִי ׀ חֶבְלֵי־מָוֶת וּמְצָרֵי שְׁאוֹל מְצָאוּנִי צָרָה וְיָגוֹן אֶמְצָא׃","וּבְשֵׁם־יְהוָה אֶקְרָא אָנָּה יְהוָה מַלְּטָה נַפְשִׁי׃","חַנּוּן יְהֹוָה וְצַדִּיק וֵאלֹהֵינוּ מְרַחֵם׃","שֹׁמֵר פְּתָאיִם יְהֹוָה דַּלּוֹתִי וְלִי יְהוֹשִׁיעַ׃","שׁוּבִי נַפְשִׁי לִמְנוּחָיְכִי כִּי־יְהוָה גָּמַל עָלָיְכִי׃","כִּי חִלַּצְתָּ נַפְשִׁי מִמָּוֶת אֶת־עֵינִי מִן־דִּמְעָה אֶת־רַגְלִי מִדֶּחִי׃","אֶתְהַלֵּךְ לִפְנֵי יְהוָה בְּאַרְצוֹת הַחַיִּים׃","הֶאֱמַנְתִּי כִּי אֲדַבֵּר אֲנִי עָנִיתִי מְאֹד׃","אֲנִי אָמַרְתִּי בְחָפְזִי כָּל־הָאָדָם כֹּזֵב׃","מָה־אָשִׁיב לַיהוָה כָּל־תַּגְמוּלוֹהִי עָלָי׃","כּוֹס־יְשׁוּעוֹת אֶשָּׂא וּבְשֵׁם יְהוָה אֶקְרָא׃","נְדָרַי לַיהוָה אֲשַׁלֵּם נֶגְדָה־נָּא לְכָל־עַמּוֹ׃","יָקָר בְּעֵינֵי יְהוָה הַמָּוְתָה לַחֲסִידָיו׃","אָנָּה יְהוָה כִּי־אֲנִי עַבְדֶּךָ אֲנִי־עַבְדְּךָ בֶּן־אֲמָתֶךָ פִּתַּחְתָּ לְמוֹסֵרָי׃","לְךָ־אֶזְבַּח זֶבַח תּוֹדָה וּבְשֵׁם יְהוָה אֶקְרָא׃","נְדָרַי לַיהוָה אֲשַׁלֵּם נֶגְדָה־נָּא לְכָל־עַמּוֹ׃","בְּחַצְרוֹת ׀ בֵּית יְהוָה בְּתוֹכֵכִי יְרוּשָׁלִָם הַלְלוּ־יָהּ׃"],"117":["הַלְלוּ אֶת־יְהוָה כָּל־גּוֹיִם שַׁבְּחוּהוּ כָּל־הָאֻמִּים׃","כִּי גָבַר עָלֵינוּ ׀ חַסְדּוֹ וֶאֱמֶת־יְהוָה לְעוֹלָם הַלְלוּ־יָהּ׃"],"118":["הוֹדוּ לַיהוָה כִּי־טוֹב כִּי לְעוֹלָם חַסְדּוֹ׃","יֹאמַר־נָא יִשְׂרָאֵל כִּי לְעוֹלָם חַסְדּוֹ׃","יֹאמְרוּ־נָא בֵית־אַהֲרֹן כִּי לְעוֹלָם חַסְדּוֹ׃","יֹאמְרוּ־נָא יִרְאֵי יְהוָה כִּי לְעוֹלָם חַסְדּוֹ׃","מִן־הַמֵּצַר קָרָאתִי יָּהּ עָנָנִי בַמֶּרְחָב יָהּ׃","יְהוָה לִי לֹא אִירָא מַה־יַּעֲשֶׂה לִי אָדָם׃","יְהוָה לִי בְּעֹזְרָי וַאֲנִי אֶרְאֶה בְשֹׂנְאָי׃","טוֹב לַחֲסוֹת בַּיהוָה מִבְּטֹחַ בָּאָדָם׃","טוֹב לַחֲסוֹת בַּיהוָה מִבְּטֹחַ בִּנְדִיבִים׃","כָּל־גּוֹיִם סְבָבוּנִי בְּשֵׁם יְהוָה כִּי אֲמִילַם׃","סַבּוּנִי גַם־סְבָבוּנִי בְּשֵׁם יְהוָה כִּי אֲמִילַם׃","סַבּוּנִי כִדְבוֹרִים דֹּעֲכוּ כְּאֵשׁ קוֹצִים בְּשֵׁם יְהוָה כִּי אֲמִילַם׃","דַּחֹה דְחִיתַנִי לִנְפֹּל וַיהוָה עֲזָרָנִי׃","עָזִּי וְזִמְרָת יָהּ וַיְהִי־לִי לִישׁוּעָה׃","קוֹל ׀ רִנָּה וִישׁוּעָה בְּאָהֳלֵי צַדִּיקִים יְמִין יְהוָה עֹשָׂה חָיִל׃","יְמִין יְהוָה רוֹמֵמָה יְמִין יְהוָה עֹשָׂה חָיִל׃","לֹא אָמוּת כִּי־אֶחְיֶה וַאֲסַפֵּר מַעֲשֵׂי יָהּ׃","יַסֹּר יִסְּרַנִּי יָּהּ וְלַמָּוֶת לֹא נְתָנָנִי׃","פִּתְחוּ־לִי שַׁעֲרֵי־צֶדֶק אָבֹא־בָם אוֹדֶה יָהּ׃","זֶה־הַשַּׁעַר לַיהוָה צַדִּיקִים יָבֹאוּ בוֹ׃","אוֹדְךָ כִּי עֲנִיתָנִי וַתְּהִי־לִי לִישׁוּעָה׃","אֶבֶן מָאֲסוּ הַבּוֹנִים הָיְתָה לְרֹאשׁ פִּנָּה׃","מֵאֵת יְהוָה הָיְתָה זֹּאת הִיא נִפְלָאת בְּעֵינֵינוּ׃","זֶה־הַיּוֹם עָשָׂה יְהוָה נָגִילָה וְנִשְׂמְחָה בוֹ׃","אָנָּא יְהוָה הוֹשִׁיעָה נָּא אָנָּא יְהוָה הַצְלִיחָה נָּא׃","בָּרוּךְ הַבָּא בְּשֵׁם יְהוָה בֵּרַכְנוּכֶם מִבֵּית יְהוָה׃","אֵל ׀ יְהוָה וַיָּאֶר לָנוּ אִסְרוּ־חַג בַּעֲבֹתִים עַד־קַרְנוֹת הַמִּזְבֵּחַ׃","אֵלִי אַתָּה וְאוֹדֶךָּ אֱלֹהַי אֲרוֹמְמֶךָּ׃","הוֹדוּ לַיהוָה כִּי־טוֹב כִּי לְעוֹלָם חַסְדּוֹ׃"],"119":["אַשְׁרֵי תְמִימֵי־דָרֶךְ הַהֹלְכִים בְּתוֹרַת יְהוָה׃","אַשְׁרֵי נֹצְרֵי עֵדֹתָיו בְּכָל־לֵב יִדְרְשׁוּהוּ׃","אַף לֹא־פָעֲלוּ עַוְלָה בִּדְרָכָיו הָלָכוּ׃","אַתָּה צִוִּיתָה פִקֻּדֶיךָ לִשְׁמֹר מְאֹד׃","אַחֲלַי יִכֹּנוּ דְרָכָי לִשְׁמֹר חֻקֶּיךָ׃","אָז לֹא־אֵבוֹשׁ בְּהַבִּיטִי אֶל־כָּל־מִצְוֺתֶיךָ׃","אוֹדְךָ בְּיֹשֶׁר לֵבָב בְּלָמְדִי מִשְׁפְּטֵי צִדְקֶךָ׃","אֶת־חֻקֶּיךָ אֶשְׁמֹר אַל־תַּעַזְבֵנִי עַד־מְאֹד׃","בַּמֶּה יְזַכֶּה־נַּעַר אֶת־אָרְחוֹ לִשְׁמֹר כִּדְבָרֶךָ׃","בְּכָל־לִבִּי דְרַשְׁתִּיךָ אַל־תַּשְׁגֵּנִי מִמִּצְוֺתֶיךָ׃","בְּלִבִּי צָפַנְתִּי אִמְרָתֶךָ לְמַעַן לֹא אֶחֱטָא־לָךְ׃","בָּרוּךְ אַתָּה יְהוָה לַמְּדֵנִי חֻקֶּיךָ׃","בִּשְׂפָתַי סִפַּרְתִּי כֹּל מִשְׁפְּטֵי־פִיךָ׃","בְּדֶרֶךְ עֵדְוֺתֶיךָ שַׂשְׂתִּי כְּעַל כָּל־הוֹן׃","בְּפִקֻּדֶיךָ אָשִׂיחָה וְאַבִּיטָה אֹרְחֹתֶיךָ׃","בְּחֻקֹּתֶיךָ אֶשְׁתַּעֲשָׁע לֹא אֶשְׁכַּח דְּבָרֶךָ׃","גְּמֹל עַל־עַבְדְּךָ אֶחְיֶה וְאֶשְׁמְרָה דְבָרֶךָ׃","גַּל־עֵינַי וְאַבִּיטָה נִפְלָאוֹת מִתּוֹרָתֶךָ׃","גֵּר אָנֹכִי בָאָרֶץ אַל־תַּסְתֵּר מִמֶּנִּי מִצְוֺתֶיךָ׃","גָּרְסָה נַפְשִׁי לְתַאֲבָה אֶל־מִשְׁפָּטֶיךָ בְכָל־עֵת׃","גָּעַרְתָּ זֵדִים אֲרוּרִים הַשֹּׁגִים מִמִּצְוֺתֶיךָ׃","גַּל מֵעָלַי חֶרְפָּה וָבוּז כִּי עֵדֹתֶיךָ נָצָרְתִּי׃","גַּם יָשְׁבוּ שָׂרִים בִּי נִדְבָּרוּ עַבְדְּךָ יָשִׂיחַ בְּחֻקֶּיךָ׃","גַּם־עֵדֹתֶיךָ שַׁעֲשֻׁעָי אַנְשֵׁי עֲצָתִי׃","דָּבְקָה לֶעָפָר נַפְשִׁי חַיֵּנִי כִּדְבָרֶךָ׃","דְּרָכַי סִפַּרְתִּי וַתַּעֲנֵנִי לַמְּדֵנִי חֻקֶּיךָ׃","דֶּרֶךְ־פִּקּוּדֶיךָ הֲבִינֵנִי וְאָשִׂיחָה בְּנִפְלְאוֹתֶיךָ׃","דָּלְפָה נַפְשִׁי מִתּוּגָה קַיְּמֵנִי כִּדְבָרֶךָ׃","דֶּרֶךְ־שֶׁקֶר הָסֵר מִמֶּנִּי וְתוֹרָתְךָ חָנֵּנִי׃","דֶּרֶךְ־אֱמוּנָה בָחָרְתִּי מִשְׁפָּטֶיךָ שִׁוִּיתִי׃","דָּבַקְתִּי בְעֵדְוֺתֶיךָ יְהוָה אַל־תְּבִישֵׁנִי׃","דֶּרֶךְ־מִצְוֺתֶיךָ אָרוּץ כִּי תַרְחִיב לִבִּי׃","הוֹרֵנִי יְהוָה דֶּרֶךְ חֻקֶּיךָ וְאֶצְּרֶנָּה עֵקֶב׃","הֲבִינֵנִי וְאֶצְּרָה תוֹרָתֶךָ וְאֶשְׁמְרֶנָּה בְכָל־לֵב׃","הַדְרִיכֵנִי בִּנְתִיב מִצְוֺתֶיךָ כִּי־בוֹ חָפָצְתִּי׃","הַט־לִבִּי אֶל־עֵדְוֺתֶיךָ וְאַל אֶל־בָּצַע׃","הַעֲבֵר עֵינַי מֵרְאוֹת שָׁוְא בִּדְרָכֶךָ חַיֵּנִי׃","הָקֵם לְעַבְדְּךָ אִמְרָתֶךָ אֲשֶׁר לְיִרְאָתֶךָ׃","הַעֲבֵר חֶרְפָּתִי אֲשֶׁר יָגֹרְתִּי כִּי מִשְׁפָּטֶיךָ טוֹבִים׃","הִנֵּה תָּאַבְתִּי לְפִקֻּדֶיךָ בְּצִדְקָתְךָ חַיֵּנִי׃","וִיבֹאֻנִי חֲסָדֶךָ יְהוָה תְּשׁוּעָתְךָ כְּאִמְרָתֶךָ׃","וְאֶעֱנֶה חֹרְפִי דָבָר כִּי־בָטַחְתִּי בִּדְבָרֶךָ׃","וְאַל־תַּצֵּל מִפִּי דְבַר־אֱמֶת עַד־מְאֹד כִּי לְמִשְׁפָּטֶךָ יִחָלְתִּי׃","וְאֶשְׁמְרָה תוֹרָתְךָ תָמִיד לְעוֹלָם וָעֶד׃","וְאֶתְהַלְּכָה בָרְחָבָה כִּי פִקֻּדֶיךָ דָרָשְׁתִּי׃","וַאֲדַבְּרָה בְעֵדֹתֶיךָ נֶגֶד מְלָכִים וְלֹא אֵבוֹשׁ׃","וְאֶשְׁתַּעֲשַׁע בְּמִצְוֺתֶיךָ אֲשֶׁר אָהָבְתִּי׃","וְאֶשָּׂא־כַפַּי אֶל־מִצְוֺתֶיךָ אֲשֶׁר אָהָבְתִּי וְאָשִׂיחָה בְחֻקֶּיךָ׃","זְכֹר־דָּבָר לְעַבְדֶּךָ עַל אֲשֶׁר יִחַלְתָּנִי׃","זֹאת נֶחָמָתִי בְעָנְיִי כִּי אִמְרָתְךָ חִיָּתְנִי׃","זֵדִים הֱלִיצֻנִי עַד־מְאֹד מִתּוֹרָתְךָ לֹא נָטִיתִי׃","זָכַרְתִּי מִשְׁפָּטֶיךָ מֵעוֹלָם ׀ יְהוָה וָאֶתְנֶחָם׃","זַלְעָפָה אֲחָזַתְנִי מֵרְשָׁעִים עֹזְבֵי תּוֹרָתֶךָ׃","זְמִרוֹת הָיוּ־לִי חֻקֶּיךָ בְּבֵית מְגוּרָי׃","זָכַרְתִּי בַלַּיְלָה שִׁמְךָ יְהוָה וָאֶשְׁמְרָה תּוֹרָתֶךָ׃","זֹאת הָיְתָה־לִּי כִּי פִקֻּדֶיךָ נָצָרְתִּי׃","חֶלְקִי יְהוָה אָמַרְתִּי לִשְׁמֹר דְּבָרֶיךָ׃","חִלִּיתִי פָנֶיךָ בְכָל־לֵב חָנֵּנִי כְּאִמְרָתֶךָ׃","חִשַּׁבְתִּי דְרָכָי וָאָשִׁיבָה רַגְלַי אֶל־עֵדֹתֶיךָ׃","חַשְׁתִּי וְלֹא הִתְמַהְמָהְתִּי לִשְׁמֹר מִצְוֺתֶיךָ׃","חֶבְלֵי רְשָׁעִים עִוְּדֻנִי תּוֹרָתְךָ לֹא שָׁכָחְתִּי׃","חֲצוֹת־לַיְלָה אָקוּם לְהוֹדוֹת לָךְ עַל מִשְׁפְּטֵי צִדְקֶךָ׃","חָבֵר אָנִי לְכָל־אֲשֶׁר יְרֵאוּךָ וּלְשֹׁמְרֵי פִּקּוּדֶיךָ׃","חַסְדְּךָ יְהוָה מָלְאָה הָאָרֶץ חֻקֶּיךָ לַמְּדֵנִי׃","טוֹב עָשִׂיתָ עִם־עַבְדְּךָ יְהוָה כִּדְבָרֶךָ׃","טוּב טַעַם וָדַעַת לַמְּדֵנִי כִּי בְמִצְוֺתֶיךָ הֶאֱמָנְתִּי׃","טֶרֶם אֶעֱנֶה אֲנִי שֹׁגֵג וְעַתָּה אִמְרָתְךָ שָׁמָרְתִּי׃","טוֹב־אַתָּה וּמֵטִיב לַמְּדֵנִי חֻקֶּיךָ׃","טָפְלוּ עָלַי שֶׁקֶר זֵדִים אֲנִי בְּכָל־לֵב ׀ אֱצֹּר פִּקּוּדֶיךָ׃","טָפַשׁ כַּחֵלֶב לִבָּם אֲנִי תּוֹרָתְךָ שִׁעֲשָׁעְתִּי׃","טוֹב־לִי כִי־עֻנֵּיתִי לְמַעַן אֶלְמַד חֻקֶּיךָ׃","טוֹב־לִי תוֹרַת־פִּיךָ מֵאַלְפֵי זָהָב וָכָסֶף׃","יָדֶיךָ עָשׂוּנִי וַיְכוֹנְנוּנִי הֲבִינֵנִי וְאֶלְמְדָה מִצְוֺתֶיךָ׃","יְרֵאֶיךָ יִרְאוּנִי וְיִשְׂמָחוּ כִּי לִדְבָרְךָ יִחָלְתִּי׃","יָדַעְתִּי יְהוָה כִּי־צֶדֶק מִשְׁפָּטֶיךָ וֶאֱמוּנָה עִנִּיתָנִי׃","יְהִי־נָא חַסְדְּךָ לְנַחֲמֵנִי כְּאִמְרָתְךָ לְעַבְדֶּךָ׃","יְבֹאוּנִי רַחֲמֶיךָ וְאֶחְיֶה כִּי־תוֹרָתְךָ שַׁעֲשֻׁעָי׃","יֵבֹשׁוּ זֵדִים כִּי־שֶׁקֶר עִוְּתוּנִי אֲנִי אָשִׂיחַ בְּפִקּוּדֶיךָ׃","יָשׁוּבוּ לִי יְרֵאֶיךָ וידעו עֵדֹתֶיךָ׃","יְהִי־לִבִּי תָמִים בְּחֻקֶּיךָ לְמַעַן לֹא אֵבוֹשׁ׃","כָּלְתָה לִתְשׁוּעָתְךָ נַפְשִׁי לִדְבָרְךָ יִחָלְתִּי׃","כָּלוּ עֵינַי לְאִמְרָתֶךָ לֵאמֹר מָתַי תְּנַחֲמֵנִי׃","כִּי־הָיִיתִי כְּנֹאד בְּקִיטוֹר חֻקֶּיךָ לֹא שָׁכָחְתִּי׃","כַּמָּה יְמֵי־עַבְדֶּךָ מָתַי תַּעֲשֶׂה בְרֹדְפַי מִשְׁפָּט׃","כָּרוּ־לִי זֵדִים שִׁיחוֹת אֲשֶׁר לֹא כְתוֹרָתֶךָ׃","כָּל־מִצְוֺתֶיךָ אֱמוּנָה שֶׁקֶר רְדָפוּנִי עָזְרֵנִי׃","כִּמְעַט כִּלּוּנִי בָאָרֶץ וַאֲנִי לֹא־עָזַבְתִּי פִקֻּודֶיךָ׃","כְּחַסְדְּךָ חַיֵּנִי וְאֶשְׁמְרָה עֵדוּת פִּיךָ׃","לְעוֹלָם יְהוָה דְּבָרְךָ נִצָּב בַּשָּׁמָיִם׃","לְדֹר וָדֹר אֱמוּנָתֶךָ כּוֹנַנְתָּ אֶרֶץ וַתַּעֲמֹד׃","לְמִשְׁפָּטֶיךָ עָמְדוּ הַיּוֹם כִּי הַכֹּל עֲבָדֶיךָ׃","לוּלֵי תוֹרָתְךָ שַׁעֲשֻׁעָי אָז אָבַדְתִּי בְעָנְיִי׃","לְעוֹלָם לֹא־אֶשְׁכַּח פִּקּוּדֶיךָ כִּי בָם חִיִּיתָנִי׃","לְךָ־אֲנִי הוֹשִׁיעֵנִי כִּי פִקּוּדֶיךָ דָרָשְׁתִּי׃","לִי קִוּוּ רְשָׁעִים לְאַבְּדֵנִי עֵדֹתֶיךָ אֶתְבּוֹנָן׃","לְכָל תִּכְלָה רָאִיתִי קֵץ רְחָבָה מִצְוָתְךָ מְאֹד׃","מָה־אָהַבְתִּי תוֹרָתֶךָ כָּל־הַיּוֹם הִיא שִׂיחָתִי׃","מֵאֹיְבַי תְּחַכְּמֵנִי מִצְוֺתֶךָ כִּי לְעוֹלָם הִיא־לִי׃","מִכָּל־מְלַמְּדַי הִשְׂכַּלְתִּי כִּי עֵדְוֺתֶיךָ שִׂיחָה לִי׃","מִזְּקֵנִים אֶתְבּוֹנָן כִּי פִקּוּדֶיךָ נָצָרְתִּי׃","מִכָּל־אֹרַח רָע כָּלִאתִי רַגְלָי לְמַעַן אֶשְׁמֹר דְּבָרֶךָ׃","מִמִּשְׁפָּטֶיךָ לֹא־סָרְתִּי כִּי־אַתָּה הוֹרֵתָנִי׃","מַה־נִּמְלְצוּ לְחִכִּי אִמְרָתֶךָ מִדְּבַשׁ לְפִי׃","מִפִּקּוּדֶיךָ אֶתְבּוֹנָן עַל־כֵּן שָׂנֵאתִי ׀ כָּל־אֹרַח שָׁקֶר׃","נֵר־לְרַגְלִי דְבָרֶךָ וְאוֹר לִנְתִיבָתִי׃","נִשְׁבַּעְתִּי וָאֲקַיֵּמָה לִשְׁמֹר מִשְׁפְּטֵי צִדְקֶךָ׃","נַעֲנֵיתִי עַד־מְאֹד יְהוָה חַיֵּנִי כִדְבָרֶךָ׃","נִדְבוֹת פִּי רְצֵה־נָא יְהוָה וּמִשְׁפָּטֶיךָ לַמְּדֵנִי׃","נַפְשִׁי בְכַפִּי תָמִיד וְתוֹרָתְךָ לֹא שָׁכָחְתִּי׃","נָתְנוּ רְשָׁעִים פַּח לִי וּמִפִּקּוּדֶיךָ לֹא תָעִיתִי׃","נָחַלְתִּי עֵדְוֺתֶיךָ לְעוֹלָם כִּי־שְׂשׂוֹן לִבִּי הֵמָּה׃","נָטִיתִי לִבִּי לַעֲשׂוֹת חֻקֶּיךָ לְעוֹלָם עֵקֶב׃","סֵעֲפִים שָׂנֵאתִי וְתוֹרָתְךָ אָהָבְתִּי׃","סִתְרִי וּמָגִנִּי אָתָּה לִדְבָרְךָ יִחָלְתִּי׃","סוּרוּ־מִמֶּנִּי מְרֵעִים וְאֶצְּרָה מִצְוֺת אֱלֹהָי׃","סָמְכֵנִי כְאִמְרָתְךָ וְאֶחְיֶה וְאַל־תְּבִישֵׁנִי מִשִּׂבְרִי׃","סְעָדֵנִי וְאִוָּשֵׁעָה וְאֶשְׁעָה בְחֻקֶּיךָ תָמִיד׃","סָלִיתָ כָּל־שׁוֹגִים מֵחֻקֶּיךָ כִּי־שֶׁקֶר תַּרְמִיתָם׃","סִגִים הִשְׁבַּתָּ כָל־רִשְׁעֵי־אָרֶץ לָכֵן אָהַבְתִּי עֵדֹתֶיךָ׃","סָמַר מִפַּחְדְּךָ בְשָׂרִי וּמִמִּשְׁפָּטֶיךָ יָרֵאתִי׃","עָשִׂיתִי מִשְׁפָּט וָצֶדֶק בַּל־תַּנִּיחֵנִי לְעֹשְׁקָי׃","עֲרֹב עַבְדְּךָ לְטוֹב אַל־יַעַשְׁקֻנִי זֵדִים׃","עֵינַי כָּלוּ לִישׁוּעָתֶךָ וּלְאִמְרַת צִדְקֶךָ׃","עֲשֵׂה עִם־עַבְדְּךָ כְחַסְדֶּךָ וְחֻקֶּיךָ לַמְּדֵנִי׃","עַבְדְּךָ־אָנִי הֲבִינֵנִי וְאֵדְעָה עֵדֹתֶיךָ׃","עֵת לַעֲשׂוֹת לַיהוָה הֵפֵרוּ תּוֹרָתֶךָ׃","עַל־כֵּן אָהַבְתִּי מִצְוֺתֶיךָ מִזָּהָב וּמִפָּז׃","עַל־כֵּן ׀ כָּל־פִּקּוּדֵי כֹל יִשָּׁרְתִּי כָּל־אֹרַח שֶׁקֶר שָׂנֵאתִי׃","פְּלָאוֹת עֵדְוֺתֶיךָ עַל־כֵּן נְצָרָתַם נַפְשִׁי׃","פֵּתַח דְּבָרֶיךָ יָאִיר מֵבִין פְּתָיִים׃","פִּי־פָעַרְתִּי וָאֶשְׁאָפָה כִּי לְמִצְוֺתֶיךָ יָאָבְתִּי׃","פְּנֵה־אֵלַי וְחָנֵּנִי כְּמִשְׁפָּט לְאֹהֲבֵי שְׁמֶךָ׃","פְּעָמַי הָכֵן בְּאִמְרָתֶךָ וְאַל־תַּשְׁלֶט־בִּי כָל־אָוֶן׃","פְּדֵנִי מֵעֹשֶׁק אָדָם וְאֶשְׁמְרָה פִּקּוּדֶיךָ׃","פָּנֶיךָ הָאֵר בְּעַבְדֶּךָ וְלַמְּדֵנִי אֶת־חֻקֶּיךָ׃","פַּלְגֵי־מַיִם יָרְדוּ עֵינָי עַל לֹא־שָׁמְרוּ תוֹרָתֶךָ׃","צַדִּיק אַתָּה יְהוָה וְיָשָׁר מִשְׁפָּטֶיךָ׃","צִוִּיתָ צֶדֶק עֵדֹתֶיךָ וֶאֱמוּנָה מְאֹד׃","צִמְּתַתְנִי קִנְאָתִי כִּי־שָׁכְחוּ דְבָרֶיךָ צָרָי׃","צְרוּפָה אִמְרָתְךָ מְאֹד וְעַבְדְּךָ אֲהֵבָהּ׃","צָעִיר אָנֹכִי וְנִבְזֶה פִּקֻּדֶיךָ לֹא שָׁכָחְתִּי׃","צִדְקָתְךָ צֶדֶק לְעוֹלָם וְתוֹרָתְךָ אֱמֶת׃","צַר־וּמָצוֹק מְצָאוּנִי מִצְוֺתֶיךָ שַׁעֲשֻׁעָי׃","צֶדֶק עֵדְוֺתֶיךָ לְעוֹלָם הֲבִינֵנִי וְאֶחְיֶה׃","קָרָאתִי בְכָל־לֵב עֲנֵנִי יְהוָה חֻקֶּיךָ אֶצֹּרָה׃","קְרָאתִיךָ הוֹשִׁיעֵנִי וְאֶשְׁמְרָה עֵדֹתֶיךָ׃","קִדַּמְתִּי בַנֶּשֶׁף וָאֲשַׁוֵּעָה לדבריך יִחָלְתִּי׃","קִדְּמוּ עֵינַי אַשְׁמֻרוֹת לָשִׂיחַ בְּאִמְרָתֶךָ׃","קוֹלִי שִׁמְעָה כְחַסְדֶּךָ יְהוָה כְּמִשְׁפָּטֶךָ חַיֵּנִי׃","קָרְבוּ רֹדְפֵי זִמָּה מִתּוֹרָתְךָ רָחָקוּ׃","קָרוֹב אַתָּה יְהוָה וְכָל־מִצְוֺתֶיךָ אֱמֶת׃","קֶדֶם יָדַעְתִּי מֵעֵדֹתֶיךָ כִּי לְעוֹלָם יְסַדְתָּם׃","רְאֵה־עָנְיִי וְחַלְּצֵנִי כִּי־תוֹרָתְךָ לֹא שָׁכָחְתִּי׃","רִיבָה רִיבִי וּגְאָלֵנִי לְאִמְרָתְךָ חַיֵּנִי׃","רָחוֹק מֵרְשָׁעִים יְשׁוּעָה כִּי־חֻקֶּיךָ לֹא דָרָשׁוּ׃","רַחֲמֶיךָ רַבִּים ׀ יְהוָה כְּמִשְׁפָּטֶיךָ חַיֵּנִי׃","רַבִּים רֹדְפַי וְצָרָי מֵעֵדְוֺתֶיךָ לֹא נָטִיתִי׃","רָאִיתִי בֹגְדִים וָאֶתְקוֹטָטָה אֲשֶׁר אִמְרָתְךָ לֹא שָׁמָרוּ׃","רְאֵה כִּי־פִקּוּדֶיךָ אָהָבְתִּי יְהוָה כְּחַסְדְּךָ חַיֵּנִי׃","רֹאשׁ־דְּבָרְךָ אֱמֶת וּלְעוֹלָם כָּל־מִשְׁפַּט צִדְקֶךָ׃","שָׂרִים רְדָפוּנִי חִנָּם ומדבריך פָּחַד לִבִּי׃","שָׂשׂ אָנֹכִי עַל־אִמְרָתֶךָ כְּמוֹצֵא שָׁלָל רָב׃","שֶׁקֶר שָׂנֵאתִי וַאֲתַעֵבָה תּוֹרָתְךָ אָהָבְתִּי׃","שֶׁבַע בַּיּוֹם הִלַּלְתִּיךָ עַל מִשְׁפְּטֵי צִדְקֶךָ׃","שָׁלוֹם רָב לְאֹהֲבֵי תוֹרָתֶךָ וְאֵין־לָמוֹ מִכְשׁוֹל׃","שִׂבַּרְתִּי לִישׁוּעָתְךָ יְהוָה וּמִצְוֺתֶיךָ עָשִׂיתִי׃","שָׁמְרָה נַפְשִׁי עֵדֹתֶיךָ וָאֹהֲבֵם מְאֹד׃","שָׁמַרְתִּי פִקּוּדֶיךָ וְעֵדֹתֶיךָ כִּי כָל־דְּרָכַי נֶגְדֶּךָ׃","תִּקְרַב רִנָּתִי לְפָנֶיךָ יְהוָה כִּדְבָרְךָ הֲבִינֵנִי׃","תָּבוֹא תְּחִנָּתִי לְפָנֶיךָ כְּאִמְרָתְךָ הַצִּילֵנִי׃","תַּבַּעְנָה שְׂפָתַי תְּהִלָּה כִּי תְלַמְּדֵנִי חֻקֶּיךָ׃","תַּעַן לְשׁוֹנִי אִמְרָתֶךָ כִּי כָל־מִצְוֺתֶיךָ צֶּדֶק׃","תְּהִי־יָדְךָ לְעָזְרֵנִי כִּי פִקּוּדֶיךָ בָחָרְתִּי׃","תָּאַבְתִּי לִישׁוּעָתְךָ יְהוָה וְתוֹרָתְךָ שַׁעֲשֻׁעָי׃","תְּחִי־נַפְשִׁי וּתְהַלְלֶךָּ וּמִשְׁפָּטֶךָ יַעֲזְרֻנִי׃","תָּעִיתִי כְּשֶׂה אֹבֵד בַּקֵּשׁ עַבְדֶּךָ כִּי מִצְוֺתֶיךָ לֹא שָׁכָחְתִּי׃"],"120":["שִׁיר הַמַּעֲלוֹת אֶל־יְהוָה בַּצָּרָתָה לִּי קָרָאתִי וַיַּעֲנֵנִי׃","יְהוָה הַצִּילָה נַפְשִׁי מִשְּׂפַת־שֶׁקֶר מִלָּשׁוֹן רְמִיָּה׃","מַה־יִּתֵּן לְךָ וּמַה־יֹּסִיף לָךְ לָשׁוֹן רְמִיָּה׃","חִצֵּי גִבּוֹר שְׁנוּנִים עִם גַּחֲלֵי רְתָמִים׃","אוֹיָה־לִי כִּי־גַרְתִּי מֶשֶׁךְ שָׁכַנְתִּי עִם־אָהֳלֵי קֵדָר׃","רַבַּת שָׁכְנָה־לָּהּ נַפְשִׁי עִם שׂוֹנֵא שָׁלוֹם׃","אֲנִי־שָׁלוֹם וְכִי אֲדַבֵּר הֵמָּה לַמִּלְחָמָה׃"],"121":["שִׁיר לַמַּעֲלוֹת אֶשָּׂא עֵינַי אֶל־הֶהָרִים מֵאַיִן יָבֹא עֶזְרִי׃","עֶזְרִי מֵעִם יְהוָה עֹשֵׂה שָׁמַיִם וָאָרֶץ׃","אַל־יִתֵּן לַמּוֹט רַגְלֶךָ אַל־יָנוּם שֹׁמְרֶךָ׃","הִנֵּה לֹא־יָנוּם וְלֹא יִישָׁן שׁוֹמֵר יִשְׂרָאֵל׃","יְהוָה שֹׁמְרֶךָ יְהוָה צִלְּךָ עַל־יַד יְמִינֶךָ׃","יוֹמָם הַשֶּׁמֶשׁ לֹא־יַכֶּכָּה וְיָרֵחַ בַּלָּיְלָה׃","יְהוָה יִשְׁמָרְךָ מִכָּל־רָע יִשְׁמֹר אֶת־נַפְשֶׁךָ׃","יְהוָה יִשְׁמָר־צֵאתְךָ וּבוֹאֶךָ מֵעַתָּה וְעַד־עוֹלָם׃"],"122":["שִׁיר הַמַּעֲלוֹת לְדָוִד שָׂמַחְתִּי בְּאֹמְרִים לִי בֵּית יְהוָה נֵלֵךְ׃","עֹמְדוֹת הָיוּ רַגְלֵינוּ בִּשְׁעָרַיִךְ יְרוּשָׁלִָם׃","יְרוּשָׁלִַם הַבְּנוּיָה כְּעִיר שֶׁחֻבְּרָה־לָּהּ יַחְדָּו׃","שֶׁשָּׁם עָלוּ שְׁבָטִים שִׁבְטֵי־יָהּ עֵדוּת לְיִשְׂרָאֵל לְהֹדוֹת לְשֵׁם יְהוָה׃","כִּי שָׁמָּה ׀ יָשְׁבוּ כִסְאוֹת לְמִשְׁפָּט כִּסְאוֹת לְבֵית דָּוִיד׃","שַׁאֲלוּ שְׁלוֹם יְרוּשָׁלִָם יִשְׁלָיוּ אֹהֲבָיִךְ׃","יְהִי־שָׁלוֹם בְּחֵילֵךְ שַׁלְוָה בְּאַרְמְנוֹתָיִךְ׃","לְמַעַן אַחַי וְרֵעָי אֲדַבְּרָה־נָּא שָׁלוֹם בָּךְ׃","לְמַעַן בֵּית־יְהוָה אֱלֹהֵינוּ אֲבַקְשָׁה טוֹב לָךְ׃"],"123":["שִׁיר הַמַּעֲלוֹת אֵלֶיךָ נָשָׂאתִי אֶת־עֵינַי הַיֹּשְׁבִי בַּשָּׁמָיִם׃","הִנֵּה כְעֵינֵי עֲבָדִים אֶל־יַד אֲדוֹנֵיהֶם כְּעֵינֵי שִׁפְחָה אֶל־יַד גְּבִרְתָּהּ כֵּן עֵינֵינוּ אֶל־יְהוָה אֱלֹהֵינוּ עַד שֶׁיְּחָנֵּנוּ׃","חָנֵּנוּ יְהוָה חָנֵּנוּ כִּי־רַב שָׂבַעְנוּ בוּז׃","רַבַּת שָׂבְעָה־לָּהּ נַפְשֵׁנוּ הַלַּעַג הַשַּׁאֲנַנִּים הַבּוּז לִגְאֵיוֹנִים׃"],"124":["שִׁיר הַמַּעֲלוֹת לְדָוִד לוּלֵי יְהוָה שֶׁהָיָה לָנוּ יֹאמַר־נָא יִשְׂרָאֵל׃","לוּלֵי יְהוָה שֶׁהָיָה לָנוּ בְּקוּם עָלֵינוּ אָדָם׃","אֲזַי חַיִּים בְּלָעוּנוּ בַּחֲרוֹת אַפָּם בָּנוּ׃","אֲזַי הַמַּיִם שְׁטָפוּנוּ נַחְלָה עָבַר עַל־נַפְשֵׁנוּ׃","אֲזַי עָבַר עַל־נַפְשֵׁנוּ הַמַּיִם הַזֵּידוֹנִים׃","בָּרוּךְ יְהוָה שֶׁלֹּא נְתָנָנוּ טֶרֶף לְשִׁנֵּיהֶם׃","נַפְשֵׁנוּ כְּצִפּוֹר נִמְלְטָה מִפַּח יוֹקְשִׁים הַפַּח נִשְׁבָּר וַאֲנַחְנוּ נִמְלָטְנוּ׃","עֶזְרֵנוּ בְּשֵׁם יְהוָה עֹשֵׂה שָׁמַיִם וָאָרֶץ׃"],"125":["שִׁיר הַמַּעֲלוֹת הַבֹּטְחִים בַּיהוָה כְּהַר־צִיּוֹן לֹא־יִמּוֹט לְעוֹלָם יֵשֵׁב׃","יְרוּשָׁלִַם הָרִים סָבִיב לָהּ וַיהוָה סָבִיב לְעַמּוֹ מֵעַתָּה וְעַד־עוֹלָם׃","כִּי לֹא יָנוּחַ שֵׁבֶט הָרֶשַׁע עַל גּוֹרַל הַצַּדִּיקִים לְמַעַן לֹא־יִשְׁלְחוּ הַצַּדִּיקִים בְּעַוְלָתָה יְדֵיהֶם׃","הֵיטִיבָה יְהוָה לַטּוֹבִים וְלִישָׁרִים בְּלִבּוֹתָם׃","וְהַמַּטִּים עַקַלְקַלּוֹתָם יוֹלִיכֵם יְהוָה אֶת־פֹּעֲלֵי הָאָוֶן שָׁלוֹם עַל־יִשְׂרָאֵל׃"],"126":["שִׁיר הַמַּעֲלוֹת בְּשׁוּב יְהוָה אֶת־שִׁיבַת צִיּוֹן הָיִינוּ כְּחֹלְמִים׃","אָז יִמָּלֵא שְׂחוֹק פִּינוּ וּלְשׁוֹנֵנוּ רִנָּה אָז יֹאמְרוּ בַגּוֹיִם הִגְדִּיל יְהוָה לַעֲשׂוֹת עִם־אֵלֶּה׃","הִגְדִּיל יְהוָה לַעֲשׂוֹת עִמָּנוּ הָיִינוּ שְׂמֵחִים׃","שׁוּבָה יְהוָה אֶת־שבותנו כַּאֲפִיקִים בַּנֶּגֶב׃","הַזֹּרְעִים בְּדִמְעָה בְּרִנָּה יִקְצֹרוּ׃","הָלוֹךְ יֵלֵךְ ׀ וּבָכֹה נֹשֵׂא מֶשֶׁךְ־הַזָּרַע בֹּא־יָבוֹא בְרִנָּה נֹשֵׂא אֲלֻמֹּתָיו׃"],"127":["שִׁיר הַמַּעֲלוֹת לִשְׁלֹמֹה אִם־יְהוָה ׀ לֹא־יִבְנֶה בַיִת שָׁוְא ׀ עָמְלוּ בוֹנָיו בּוֹ אִם־יְהוָה לֹא־יִשְׁמָר־עִיר שָׁוְא ׀ שָׁקַד שׁוֹמֵר׃","שָׁוְא לָכֶם ׀ מַשְׁכִּימֵי קוּם מְאַחֲרֵי־שֶׁבֶת אֹכְלֵי לֶחֶם הָעֲצָבִים כֵּן יִתֵּן לִידִידוֹ שֵׁנָא׃","הִנֵּה נַחֲלַת יְהוָה בָּנִים שָׂכָר פְּרִי הַבָּטֶן׃","כְּחִצִּים בְּיַד־גִּבּוֹר כֵּן בְּנֵי הַנְּעוּרִים׃","אַשְׁרֵי הַגֶּבֶר אֲשֶׁר מִלֵּא אֶת־אַשְׁפָּתוֹ מֵהֶם לֹא־יֵבֹשׁוּ כִּי־יְדַבְּרוּ אֶת־אוֹיְבִים בַּשָּׁעַר׃"],"128":["שִׁיר הַמַּעֲלוֹת אַשְׁרֵי כָּל־יְרֵא יְהוָה הַהֹלֵךְ בִּדְרָכָיו׃","יְגִיעַ כַּפֶּיךָ כִּי תֹאכֵל אַשְׁרֶיךָ וְטוֹב לָךְ׃","אֶשְׁתְּךָ ׀ כְּגֶפֶן פֹּרִיָּה בְּיַרְכְּתֵי בֵיתֶךָ בָּנֶיךָ כִּשְׁתִלֵי זֵיתִים סָבִיב לְשֻׁלְחָנֶךָ׃","הִנֵּה כִי־כֵן יְבֹרַךְ גָּבֶר יְרֵא יְהוָה׃","יְבָרֶכְךָ יְהוָה מִצִּיּוֹן וּרְאֵה בְּטוּב יְרוּשָׁלִָם כֹּל יְמֵי חַיֶּיךָ׃","וּרְאֵה־בָנִים לְבָנֶיךָ שָׁלוֹם עַל־יִשְׂרָאֵל׃"],"129":["שִׁיר הַמַּעֲלוֹת רַבַּת צְרָרוּנִי מִנְּעוּרַי יֹאמַר־נָא יִשְׂרָאֵל׃","רַבַּת צְרָרוּנִי מִנְּעוּרָי גַּם לֹא־יָכְלוּ לִי׃","עַל־גַּבִּי חָרְשׁוּ חֹרְשִׁים הֶאֱרִיכוּ למענותם׃","יְהוָה צַדִּיק קִצֵּץ עֲבוֹת רְשָׁעִים׃","יֵבֹשׁוּ וְיִסֹּגוּ אָחוֹר כֹּל שֹׂנְאֵי צִיּוֹן׃","יִהְיוּ כַּחֲצִיר גַּגּוֹת שֶׁקַּדְמַת שָׁלַף יָבֵשׁ׃","שֶׁלֹּא מִלֵּא כַפּוֹ קוֹצֵר וְחִצְנוֹ מְעַמֵּר׃","וְלֹא אָמְרוּ ׀ הָעֹבְרִים בִּרְכַּת־יְהוָה אֲלֵיכֶם בֵּרַכְנוּ אֶתְכֶם בְּשֵׁם יְהוָה׃"],"130":["שִׁיר הַמַּעֲלוֹת מִמַּעֲמַקִּים קְרָאתִיךָ יְהוָה׃","אֲדֹנָי שִׁמְעָה בְקוֹלִי תִּהְיֶינָה אָזְנֶיךָ קַשֻּׁבוֹת לְקוֹל תַּחֲנוּנָי׃","אִם־עֲוֺנוֹת תִּשְׁמָר־יָהּ אֲדֹנָי מִי יַעֲמֹד׃","כִּי־עִמְּךָ הַסְּלִיחָה לְמַעַן תִּוָּרֵא׃","קִוִּיתִי יְהוָה קִוְּתָה נַפְשִׁי וְלִדְבָרוֹ הוֹחָלְתִּי׃","נַפְשִׁי לַאדֹנָי מִשֹּׁמְרִים לַבֹּקֶר שֹׁמְרִים לַבֹּקֶר׃","יַחֵל יִשְׂרָאֵל אֶל־יְהוָה כִּי־עִם־יְהוָה הַחֶסֶד וְהַרְבֵּה עִמּוֹ פְדוּת׃","וְהוּא יִפְדֶּה אֶת־יִשְׂרָאֵל מִכֹּל עֲוֺנֹתָיו׃"],"131":["שִׁיר הַמַּעֲלוֹת לְדָוִד יְהוָה ׀ לֹא־גָבַהּ לִבִּי וְלֹא־רָמוּ עֵינַי וְלֹא־הִלַּכְתִּי ׀ בִּגְדֹלוֹת וּבְנִפְלָאוֹת מִמֶּנִּי׃","אִם־לֹא שִׁוִּיתִי ׀ וְדוֹמַמְתִּי נַפְשִׁי כְּגָמֻל עֲלֵי אִמּוֹ כַּגָּמֻל עָלַי נַפְשִׁי׃","יַחֵל יִשְׂרָאֵל אֶל־יְהוָה מֵעַתָּה וְעַד־עוֹלָם׃"],"132":["שִׁיר הַמַּעֲלוֹת זְכוֹר־יְהוָה לְדָוִד אֵת כָּל־עֻנּוֹתוֹ׃","אֲשֶׁר נִשְׁבַּע לַיהוָה נָדַר לַאֲבִיר יַעֲקֹב׃","אִם־אָבֹא בְּאֹהֶל בֵּיתִי אִם־אֶעֱלֶה עַל־עֶרֶשׂ יְצוּעָי׃","אִם־אֶתֵּן שְׁנַת לְעֵינָי לְעַפְעַפַּי תְּנוּמָה׃","עַד־אֶמְצָא מָקוֹם לַיהוָה מִשְׁכָּנוֹת לַאֲבִיר יַעֲקֹב׃","הִנֵּה־שְׁמַעֲנוּהָ בְאֶפְרָתָה מְצָאנוּהָ בִּשְׂדֵי־יָעַר׃","נָבוֹאָה לְמִשְׁכְּנוֹתָיו נִשְׁתַּחֲוֶה לַהֲדֹם רַגְלָיו׃","קוּמָה יְהוָה לִמְנוּחָתֶךָ אַתָּה וַאֲרוֹן עֻזֶּךָ׃","כֹּהֲנֶיךָ יִלְבְּשׁוּ־צֶדֶק וַחֲסִידֶיךָ יְרַנֵּנוּ׃","בַּעֲבוּר דָּוִד עַבְדֶּךָ אַל־תָּשֵׁב פְּנֵי מְשִׁיחֶךָ׃","נִשְׁבַּע־יְהוָה ׀ לְדָוִד אֱמֶת לֹא־יָשׁוּב מִמֶּנָּה מִפְּרִי בִטְנְךָ אָשִׁית לְכִסֵּא־לָךְ׃","אִם־יִשְׁמְרוּ בָנֶיךָ ׀ בְּרִיתִי וְעֵדֹתִי זוֹ אֲלַמְּדֵם גַּם־בְּנֵיהֶם עֲדֵי־עַד יֵשְׁבוּ לְכִסֵּא־לָךְ׃","כִּי־בָחַר יְהוָה בְּצִיּוֹן אִוָּהּ לְמוֹשָׁב לוֹ׃","זֹאת־מְנוּחָתִי עֲדֵי־עַד פֹּה־אֵשֵׁב כִּי אִוִּתִיהָ׃","צֵידָהּ בָּרֵךְ אֲבָרֵךְ אֶבְיוֹנֶיהָ אַשְׂבִּיעַ לָחֶם׃","וְכֹהֲנֶיהָ אַלְבִּישׁ יֶשַׁע וַחֲסִידֶיהָ רַנֵּן יְרַנֵּנוּ׃","שָׁם אַצְמִיחַ קֶרֶן לְדָוִד עָרַכְתִּי נֵר לִמְשִׁיחִי׃","אוֹיְבָיו אַלְבִּישׁ בֹּשֶׁת וְעָלָיו יָצִיץ נִזְרוֹ׃"],"133":["שִׁיר הַמַּעֲלוֹת לְדָוִד הִנֵּה מַה־טּוֹב וּמַה־נָּעִים שֶׁבֶת אַחִים גַּם־יָחַד׃","כַּשֶּׁמֶן הַטּוֹב ׀ עַל־הָרֹאשׁ יֹרֵד עַל־הַזָּקָן זְקַן־אַהֲרֹן שֶׁיֹּרֵד עַל־פִּי מִדּוֹתָיו׃","כְּטַל־חֶרְמוֹן שֶׁיֹּרֵד עַל־הַרְרֵי צִיּוֹן כִּי שָׁם ׀ צִוָּה יְהוָה אֶת־הַבְּרָכָה חַיִּים עַד־הָעוֹלָם׃"],"134":["שִׁיר הַמַּעֲלוֹת הִנֵּה ׀ בָּרֲכוּ אֶת־יְהוָה כָּל־עַבְדֵי יְהוָה הָעֹמְדִים בְּבֵית־יְהוָה בַּלֵּילוֹת׃","שְׂאוּ־יְדֵכֶם קֹדֶשׁ וּבָרֲכוּ אֶת־יְהוָה׃","יְבָרֶכְךָ יְהוָה מִצִּיּוֹן עֹשֵׂה שָׁמַיִם וָאָרֶץ׃"],"135":["הַלְלוּ יָהּ ׀ הַלְלוּ אֶת־שֵׁם יְהוָה הַלְלוּ עַבְדֵי יְהוָה׃","שֶׁעֹמְדִים בְּבֵית יְהוָה בְּחַצְרוֹת בֵּית אֱלֹהֵינוּ׃","הַלְלוּ־יָהּ כִּי־טוֹב יְהוָה זַמְּרוּ לִשְׁמוֹ כִּי נָעִים׃","כִּי־יַעֲקֹב בָּחַר לוֹ יָהּ יִשְׂרָאֵל לִסְגֻלָּתוֹ׃","כִּי אֲנִי יָדַעְתִּי כִּי־גָדוֹל יְהוָה וַאֲדֹנֵינוּ מִכָּל־אֱלֹהִים׃","כֹּל אֲשֶׁר־חָפֵץ יְהוָה עָשָׂה בַּשָּׁמַיִם וּבָאָרֶץ בַּיַּמִּים וְכָל־תְּהוֹמוֹת׃","מַעֲלֶה נְשִׂאִים מִקְצֵה הָאָרֶץ בְּרָקִים לַמָּטָר עָשָׂה מוֹצֵא־רוּחַ מֵאוֹצְרוֹתָיו׃","שֶׁהִכָּה בְּכוֹרֵי מִצְרָיִם מֵאָדָם עַד־בְּהֵמָה׃","שָׁלַח ׀ אֹתוֹת וּמֹפְתִים בְּתוֹכֵכִי מִצְרָיִם בְּפַרְעֹה וּבְכָל־עֲבָדָיו׃","שֶׁהִכָּה גּוֹיִם רַבִּים וְהָרַג מְלָכִים עֲצוּמִים׃","לְסִיחוֹן ׀ מֶלֶךְ הָאֱמֹרִי וּלְעוֹג מֶלֶךְ הַבָּשָׁן וּלְכֹל מַמְלְכוֹת כְּנָעַן׃","וְנָתַן אַרְצָם נַחֲלָה נַחֲלָה לְיִשְׂרָאֵל עַמּוֹ׃","יְהוָה שִׁמְךָ לְעוֹלָם יְהוָה זִכְרְךָ לְדֹר־וָדֹר׃","כִּי־יָדִין יְהוָה עַמּוֹ וְעַל־עֲבָדָיו יִתְנֶחָם׃","עֲצַבֵּי הַגּוֹיִם כֶּסֶף וְזָהָב מַעֲשֵׂה יְדֵי אָדָם׃","פֶּה־לָהֶם וְלֹא יְדַבֵּרוּ עֵינַיִם לָהֶם וְלֹא יִרְאוּ׃","אָזְנַיִם לָהֶם וְלֹא יַאֲזִינוּ אַף אֵין־יֶשׁ־רוּחַ בְּפִיהֶם׃","כְּמוֹהֶם יִהְיוּ עֹשֵׂיהֶם כֹּל אֲשֶׁר־בֹּטֵחַ בָּהֶם׃","בֵּית יִשְׂרָאֵל בָּרֲכוּ אֶת־יְהוָה בֵּית אַהֲרֹן בָּרֲכוּ אֶת־יְהוָה׃","בֵּית הַלֵּוִי בָּרֲכוּ אֶת־יְהוָה יִרְאֵי יְהוָה בָּרֲכוּ אֶת־יְהוָה׃","בָּרוּךְ יְהוָה ׀ מִצִּיּוֹן שֹׁכֵן יְרוּשָׁלִָם הַלְלוּ־יָהּ׃"],"136":["הוֹדוּ לַיהוָה כִּי־טוֹב כִּי לְעוֹלָם חַסְדּוֹ׃","הוֹדוּ לֵאלֹהֵי הָאֱלֹהִים כִּי לְעוֹלָם חַסְדּוֹ׃","הוֹדוּ לַאֲדֹנֵי הָאֲדֹנִים כִּי לְעֹלָם חַסְדּוֹ׃","לְעֹשֵׂה נִפְלָאוֹת גְּדֹלוֹת לְבַדּוֹ כִּי לְעוֹלָם חַסְדּוֹ׃","לְעֹשֵׂה הַשָּׁמַיִם בִּתְבוּנָה כִּי לְעוֹלָם חַסְדּוֹ׃","לְרֹקַע הָאָרֶץ עַל־הַמָּיִם כִּי לְעוֹלָם חַסְדּוֹ׃","לְעֹשֵׂה אוֹרִים גְּדֹלִים כִּי לְעוֹלָם חַסְדּוֹ׃","אֶת־הַשֶּׁמֶשׁ לְמֶמְשֶׁלֶת בַּיּוֹם כִּי לְעוֹלָם חַסְדּוֹ׃","אֶת־הַיָּרֵחַ וְכוֹכָבִים לְמֶמְשְׁלוֹת בַּלָּיְלָה כִּי לְעוֹלָם חַסְדּוֹ׃","לְמַכֵּה מִצְרַיִם בִּבְכוֹרֵיהֶם כִּי לְעוֹלָם חַסְדּוֹ׃","וַיּוֹצֵא יִשְׂרָאֵל מִתּוֹכָם כִּי לְעוֹלָם חַסְדּוֹ׃","בְּיָד חֲזָקָה וּבִזְרוֹעַ נְטוּיָה כִּי לְעוֹלָם חַסְדּוֹ׃","לְגֹזֵר יַם־סוּף לִגְזָרִים כִּי לְעוֹלָם חַסְדּוֹ׃","וְהֶעֱבִיר יִשְׂרָאֵל בְּתוֹכוֹ כִּי לְעוֹלָם חַסְדּוֹ׃","וְנִעֵר פַּרְעֹה וְחֵילוֹ בְיַם־סוּף כִּי לְעוֹלָם חַסְדּוֹ׃","לְמוֹלִיךְ עַמּוֹ בַּמִּדְבָּר כִּי לְעוֹלָם חַסְדּוֹ׃","לְמַכֵּה מְלָכִים גְּדֹלִים כִּי לְעוֹלָם חַסְדּוֹ׃","וַיַּהֲרֹג מְלָכִים אַדִּירִים כִּי לְעוֹלָם חַסְדּוֹ׃","לְסִיחוֹן מֶלֶךְ הָאֱמֹרִי כִּי לְעוֹלָם חַסְדּוֹ׃","וּלְעוֹג מֶלֶךְ הַבָּשָׁן כִּי לְעוֹלָם חַסְדּוֹ׃","וְנָתַן אַרְצָם לְנַחֲלָה כִּי לְעוֹלָם חַסְדּוֹ׃","נַחֲלָה לְיִשְׂרָאֵל עַבְדּוֹ כִּי לְעוֹלָם חַסְדּוֹ׃","שֶׁבְּשִׁפְלֵנוּ זָכַר לָנוּ כִּי לְעוֹלָם חַסְדּוֹ׃","וַיִּפְרְקֵנוּ מִצָּרֵינוּ כִּי לְעוֹלָם חַסְדּוֹ׃","נֹתֵן לֶחֶם לְכָל־בָּשָׂר כִּי לְעוֹלָם חַסְדּוֹ׃","הוֹדוּ לְאֵל הַשָּׁמָיִם כִּי לְעוֹלָם חַסְדּוֹ׃"],"137":["עַל נַהֲרוֹת ׀ בָּבֶל שָׁם יָשַׁבְנוּ גַּם־בָּכִינוּ בְּזָכְרֵנוּ אֶת־צִיּוֹן׃","עַל־עֲרָבִים בְּתוֹכָהּ תָּלִינוּ כִּנֹּרוֹתֵינוּ׃","כִּי שָׁם שְׁאֵלוּנוּ שׁוֹבֵינוּ דִּבְרֵי־שִׁיר וְתוֹלָלֵינוּ שִׂמְחָה שִׁירוּ לָנוּ מִשִּׁיר צִיּוֹן׃","אֵיךְ נָשִׁיר אֶת־שִׁיר־יְהוָה עַל אַדְמַת נֵכָר׃","אִם־אֶשְׁכָּחֵךְ יְרוּשָׁלִָם תִּשְׁכַּח יְמִינִי׃","תִּדְבַּק־לְשׁוֹנִי ׀ לְחִכִּי אִם־לֹא אֶזְכְּרֵכִי אִם־לֹא אַעֲלֶה אֶת־יְרוּשָׁלִַם עַל רֹאשׁ שִׂמְחָתִי׃","זְכֹר יְהוָה ׀ לִבְנֵי אֱדוֹם אֵת יוֹם יְרוּשָׁלִָם הָאֹמְרִים עָרוּ ׀ עָרוּ עַד הַיְסוֹד בָּהּ׃","בַּת־בָּבֶל הַשְּׁדוּדָה אַשְׁרֵי שֶׁיְשַׁלֶּם־לָךְ אֶת־גְּמוּלֵךְ שֶׁגָּמַלְתְּ לָנוּ׃","אַשְׁרֵי ׀ שֶׁיֹּאחֵז וְנִפֵּץ אֶת־עֹלָלַיִךְ אֶל־הַסָּלַע׃"],"138":["לְדָוִד ׀ אוֹדְךָ בְכָל־לִבִּי נֶגֶד אֱלֹהִים אֲזַמְּרֶךָּ׃","אֶשְׁתַּחֲוֶה אֶל־הֵיכַל קָדְשְׁךָ וְאוֹדֶה אֶת־שְׁמֶךָ עַל־חַסְדְּךָ וְעַל־אֲמִתֶּךָ כִּי־הִגְדַּלְתָּ עַל־כָּל־שִׁמְךָ אִמְרָתֶךָ׃","בְּיוֹם קָרָאתִי וַתַּעֲנֵנִי תַּרְהִבֵנִי בְנַפְשִׁי עֹז׃","יוֹדוּךָ יְהוָה כָּל־מַלְכֵי־אָרֶץ כִּי שָׁמְעוּ אִמְרֵי־פִיךָ׃","וְיָשִׁירוּ בְּדַרְכֵי יְהוָה כִּי גָדוֹל כְּבוֹד יְהוָה׃","כִּי־רָם יְהוָה וְשָׁפָל יִרְאֶה וְגָבֹהַּ מִמֶּרְחָק יְיֵדָע׃","אִם־אֵלֵךְ ׀ בְּקֶרֶב צָרָה תְּחַיֵּנִי עַל אַף אֹיְבַי תִּשְׁלַח יָדֶךָ וְתוֹשִׁיעֵנִי יְמִינֶךָ׃","יְהוָה יִגְמֹר בַּעֲדִי יְהוָה חַסְדְּךָ לְעוֹלָם מַעֲשֵׂי יָדֶיךָ אַל־תֶּרֶף׃"],"139":["לַמְנַצֵּחַ לְדָוִד מִזְמוֹר יְהוָה חֲקַרְתַּנִי וַתֵּדָע׃","אַתָּה יָדַעְתָּ שִׁבְתִּי וְקוּמִי בַּנְתָּה לְרֵעִי מֵרָחוֹק׃","אָרְחִי וְרִבְעִי זֵרִיתָ וְכָל־דְּרָכַי הִסְכַּנְתָּה׃","כִּי אֵין מִלָּה בִּלְשׁוֹנִי הֵן יְהוָה יָדַעְתָּ כֻלָּהּ׃","אָחוֹר וָקֶדֶם צַרְתָּנִי וַתָּשֶׁת עָלַי כַּפֶּכָה׃","פלאיה דַעַת מִמֶּנִּי נִשְׂגְּבָה לֹא־אוּכַל לָהּ׃","אָנָה אֵלֵךְ מֵרוּחֶךָ וְאָנָה מִפָּנֶיךָ אֶבְרָח׃","אִם־אֶסַּק שָׁמַיִם שָׁם אָתָּה וְאַצִּיעָה שְּׁאוֹל הִנֶּךָּ׃","אֶשָּׂא כַנְפֵי־שָׁחַר אֶשְׁכְּנָה בְּאַחֲרִית יָם׃","גַּם־שָׁם יָדְךָ תַנְחֵנִי וְתֹאחֲזֵנִי יְמִינֶךָ׃","וָאֹמַר אַךְ־חֹשֶׁךְ יְשׁוּפֵנִי וְלַיְלָה אוֹר בַּעֲדֵנִי׃","גַּם־חֹשֶׁךְ לֹא־יַחְשִׁיךְ מִמֶּךָ וְלַיְלָה כַּיּוֹם יָאִיר כַּחֲשֵׁיכָה כָּאוֹרָה׃","כִּי־אַתָּה קָנִיתָ כִלְיֹתָי תְּסֻכֵּנִי בְּבֶטֶן אִמִּי׃","אוֹדְךָ עַל כִּי נוֹרָאוֹת נִפְלֵיתִי נִפְלָאִים מַעֲשֶׂיךָ וְנַפְשִׁי יֹדַעַת מְאֹד׃","לֹא־נִכְחַד עָצְמִי מִמֶּךָּ אֲשֶׁר־עֻשֵּׂיתִי בַסֵּתֶר רֻקַּמְתִּי בְּתַחְתִּיּוֹת אָרֶץ׃","גָּלְמִי ׀ רָאוּ עֵינֶיךָ וְעַל־סִפְרְךָ כֻּלָּם יִכָּתֵבוּ יָמִים יֻצָּרוּ ולא אֶחָד בָּהֶם׃","וְלִי מַה־יָּקְרוּ רֵעֶיךָ אֵל מֶה עָצְמוּ רָאשֵׁיהֶם׃","אֶסְפְּרֵם מֵחוֹל יִרְבּוּן הֱקִיצֹתִי וְעוֹדִי עִמָּךְ׃","אִם־תִּקְטֹל אֱלוֹהַּ ׀ רָשָׁע וְאַנְשֵׁי דָמִים סוּרוּ מֶנִּי׃","אֲשֶׁר יֹאמְרֻךָ לִמְזִמָּה נָשֻׂא לַשָּׁוְא עָרֶיךָ׃","הֲלוֹא־מְשַׂנְאֶיךָ יְהוָה ׀ אֶשְׂנָא וּבִתְקוֹמְמֶיךָ אֶתְקוֹטָט׃","תַּכְלִית שִׂנְאָה שְׂנֵאתִים לְאוֹיְבִים הָיוּ לִי׃","חָקְרֵנִי אֵל וְדַע לְבָבִי בְּחָנֵנִי וְדַע שַׂרְעַפָּי׃","וּרְאֵה אִם־דֶּרֶךְ־עֹצֶב בִּי וּנְחֵנִי בְּדֶרֶךְ עוֹלָם׃"],"140":["לַמְנַצֵּחַ מִזְמוֹר לְדָוִד׃","חַלְּצֵנִי יְהוָה מֵאָדָם רָע מֵאִישׁ חֲמָסִים תִּנְצְרֵנִי׃","אֲשֶׁר חָשְׁבוּ רָעוֹת בְּלֵב כָּל־יוֹם יָגוּרוּ מִלְחָמוֹת׃","שָׁנֲנוּ לְשׁוֹנָם כְּמוֹ־נָחָשׁ חֲמַת עַכְשׁוּב תַּחַת שְׂפָתֵימוֹ סֶלָה׃","שָׁמְרֵנִי יְהוָה ׀ מִידֵי רָשָׁע מֵאִישׁ חֲמָסִים תִּנְצְרֵנִי אֲשֶׁר חָשְׁבוּ לִדְחוֹת פְּעָמָי׃","טָמְנוּ־גֵאִים ׀ פַּח לִי וַחֲבָלִים פָּרְשׂוּ רֶשֶׁת לְיַד־מַעְגָּל מֹקְשִׁים שָׁתוּ־לִי סֶלָה׃","אָמַרְתִּי לַיהוָה אֵלִי אָתָּה הַאֲזִינָה יְהוָה קוֹל תַּחֲנוּנָי׃","יְהֹוִה אֲדֹנָי עֹז יְשׁוּעָתִי סַכֹּתָה לְרֹאשִׁי בְּיוֹם נָשֶׁק׃","אַל־תִּתֵּן יְהוָה מַאֲוַיֵּי רָשָׁע זְמָמוֹ אַל־תָּפֵק יָרוּמוּ סֶלָה׃","רֹאשׁ מְסִבָּי עֲמַל שְׂפָתֵימוֹ יכסומו׃","ימיטו עֲלֵיהֶם גֶּחָלִים בָּאֵשׁ יַפִּלֵם בְּמַהֲמֹרוֹת בַּל־יָקוּמוּ׃","אִישׁ לָשׁוֹן בַּל־יִכּוֹן בָּאָרֶץ אִישׁ־חָמָס רָע יְצוּדֶנּוּ לְמַדְחֵפֹת׃","ידעת כִּי־יַעֲשֶׂה יְהוָה דִּין עָנִי מִשְׁפַּט אֶבְיֹנִים׃","אַךְ צַדִּיקִים יוֹדוּ לִשְׁמֶךָ יֵשְׁבוּ יְשָׁרִים אֶת־פָּנֶיךָ׃"],"141":["מִזְמוֹר לְדָוִד יְהוָה קְרָאתִיךָ חוּשָׁה לִּי הַאֲזִינָה קוֹלִי בְּקָרְאִי־לָךְ׃","תִּכּוֹן תְּפִלָּתִי קְטֹרֶת לְפָנֶיךָ מַשְׂאַת כַּפַּי מִנְחַת־עָרֶב׃","שִׁיתָה יְהוָה שָׁמְרָה לְפִי נִצְּרָה עַל־דַּל שְׂפָתָי׃","אַל־תַּט־לִבִּי לְדָבָר ׀ רָע לְהִתְעוֹלֵל עֲלִלוֹת ׀ בְּרֶשַׁע אֶת־אִישִׁים פֹּעֲלֵי־אָוֶן וּבַל־אֶלְחַם בְּמַנְעַמֵּיהֶם׃","יֶהֶלְמֵנִי־צַדִּיק ׀ חֶסֶד וְיוֹכִיחֵנִי שֶׁמֶן רֹאשׁ אַל־יָנִי רֹאשִׁי כִּי־עוֹד וּתְפִלָּתִי בְּרָעוֹתֵיהֶם׃","נִשְׁמְטוּ בִידֵי־סֶלַע שֹׁפְטֵיהֶם וְשָׁמְעוּ אֲמָרַי כִּי נָעֵמוּ׃","כְּמוֹ פֹלֵחַ וּבֹקֵעַ בָּאָרֶץ נִפְזְרוּ עֲצָמֵינוּ לְפִי שְׁאוֹל׃","כִּי אֵלֶיךָ ׀ יְהֹוִה אֲדֹנָי עֵינָי בְּכָה חָסִיתִי אַל־תְּעַר נַפְשִׁי׃","שָׁמְרֵנִי מִידֵי פַח יָקְשׁוּ לִי וּמֹקְשׁוֹת פֹּעֲלֵי אָוֶן׃","יִפְּלוּ בְמַכְמֹרָיו רְשָׁעִים יַחַד אָנֹכִי עַד־אֶעֱבוֹר׃"],"142":["מַשְׂכִּיל לְדָוִד בִּהְיוֹתוֹ בַמְּעָרָה תְפִלָּה׃","קוֹלִי אֶל־יְהוָה אֶזְעָק קוֹלִי אֶל־יְהוָה אֶתְחַנָּן׃","אֶשְׁפֹּךְ לְפָנָיו שִׂיחִי צָרָתִי לְפָנָיו אַגִּיד׃","בְּהִתְעַטֵּף עָלַי ׀ רוּחִי וְאַתָּה יָדַעְתָּ נְתִיבָתִי בְּאֹרַח־זוּ אֲהַלֵּךְ טָמְנוּ פַח לִי׃","הַבֵּיט יָמִין ׀ וּרְאֵה וְאֵין־לִי מַכִּיר אָבַד מָנוֹס מִמֶּנִּי אֵין דּוֹרֵשׁ לְנַפְשִׁי׃","זָעַקְתִּי אֵלֶיךָ יְהוָה אָמַרְתִּי אַתָּה מַחְסִי חֶלְקִי בְּאֶרֶץ הַחַיִּים׃","הַקְשִׁיבָה ׀ אֶל־רִנָּתִי כִּי־דַלּוֹתִי מְאֹד הַצִּילֵנִי מֵרֹדְפַי כִּי אָמְצוּ מִמֶּנִּי׃","הוֹצִיאָה מִמַּסְגֵּר ׀ נַפְשִׁי לְהוֹדוֹת אֶת־שְׁמֶךָ בִּי יַכְתִּרוּ צַדִּיקִים כִּי תִגְמֹל עָלָי׃"],"143":["מִזְמוֹר לְדָוִד יְהוָה ׀ שְׁמַע תְּפִלָּתִי הַאֲזִינָה אֶל־תַּחֲנוּנַי בֶּאֱמֻנָתְךָ עֲנֵנִי בְּצִדְקָתֶךָ׃","וְאַל־תָּבוֹא בְמִשְׁפָּט אֶת־עַבְדֶּךָ כִּי לֹא־יִצְדַּק לְפָנֶיךָ כָל־חָי׃","כִּי רָדַף אוֹיֵב ׀ נַפְשִׁי דִּכָּא לָאָרֶץ חַיָּתִי הוֹשִׁיבַנִי בְמַחֲשַׁכִּים כְּמֵתֵי עוֹלָם׃","וַתִּתְעַטֵּף עָלַי רוּחִי בְּתוֹכִי יִשְׁתּוֹמֵם לִבִּי׃","זָכַרְתִּי יָמִים ׀ מִקֶּדֶם הָגִיתִי בְכָל־פָּעֳלֶךָ בְּמַעֲשֵׂה יָדֶיךָ אֲשׂוֹחֵחַ׃","פֵּרַשְׂתִּי יָדַי אֵלֶיךָ נַפְשִׁי ׀ כְּאֶרֶץ־עֲיֵפָה לְךָ סֶלָה׃","מַהֵר עֲנֵנִי ׀ יְהוָה כָּלְתָה רוּחִי אַל־תַּסְתֵּר פָּנֶיךָ מִמֶּנִּי וְנִמְשַׁלְתִּי עִם־יֹרְדֵי בוֹר׃","הַשְׁמִיעֵנִי בַבֹּקֶר ׀ חַסְדֶּךָ כִּי־בְךָ בָטָחְתִּי הוֹדִיעֵנִי דֶּרֶךְ־זוּ אֵלֵךְ כִּי־אֵלֶיךָ נָשָׂאתִי נַפְשִׁי׃","הַצִּילֵנִי מֵאֹיְבַי ׀ יְהוָה אֵלֶיךָ כִסִּתִי׃","לַמְּדֵנִי ׀ לַעֲשׂוֹת רְצוֹנֶךָ כִּי־אַתָּה אֱלוֹהָי רוּחֲךָ טוֹבָה תַּנְחֵנִי בְּאֶרֶץ מִישׁוֹר׃","לְמַעַן־שִׁמְךָ יְהוָה תְּחַיֵּנִי בְּצִדְקָתְךָ ׀ תוֹצִיא מִצָּרָה נַפְשִׁי׃","וּבְחַסְדְּךָ תַּצְמִית אֹיְבָי וְהַאֲבַדְתָּ כָּל־צֹרֲרֵי נַפְשִׁי כִּי אֲנִי עַבְדֶּךָ׃"],"144":["לְדָוִד ׀ בָּרוּךְ יְהוָה ׀ צוּרִי הַמְלַמֵּד יָדַי לַקְרָב אֶצְבְּעוֹתַי לַמִּלְחָמָה׃","חַסְדִּי וּמְצוּדָתִי מִשְׂגַּבִּי וּמְפַלְטִי לִי מָגִנִּי וּבוֹ חָסִיתִי הָרוֹדֵד עַמִּי תַחְתָּי׃","יְהוָה מָה־אָדָם וַתֵּדָעֵהוּ בֶּן־אֱנוֹשׁ וַתְּחַשְּׁבֵהוּ׃","אָדָם לַהֶבֶל דָּמָה יָמָיו כְּצֵל עוֹבֵר׃","יְהוָה הַט־שָׁמֶיךָ וְתֵרֵד גַּע בֶּהָרִים וְיֶעֱשָׁנוּ׃","בְּרוֹק בָּרָק וּתְפִיצֵם שְׁלַח חִצֶּיךָ וּתְהֻמֵּם׃","שְׁלַח יָדֶיךָ מִמָּרוֹם פְּצֵנִי וְהַצִּילֵנִי מִמַּיִם רַבִּים מִיַּד בְּנֵי נֵכָר׃","אֲשֶׁר פִּיהֶם דִּבֶּר־שָׁוְא וִימִינָם יְמִין שָׁקֶר׃","אֱלֹהִים שִׁיר חָדָשׁ אָשִׁירָה לָּךְ בְּנֵבֶל עָשׂוֹר אֲזַמְּרָה־לָּךְ׃","הַנּוֹתֵן תְּשׁוּעָה לַמְּלָכִים הַפּוֹצֶה אֶת־דָּוִד עַבְדּוֹ מֵחֶרֶב רָעָה׃","פְּצֵנִי וְהַצִּילֵנִי מִיַּד בְּנֵי־נֵכָר אֲשֶׁר פִּיהֶם דִּבֶּר־שָׁוְא וִימִינָם יְמִין שָׁקֶר׃","אֲשֶׁר בָּנֵינוּ ׀ כִּנְטִעִים מְגֻדָּלִים בִּנְעוּרֵיהֶם בְּנוֹתֵינוּ כְזָוִיֹּת מְחֻטָּבוֹת תַּבְנִית הֵיכָל׃","מְזָוֵינוּ מְלֵאִים מְפִיקִים מִזַּן אֶל־זַן צֹאונֵנוּ מַאֲלִיפוֹת מְרֻבָּבוֹת בְּחוּצוֹתֵינוּ׃","אַלּוּפֵינוּ מְסֻבָּלִים אֵין־פֶּרֶץ וְאֵין יוֹצֵאת וְאֵין צְוָחָה בִּרְחֹבֹתֵינוּ׃","אַשְׁרֵי הָעָם שֶׁכָּכָה לּוֹ אַשְׁרֵי הָעָם שֶׁיֲהוָה אֱלֹהָיו׃"],"145":["תְּהִלָּה לְדָוִד אֲרוֹמִמְךָ אֱלוֹהַי הַמֶּלֶךְ וַאֲבָרֲכָה שִׁמְךָ לְעוֹלָם וָעֶד׃","בְּכָל־יוֹם אֲבָרֲכֶךָּ וַאֲהַלְלָה שִׁמְךָ לְעוֹלָם וָעֶד׃","גָּדוֹל יְהוָה וּמְהֻלָּל מְאֹד וְלִגְדֻלָּתוֹ אֵין חֵקֶר׃","דּוֹר לְדוֹר יְשַׁבַּח מַעֲשֶׂיךָ וּגְבוּרֹתֶיךָ יַגִּידוּ׃","הֲדַר כְּבוֹד הוֹדֶךָ וְדִבְרֵי נִפְלְאוֹתֶיךָ אָשִׂיחָה׃","וֶעֱזוּז נוֹרְאֹתֶיךָ יֹאמֵרוּ וגדולתיך אֲסַפְּרֶנָּה׃","זֵכֶר רַב־טוּבְךָ יַבִּיעוּ וְצִדְקָתְךָ יְרַנֵּנוּ׃","חַנּוּן וְרַחוּם יְהוָה אֶרֶךְ אַפַּיִם וּגְדָל־חָסֶד׃","טוֹב־יְהוָה לַכֹּל וְרַחֲמָיו עַל־כָּל־מַעֲשָׂיו׃","יוֹדוּךָ יְהוָה כָּל־מַעֲשֶׂיךָ וַחֲסִידֶיךָ יְבָרֲכוּכָה׃","כְּבוֹד מַלְכוּתְךָ יֹאמֵרוּ וּגְבוּרָתְךָ יְדַבֵּרוּ׃","לְהוֹדִיעַ ׀ לִבְנֵי הָאָדָם גְּבוּרֹתָיו וּכְבוֹד הֲדַר מַלְכוּתוֹ׃","מַלְכוּתְךָ מַלְכוּת כָּל־עֹלָמִים וּמֶמְשֶׁלְתְּךָ בְּכָל־דּוֹר וָדוֹר׃","סוֹמֵךְ יְהוָה לְכָל־הַנֹּפְלִים וְזוֹקֵף לְכָל־הַכְּפוּפִים׃","עֵינֵי־כֹל אֵלֶיךָ יְשַׂבֵּרוּ וְאַתָּה נוֹתֵן־לָהֶם אֶת־אָכְלָם בְּעִתּוֹ׃","פּוֹתֵחַ אֶת־יָדֶךָ וּמַשְׂבִּיעַ לְכָל־חַי רָצוֹן׃","צַדִּיק יְהוָה בְּכָל־דְּרָכָיו וְחָסִיד בְּכָל־מַעֲשָׂיו׃","קָרוֹב יְהוָה לְכָל־קֹרְאָיו לְכֹל אֲשֶׁר יִקְרָאֻהוּ בֶאֱמֶת׃","רְצוֹן־יְרֵאָיו יַעֲשֶׂה וְאֶת־שַׁוְעָתָם יִשְׁמַע וְיוֹשִׁיעֵם׃","שׁוֹמֵר יְהוָה אֶת־כָּל־אֹהֲבָיו וְאֵת כָּל־הָרְשָׁעִים יַשְׁמִיד׃","תְּהִלַּת יְהוָה יְדַבֶּר־פִּי וִיבָרֵךְ כָּל־בָּשָׂר שֵׁם קָדְשׁוֹ לְעוֹלָם וָעֶד׃"],"146":["הַלְלוּ־יָהּ הַלְלִי נַפְשִׁי אֶת־יְהוָה׃","אֲהַלְלָה יְהוָה בְּחַיָּי אֲזַמְּרָה לֵאלֹהַי בְּעוֹדִי׃","אַל־תִּבְטְחוּ בִנְדִיבִים בְּבֶן־אָדָם ׀ שֶׁאֵין לוֹ תְשׁוּעָה׃","תֵּצֵא רוּחוֹ יָשֻׁב לְאַדְמָתוֹ בַּיּוֹם הַהוּא אָבְדוּ עֶשְׁתֹּנֹתָיו׃","אַשְׁרֵי שֶׁאֵל יַעֲקֹב בְּעֶזְרוֹ שִׂבְרוֹ עַל־יְהוָה אֱלֹהָיו׃","עֹשֶׂה ׀ שָׁמַיִם וָאָרֶץ אֶת־הַיָּם וְאֶת־כָּל־אֲשֶׁר־בָּם הַשֹּׁמֵר אֱמֶת לְעוֹלָם׃","עֹשֶׂה מִשְׁפָּט ׀ לָעֲשׁוּקִים נֹתֵן לֶחֶם לָרְעֵבִים יְהוָה מַתִּיר אֲסוּרִים׃","יְהוָה ׀ פֹּקֵחַ עִוְרִים יְהוָה זֹקֵף כְּפוּפִים יְהוָה אֹהֵב צַדִּיקִים׃","יְהוָה ׀ שֹׁמֵר אֶת־גֵּרִים יָתוֹם וְאַלְמָנָה יְעוֹדֵד וְדֶרֶךְ רְשָׁעִים יְעַוֵּת׃","יִמְלֹךְ יְהוָה ׀ לְעוֹלָם אֱלֹהַיִךְ צִיּוֹן לְדֹר וָדֹר הַלְלוּ־יָהּ׃"],"147":["הַלְלוּ יָהּ ׀ כִּי־טוֹב זַמְּרָה אֱלֹהֵינוּ כִּי־נָעִים נָאוָה תְהִלָּה׃","בּוֹנֵה יְרוּשָׁלִַם יְהוָה נִדְחֵי יִשְׂרָאֵל יְכַנֵּס׃","הָרֹפֵא לִשְׁבוּרֵי לֵב וּמְחַבֵּשׁ לְעַצְּבוֹתָם׃","מוֹנֶה מִסְפָּר לַכּוֹכָבִים לְכֻלָּם שֵׁמוֹת יִקְרָא׃","גָּדוֹל אֲדוֹנֵינוּ וְרַב־כֹּחַ לִתְבוּנָתוֹ אֵין מִסְפָּר׃","מְעוֹדֵד עֲנָוִים יְהוָה מַשְׁפִּיל רְשָׁעִים עֲדֵי־אָרֶץ׃","עֱנוּ לַיהוָה בְּתוֹדָה זַמְּרוּ לֵאלֹהֵינוּ בְכִנּוֹר׃","הַמְכַסֶּה שָׁמַיִם ׀ בְּעָבִים הַמֵּכִין לָאָרֶץ מָטָר הַמַּצְמִיחַ הָרִים חָצִיר׃","נוֹתֵן לִבְהֵמָה לַחְמָהּ לִבְנֵי עֹרֵב אֲשֶׁר יִקְרָאוּ׃","לֹא בִגְבוּרַת הַסּוּס יֶחְפָּץ לֹא־בְשׁוֹקֵי הָאִישׁ יִרְצֶה׃","רוֹצֶה יְהוָה אֶת־יְרֵאָיו אֶת־הַמְיַחֲלִים לְחַסְדּוֹ׃","שַׁבְּחִי יְרוּשָׁלִַם אֶת־יְהוָה הַלְלִי אֱלֹהַיִךְ צִיּוֹן׃","כִּי־חִזַּק בְּרִיחֵי שְׁעָרָיִךְ בֵּרַךְ בָּנַיִךְ בְּקִרְבֵּךְ׃","הַשָּׂם־גְּבוּלֵךְ שָׁלוֹם חֵלֶב חִטִּים יַשְׂבִּיעֵךְ׃","הַשֹּׁלֵחַ אִמְרָתוֹ אָרֶץ עַד־מְהֵרָה יָרוּץ דְּבָרוֹ׃","הַנֹּתֵן שֶׁלֶג כַּצָּמֶר כְּפוֹר כָּאֵפֶר יְפַזֵּר׃","מַשְׁלִיךְ קַרְחוֹ כְפִתִּים לִפְנֵי קָרָתוֹ מִי יַעֲמֹד׃","יִשְׁלַח דְּבָרוֹ וְיַמְסֵם יַשֵּׁב רוּחוֹ יִזְּלוּ־מָיִם׃","מַגִּיד דברו לְיַעֲקֹב חֻקָּיו וּמִשְׁפָּטָיו לְיִשְׂרָאֵל׃","לֹא עָשָׂה כֵן ׀ לְכָל־גּוֹי וּמִשְׁפָּטִים בַּל־יְדָעוּם הַלְלוּ־יָהּ׃"],"148":["הַלְלוּ יָהּ ׀ הַלְלוּ אֶת־יְהוָה מִן־הַשָּׁמַיִם הַלְלוּהוּ בַּמְּרוֹמִים׃","הַלְלוּהוּ כָל־מַלְאָכָיו הַלְלוּהוּ כָּל־צבאו׃","הַלְלוּהוּ שֶׁמֶשׁ וְיָרֵחַ הַלְלוּהוּ כָּל־כּוֹכְבֵי אוֹר׃","הַלְלוּהוּ שְׁמֵי הַשָּׁמָיִם וְהַמַּיִם אֲשֶׁר ׀ מֵעַל הַשָּׁמָיִם׃","יְהַלְלוּ אֶת־שֵׁם יְהוָה כִּי הוּא צִוָּה וְנִבְרָאוּ׃","וַיַּעֲמִידֵם לָעַד לְעוֹלָם חָק־נָתַן וְלֹא יַעֲבוֹר׃","הַלְלוּ אֶת־יְהוָה מִן־הָאָרֶץ תַּנִּינִים וְכָל־תְּהֹמוֹת׃","אֵשׁ וּבָרָד שֶׁלֶג וְקִיטוֹר רוּחַ סְעָרָה עֹשָׂה דְבָרוֹ׃","הֶהָרִים וְכָל־גְּבָעוֹת עֵץ פְּרִי וְכָל־אֲרָזִים׃","הַחַיָּה וְכָל־בְּהֵמָה רֶמֶשׂ וְצִפּוֹר כָּנָף׃","מַלְכֵי־אֶרֶץ וְכָל־לְאֻמִּים שָׂרִים וְכָל־שֹׁפְטֵי אָרֶץ׃","בַּחוּרִים וְגַם־בְּתוּלוֹת זְקֵנִים עִם־נְעָרִים׃","יְהַלְלוּ ׀ אֶת־שֵׁם יְהוָה כִּי־נִשְׂגָּב שְׁמוֹ לְבַדּוֹ הוֹדוֹ עַל־אֶרֶץ וְשָׁמָיִם׃","וַיָּרֶם קֶרֶן ׀ לְעַמּוֹ תְּהִלָּה לְכָל־חֲסִידָיו לִבְנֵי יִשְׂרָאֵל עַם־קְרֹבוֹ הַלְלוּ־יָהּ׃"],"149":["הַלְלוּ יָהּ ׀ שִׁירוּ לַיהוָה שִׁיר חָדָשׁ תְּהִלָּתוֹ בִּקְהַל חֲסִידִים׃","יִשְׂמַח יִשְׂרָאֵל בְּעֹשָׂיו בְּנֵי־צִיּוֹן יָגִילוּ בְמַלְכָּם׃","יְהַלְלוּ שְׁמוֹ בְמָחוֹל בְּתֹף וְכִנּוֹר יְזַמְּרוּ־לוֹ׃","כִּי־רוֹצֶה יְהוָה בְּעַמּוֹ יְפָאֵר עֲנָוִים בִּישׁוּעָה׃","יַעְלְזוּ חֲסִידִים בְּכָבוֹד יְרַנְּנוּ עַל־מִשְׁכְּבוֹתָם׃","רוֹמְמוֹת אֵל בִּגְרוֹנָם וְחֶרֶב פִּיפִיּוֹת בְּיָדָם׃","לַעֲשׂוֹת נְקָמָה בַּגּוֹיִם תּוֹכֵחֹת בַּל־אֻמִּים׃","לֶאְסֹר מַלְכֵיהֶם בְּזִקִּים וְנִכְבְּדֵיהֶם בְּכַבְלֵי בַרְזֶל׃","לַעֲשׂוֹת בָּהֶם ׀ מִשְׁפָּט כָּתוּב הָדָר הוּא לְכָל־חֲסִידָיו הַלְלוּ־יָהּ׃"],"150":["הַלְלוּ יָהּ ׀ הַלְלוּ־אֵל בְּקָדְשׁוֹ הַלְלוּהוּ בִּרְקִיעַ עֻזּוֹ׃","הַלְלוּהוּ בִגְבוּרֹתָיו הַלְלוּהוּ כְּרֹב גֻּדְלוֹ׃","הַלְלוּהוּ בְּתֵקַע שׁוֹפָר הַלְלוּהוּ בְּנֵבֶל וְכִנּוֹר׃","הַלְלוּהוּ בְתֹף וּמָחוֹל הַלְלוּהוּ בְּמִנִּים וְעוּגָב׃","הַלְלוּהוּ בְצִלְצְלֵי־שָׁמַע הַלְלוּהוּ בְּצִלְצְלֵי תְרוּעָה׃","כֹּל הַנְּשָׁמָה תְּהַלֵּל יָהּ הַלְלוּ־יָהּ׃"]};</script>

  const z=zmanimFor(dateObj); const out=[];
  for(const [k,label,ic] of ZDEFS){ let d=null; try{ d=z[k](); }catch(e){} out.push({key:k,label,icon:ic,date:d}); }
  return out;
}

/* ---------- halachic hebrew date (sunset rollover) ---------- */
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function civilToday(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function currentHDate(){
  const now=new Date(); let base=civilToday();
  if(S.sunsetRoll){ try{ const ss=zmanimFor(base).sunset(); if(ss && now>=ss) base=addDays(base,1); }catch(e){} }
  return new HDate(base);
}

/* ---------- portions ---------- */
const WEEKLY = [[1,29],[30,50],[51,72],[73,89],[90,106],[107,119],[120,150]]; // Sun..Sat
function monthlyPortion(hd){ const day=hd.getDate(), len=hd.daysInMonth();
  if(len===29 && day===29) return [141,150];
  const s=5*(day-1)+1; return [s, Math.min(150,s+4)]; }
function weeklyPortion(hd){ return WEEKLY[hd.getDay()].slice(); }
function portionFor(hd,mode){ mode=mode||S.division; return mode==='weekly'?weeklyPortion(hd):monthlyPortion(hd); }
function chaptersOf(range){ const a=[]; for(let i=range[0];i<=range[1];i++) a.push(i); return a; }

/* ---------- progress ---------- */
function progKey(){ return String(currentHDate().abs()); }
let PROG = JSON.parse(localStorage.getItem('betel_prog')||'{}');
function readSet(){ const k=progKey(); return new Set(PROG[k]||[]); }
function markRead(ch){ const k=progKey(); const set=new Set(PROG[k]||[]); if(set.has(ch))return false; set.add(ch); PROG[k]=[...set]; localStorage.setItem('betel_prog',JSON.stringify(PROG)); return true; }
function isRead(ch){ return readSet().has(ch); }

function nextZmanText(){
  const now=new Date(); let list=zmanimList(civilToday()).filter(z=>z.date&&z.date>now);
  let z=list[0];
  if(!z){ const tm=zmanimList(addDays(civilToday(),1)); z=tm.find(x=>x.date); }
  if(!z||!z.date) return null;
  let diff=Math.round((z.date-now)/60000); if(diff<0) return null;
  let t; if(diff<60) t='בְּעוֹד '+diff+' דַּקּוֹת'; else { const hh=Math.floor(diff/60),mm=diff%60; t='בְּעוֹד '+hh+'ש\''+(mm?' '+mm+'ד\'':''); }
  return {label:z.label, t, time:fmtTime(z.date)};
}

/* ================= READER ================= */
let RD=null; // {chapters, idx, daily, hd, showPrayers}
function openReader(chapters, opt){
  opt=opt||{};
  let idx=0; if(opt.start){ const p=chapters.indexOf(opt.start); if(p>=0) idx=p; }
  RD={ chapters:chapters.slice(), idx, daily:!!opt.daily, hd:opt.hd||currentHDate() };
  TAB='reader'; renderReader(); window.scrollTo({top:0});
}
function prayerBlock(which){
  const pr=P[which]; if(!pr) return '';
  const body=pr.paras.map(p=>`<p>${p}</p>`).join('');
  return `<div class="prayer collapsed" data-prayer>
    <div class="prayer-title">${pr.title}</div>
    <div class="pbody">${body}</div>
    <div class="prayer-toggle" data-ptoggle>${I.chev}<span>הַצֵּג / הַסְתֵּר</span></div>
  </div>`;
}
function chapterHTML(ch){
  const verses=T[ch]||[];
  const body=verses.map((v,i)=>`<span class="verse"><span class="vn">${heNum(i+1)}</span>${v}</span> `).join('');
  return `<div class="chapter" data-ch="${ch}">
    <div class="chapter-title">מִזְמוֹר <span class="num">${heNum(ch)}</span></div>
    <div class="chapter-cap">פֶּרֶק ${ch} · ${verses.length} פְּסוּקִים</div>
    <div class="psalm-body">${body}</div>
  </div>`;
}
function renderReader(){
  const ch=RD.chapters[RD.idx];
  const first=RD.idx===0, last=RD.idx===RD.chapters.length-1;
  const total=RD.chapters.length;
  const headTitle = RD.daily ? ('קְרִיאַת הַיּוֹם · '+(RD.idx+1)+'/'+total) : 'תְּהִלִּים';
  // prayers: daily -> before on first, after on last; browse -> both around every chapter
  const showBefore = RD.daily ? first : true;
  const showAfter  = RD.daily ? last  : true;
  const showDone   = RD.daily && last;
  app.innerHTML = `
  <div class="reader view">
    <div class="reader-head">
      <div class="reader-top">
        <button class="icon-btn" id="rBack">${I.prev}</button>
        <div class="reader-title">${headTitle}</div>
        <button class="icon-btn" id="rShare">${I.share}</button>
      </div>
      <div class="reader-progress"><i style="width:${RD.daily?(((RD.idx+1)/total)*100):((ch/150)*100)}%"></i></div>
    </div>
    ${showBefore?prayerBlock('before'):''}
    <div id="chWrap">${chapterHTML(ch)}</div>
    ${showAfter?prayerBlock('after'):''}
    <div class="reader-nav">
      <button class="rnav-btn" id="rPrev" ${first?'disabled':''}>${I.prev}<span>הַקּוֹדֵם</span></button>
      ${ showDone
        ? `<button class="rnav-btn done" id="rDone">${I.check}<span>סִיַּמְתִּי אֶת הַקְּרִיאָה</span></button>`
        : `<button class="rnav-btn" id="rNext" ${last?'disabled':''}><span>הַבָּא</span>${I.next}</button>` }
    </div>
    <div style="height:26px"></div>
  </div>
  <div class="reader-tools">
    <button id="tMinus">${I.aminus}</button>
    <div class="fs-val" id="tFs">${Math.round(S.fontScale*100)}</div>
    <button id="tPlus">${I.aplus}</button>
    <div class="sep"></div>
    <button id="tTheme">${S.theme==='dark'?I.sun:I.moon}</button>
    <button id="tHome">${I.home}</button>
  </div>`;
  wireReader();
}
function wireReader(){
  const back=()=> RD.daily?go('home'):go('tehillim');
  document.getElementById('rBack').onclick=back;
  document.getElementById('tHome').onclick=()=>go('home');
  document.getElementById('rShare').onclick=()=>shareChapter(RD.chapters[RD.idx]);
  // prayer toggles
  app.querySelectorAll('[data-prayer]').forEach(pb=>{
    pb.querySelector('[data-ptoggle]').onclick=()=>pb.classList.toggle('collapsed');
  });
  const prev=document.getElementById('rPrev'); if(prev) prev.onclick=()=>{ if(RD.idx>0){ markRead(RD.chapters[RD.idx]); RD.idx--; renderReader(); window.scrollTo({top:0}); } };
  const next=document.getElementById('rNext'); if(next) next.onclick=()=>{
    markRead(RD.chapters[RD.idx]); RD.idx++; renderReader(); window.scrollTo({top:0});
  };
  const done=document.getElementById('rDone'); if(done) done.onclick=()=>{
    markRead(RD.chapters[RD.idx]); finishReading();
  };
  // tools
  document.getElementById('tMinus').onclick=()=>changeFont(-0.1);
  document.getElementById('tPlus').onclick=()=>changeFont(0.1);
  document.getElementById('tTheme').onclick=()=>{ toggleTheme(); document.getElementById('tTheme').innerHTML=S.theme==='dark'?I.sun:I.moon; };
}
function changeFont(d){ S.fontScale=Math.min(1.7,Math.max(0.8,Math.round((S.fontScale+d)*10)/10)); saveS(); applySettings();
  const el=document.getElementById('tFs'); if(el) el.textContent=Math.round(S.fontScale*100); }
function finishReading(){
  // check whole-book completion (monthly last day → ends at 150 and all read)
  const hd=RD.hd||currentHDate();
  const range=portionFor(hd);
  const grand = RD.daily && range[1]===150;
  if(RD.daily && grand) celebrate('grand'); else if(RD.daily) celebrate('daily'); else go('tehillim');
  if(!RD.daily && !grand) return;
}

/* ================= CALENDAR ================= */
let CAL=null; // {hd: first-of-month HDate}
function renderCalendar(){
  if(!CAL){ const t=currentHDate(); CAL={ y:t.getFullYear(), m:t.getMonth() }; }
  const first=new HDate(1, CAL.m, CAL.y);
  const len=first.daysInMonth();
  const today=currentHDate();
  // events for the month (holidays + parsha)
  const gStart=first.greg(); const gEnd=new HDate(len,CAL.m,CAL.y).greg();
  const evMap={};
  try{
    const evs=HebrewCalendar.calendar({start:gStart,end:gEnd,sedrot:true,il:/Jerusalem/.test(LOC.tz),locale:'he',noModern:false});
    evs.forEach(e=>{ const d=e.getDate(); const key=d.getDate()+'-'+d.getMonth(); (evMap[key]=evMap[key]||[]).push(e.render('he')); });
  }catch(e){}
  const selDay = (CAL.sel && CAL.sel.m===CAL.m && CAL.sel.y===CAL.y)? CAL.sel.d : (today.getMonth()===CAL.m&&today.getFullYear()===CAL.y? today.getDate():1);
  // build grid
  let cells='';
  const startDow=first.getDay();
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=len;d++){
    const hd=new HDate(d,CAL.m,CAL.y); const dow=hd.getDay();
    const key=d+'-'+CAL.m; const hasEv=!!evMap[key];
    const isToday=(hd.abs()===today.abs());
    const cls=['cal-cell']; if(isToday)cls.push('today'); if(hasEv)cls.push('hol'); if(dow===6)cls.push('sat'); if(d===selDay)cls.push('sel');
    cells+=`<div class="${cls.join(' ')}" data-day="${d}"><div class="hd">${heNum(d)}</div><div class="gd">${hd.greg().getDate()}/${hd.greg().getMonth()+1}</div></div>`;
  }
  app.innerHTML=`
  ${topbar('לוּחַ עִבְרִי')}
  <div class="view">
    <div class="cal-head">
      <button class="cal-nav" id="calPrevM">${I.prev}</button>
      <div class="cal-month"><div class="m">${monthNameHe(first)}</div><div class="y">${heNum(CAL.y)}</div></div>
      <button class="cal-nav" id="calNextM">${I.next}</button>
    </div>
    <div class="cal-grid">${DOW_SHORT.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    <div id="dayDetail"></div>
    ${ornament()}
  </div>`;
  document.getElementById('calPrevM').onclick=()=>{ let m=CAL.m-1,y=CAL.y; if(m<1){m=13;y--;} while(!monthExists(m,y)){m--; if(m<1){m=13;y--;}} CAL={y,m}; renderCalendar(); };
  document.getElementById('calNextM').onclick=()=>{ let m=CAL.m+1,y=CAL.y; if(!monthExists(m,y)){ m=1;y++; } CAL={y,m}; renderCalendar(); };
  app.querySelectorAll('[data-day]').forEach(c=>c.onclick=()=>{ CAL.sel={d:+c.dataset.day,m:CAL.m,y:CAL.y}; renderCalendar(); });
  renderDayDetail(new HDate(selDay,CAL.m,CAL.y), evMap[selDay+'-'+CAL.m]||[]);
}
function monthExists(m,y){ try{ const h=new HDate(1,m,y); return h.getMonth()===m; }catch(e){ return false; } }
function renderDayDetail(hd, events){
  const el=document.getElementById('dayDetail'); if(!el) return;
  const g=hd.greg();
  const mRange=monthlyPortion(hd), wRange=weeklyPortion(hd);
  const zlist=zmanimList(g);
  const now=new Date(); const isToday=hd.abs()===currentHDate().abs();
  let nextKey=null;
  if(isToday){ const nx=zlist.find(z=>z.date&&z.date>now); if(nx)nextKey=nx.key; }
  el.innerHTML=`
  <div class="day-detail card">
    <div class="dd-date">${DOW_HE[hd.getDay()]} · ${heNum(hd.getDate())} ${monthNameHe(hd)}</div>
    <div class="dd-greg">${g.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    ${events.length?`<div class="dd-events">${events.map(e=>`<span class="dd-event">${e}</span>`).join('')}</div>`:''}
    <div style="display:flex;gap:10px">
      <div class="dd-portion" style="flex:1" data-open="${mRange[0]},${mRange[1]}"><div class="lbl">קְרִיאָה חָדְשִׁית</div><div class="val">${heNum(mRange[0])}–${heNum(mRange[1])}</div></div>
      <div class="dd-portion" style="flex:1" data-open="${wRange[0]},${wRange[1]}"><div class="lbl">קְרִיאָה שְׁבוּעִית</div><div class="val">${heNum(wRange[0])}–${heNum(wRange[1])}</div></div>
    </div>
    <div class="loc-line">${I.loc}<span>${LOC.name}</span></div>
    <div class="zmanim-list">
      ${zlist.map(z=>`<div class="zman-row ${z.key===nextKey?'next':''}"><div class="zl"><span class="zi">${I[z.icon]||I.clock}</span><span class="zname">${z.label}</span></div><span class="ztime">${fmtTime(z.date)}</span></div>`).join('')}
    </div>
  </div>`;
  el.querySelectorAll('[data-open]').forEach(d=>d.onclick=()=>{ const [a,b]=d.dataset.open.split(',').map(Number); openReader(chaptersOf([a,b]),{daily:false}); });

    <div class="set-group">
      <h3>מִקּוּם וּזְמַנִּים</h3>
      <div class="set-item"><div class="si-l"><span class="si-ico">${I.loc}</span><div><div class="si-t">${LOC.name}</div><div class="si-d">${LOC.auto?'מְעֻדְכָּן לְפִי GPS':'מִקּוּם נִבְחָר'}</div></div></div></div>
      <div class="set-item" id="useGPS" style="cursor:pointer"><div class="si-l"><span class="si-ico">${I.loc}</span><div><div class="si-t">הִשְׁתַּמֵּשׁ בַּמִּקּוּם שֶׁלִּי</div><div class="si-d">אִתּוּר אוֹטוֹמָטִי לְפִי GPS</div></div></div>${I.refresh}</div>
      <div class="set-item" id="pickCity" style="cursor:pointer"><div class="si-l"><span class="si-ico">${I.search}</span><div><div class="si-t">בְּחַר מִקּוּם מֵרְשִׁימָה</div><div class="si-d">עָרִים מִכָּל הָעוֹלָם</div></div></div>${I.chev}</div>
    </div>

    <div class="set-group">
      <h3>שִׁתּוּף</h3>
      <div class="set-item" id="shareApp" style="cursor:pointer"><div class="si-l"><span class="si-ico">${I.share}</span><div><div class="si-t">שַׁתֵּף אֶת הָאַפְּלִיקַצְיָה</div><div class="si-d">שְׁלַח לַחֲבֵרִים בַּקְּהִלָּה</div></div></div>${I.chev}</div>
      <div class="set-item" id="resetProg" style="cursor:pointer"><div class="si-l"><span class="si-ico">${I.refresh}</span><div><div class="si-t">אִפּוּס מַעֲקַב הַיּוֹם</div><div class="si-d">נַקֵּה סִימוּן פְּרָקִים שֶׁנִּקְרְאוּ</div></div></div></div>
    </div>

    <div class="ornament">${ORN}</div>
    <div class="credit">אַפְּלִיקַצְיַת תְּהִלִּים<br><span class="cg">מֶרְכַּז ק״ק הַסְּפָרַדִּים · בֵּית אֵ-ל</span><br>אַנְטְוֶורְפֶּן בֶּלְגְּיָה</div>
  </div>`;
  document.getElementById('tgTheme').onclick=()=>{ toggleTheme(); renderSettings(); };
  document.getElementById('tgSunset').onclick=()=>{ S.sunsetRoll=!S.sunsetRoll; saveS(); renderSettings(); };
  document.getElementById('fsMinus').onclick=()=>{ changeFont(-0.1); document.getElementById('fsVal').textContent=Math.round(S.fontScale*100)+'%'; };
  document.getElementById('fsPlus').onclick=()=>{ changeFont(0.1); document.getElementById('fsVal').textContent=Math.round(S.fontScale*100)+'%'; };
  app.querySelectorAll('[data-div]').forEach(b=>b.onclick=()=>{ S.division=b.dataset.div; saveS(); renderSettings(); });
  document.getElementById('useGPS').onclick=()=>{ toast('מְאַתֵּר מִקּוּם…'); localStorage.setItem('betel_gps_tried','1'); requestGPS(ok=>{ toast(ok?'הַמִּקּוּם עֻדְכַּן לְפִי GPS':'לֹא הִתְקַבְּלָה הַרְשָׁאַת מִקּוּם'); renderSettings(); }); };
  document.getElementById('pickCity').onclick=openCityPicker;
  document.getElementById('shareApp').onclick=shareApp;
  document.getElementById('resetProg').onclick=()=>{ const k=progKey(); delete PROG[k]; localStorage.setItem('betel_prog',JSON.stringify(PROG)); toast('הַמַּעֲקָב אֻפַּס'); };
}
function toggleTheme(){ S.theme=S.theme==='dark'?'light':'dark'; saveS(); applySettings(); }

/* ================= SHARE ================= */
function copyText(t){ try{ if(navigator.clipboard&&navigator.clipboard.writeText) return navigator.clipboard.writeText(t); }catch(e){}
  return new Promise(res=>{ const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand('copy');}catch(e){} ta.remove(); res(); }); }
function shareSheet(title, text, url){
  const ov=document.createElement('div'); ov.className='overlay';
  const hasNative = !!navigator.share;
  ov.innerHTML=`<div class="modal" style="max-width:360px">
    <button class="close-x" data-close>${I.x}</button>
    <div class="m-crown" style="margin-bottom:2px">${I.share}</div>
    <h3 style="font-size:20px;margin-bottom:16px">${title}</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-gold" data-wa><span>${I.share}</span><span>שְׁלַח בְּוָואטְסְאַפּ</span></button>
      <button class="btn btn-ghost" data-copy><span>הַעֲתֵק</span></button>
      ${hasNative?`<button class="btn btn-ghost" data-native><span>שִׁתּוּף בַּמַּכְשִׁיר…</span></button>`:''}
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('[data-close]').onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  ov.querySelector('[data-wa]').onclick=()=>{ window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); close(); };
  ov.querySelector('[data-copy]').onclick=()=>{ copyText(text).then(()=>toast('הֻעְתַּק לַלּוּחַ')); close(); };
  const nat=ov.querySelector('[data-native]'); if(nat) nat.onclick=()=>{ const d={title,text}; if(url)d.url=url; navigator.share(d).catch(()=>{}); close(); };
}
function shareChapter(ch){
  const verses=T[ch]||[];
  const text='תהילים · פרק '+heNum(ch)+'\n\n'+verses.join('\n')+'\n\n— אפליקציית תהילים · בית אל';
  shareSheet('שִׁתּוּף פֶּרֶק '+heNum(ch), text);
}
function shareApp(){
  const url=location.href.split('#')[0];
  const text='📖 אפליקציית התהילים של קהילת בית אל\nתהילים יומי, לוח עברי וזמני היום:\n'+url;
  shareSheet('שִׁתּוּף הָאַפְּלִיקַצְיָה', text, url);
}
function openCityPicker(){
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal city-modal">
    <button class="close-x" data-close>${I.x}</button>
    <h3 style="font-size:20px;margin-bottom:12px">בְּחַר מִקּוּם</h3>
    <div class="search-box" style="margin-bottom:10px">${I.search}<input id="citySearch" placeholder="חפש עיר או מדינה…"/></div>
    <div id="cityList" class="city-list"></div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector('[data-close]').onclick=close; ov.onclick=e=>{if(e.target===ov)close();};
  const list=ov.querySelector('#cityList');
  function draw(f){ f=(f||'').trim(); list.innerHTML='';
    (window.CITIES||[]).forEach(([n,c,lat,lon,tz])=>{ if(f && !(n.indexOf(f)>=0||c.indexOf(f)>=0)) return;
      const row=document.createElement('div'); row.className='city-row';
      row.innerHTML=`<span class="cn">${n}</span><span class="cc">${c}</span>`;
      row.onclick=()=>{ LOC={lat,lon,tz,name:n+', '+c,auto:false}; saveLoc(); localStorage.setItem('betel_gps_tried','1'); close(); toast('הַמִּקּוּם עֻדְכַּן · '+n); renderSettings(); };
      list.appendChild(row); });
    if(!list.children.length) list.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px">לא נמצא מיקום</div>';
  }
  draw(''); ov.querySelector('#citySearch').oninput=e=>draw(e.target.value);
  setTimeout(()=>{try{ov.querySelector('#citySearch').focus();}catch(e){}},80);
}

/* ================= CELEBRATION ================= */
function celebrate(kind){
  const grand = kind==='grand';
  confetti(grand?90:45);
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">
    <button class="close-x" data-close>${I.x}</button>
    <div class="m-crown">${I.crown}</div>
    <h3 class="gold-text">${grand?'חֲזַק חֲזַק וְנִתְחַזֵּק':'יִישַׁר כֹּחֲךָ'}</h3>
    <p>${grand?'סִיַּמְתָּ אֶת כָּל סֵפֶר הַתְּהִלִּים לְחֹדֶשׁ זֶה!<br>תְּהִי מִשְׁנָתְךָ לְעִלּוּי וּלְבְרָכָה.':'סִיַּמְתָּ אֶת קְרִיאַת הַתְּהִלִּים שֶׁל הַיּוֹם.<br>תִּזְכֶּה לְמִצְווֹת!'}</p>
    <button class="btn btn-gold" data-close><span>${I.heart}</span><span>אָמֵן</span></button>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{ ov.remove(); go('home'); });
  ov.onclick=e=>{ if(e.target===ov){ ov.remove(); go('home'); } };
}
function confetti(n){
  const c=document.createElement('div'); c.className='confetti'; document.body.appendChild(c);
  const colors=['#d4af5f','#f3e3af','#b8860b','#e6c874','#fff'];
  for(let i=0;i<n;i++){ const p=document.createElement('i');
    p.style.left=Math.random()*100+'vw'; p.style.background=colors[i%colors.length];
    p.style.animationDuration=(2.2+Math.random()*2)+'s'; p.style.animationDelay=(Math.random()*.6)+'s';
    p.style.transform='rotate('+Math.random()*360+'deg)';
    if(Math.random()>.5)p.style.borderRadius='50%'; c.appendChild(p);
  }
  setTimeout(()=>c.remove(),5000);
}

/* ================= UI bits ================= */
const ORN='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 4.2L18 4.8l-1.4 4.4L21 11l-4.4 1.8L18 17l-4.4-1.4L12 20l-1.6-4.4L6 17l1.4-4.2L3 11l4.4-1.8L6 4.8l4.4 1.4z" opacity=".85"/></svg>';
function ornament(){ return `<div class="ornament">${ORN}</div>`; }
function topbar(title){ return `<div class="topbar">
  <img class="tb-mark" src="${LOGO}" alt=""/>
  <div class="tb-title gold-text">${title}</div>
  <div style="width:34px"></div></div>`; }
let toastT;
function toast(msg){ let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t);} t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

/* ================= BOOT ================= */
function buildNav(){
  const nav=document.createElement('div'); nav.className='bottom-nav';
  const items=[['home','דף הבית',I.home],['tehillim','תהילים',I.book],['calendar','לוח שנה',I.cal],['settings','הגדרות',I.gear]];
  nav.innerHTML=items.map(([t,l,ic])=>`<div class="nav-item ${t==='home'?'on':''}" data-tab="${t}">${ic}<span>${l}</span></div>`).join('');
  document.body.appendChild(nav);
  nav.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>go(n.dataset.tab));
}
applySettings();
buildNav();
render();

})();
</script>
